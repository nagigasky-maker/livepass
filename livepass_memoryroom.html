<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>Memory Room — LIVE PASS</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;500&family=Noto+Sans+JP:wght@300;400&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/Observer.min.js"></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --black:#080808;--white:#EDEBE6;--red:#E8100A;--blue:#3DAAFF;--green:#A8E63D;--gold:#F5C842;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bot:env(safe-area-inset-bottom,0px);
}
html,body{width:100%;height:100%;background:#0a0a0f;color:var(--white);
  font-family:'Noto Sans JP',sans-serif;-webkit-font-smoothing:antialiased;
  user-select:none;-webkit-user-select:none;overflow:hidden;
  overscroll-behavior:none;touch-action:none}

/* ══════════════════════════════════
   MEMORY ROOM — effect026 + 012 hybrid
   ══════════════════════════════════ */
.memory-room{
  position:fixed;inset:0;
  height:100vh;width:100%;
  overflow:hidden;
  background:radial-gradient(ellipse at 50% 50%,#14141c 0%,#050507 85%);
  perspective:100vw;
  perspective-origin:50% 50%;
}

/* ═════ atmosphere layers ═════ */
.mr-lights{
  position:absolute;inset:0;z-index:2;pointer-events:none;
  background:
    radial-gradient(ellipse at 15% 20%,rgba(232,16,10,.08) 0%,transparent 45%),
    radial-gradient(ellipse at 85% 75%,rgba(61,170,255,.06) 0%,transparent 45%),
    radial-gradient(ellipse at 50% 50%,rgba(168,230,61,.03) 0%,transparent 55%);
  mix-blend-mode:screen;
}
.mr-grain{
  position:absolute;inset:-50%;width:200%;height:200%;
  pointer-events:none;z-index:3;opacity:.14;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.5'/%3E%3C/svg%3E");
  background-size:180px 180px;mix-blend-mode:overlay;
  animation:grainShift .08s steps(1) infinite;
}
@keyframes grainShift{
  0%{transform:translate(0,0)} 20%{transform:translate(-3%,-2%)}
  40%{transform:translate(2%,-3%)} 60%{transform:translate(-2%,2%)}
  80%{transform:translate(3%,3%)} 100%{transform:translate(-1%,-1%)}
}
.mr-vignette{
  position:absolute;inset:0;z-index:4;pointer-events:none;
  background:radial-gradient(ellipse at 50% 50%,transparent 35%,rgba(0,0,0,.78) 100%);
}

/* ═════ effect026 container grid ═════ */
.mr-container{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  width:max-content;
  will-change:transform;
  transform-style:preserve-3d;
  z-index:1;
  position:relative;
}
.mr-content{
  display:grid;
  width:max-content;
  grid-template-columns:repeat(5,1fr);
  gap:14vw;
  padding:7vw;
}

/* Mobile: denser grid for better exploration */
@media (max-width:720px){
  .mr-content{
    grid-template-columns:repeat(3,1fr);
    gap:18vw;
    padding:9vw;
  }
}

/* ═════ individual memory tile ═════ */
.mr-media{
  width:26vw;
  aspect-ratio:3/4;
  position:relative;
  user-select:none;
  cursor:pointer;
  pointer-events:auto;
  border-radius:10px;
  overflow:hidden;
  background:#151519;
  box-shadow:0 12px 32px rgba(0,0,0,.65),0 2px 8px rgba(0,0,0,.4);
  border:1px solid rgba(255,255,255,.06);
  transform:translateZ(0);
  transition:transform .3s cubic-bezier(.25,.46,.45,.94);
}
@media (max-width:720px){
  .mr-media{ width:44vw }
}

.mr-media:active{ transform:translateZ(8px) scale(.97) }

.mr-media::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(to top,rgba(0,0,0,.88) 0%,transparent 55%);
  z-index:2;pointer-events:none;
}
.mr-bg{
  position:absolute;inset:0;
  background-size:cover;background-position:center;
}
.mr-label{
  position:absolute;bottom:0;left:0;right:0;z-index:3;
  padding:10px 12px;
}
.mr-type{
  font-family:'IBM Plex Mono',monospace;
  font-size:8px;letter-spacing:.18em;text-transform:uppercase;
  font-weight:500;margin-bottom:2px;
}
.mr-title{
  font-family:'Bebas Neue';font-size:15px;color:var(--white);
  letter-spacing:.04em;line-height:1.1;
}
.mr-time{
  position:absolute;top:10px;right:12px;z-index:3;
  font-family:'Bebas Neue';font-size:9px;letter-spacing:.1em;
  color:rgba(255,255,255,.42);
}

/* type-based accents */
.mr-media[data-type="photo"] .mr-type{color:var(--gold)}
.mr-media[data-type="setlist"] .mr-type{color:var(--green)}
.mr-media[data-type="clip"] .mr-type{color:var(--red)}
.mr-media[data-type="moment"] .mr-type{color:var(--blue)}
.mr-media[data-type="credit"] .mr-type{color:#BF5AF2}

/* ═════ HUD overlay ═════ */
.mr-hud{
  position:fixed;top:0;left:0;right:0;z-index:50;
  padding:max(14px,calc(var(--safe-top) + 10px)) 18px 14px;
  display:flex;align-items:flex-start;justify-content:space-between;
  pointer-events:none;
  background:linear-gradient(to bottom,rgba(0,0,0,.72) 0%,transparent 100%);
}
.hud-label{
  font-family:'IBM Plex Mono',monospace;
  font-size:8px;letter-spacing:.38em;text-transform:uppercase;
  color:rgba(237,235,230,.35);line-height:1;margin-bottom:3px;
}
.hud-title{
  font-family:'Bebas Neue';font-size:14px;letter-spacing:.18em;
  color:var(--white);line-height:1;
}
.hud-count{
  font-family:'Bebas Neue';font-size:11px;letter-spacing:.16em;
  color:rgba(237,235,230,.35);
}

.mr-hint{
  position:fixed;bottom:max(28px,calc(var(--safe-bot) + 18px));
  left:50%;transform:translateX(-50%);z-index:50;
  font-family:'IBM Plex Mono',monospace;
  font-size:8px;letter-spacing:.4em;text-transform:uppercase;
  color:rgba(237,235,230,.32);pointer-events:none;
  transition:opacity 1s ease;white-space:nowrap;
}

.mr-exit{
  position:fixed;top:max(14px,calc(var(--safe-top) + 10px));right:16px;z-index:60;
  width:38px;height:38px;border-radius:50%;
  background:rgba(0,0,0,.55);border:1px solid rgba(255,255,255,.12);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;color:rgba(237,235,230,.65);font-size:15px;
  -webkit-tap-highlight-color:transparent;
}

/* ═════ REVEAL modal (effect012-inspired zoom) ═════ */
.mr-reveal{
  position:fixed;inset:0;z-index:100;
  background:rgba(0,0,0,.92);
  backdrop-filter:blur(28px);-webkit-backdrop-filter:blur(28px);
  opacity:0;pointer-events:none;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:max(40px,calc(var(--safe-top) + 20px)) 20px max(40px,calc(var(--safe-bot) + 20px));
  transition:opacity .4s ease;
}
.mr-reveal.open{opacity:1;pointer-events:all}

.reveal-media{
  position:relative;
  width:min(76vw,380px);
  aspect-ratio:3/4;
  border-radius:16px;
  overflow:hidden;
  background:#151519;
  box-shadow:0 40px 100px rgba(0,0,0,.85),0 0 80px rgba(232,16,10,.15);
  transform:scale(.7) translateY(40px) rotateX(10deg);
  opacity:0;
  transition:transform .55s cubic-bezier(.22,1,.36,1),opacity .4s ease;
}
.mr-reveal.open .reveal-media{
  transform:scale(1) translateY(0) rotateX(0);opacity:1;
}
.reveal-media .mr-bg{position:absolute;inset:0;background-size:cover;background-position:center}

.reveal-meta{
  margin-top:20px;text-align:center;max-width:420px;
  opacity:0;transform:translateY(20px);
  transition:opacity .4s ease .18s,transform .55s ease .18s;
}
.mr-reveal.open .reveal-meta{opacity:1;transform:translateY(0)}
.reveal-type{
  font-family:'IBM Plex Mono',monospace;
  font-size:8px;letter-spacing:.3em;text-transform:uppercase;
  color:var(--red);font-weight:500;margin-bottom:6px;
}
.reveal-title{
  font-family:'Bebas Neue';font-size:28px;letter-spacing:.05em;
  line-height:1;margin-bottom:10px;color:var(--white);
}
.reveal-desc{
  font-size:11px;letter-spacing:.04em;line-height:1.6;
  color:rgba(237,235,230,.62);max-width:340px;margin:0 auto;
}
.reveal-time{
  font-family:'Bebas Neue';font-size:11px;letter-spacing:.18em;
  color:var(--gold);margin-top:14px;
}

.reveal-close{
  position:absolute;top:max(14px,calc(var(--safe-top) + 10px));right:16px;
  width:42px;height:42px;border-radius:50%;
  background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;color:var(--white);font-size:18px;
  -webkit-tap-highlight-color:transparent;
}
</style>
</head>
<body>

<!-- ═══ MEMORY ROOM ═══ -->
<section class="memory-room" id="room">
  <div class="mr-lights"></div>
  <div class="mr-container" id="mrContainer">
    <!-- 4 content copies for 2D wrap-around (2 cols × 2 rows) -->
    <div class="mr-content" data-copy="0"></div>
    <div class="mr-content" data-copy="1"></div>
    <div class="mr-content" data-copy="2"></div>
    <div class="mr-content" data-copy="3"></div>
  </div>
  <div class="mr-grain"></div>
  <div class="mr-vignette"></div>
</section>

<!-- HUD -->
<div class="mr-hud">
  <div>
    <div class="hud-label">Memory Room</div>
    <div class="hud-title">ALL MUST DANCE</div>
  </div>
  <div class="hud-count">#043 / 100</div>
</div>

<div class="mr-hint">Drag to explore · Tap to open</div>

<button class="mr-exit" onclick="exitRoom()">✕</button>

<!-- ═══ REVEAL MODAL ═══ -->
<div class="mr-reveal" id="reveal">
  <button class="reveal-close" onclick="closeReveal()">✕</button>
  <div class="reveal-media">
    <div class="mr-bg" id="revealBg"></div>
  </div>
  <div class="reveal-meta">
    <div class="reveal-type" id="revealType">PHOTO</div>
    <div class="reveal-title" id="revealTitle">Opening Ritual</div>
    <div class="reveal-desc" id="revealDesc">—</div>
    <div class="reveal-time" id="revealTime">—</div>
  </div>
</div>

<script>
gsap.registerPlugin(Observer);

/* ═══════════════════════════════
   MEMORY DATA
   ═══════════════════════════════ */
const MEMORIES = [
  { type:'photo',   title:'Opening Ritual',        time:'22:04', desc:'The night begins. NOBBY takes the decks and the room falls silent for the first beat.', color:'#0a1a2a' },
  { type:'setlist', title:'Somewhere — MST 2',     time:'22:18', desc:'Track 02 — Elhast_experience remix drops and the floor ignites.', color:'#1a0a0a' },
  { type:'clip',    title:'First Drop',            time:'22:27', desc:'8-second clip. The bass hit that changed everything.', color:'#2a0a1a' },
  { type:'moment',  title:'Crowd Peak',            time:'22:44', desc:'Panoramic view of the dance floor at maximum density.', color:'#0a2a1a' },
  { type:'photo',   title:'Smoke Machine',         time:'22:51', desc:'Red laser cutting through fog. NOBBY silhouette emerges.', color:'#2a1a0a' },
  { type:'setlist', title:'All Must Dance',        time:'23:02', desc:'The title track. Live mix debut. 6:42 duration.', color:'#1a1a2a' },
  { type:'credit',  title:'NOBBY · SACHI · KEITA', time:'23:10', desc:'Three-artist choreography freestyle — unscripted collaboration.', color:'#1a0a2a' },
  { type:'photo',   title:'Waacking Circle',       time:'23:18', desc:'SACHI leads the cypher. 12 dancers rotate through the center.', color:'#2a0a2a' },
  { type:'moment',  title:'Silence Break',         time:'23:33', desc:'DJ cuts the sound. 3 seconds of pure crowd breath.', color:'#0a0a1a' },
  { type:'clip',    title:'Night Vision',          time:'23:47', desc:'NOBBY track reveal. 14-second teaser.', color:'#0a2a2a' },
  { type:'photo',   title:'Stage View',            time:'00:02', desc:'From behind the decks. NOBBY hands on the faders.', color:'#2a1a1a' },
  { type:'setlist', title:'Closing Fragments',     time:'00:15', desc:'Final track sequence. Ambient breakdown into silence.', color:'#1a2a1a' },
  { type:'moment',  title:'Last Light',            time:'00:32', desc:'House lights come up. Room frozen in applause.', color:'#2a2a0a' },
  { type:'credit',  title:'Club Asia Crew',        time:'00:40', desc:'Special thanks to the venue and sound engineers.', color:'#0a1a1a' },
  { type:'photo',   title:'Exit Portrait',         time:'00:48', desc:'NOBBY stepping out. Night complete.', color:'#1a1a0a' },
];

/* ═══════════════════════════════
   POPULATE 4 CONTENT COPIES
   (effect026 pattern — 2×2 wrap)
   ═══════════════════════════════ */
function createMediaElement(m, i, copyIdx) {
  const el = document.createElement('div');
  el.className = 'mr-media';
  el.dataset.type = m.type;
  el.dataset.idx = i;
  // only the first copy is interactive (prevents dup fires)
  if (copyIdx === 0) el.dataset.primary = '1';

  const bg = document.createElement('div');
  bg.className = 'mr-bg';
  bg.style.background = `linear-gradient(135deg,${m.color} 0%,#000 100%)`;
  el.appendChild(bg);

  const label = document.createElement('div');
  label.className = 'mr-label';
  label.innerHTML = `<div class="mr-type">${m.type}</div><div class="mr-title">${m.title}</div>`;
  el.appendChild(label);

  const time = document.createElement('div');
  time.className = 'mr-time';
  time.textContent = m.time;
  el.appendChild(time);

  return el;
}

document.querySelectorAll('.mr-content').forEach((content, copyIdx) => {
  MEMORIES.forEach((m, i) => {
    content.appendChild(createMediaElement(m, i, copyIdx));
  });
});

/* ═══════════════════════════════
   EFFECT026 — infinite 2D wrap
   ═══════════════════════════════ */
const container = document.getElementById('mrContainer');

// Wait for layout before computing wrap bounds
requestAnimationFrame(() => {
  const halfX = container.clientWidth / 2;
  const halfY = container.clientHeight / 2;
  const wrapX = gsap.utils.wrap(-halfX, 0);
  const wrapY = gsap.utils.wrap(-halfY, 0);

  const xTo = gsap.quickTo(container, 'x', {
    duration: 1.3,
    ease: 'power4',
    modifiers: { x: gsap.utils.unitize(wrapX) }
  });
  const yTo = gsap.quickTo(container, 'y', {
    duration: 1.3,
    ease: 'power4',
    modifiers: { y: gsap.utils.unitize(wrapY) }
  });

  // start centered inside the wrap space
  let incrX = -halfX / 2;
  let incrY = -halfY / 2;
  xTo(incrX);
  yTo(incrY);

  Observer.create({
    target: window,
    type: 'wheel,touch,pointer',
    preventDefault: true,
    onChangeX: (self) => {
      if (self.event.type === 'wheel') incrX -= self.deltaX;
      else incrX += self.deltaX * 2;
      xTo(incrX);
      hideHint();
    },
    onChangeY: (self) => {
      if (self.event.type === 'wheel') incrY -= self.deltaY;
      else incrY += self.deltaY * 2;
      yTo(incrY);
      hideHint();
    },
  });
});

/* ═══════════════════════════════
   EFFECT012 — mild 3D rotation
   on pointer move (parallax)
   ═══════════════════════════════ */
const rotY = gsap.quickTo(container, 'rotationY', { duration: 0.8, ease: 'power1' });
const rotX = gsap.quickTo(container, 'rotationX', { duration: 0.8, ease: 'power1' });

document.getElementById('room').addEventListener('mousemove', e => {
  const valY = (e.clientX / window.innerWidth - 0.5) * 6;
  const valX = (e.clientY / window.innerHeight - 0.5) * 6;
  rotY(valY);
  rotX(-valX);
});

// Gyro on mobile — subtle 3D tilt
window.addEventListener('deviceorientation', e => {
  if (e.gamma === null || e.beta === null) return;
  const gy = Math.max(-1, Math.min(1, e.gamma / 25));
  const gx = Math.max(-1, Math.min(1, (e.beta - 45) / 25));
  rotY(gy * 5);
  rotX(-gx * 4);
}, { passive: true });

/* iOS 13+ permission request on first touch */
let gyroAsked = false;
document.addEventListener('touchstart', () => {
  if (gyroAsked) return;
  gyroAsked = true;
  if (typeof DeviceOrientationEvent !== 'undefined' &&
      typeof DeviceOrientationEvent.requestPermission === 'function') {
    DeviceOrientationEvent.requestPermission().catch(() => {});
  }
}, { once: true });

/* ═══════════════════════════════
   TAP DETECTION → REVEAL
   (only fires if finger didn't drag)
   ═══════════════════════════════ */
let downX = 0, downY = 0, downT = 0, tapCandidate = null;

document.getElementById('room').addEventListener('touchstart', e => {
  if (e.touches.length !== 1) return;
  const t = e.touches[0];
  downX = t.clientX; downY = t.clientY; downT = performance.now();
  tapCandidate = e.target.closest('.mr-media');
}, { passive: true });

document.getElementById('room').addEventListener('touchend', e => {
  if (!tapCandidate) return;
  const t = (e.changedTouches && e.changedTouches[0]) || e;
  const dx = Math.abs(t.clientX - downX);
  const dy = Math.abs(t.clientY - downY);
  const dt = performance.now() - downT;
  if (dx < 10 && dy < 10 && dt < 350) {
    openReveal(parseInt(tapCandidate.dataset.idx));
  }
  tapCandidate = null;
});

// Desktop click fallback
document.querySelectorAll('.mr-media').forEach(el => {
  el.addEventListener('click', e => {
    // Only fire on primary copies to avoid duplicate events
    openReveal(parseInt(el.dataset.idx));
  });
});

/* ═══════════════════════════════
   REVEAL MODAL
   ═══════════════════════════════ */
const revealEl = document.getElementById('reveal');

function openReveal(idx) {
  const m = MEMORIES[idx];
  if (!m) return;
  if (navigator.vibrate) navigator.vibrate(15);
  document.getElementById('revealType').textContent = m.type.toUpperCase();
  document.getElementById('revealTitle').textContent = m.title;
  document.getElementById('revealDesc').textContent = m.desc;
  document.getElementById('revealTime').textContent = `${m.time} · MAY 4 2026`;
  document.getElementById('revealBg').style.background =
    `linear-gradient(135deg,${m.color} 0%,#000 100%)`;
  revealEl.classList.add('open');
}

function closeReveal() {
  if (navigator.vibrate) navigator.vibrate(8);
  revealEl.classList.remove('open');
}

revealEl.addEventListener('click', e => {
  if (e.target === revealEl) closeReveal();
});

/* ═══════════════════════════════
   EXIT
   ═══════════════════════════════ */
function exitRoom() {
  if (navigator.vibrate) navigator.vibrate(12);
  if (history.length > 1) history.back();
  else location.href = 'livepass_collection.html';
}

/* ═══════════════════════════════
   HINT FADE
   ═══════════════════════════════ */
function hideHint() {
  document.querySelector('.mr-hint').style.opacity = '0';
}
setTimeout(hideHint, 5500);

/* ═══════════════════════════════
   KEYBOARD (desktop)
   ═══════════════════════════════ */
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    if (revealEl.classList.contains('open')) closeReveal();
    else exitRoom();
  }
});
</script>
</body>
</html>
