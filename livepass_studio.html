<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>LIVE PASS — Studio Booking</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg:#000;--bg2:#0a0a0a;--bg3:#111;--fg:#fff;--muted:rgba(255,255,255,.3);--muted2:rgba(255,255,255,.1);--border:rgba(255,255,255,.07);--dim:rgba(255,255,255,.04);--lp:#A8E63D;--sp:#F5C842;--red:#FF3B30;--green:#1D9E75;--mint:#00E5A0;}
html,body{height:100%;background:var(--bg);color:var(--fg);font-family:'Inter',sans-serif;overflow:hidden}
#app{max-width:430px;margin:0 auto;height:100dvh;display:flex;flex-direction:column;overflow:hidden}
.view{flex:1;display:none;flex-direction:column;overflow:hidden;min-height:0}
.view.active{display:flex}

/* TOPBAR */
#topbar{flex-shrink:0;padding:calc(13px + env(safe-area-inset-top,44px)) 18px 11px;border-bottom:0.5px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.logo{font-size:10px;font-weight:800;letter-spacing:4px}.logo span{color:var(--red)}
.page-title{font-size:8px;letter-spacing:3px;color:var(--muted);font-weight:300;text-transform:uppercase;margin-top:2px}
.ai-badge{font-size:7px;letter-spacing:2px;color:var(--lp);border:0.5px solid rgba(168,230,61,.3);padding:2px 9px;border-radius:1px;font-weight:400}

/* CHAT */
#chat-scroll{flex:1;overflow-y:auto;scrollbar-width:none;padding:14px 18px}
#chat-scroll::-webkit-scrollbar{display:none}
.bubble-wrap{display:flex;margin-bottom:10px}
.bubble-wrap.user{justify-content:flex-end}
.bubble{max-width:82%;padding:10px 13px;font-size:12px;line-height:1.6;letter-spacing:.1px}
.bubble.ai{background:rgba(255,255,255,.05);border:0.5px solid var(--border);border-radius:2px 12px 12px 12px;color:var(--fg)}
.bubble.user{background:var(--dim);border:0.5px solid var(--border);border-radius:12px 2px 12px 12px;color:var(--muted)}
.typing-bubble{display:flex;gap:4px;align-items:center;padding:12px 14px;background:rgba(255,255,255,.05);border:0.5px solid var(--border);border-radius:2px 12px 12px 12px}
.typing-dot{width:5px;height:5px;border-radius:50%;background:var(--muted);animation:tdot .9s ease-in-out infinite}
.typing-dot:nth-child(2){animation-delay:.15s}
.typing-dot:nth-child(3){animation-delay:.3s}
@keyframes tdot{0%,100%{opacity:.3;transform:translateY(0)}50%{opacity:1;transform:translateY(-3px)}}

/* OPTIONS */
#chat-opts{flex-shrink:0;padding:0 18px 14px;border-top:0.5px solid var(--border);padding-top:12px}
.opts-question{font-size:7px;letter-spacing:3px;color:var(--muted2);text-transform:uppercase;font-weight:400;margin-bottom:9px}
.opts-chips{display:flex;flex-wrap:wrap;gap:6px}
.opt-chip{padding:6px 13px;border-radius:1px;font-size:9px;letter-spacing:1.5px;border:0.5px solid var(--border);background:none;cursor:pointer;color:var(--muted);font-family:'Inter',sans-serif;font-weight:300;text-transform:uppercase;transition:all .2s}
.opt-chip:hover{border-color:rgba(255,255,255,.2);color:var(--fg)}
.opt-chip.selected{border-color:rgba(255,255,255,.3);color:var(--fg);background:var(--dim)}
.opts-confirm{margin-top:10px}
.opts-confirm-btn{padding:8px 20px;border-radius:1px;border:0.5px solid rgba(255,255,255,.2);background:none;font-size:8px;letter-spacing:2px;color:var(--fg);cursor:pointer;font-family:'Inter',sans-serif;font-weight:500;text-transform:uppercase;transition:all .2s}
.opts-confirm-btn:active{transform:scale(.97)}

/* RESULTS */
#results-scroll{flex:1;overflow-y:auto;scrollbar-width:none;padding:0 18px 24px}
#results-scroll::-webkit-scrollbar{display:none}
#res-top{flex-shrink:0;padding:13px 18px 11px;border-bottom:0.5px solid var(--border);display:flex;align-items:center;gap:12px}
.res-back{background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer;padding:0}
.res-title{font-size:12px;font-weight:600;letter-spacing:-.2px;flex:1}
.res-cond{font-size:7px;color:var(--muted);letter-spacing:.5px}
.res-lbl{font-size:6px;letter-spacing:3px;color:var(--muted2);text-transform:uppercase;font-weight:400;padding:14px 0 8px}
.studio-card{border:0.5px solid var(--border);border-radius:2px;margin-bottom:10px;overflow:hidden;cursor:pointer;transition:border-color .2s}
.studio-card.recommended{border-color:rgba(168,230,61,.35)}
.studio-card:active{background:var(--dim)}
.sc-header{padding:12px 14px 10px;display:flex;justify-content:space-between;align-items:flex-start}
.sc-ai-tag{font-size:6px;letter-spacing:2px;padding:2px 7px;font-weight:600;text-transform:uppercase;background:rgba(168,230,61,.1);color:var(--lp);border-radius:1px;margin-bottom:6px}
.sc-name{font-size:13px;font-weight:700;letter-spacing:-.3px;margin-bottom:2px}
.sc-room{font-size:8px;color:var(--muted);letter-spacing:.5px}
.sc-price-wrap{text-align:right;flex-shrink:0}
.sc-price{font-size:14px;font-weight:700;letter-spacing:-.4px}
.sc-price-sub{font-size:7px;color:var(--muted);margin-top:2px;letter-spacing:.5px}
.sc-slots{display:flex;gap:5px;padding:0 14px 12px;flex-wrap:wrap}
.sc-slot{padding:5px 10px;border:0.5px solid var(--border);border-radius:1px;font-size:8px;letter-spacing:1px;cursor:pointer;transition:all .15s;color:var(--muted);font-family:'Inter',sans-serif}
.sc-slot.available:hover{border-color:rgba(255,255,255,.3);color:var(--fg)}
.sc-slot.selected{border-color:var(--lp);color:var(--lp);background:rgba(168,230,61,.06)}
.sc-slot.taken{opacity:.25;cursor:default}
.sc-meta-row{display:flex;gap:0;padding:10px 14px;border-top:0.5px solid var(--border);background:var(--dim)}
.sc-meta-item{flex:1;text-align:center}
.sc-meta-key{font-size:6px;letter-spacing:2px;color:var(--muted2);text-transform:uppercase;font-weight:400;margin-bottom:3px}
.sc-meta-val{font-size:9px;font-weight:500;letter-spacing:-.1px}
.book-selected-btn{width:100%;padding:12px;border-radius:1px;border:0.5px solid rgba(168,230,61,.3);background:none;font-family:'Inter',sans-serif;font-size:8px;letter-spacing:3px;color:var(--lp);cursor:pointer;text-transform:uppercase;transition:all .2s;margin-top:16px}
.book-selected-btn:active{transform:scale(.98)}

/* CONFIRMED */
.confirmed-wrap{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 28px;text-align:center;gap:12px}
.confirmed-label{font-size:7px;letter-spacing:4px;color:var(--mint);font-weight:300}
.conf-name{font-size:18px;font-weight:300;letter-spacing:-.3px}
.conf-meta{font-size:9px;color:var(--muted);letter-spacing:.5px;font-weight:300;line-height:1.9}
.conf-divider{height:0.5px;width:60px;background:var(--border);margin:8px 0}
.conf-back{font-size:8px;letter-spacing:2px;color:var(--muted);background:none;border:0.5px solid var(--border);padding:7px 18px;cursor:pointer;font-family:'Inter',sans-serif;margin-top:8px;text-transform:uppercase}
.flyer-btn{font-size:8px;letter-spacing:2px;color:var(--lp);background:none;border:0.5px solid rgba(168,230,61,.3);padding:7px 18px;cursor:pointer;font-family:'Inter',sans-serif;text-transform:uppercase}
</style>
</head>
<body>
<div id="app">

  <!-- CHAT VIEW -->
  <div class="view active" id="chat-view">
    <div id="topbar">
      <div><div class="logo">LIVE <span>PASS</span></div><div class="page-title">AI Studio Booking</div></div>
      <div style="display:flex;align-items:center;gap:10px">
        <div class="ai-badge">AI</div>
        <button onclick="if(window.parent&&window.parent.goBack)window.parent.goBack();else window.history.back()" style="background:none;border:0.5px solid rgba(255,255,255,.15);color:rgba(255,255,255,.5);font-family:'Inter',sans-serif;font-size:10px;letter-spacing:1px;padding:6px 14px;border-radius:100px;cursor:pointer">← Back</button>
      </div>
    </div>
    <div id="chat-scroll"><div id="chat-messages"></div><div id="typing-indicator" style="display:none"><div class="typing-bubble"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div></div></div>
    <div id="chat-opts">
      <div class="opts-question" id="opts-q"></div>
      <div class="opts-chips" id="opts-chips"></div>
      <div class="opts-confirm" id="opts-confirm" style="display:none"><button class="opts-confirm-btn" onclick="confirmMulti()">決定 →</button></div>
    </div>
  </div>

  <!-- RESULTS VIEW -->
  <div class="view" id="results-view">
    <div id="res-top">
      <button class="res-back" onclick="resetToChat()">←</button>
      <div><div class="res-title">Search Results</div><div class="res-cond" id="res-cond"></div></div>
    </div>
    <div id="results-scroll">
      <div class="res-lbl" id="res-count-lbl"></div>
      <div id="results-list"></div>
      <button class="book-selected-btn" id="book-sel-btn" style="display:none" onclick="bookSelected()">予約する →</button>
    </div>
  </div>

  <!-- CONFIRMED VIEW -->
  <div class="view" id="confirmed-view">
    <div id="topbar" style="flex-shrink:0">
      <div><div class="logo">LIVE <span>PASS</span></div><div class="page-title">Reserved</div></div>
    </div>
    <div class="confirmed-wrap">
      <div class="confirmed-label">RESERVED</div>
      <div class="conf-name" id="conf-name">—</div>
      <div class="conf-meta" id="conf-meta"></div>
      <div class="conf-divider"></div>
      <button class="flyer-btn">フライヤーを生成する</button>
      <button class="conf-back" onclick="resetToChat()">最初に戻る</button>
    </div>
  </div>
</div>

<script>
const STUDIOS = [
  {id:"mission-A", studio:"Studio Mission", room:"Room A",     area:"渋谷", size:100, cap:30, price_h:3300, mirror:true,  sound:true,  color:"#9FE1CB", taken:["10:00","14:00"]},
  {id:"mission-B", studio:"Studio Mission", room:"Room B",     area:"渋谷", size:60,  cap:15, price_h:2200, mirror:true,  sound:false, color:"#9FE1CB", taken:["13:00"]},
  {id:"worcle-C",  studio:"Studio Worcle",  room:"Flooring C", area:"新宿", size:80,  cap:25, price_h:2800, mirror:true,  sound:true,  color:"#AFA9EC", taken:["11:00","15:00"]},
  {id:"worcle-D",  studio:"Studio Worcle",  room:"Studio D",   area:"新宿", size:40,  cap:10, price_h:1800, mirror:false, sound:true,  color:"#AFA9EC", taken:[]},
];

const QUESTIONS = [
  {key:"area",   q:"エリアはどこですか？",       opts:["渋谷","新宿","下北沢","恵比寿","中目黒"], multi:false},
  {key:"date",   q:"日程はいつですか？",          opts:["2026.05.17","2026.05.18","2026.05.24","2026.05.25","2026.06.01"], multi:false},
  {key:"start",  q:"開始時間は？",               opts:["10:00","11:00","12:00","13:00","14:00","15:00","16:00","17:00","18:00","19:00"], multi:false},
  {key:"hours",  q:"何時間使いますか？",          opts:["1時間","2時間","3時間","4時間"], multi:false},
  {key:"people", q:"参加人数は？",               opts:["〜10人","〜15人","〜20人","〜30人"], multi:false},
  {key:"equip",  q:"必要な設備は？（複数可）",    opts:["大鏡","音響設備","不問"], multi:true},
];

let stage = 0, cond = {}, messages = [], aiTyping = false, multiSel = [];
let results = [], selStudio = null, selSlot = null;

function addMsg(role, text){
  messages.push({role, text});
  const el = document.createElement('div');
  el.className = 'bubble-wrap'+(role==='user'?' user':'');
  el.innerHTML = `<div class="bubble ${role}">${text}</div>`;
  document.getElementById('chat-messages').appendChild(el);
  document.getElementById('chat-scroll').scrollTop = 9999;
}

function showTyping(){ document.getElementById('typing-indicator').style.display='block'; document.getElementById('chat-scroll').scrollTop=9999; }
function hideTyping(){ document.getElementById('typing-indicator').style.display='none'; }

function addAi(text, delay=700){
  showTyping();
  setTimeout(()=>{ hideTyping(); addMsg('ai', text); showOpts(stage); }, delay);
}

function showOpts(s){
  if(s >= QUESTIONS.length) return;
  const q = QUESTIONS[s];
  document.getElementById('opts-q').textContent = q.q;
  const chips = document.getElementById('opts-chips');
  chips.innerHTML = q.opts.map(o=>`<button class="opt-chip" onclick="${q.multi?'toggleMulti':'pickOpt'}('${o}')">${o}</button>`).join('');
  document.getElementById('opts-confirm').style.display = q.multi ? 'block' : 'none';
  multiSel = [];
}

function pickOpt(v){
  addMsg('user', v);
  const q = QUESTIONS[stage];
  let hours=2, people=10;
  if(q.key==='hours')  hours   = parseInt(v);
  if(q.key==='people') people  = parseInt(v.replace('〜','').replace('人',''));
  cond[q.key] = q.key==='hours'?parseInt(v):q.key==='people'?parseInt(v.replace('〜','').replace('人','')):v;
  stage++;
  if(stage < QUESTIONS.length){ addAi(QUESTIONS[stage].q); }
  else { runSearch(); }
}

function toggleMulti(v){
  const chips = document.querySelectorAll('.opt-chip');
  chips.forEach(c=>{ if(c.textContent===v) c.classList.toggle('selected'); });
  multiSel = multiSel.includes(v) ? multiSel.filter(x=>x!==v) : [...multiSel, v];
}

function confirmMulti(){
  const chosen = multiSel.length ? multiSel : ['不問'];
  addMsg('user', chosen.join(' · '));
  cond.mirror = chosen.includes('大鏡');
  cond.sound  = chosen.includes('音響設備');
  stage++;
  runSearch();
}

function runSearch(){
  addMsg('ai', '最適なスタジオを検索中...');
  showTyping();
  setTimeout(()=>{
    hideTyping();
    const hours   = cond.hours  || 2;
    const people  = cond.people || 10;
    const budget  = 20000;
    results = STUDIOS
      .filter(s=>{
        if(cond.area && s.area!==cond.area) return false;
        if(s.cap < people) return false;
        if(cond.mirror && !s.mirror) return false;
        if(cond.sound  && !s.sound)  return false;
        return getSlots(s, hours).some(sl=>!s.taken.includes(sl));
      })
      .sort((a,b)=> score(b,cond,hours) - score(a,cond,hours));
    const msg = results.length > 0 ? `条件に合うスタジオが ${results.length} 件見つかりました。` : '条件に合うスタジオが見つかりませんでした。';
    addMsg('ai', msg);
    if(results.length > 0) setTimeout(()=>showResults(), 500);
  }, 1400);
}

function score(s, c, hours){
  let sc=0;
  if(s.area===c.area) sc+=3;
  if(s.size >= (c.people||10)*4) sc+=2;
  if(c.mirror && s.mirror) sc+=1;
  if(c.sound  && s.sound)  sc+=1;
  return sc;
}

function getSlots(s, hours){
  const out=[];
  for(let h=9;h<=21-hours;h++) out.push(String(h).padStart(2,'0')+':00');
  return out;
}

function showResults(){
  document.getElementById('res-cond').textContent = [cond.area, cond.date, (cond.hours||2)+'h', (cond.people||10)+'人'].filter(Boolean).join(' · ');
  document.getElementById('res-count-lbl').textContent = `${results.length} 件見つかりました — おすすめ順`;
  const list = document.getElementById('results-list');
  const hours = cond.hours || 2;
  list.innerHTML = results.map((s,i)=>{
    const slots = getSlots(s, hours);
    const total = s.price_h * hours;
    return `<div class="studio-card${i===0?' recommended':''}" id="sc-${s.id}">
      ${i===0?`<div style="padding:5px 14px;background:rgba(168,230,61,.06);border-bottom:0.5px solid rgba(168,230,61,.2)"><span class="sc-ai-tag">AI Recommended</span></div>`:''}
      <div class="sc-header">
        <div>
          <div class="sc-name" style="color:${s.color}">${s.studio}</div>
          <div class="sc-room">${s.room} · ${s.area} · ${s.size}㎡</div>
        </div>
        <div class="sc-price-wrap">
          <div class="sc-price">¥${total.toLocaleString()}</div>
          <div class="sc-price-sub">${hours}h · ¥${s.price_h.toLocaleString()}/h</div>
        </div>
      </div>
      <div class="sc-slots">
        ${slots.map(sl=>{
          const taken = s.taken.includes(sl);
          return `<div class="sc-slot ${taken?'taken':'available'}" onclick="${taken?'':''}`+"selectSlot('"+s.id+"','"+sl+"')"+'">'+sl+'</div>';
        }).join('')}
      </div>
      <div class="sc-meta-row">
        <div class="sc-meta-item"><div class="sc-meta-key">Mirror</div><div class="sc-meta-val" style="color:${s.mirror?'var(--lp)':'var(--muted)'}">${s.mirror?'✓ あり':'—'}</div></div>
        <div class="sc-meta-item"><div class="sc-meta-key">Sound</div><div class="sc-meta-val" style="color:${s.sound?'var(--lp)':'var(--muted)'}">${s.sound?'✓ あり':'—'}</div></div>
        <div class="sc-meta-item"><div class="sc-meta-key">Cap</div><div class="sc-meta-val">${s.cap}人</div></div>
        <div class="sc-meta-item"><div class="sc-meta-key">Area</div><div class="sc-meta-val">${s.area}</div></div>
      </div>
    </div>`;
  }).join('');
  switchView('results-view');
}

function selectSlot(studioId, slot){
  selStudio = STUDIOS.find(s=>s.id===studioId);
  selSlot   = slot;
  document.querySelectorAll('.sc-slot.available').forEach(el=>el.classList.remove('selected'));
  event.target.classList.add('selected');
  document.getElementById('book-sel-btn').style.display = 'block';
  document.getElementById('book-sel-btn').textContent = `${selStudio.studio} ${selSlot} を予約する →`;
}

function bookSelected(){
  if(!selStudio || !selSlot) return;
  const hours = cond.hours || 2;
  document.getElementById('conf-name').textContent = selStudio.studio + ' ' + selStudio.room;
  document.getElementById('conf-meta').innerHTML = `${cond.area||selStudio.area} · ${cond.date||'—'}<br>${selSlot} — ${String(parseInt(selSlot)+hours).padStart(2,'0')}:00 · ${hours}h<br>¥${(selStudio.price_h*hours).toLocaleString()}`;
  switchView('confirmed-view');
}

function resetToChat(){ stage=0; cond={}; messages=[]; multiSel=[]; selStudio=null; selSlot=null; document.getElementById('chat-messages').innerHTML=''; switchView('chat-view'); setTimeout(init,100); }
function switchView(id){ document.querySelectorAll('.view').forEach(v=>v.classList.remove('active')); document.getElementById(id).classList.add('active'); }

function init(){ addMsg('ai','スタジオを探します。いくつか教えてください。'); showOpts(0); }
init();
</script>
</body>
</html>
