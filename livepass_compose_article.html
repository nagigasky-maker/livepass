<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#000000">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/livepasslogo.png">
<title>LIVE PASS — 記事作成</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=IBM+Plex+Mono:wght@400;500&family=Noto+Sans+JP:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --black:#000;--bg:#080808;--white:#EDEBE6;
  --red:#E8100A;--blue:#3DAAFF;--green:#A8E63D;
  --gold:#F5C842;--mint:#00E5A0;--pink:#F4C0D1;--purple:#bf5af2;
  --muted:rgba(237,235,230,.3);--muted2:rgba(237,235,230,.14);
  --border:rgba(255,255,255,.07);
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bot:env(safe-area-inset-bottom,0px);
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;height:100dvh;background:var(--black);color:var(--white);
  font-family:Arial,'Noto Sans JP',sans-serif;-webkit-font-smoothing:antialiased;
  user-select:none;-webkit-user-select:none;overflow:hidden;max-width:100vw;position:fixed;overscroll-behavior-x:none;touch-action:pan-y;}
a{color:inherit;text-decoration:none}
button{background:none;border:none;color:inherit;font:inherit;cursor:pointer}
input,textarea{color:inherit;font:inherit}

/* HEADER ─────────────────────── */
.hdr{
  position:fixed;top:0;left:0;right:0;z-index:10;
  padding:max(14px,calc(var(--safe-top) + 12px)) 18px 12px;
  display:flex;align-items:center;gap:14px;
  background:rgba(0,0,0,.96);
  border-bottom:0.5px solid var(--border);
}
.hdr-back{
  background:none;border:0.5px solid rgba(255,255,255,.18);
  color:rgba(237,235,230,.65);
  font-family:Arial,'Noto Sans JP',sans-serif;font-size:10px;
  font-weight:500;letter-spacing:.08em;
  padding:7px 14px;border-radius:99px;
}
.hdr-title{
  font-family:'IBM Plex Mono',monospace;
  font-size:10px;letter-spacing:.32em;text-transform:uppercase;
  color:rgba(237,235,230,.35);margin-left:auto;margin-right:auto;
  padding-right:60px;
}

/* FORM ─────────────────────── */
.form{
  position:fixed;top:0;left:0;right:0;
  bottom:calc(72px + var(--safe-bot));
  padding-top:calc(var(--safe-top) + 64px);
  overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;
  scrollbar-width:none;
  touch-action:pan-y;overscroll-behavior-x:none;max-width:100vw;
}
.form::-webkit-scrollbar{display:none}
.form-section{padding:18px 20px 4px;max-width:100%;min-width:0}
.form-label{
  font-family:'IBM Plex Mono',monospace;
  font-size:8px;letter-spacing:.34em;text-transform:uppercase;
  color:rgba(237,235,230,.3);margin-bottom:10px;
}

/* Layout picker ─────────────────────── */
.layout-row{display:flex;gap:10px}
.lay-btn{
  flex:1;display:flex;flex-direction:column;align-items:center;gap:8px;
  padding:16px 8px 12px;
  background:rgba(255,255,255,.02);
  border:0.5px solid rgba(255,255,255,.08);
  border-radius:10px;color:rgba(237,235,230,.5);
  transition:background .2s, border-color .2s, color .2s;
}
.lay-btn.active{
  background:rgba(61,170,255,.08);
  border-color:var(--blue);color:var(--blue);
}
.lay-box{border:1.5px solid currentColor;border-radius:3px}
.lay-btn[data-layout="poster"] .lay-box{width:28px;height:42px}
.lay-btn[data-layout="square"] .lay-box{width:34px;height:34px}
.lay-btn[data-layout="wide"]   .lay-box{width:48px;height:28px}
.lay-name{
  font-family:Arial,'Noto Sans JP',sans-serif;font-weight:500;
  font-size:9px;letter-spacing:.14em;text-transform:uppercase;
}

/* Input ─────────────────────── */
.input-box{
  width:100%;
  background:rgba(255,255,255,.04);
  border:0.5px solid rgba(255,255,255,.08);
  border-radius:8px;
  padding:14px 16px;
  font-family:Arial,'Noto Sans JP',sans-serif;font-size:14px;
  color:var(--white);outline:none;
  transition:border-color .2s;
}
.input-box:focus{border-color:var(--blue)}
textarea.input-box{resize:vertical;min-height:160px;line-height:1.8;font-size:13px}

/* Pill row ─────────────────────── */
.pill-row{display:flex;flex-wrap:wrap;gap:8px}
.pill{
  padding:7px 14px;border-radius:99px;
  background:rgba(255,255,255,.04);
  border:0.5px solid rgba(237,235,230,.15);
  color:rgba(237,235,230,.55);
  font-family:Arial,'Noto Sans JP',sans-serif;font-weight:500;
  font-size:10px;letter-spacing:.08em;
}
.pill.active{
  background:rgba(61,170,255,.1);
  border-color:var(--blue);color:var(--blue);
}

/* Cover upload ─────────────────────── */
.cover-upload{
  width:100%;
  border:1px dashed rgba(255,255,255,.14);
  border-radius:10px;
  background:rgba(255,255,255,.02);
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;cursor:pointer;
  transition:border-color .2s;
}
.cover-upload:hover,.cover-upload:active{border-color:var(--blue)}
.cover-upload.has-image{border-style:solid;border-color:transparent}
.cover-upload[data-layout="poster"]{aspect-ratio:9/14}
.cover-upload[data-layout="square"]{aspect-ratio:1/1}
.cover-upload[data-layout="wide"]  {aspect-ratio:16/10}
.cover-placeholder{
  display:flex;flex-direction:column;align-items:center;gap:8px;
  color:rgba(237,235,230,.3);
}
.cover-placeholder svg{width:32px;height:32px;stroke:currentColor;fill:none;stroke-width:1.5}
.cover-placeholder span{
  font-family:Arial,'Noto Sans JP',sans-serif;font-size:10px;
  letter-spacing:.12em;
}
.cover-preview-img{width:100%;height:100%;object-fit:cover;display:block}
#coverInput{display:none}

/* AI assist buttons ─────────────────────── */
.ai-btn{
  display:inline-flex;align-items:center;gap:6px;
  padding:6px 12px;border-radius:99px;
  background:rgba(168,230,61,.08);
  border:0.5px solid rgba(168,230,61,.35);
  color:var(--green);
  font-family:Arial,'Noto Sans JP',sans-serif;font-weight:700;
  font-size:9px;letter-spacing:.08em;text-transform:uppercase;
}
.ai-btn:active{background:rgba(168,230,61,.15)}
.ai-btn:disabled{opacity:.4}

/* AI prompt example bottom sheet */
#aiPromptOverlay{
  position:fixed;inset:0;z-index:1200;
  background:rgba(0,0,0,0);pointer-events:none;opacity:0;
  transition:background .3s ease, opacity .2s ease;
}
#aiPromptOverlay.active{
  background:rgba(0,0,0,.75);pointer-events:all;opacity:1;
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
}
#aiPromptSheet{
  position:fixed;left:0;right:0;bottom:0;z-index:1201;
  background:#0a0a0a;
  border-top:0.5px solid var(--border);
  border-top-left-radius:20px;border-top-right-radius:20px;
  padding:18px 20px calc(24px + var(--safe-bot));
  transform:translateY(100%);
  transition:transform .35s cubic-bezier(.2,.8,.2,1);
  box-shadow:0 -12px 40px rgba(0,0,0,.7);
  max-height:75vh;overflow-y:auto;scrollbar-width:none;
}
#aiPromptSheet::-webkit-scrollbar{display:none}
#aiPromptOverlay.active #aiPromptSheet{transform:translateY(0)}
.ap-handle{width:40px;height:4px;border-radius:99px;background:rgba(237,235,230,.2);margin:0 auto 14px}
.ap-title{
  font-family:Arial,'Noto Sans JP',sans-serif;font-weight:900;
  font-size:14px;color:var(--white);text-align:center;margin-bottom:4px;
}
.ap-sub{
  font-family:'IBM Plex Mono',monospace;font-size:8px;
  letter-spacing:.3em;text-transform:uppercase;
  color:rgba(168,230,61,.55);text-align:center;margin-bottom:18px;
}
.ap-list{display:flex;flex-direction:column;gap:8px}
.ap-item{
  display:block;width:100%;text-align:left;
  padding:14px 16px;border-radius:12px;
  background:rgba(255,255,255,.03);
  border:0.5px solid rgba(237,235,230,.08);
  border-left:3px solid var(--green);
  color:var(--white);
  font-family:Arial,'Noto Sans JP',sans-serif;
}
.ap-item:active{background:rgba(168,230,61,.06)}
.ap-cat{
  font-family:Arial,'Noto Sans JP',sans-serif;font-weight:500;
  font-size:8px;letter-spacing:.2em;text-transform:uppercase;
  color:var(--green);margin-bottom:4px;
}
.ap-text{
  font-family:Arial,'Noto Sans JP',sans-serif;font-weight:500;
  font-size:12px;color:var(--white);line-height:1.4;
}
.ap-close{
  display:block;width:100%;padding:13px;margin-top:14px;
  background:none;border:0.5px solid rgba(237,235,230,.12);
  border-radius:99px;
  font-family:Arial,'Noto Sans JP',sans-serif;font-size:11px;
  font-weight:500;color:rgba(237,235,230,.5);
}

/* Access toggle ─────────────────────── */
.access-row{display:flex;gap:8px}
.access-btn{
  flex:1;padding:14px 12px;border-radius:10px;
  background:rgba(255,255,255,.04);
  border:0.5px solid rgba(237,235,230,.15);
  color:rgba(237,235,230,.55);
  font-family:Arial,'Noto Sans JP',sans-serif;font-weight:700;
  font-size:11px;letter-spacing:.1em;text-transform:uppercase;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;
  text-align:center;min-height:68px;
}
.access-btn .ab-sub{
  font-family:Arial,'Noto Sans JP',sans-serif;
  font-size:9px;font-weight:400;letter-spacing:.02em;
  text-transform:none;opacity:.75;
}
.access-btn[data-access="free"].active{
  background:rgba(168,230,61,.08);border-color:var(--green);color:var(--green);
}
.access-btn[data-access="pass"].active{
  background:rgba(191,90,242,.08);border-color:var(--purple);color:#d4a8ff;
}
.access-btn svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2}

/* Collaboration section ─────────────────────── */
.collab-list{display:flex;flex-direction:column;gap:8px;margin-bottom:10px}
.collab-list:empty{display:none}
.collab-row{
  display:flex;align-items:center;gap:10px;
  padding:10px 12px 10px 8px;border-radius:10px;
  background:rgba(191,90,242,.06);
  border:0.5px solid rgba(191,90,242,.35);
}
.collab-row-av{
  width:28px;height:28px;border-radius:50%;
  background:linear-gradient(135deg,#bf5af2,#F4C0D1);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  font-family:Arial,sans-serif;font-weight:900;font-size:10px;color:#000;
}
.collab-row-name{
  flex:1;min-width:0;
  font-family:Arial,'Noto Sans JP',sans-serif;font-weight:700;
  font-size:13px;color:var(--white);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.collab-row-share{
  flex-shrink:0;display:flex;align-items:center;gap:4px;
  background:rgba(0,0,0,.35);border:0.5px solid rgba(191,90,242,.35);
  border-radius:99px;padding:4px 12px;
}
.collab-row-share input{
  background:none;border:none;outline:none;
  font-family:Arial,'Noto Sans JP',sans-serif;font-weight:900;
  font-size:13px;color:var(--white);width:34px;text-align:right;
  -moz-appearance:textfield;
}
.collab-row-share input::-webkit-outer-spin-button,
.collab-row-share input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
.collab-row-share span{font-family:Arial,sans-serif;font-weight:700;font-size:11px;color:#d4a8ff}
.collab-row-remove{
  width:22px;height:22px;border-radius:50%;
  background:rgba(0,0,0,.35);display:flex;align-items:center;justify-content:center;
  color:rgba(255,255,255,.75);flex-shrink:0;
}
.collab-row-remove svg{width:10px;height:10px;stroke:currentColor;fill:none;stroke-width:2.4}
.collab-search-wrap{position:relative}
.collab-suggest{
  position:absolute;top:calc(100% + 4px);left:0;right:0;z-index:6;
  background:#0c0c0c;border:0.5px solid rgba(255,255,255,.14);
  border-radius:10px;max-height:240px;overflow-y:auto;
  box-shadow:0 12px 36px rgba(0,0,0,.55);display:none;
}
.collab-suggest.open{display:block}
.collab-suggest-item{
  display:flex;align-items:center;gap:10px;
  padding:11px 14px;cursor:pointer;
  border-bottom:0.5px solid rgba(255,255,255,.04);
}
.collab-suggest-item:last-child{border-bottom:0}
.collab-suggest-item:active{background:rgba(255,255,255,.05)}
.collab-suggest-avatar{
  width:28px;height:28px;border-radius:50%;
  background:linear-gradient(135deg,#bf5af2,#F4C0D1);
  display:flex;align-items:center;justify-content:center;
  font-family:Arial,sans-serif;font-weight:900;font-size:10px;color:#000;
  flex-shrink:0;
}
.collab-suggest-name{font-family:Arial,'Noto Sans JP',sans-serif;font-weight:700;font-size:13px;color:var(--white)}
.collab-suggest-add{
  margin-left:auto;padding:5px 11px;border-radius:99px;
  background:rgba(191,90,242,.12);border:0.5px solid rgba(191,90,242,.4);
  color:#d4a8ff;font-family:Arial,sans-serif;font-weight:700;
  font-size:9px;letter-spacing:.1em;
}
.collab-total{
  margin-top:10px;padding:12px 14px;border-radius:10px;
  background:rgba(255,255,255,.02);border:0.5px solid rgba(255,255,255,.08);
  font-family:'IBM Plex Mono',monospace;font-size:9px;
  letter-spacing:.18em;text-transform:uppercase;
  color:rgba(237,235,230,.5);line-height:1.9;
}
.collab-total b{color:var(--white);font-weight:800}
.collab-total.error{background:rgba(232,16,10,.06);border-color:rgba(232,16,10,.4);color:#ff8a86}
.collab-total .me{color:#8fcaff}
.collab-total .them{color:#d4a8ff}

/* Bottom submit bar ─────────────────────── */
.submit-bar{
  position:fixed;left:0;right:0;bottom:0;z-index:10;
  padding:14px 18px calc(14px + var(--safe-bot));
  background:rgba(0,0,0,.96);
  border-top:0.5px solid var(--border);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
}
.submit-btn{
  width:100%;padding:16px;
  background:var(--green);color:#000;
  font-family:Arial,'Noto Sans JP',sans-serif;font-weight:900;
  font-size:13px;letter-spacing:.2em;text-transform:uppercase;
  border-radius:99px;
  box-shadow:0 6px 24px rgba(168,230,61,.25);
}
.submit-btn:disabled{
  background:rgba(237,235,230,.08);color:rgba(237,235,230,.25);
  box-shadow:none;
}

/* Success toast ─────────────────────── */
#toast{
  position:fixed;top:max(20px,calc(var(--safe-top) + 20px));left:50%;
  transform:translate(-50%,-30px);z-index:20;
  background:rgba(168,230,61,.15);border:0.5px solid var(--green);
  color:var(--green);padding:10px 20px;border-radius:99px;
  font-family:Arial,'Noto Sans JP',sans-serif;font-weight:700;
  font-size:11px;letter-spacing:.12em;
  opacity:0;transition:opacity .3s, transform .3s;
  pointer-events:none;
}
#toast.show{opacity:1;transform:translate(-50%,0)}

.form-bottom-padding{height:28px}
</style>
</head>
<body>

<header class="hdr">
  <a href="/home" class="hdr-back">← Back</a>
  <div class="hdr-title" id="hdrTitle">記事作成</div>
</header>

<main class="form">

  <!-- Layout ─────────────────────── -->
  <div class="form-section">
    <div class="form-label">レイアウト</div>
    <div class="layout-row" id="layoutRow">
      <button class="lay-btn active" data-layout="poster">
        <div class="lay-box"></div>
        <div class="lay-name">Poster</div>
      </button>
      <button class="lay-btn" data-layout="square">
        <div class="lay-box"></div>
        <div class="lay-name">Square</div>
      </button>
      <button class="lay-btn" data-layout="wide">
        <div class="lay-box"></div>
        <div class="lay-name">Wide</div>
      </button>
    </div>
  </div>

  <!-- Title ─────────────────────── -->
  <div class="form-section">
    <div class="form-label">タイトル</div>
    <input class="input-box" id="titleInput" placeholder="記事タイトル" maxlength="80">
  </div>

  <!-- Category ─────────────────────── -->
  <div class="form-section">
    <div class="form-label">カテゴリ</div>
    <div class="pill-row" id="catRow">
      <button class="pill active" data-cat="Culture">Culture</button>
      <button class="pill" data-cat="Interview">Interview</button>
      <button class="pill" data-cat="Fashion">Fashion</button>
      <button class="pill" data-cat="Dance">Dance</button>
      <button class="pill" data-cat="Report">Report</button>
      <button class="pill" data-cat="Photography">Photography</button>
    </div>
  </div>

  <!-- Cover image ─────────────────────── -->
  <div class="form-section">
    <div class="form-label">カバー画像</div>
    <div class="cover-upload" id="coverUpload" data-layout="poster">
      <div class="cover-placeholder" id="coverPh">
        <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="9" cy="9" r="2"/><path d="M21 15l-5-5L5 21"/></svg>
        <span>タップして画像を選択</span>
      </div>
    </div>
    <input type="file" id="coverInput" accept="image/*">
  </div>

  <!-- Body ─────────────────────── -->
  <div class="form-section">
    <div class="form-label" style="display:flex;align-items:center;gap:8px">
      <span>本文</span>
      <div style="flex:1"></div>
      <button type="button" class="ai-btn" id="aiWriteBtn" aria-label="AIで書く">
        <svg viewBox="0 0 24 24" width="12" height="12" style="stroke:currentColor;fill:none;stroke-width:2"><polygon points="12,2 15,9 22,9 17,14 19,21 12,17 5,21 7,14 2,9 9,9"/></svg>
        AIで書く
      </button>
      <button type="button" class="ai-btn" id="aiProofBtn" aria-label="校正する">
        <svg viewBox="0 0 24 24" width="12" height="12" style="stroke:currentColor;fill:none;stroke-width:2"><polyline points="20,6 9,17 4,12"/></svg>
        校正
      </button>
    </div>
    <textarea class="input-box" id="bodyInput" placeholder="記事の本文を入力... (AIで書くボタンを押すとタイトルから自動生成)" rows="8"></textarea>
    <div id="aiStatus" style="font-family:'IBM Plex Mono',monospace;font-size:8px;letter-spacing:.24em;text-transform:uppercase;color:rgba(168,230,61,.5);margin-top:8px;display:none">AI thinking…</div>
  </div>

  <!-- Access ─────────────────────── -->
  <div class="form-section">
    <div class="form-label">公開範囲</div>
    <div class="access-row" id="accessRow">
      <button class="access-btn active" data-access="free" type="button">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M7 12h10M12 7v10" stroke-linecap="round"/></svg>
        FREE
        <span class="ab-sub">誰でも閲覧可能</span>
      </button>
      <button class="access-btn" data-access="pass" type="button">
        <svg viewBox="0 0 24 24"><rect x="5" y="11" width="14" height="10" rx="2"/><path d="M8 11V8a4 4 0 0 1 8 0v3"/></svg>
        SUBSCRIBERS
        <span class="ab-sub">サブスク登録者のみ</span>
      </button>
    </div>
  </div>

  <!-- Collaboration ─────────────────────── -->
  <div class="form-section">
    <div class="form-label">COLLABORATION / 収益分配</div>
    <div class="collab-list" id="collabList"></div>
    <div class="collab-search-wrap">
      <input class="input-box" id="collabSearchInput" placeholder="コラボするアーティストを検索" autocomplete="off">
      <div class="collab-suggest" id="collabSuggest"></div>
    </div>
    <div class="collab-total" id="collabTotal" style="display:none">
      <div><b>自分の取り分</b> <span class="me" id="collabMyShare">100%</span></div>
      <div><b>コラボ合計</b> <span class="them" id="collabThemShare">0%</span></div>
    </div>
    <div style="font-family:'IBM Plex Mono',monospace;font-size:8px;letter-spacing:.18em;text-transform:uppercase;color:rgba(237,235,230,.3);margin-top:8px;line-height:1.7">
      ※ コラボアーティストを追加すると、収益が指定の割合で自動分配されます
    </div>
  </div>

  <div class="form-bottom-padding"></div>
</main>

<div class="submit-bar">
  <button class="submit-btn" id="submitBtn">投稿する →</button>
</div>

<div id="toast">✓ 投稿しました</div>

<!-- ═══ AI PROMPT EXAMPLES ═══ -->
<div id="aiPromptOverlay" aria-hidden="true">
  <div id="aiPromptSheet" role="dialog" aria-label="AI プロンプト例">
    <div class="ap-handle"></div>
    <div class="ap-title">AI で記事を書く</div>
    <div class="ap-sub">Pick a prompt or write your own</div>
    <div class="ap-list" id="apList"></div>
    <button class="ap-close" id="apClose">キャンセル</button>
  </div>
</div>

<script>
/* State */
const state = {
  layout: 'poster',
  category: 'Culture',
  access: 'free',
  coverDataUrl: null,
  collaborators: [], // [{ name, share }]
};

// ─── Account directory (mirrors compose_event) ───
const KNOWN_ACCOUNTS = [
  { name: 'NOBBY' }, { name: 'MOZYSKYE' }, { name: 'KENJI' }, { name: 'SAKURA' },
  { name: 'YUKI' }, { name: 'TAKUYA' }, { name: 'MARI' }, { name: 'REN' },
  { name: 'AMI' }, { name: 'KOTA' }, { name: 'HARUKA' }, { name: 'RYO' },
  { name: 'SPACE COOKING' }, { name: 'DUBLA®' }, { name: 'LIVE PASS' },
];
function loadDynamicAccounts() {
  const set = new Map();
  KNOWN_ACCOUNTS.forEach(a => set.set(a.name, a));
  const tryLoad = (key) => { try { const r = localStorage.getItem(key); return r ? JSON.parse(r) : []; } catch(e) { return []; } };
  [...tryLoad('livepass_following'), ...tryLoad('livepass_followers')].forEach(u => {
    const n = typeof u === 'string' ? u : (u && u.name);
    if (n && !set.has(n)) set.set(n, { name: n });
  });
  return Array.from(set.values());
}
const ALL_ACCOUNTS = loadDynamicAccounts();
const initialsOf = (n) => (n || '?').replace(/[^A-Za-z0-9\u3040-\u30FF\u4E00-\u9FFF]/g, '').slice(0, 2).toUpperCase();

/* Layout picker */
document.querySelectorAll('.lay-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.lay-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    state.layout = btn.dataset.layout;
    document.getElementById('coverUpload').dataset.layout = state.layout;
    if (navigator.vibrate) navigator.vibrate(6);
  });
});

/* Category pills */
document.querySelectorAll('#catRow .pill').forEach(p => {
  p.addEventListener('click', () => {
    document.querySelectorAll('#catRow .pill').forEach(x => x.classList.remove('active'));
    p.classList.add('active');
    state.category = p.dataset.cat;
  });
});

/* Access toggle */
document.querySelectorAll('.access-btn').forEach(b => {
  b.addEventListener('click', () => {
    document.querySelectorAll('.access-btn').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    state.access = b.dataset.access;
  });
});

/* ─── Collaboration ─── */
const collabList     = document.getElementById('collabList');
const collabSearchIn = document.getElementById('collabSearchInput');
const collabSuggest  = document.getElementById('collabSuggest');
const collabTotal    = document.getElementById('collabTotal');
const collabMyShare  = document.getElementById('collabMyShare');
const collabThemShare= document.getElementById('collabThemShare');

function updateCollabTotals() {
  const them = state.collaborators.reduce((s, c) => s + (Number(c.share)||0), 0);
  const me = 100 - them;
  collabMyShare.textContent = me + '%';
  collabThemShare.textContent = them + '%';
  collabTotal.style.display = state.collaborators.length > 0 ? 'block' : 'none';
  collabTotal.classList.toggle('error', them > 100 || me < 0);
}
function renderCollabList() {
  collabList.innerHTML = state.collaborators.map((c, i) => `
    <div class="collab-row" data-i="${i}">
      <div class="collab-row-av">${initialsOf(c.name)}</div>
      <div class="collab-row-name">${c.name}</div>
      <div class="collab-row-share">
        <input type="number" min="0" max="100" step="5" value="${c.share}" data-i="${i}">
        <span>%</span>
      </div>
      <button type="button" class="collab-row-remove" data-remove-collab="${i}" aria-label="Remove">
        <svg viewBox="0 0 24 24"><line x1="6" y1="6" x2="18" y2="18"/><line x1="6" y1="18" x2="18" y2="6"/></svg>
      </button>
    </div>
  `).join('');
  updateCollabTotals();
}
collabList.addEventListener('click', (e) => {
  const removeBtn = e.target.closest('[data-remove-collab]');
  if (!removeBtn) return;
  state.collaborators.splice(Number(removeBtn.dataset.removeCollab), 1);
  renderCollabList();
});
collabList.addEventListener('input', (e) => {
  if (e.target.tagName !== 'INPUT') return;
  const i = Number(e.target.dataset.i);
  state.collaborators[i].share = Math.max(0, Math.min(100, parseInt(e.target.value, 10) || 0));
  updateCollabTotals();
});
function renderCollabSuggest(query) {
  const q = (query || '').trim().toLowerCase();
  const added = new Set(state.collaborators.map(c => c.name));
  let matches = ALL_ACCOUNTS.filter(a => !added.has(a.name));
  if (q) matches = matches.filter(a => a.name.toLowerCase().includes(q));
  matches = matches.slice(0, 8);
  if (matches.length === 0) {
    if (q) {
      collabSuggest.innerHTML = `
        <div class="collab-suggest-item" data-collab-add-new="${q.toUpperCase()}">
          <div class="collab-suggest-avatar">${initialsOf(q)}</div>
          <div class="collab-suggest-name">${q.toUpperCase()}</div>
          <div class="collab-suggest-add">+ ADD</div>
        </div>`;
    } else {
      collabSuggest.innerHTML = `<div class="collab-suggest-item" style="justify-content:center;color:rgba(237,235,230,.4);font-size:11px">候補なし</div>`;
    }
    collabSuggest.classList.add('open');
    return;
  }
  collabSuggest.innerHTML = matches.map(a => `
    <div class="collab-suggest-item" data-collab-add="${a.name}">
      <div class="collab-suggest-avatar">${initialsOf(a.name)}</div>
      <div class="collab-suggest-name">${a.name}</div>
      <div class="collab-suggest-add">+ ADD</div>
    </div>
  `).join('');
  collabSuggest.classList.add('open');
}
collabSearchIn.addEventListener('focus', () => renderCollabSuggest(collabSearchIn.value));
collabSearchIn.addEventListener('input', () => renderCollabSuggest(collabSearchIn.value));
collabSearchIn.addEventListener('blur', () => setTimeout(() => collabSuggest.classList.remove('open'), 180));
collabSuggest.addEventListener('mousedown', (e) => {
  const item = e.target.closest('[data-collab-add], [data-collab-add-new]');
  if (!item) return;
  e.preventDefault();
  const name = item.dataset.collabAdd || item.dataset.collabAddNew;
  const remaining = Math.max(0, 100 - state.collaborators.reduce((s, c) => s + (Number(c.share)||0), 0));
  const defaultShare = remaining > 0 ? Math.min(remaining, 20) : 0;
  state.collaborators.push({ name, share: defaultShare });
  renderCollabList();
  collabSearchIn.value = '';
  renderCollabSuggest('');
  collabSearchIn.focus();
});

/* Cover upload — downscale to max 1280px before storing so the Data URL
   fits comfortably in localStorage (5MB limit per origin). */
function downscaleImageFile(file, maxDim = 1280, quality = 0.82) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        const scale = Math.min(1, maxDim / Math.max(img.width, img.height));
        const w = Math.round(img.width  * scale);
        const h = Math.round(img.height * scale);
        const canvas = document.createElement('canvas');
        canvas.width  = w;
        canvas.height = h;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.onerror = reject;
      img.src = e.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

const coverUpload = document.getElementById('coverUpload');
const coverInput  = document.getElementById('coverInput');
const coverPh     = document.getElementById('coverPh');
coverUpload.addEventListener('click', () => coverInput.click());
coverInput.addEventListener('change', async (e) => {
  const file = e.target.files && e.target.files[0];
  if (!file) return;
  try {
    const dataUrl = await downscaleImageFile(file);
    state.coverDataUrl = dataUrl;
    coverUpload.classList.add('has-image');
    coverUpload.innerHTML = `<img class="cover-preview-img" src="${dataUrl}" alt="">`;
    if (navigator.vibrate) navigator.vibrate(8);
  } catch (err) {
    alert('画像の読み込みに失敗しました: ' + err.message);
  }
});

/* AI assist — write + proofread via /api/ai-write */
const aiWriteBtn   = document.getElementById('aiWriteBtn');
const aiProofBtn   = document.getElementById('aiProofBtn');
const aiStatus     = document.getElementById('aiStatus');
const aiPromptOverlay = document.getElementById('aiPromptOverlay');
const aiPromptClose   = document.getElementById('apClose');
const apList          = document.getElementById('apList');

/* Example prompts — tapping one fills the title then calls AI write */
const PROMPT_EXAMPLES = [
  { cat:'Event Report', text:'昨夜 LIQUIDROOM で開催された All Must Dance Vol.25 のレポート。フロアの熱気、印象的だった曲、ゲスト DJ、朝までの流れを臨場感を持って書く。' },
  { cat:'Artist Interview', text:'NOBBY へのインタビュー記事。Space Cooking™ の哲学、中間搾取のないプラットフォームを作る理由、ダンスと DJ と生活の関係性について。' },
  { cat:'Culture',         text:'東京のハウスダンス文化と DJ カルチャーの繋がりについてのエッセイ。90年代からの系譜と、今なぜ LIVE PASS が必要なのか。' },
  { cat:'Workshop Review', text:'SACHI の Waacking Intensive に参加した感想。技法の解説、SACHI の教え方の特徴、初心者でも楽しめた理由。' },
  { cat:'Fashion · DUBLA', text:'DUBLA® の最新コレクションについて。ダンサー目線で動きやすさ、シルエット、着こなしのコツを紹介。' },
  { cat:'Manifesto',       text:'アーティストがプラットフォームに搾取されない仕組みについてのマニフェスト。LIVE PASS が解決する問題と未来像を情熱的に。' },
  { cat:'Tokyo Scene',     text:'今月の東京ダンスシーンのハイライト。注目イベント、ピックアップアーティスト、これから来る若手について。' },
  { cat:'Free Topic',      text:'好きなトピックで自由に書く — タイトルから自動で本文を生成する' },
];

function renderPromptList(){
  apList.innerHTML = '';
  PROMPT_EXAMPLES.forEach((p, i) => {
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'ap-item';
    btn.innerHTML = `<div class="ap-cat">${p.cat}</div><div class="ap-text">${p.text}</div>`;
    btn.addEventListener('click', () => {
      // For all except "Free Topic", seed the body textarea with the prompt
      // as a "memo", then call AI write. Free Topic just uses whatever title
      // is currently set.
      if (i < PROMPT_EXAMPLES.length - 1) {
        document.getElementById('bodyInput').value = p.text;
        // If title is empty, suggest one based on the category
        const titleInput = document.getElementById('titleInput');
        if (!titleInput.value.trim()) {
          titleInput.value = p.cat;
        }
      }
      closePromptSheet();
      callAI('write');
    });
    apList.appendChild(btn);
  });
}
function openPromptSheet(){
  renderPromptList();
  aiPromptOverlay.classList.add('active');
  aiPromptOverlay.setAttribute('aria-hidden', 'false');
  if (navigator.vibrate) navigator.vibrate(8);
}
function closePromptSheet(){
  aiPromptOverlay.classList.remove('active');
  aiPromptOverlay.setAttribute('aria-hidden', 'true');
}
aiPromptClose.addEventListener('click', closePromptSheet);
aiPromptOverlay.addEventListener('click', (e) => { if (e.target === aiPromptOverlay) closePromptSheet(); });
window.addEventListener('keydown', (e) => {
  if (e.key === 'Escape' && aiPromptOverlay.classList.contains('active')) closePromptSheet();
});

async function callAI(action){
  const title = document.getElementById('titleInput').value.trim();
  const body  = document.getElementById('bodyInput').value.trim();
  if (action === 'write' && !title) {
    alert('タイトルを入力してから AI で書くを押してください');
    return;
  }
  if (action === 'proof' && !body) {
    alert('校正する本文を先に入力してください');
    return;
  }
  aiWriteBtn.disabled = aiProofBtn.disabled = true;
  aiStatus.style.display = 'block';
  aiStatus.textContent = action === 'write' ? 'AI writing…' : 'AI proofreading…';
  try {
    const r = await fetch('/api/ai-write', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action, title, body }),
    });
    const data = await r.json();
    if (!r.ok) throw new Error(data.error || 'api error');
    document.getElementById('bodyInput').value = data.text || '';
    if (data.stub) {
      aiStatus.textContent = 'AI stub — set ANTHROPIC_API_KEY in Vercel';
      aiStatus.style.color = 'rgba(245,200,66,.7)';
    } else {
      aiStatus.textContent = 'AI ✓ Done';
      aiStatus.style.color = 'rgba(168,230,61,.7)';
    }
    if (navigator.vibrate) navigator.vibrate(12);
    updateSubmitState();
    setTimeout(() => { aiStatus.style.display = 'none'; }, 2400);
  } catch (e) {
    aiStatus.textContent = 'AI error: ' + e.message;
    aiStatus.style.color = 'rgba(232,16,10,.8)';
    setTimeout(() => { aiStatus.style.display = 'none'; }, 3400);
  } finally {
    aiWriteBtn.disabled = aiProofBtn.disabled = false;
  }
}

// AI write button → show the prompt examples sheet first
aiWriteBtn.addEventListener('click', openPromptSheet);
// Proofread goes straight to the API (no picker needed)
aiProofBtn.addEventListener('click', () => callAI('proof'));

/* Submit */
const submitBtn = document.getElementById('submitBtn');
const titleInput = document.getElementById('titleInput');
const bodyInput = document.getElementById('bodyInput');

function updateSubmitState(){
  const valid = titleInput.value.trim().length > 0 && bodyInput.value.trim().length > 0;
  submitBtn.disabled = !valid;
}
titleInput.addEventListener('input', updateSubmitState);
bodyInput.addEventListener('input', updateSubmitState);
updateSubmitState();

// ─── Edit mode ───
// ?edit=<id> loads the article, prefills every field, and the submit
// handler updates the existing entry in place instead of inserting a
// new one.
const editId = new URLSearchParams(location.search).get('edit');
let editingArticle = null;
if (editId) {
  try {
    const raw = localStorage.getItem('livepass_articles');
    const list = raw ? JSON.parse(raw) : [];
    editingArticle = list.find(a => a.id === editId) || null;
    if (editingArticle) {
      const me = localStorage.getItem('livepass_account_name') || 'NOBBY';
      if ((editingArticle.author || 'NOBBY') !== me) {
        alert('この記事を編集する権限がありません');
        location.href = '/profile';
      }
    }
  } catch(e) {}
}

if (editingArticle) {
  document.getElementById('hdrTitle').textContent = '記事編集';
  submitBtn.textContent = '変更を保存 →';

  // Layout
  state.layout = editingArticle.layout || 'poster';
  document.querySelectorAll('.lay-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.layout === state.layout);
  });
  document.getElementById('coverUpload').dataset.layout = state.layout;

  // Category
  state.category = editingArticle.category || 'Culture';
  document.querySelectorAll('#catRow .pill').forEach(p => {
    p.classList.toggle('active', p.dataset.cat === state.category);
  });

  // Access (free / pass)
  state.access = editingArticle.access || 'free';
  document.querySelectorAll('.access-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.access === state.access);
  });

  // Title / body
  titleInput.value = editingArticle.title || '';
  bodyInput.value  = editingArticle.body  || '';

  // Cover preview
  if (editingArticle.cover) {
    state.coverDataUrl = editingArticle.cover;
    const coverUpload = document.getElementById('coverUpload');
    coverUpload.classList.add('has-image');
    coverUpload.innerHTML = `<img class="cover-preview-img" src="${editingArticle.cover}" alt="">`;
  }

  // Collaborators
  if (Array.isArray(editingArticle.collaborators)) {
    state.collaborators = editingArticle.collaborators.map(c => ({
      name: c.name || c, share: Number(c.share) || 0,
    }));
    renderCollabList();
  }

  updateSubmitState();
}

submitBtn.addEventListener('click', () => {
  if (submitBtn.disabled) return;
  const article = {
    id:       editingArticle ? editingArticle.id : 'a' + Date.now(),
    type:     'article',
    layout:   state.layout,
    category: state.category,
    access:   state.access,
    cover:    state.coverDataUrl,
    title:    titleInput.value.trim(),
    body:     bodyInput.value.trim(),
    collaborators: state.collaborators.slice(),
    author:   (editingArticle && editingArticle.author) || localStorage.getItem('livepass_account_name') || 'NOBBY',
    createdAt:(editingArticle && editingArticle.createdAt) || new Date().toISOString(),
    updatedAt:editingArticle ? new Date().toISOString() : undefined,
    // Preserve reshare metadata if present
    sharedBy:         editingArticle ? editingArticle.sharedBy : undefined,
    sharedFromId:     editingArticle ? editingArticle.sharedFromId : undefined,
    sharedFromAuthor: editingArticle ? editingArticle.sharedFromAuthor : undefined,
  };
  function saveArticles(list) {
    localStorage.setItem('livepass_articles', JSON.stringify(list));
  }
  function pushArticle(withCover) {
    const raw = localStorage.getItem('livepass_articles');
    const list = raw ? JSON.parse(raw) : [];
    const payload = { ...article, cover: withCover ? article.cover : null };
    if (editingArticle) {
      // Replace the existing entry in place (preserve original position)
      const idx = list.findIndex(x => x.id === editingArticle.id);
      if (idx >= 0) list[idx] = payload;
      else list.unshift(payload);
    } else {
      list.unshift(payload);
    }
    saveArticles(list);
  }
  try {
    pushArticle(true);
  } catch(e) {
    // Quota exceeded: try again without the cover image
    if (e && /quota|QUOTA/i.test(e.name + ' ' + e.message)) {
      try {
        pushArticle(false);
        alert('カバー画像が大きすぎたので画像なしで投稿しました。');
      } catch(e2) {
        alert('投稿の保存に失敗しました (localStorage full): ' + e2.message +
              '\n\nSettings で古い投稿を削除するか、ブラウザのストレージを消去してください。');
        return;
      }
    } else {
      alert('投稿の保存に失敗しました: ' + e.message);
      return;
    }
  }
  if (navigator.vibrate) navigator.vibrate([18, 40, 18]);
  const toast = document.getElementById('toast');
  toast.classList.add('show');
  setTimeout(() => {
    location.href = editingArticle ? '/profile' : '/home';
  }, 900);
});
</script>

</body>
</html>
