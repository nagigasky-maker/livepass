<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta http-equiv="Cache-Control" content="no-store,no-cache,must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta http-equiv="refresh" content="0;url=/home">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/livepass-icon-180.png">
<title>LIVE PASS</title>
<style>html,body{margin:0;background:#000;color:#EDEBE6;font-family:Arial,sans-serif;height:100vh;display:flex;align-items:center;justify-content:center}img{height:32px;opacity:.85}</style>
<script type="module" src="/firebase-init.js"></script>
</head>
<body>
<img src="/livepasslogo.png" alt="LIVE PASS">
<script>
(function(){
  try {
    // Break out of any parent iframe (legacy shell)
    if (window.top !== window.self) { window.top.location.replace('/home'); return; }
    const signedIn = !!localStorage.getItem('livepass_account_name');
    window.location.replace(signedIn ? '/home' : '/onboarding');
  } catch(e) { window.location.replace('/home'); }
})();
</script>
</body>
</html>
