<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>LIVE PASS — Store</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#000;--bg2:#0a0a0a;--bg3:#111;--bg4:#161616;
  --fg:#fff;--muted:rgba(255,255,255,.3);--muted2:rgba(255,255,255,.1);
  --border:rgba(255,255,255,.07);--dim:rgba(255,255,255,.04);
  --lp:#A8E63D;--sp:#F5C842;--red:#FF3B30;
  --blue:#3DAAFF;--purple:#BF5AF2;--mint:#00E5A0;
}
html,body{height:100%;background:var(--bg);color:var(--fg);font-family:'Inter',sans-serif;overflow:hidden}
#app{max-width:430px;margin:0 auto;height:100dvh;position:relative;overflow:hidden;display:flex;flex-direction:column}

/* ── VIEWS ── */
.view{flex:1;display:none;flex-direction:column;overflow:hidden;min-height:0}
.view.active{display:flex}

/* ────────────────────────────
   STORE VIEW
──────────────────────────── */

/* TOPBAR */
#s-topbar{flex-shrink:0;padding:calc(13px + env(safe-area-inset-top,44px)) 18px 11px;border-bottom:0.5px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:rgba(0,0,0,.98);position:relative}
.logo{font-size:10px;font-weight:800;letter-spacing:4px}.logo span{color:var(--red)}
.store-title{font-size:8px;letter-spacing:3px;color:var(--muted);font-weight:300;text-transform:uppercase}
.topbar-r{display:flex;align-items:center;gap:8px}
.cart-btn{display:flex;align-items:center;gap:6px;padding:5px 12px;border:0.5px solid var(--border);border-radius:1px;background:none;color:var(--muted);cursor:pointer;font-family:'Inter',sans-serif;font-size:8px;letter-spacing:2px;font-weight:400;text-transform:uppercase;transition:all .2s}
.cart-btn.has-items{border-color:rgba(255,255,255,.2);color:var(--fg)}
.cart-count{background:var(--red);color:#fff;border-radius:100px;font-size:8px;font-weight:700;padding:1px 6px;letter-spacing:0}

/* TIER BAR */
#tier-bar{flex-shrink:0;padding:10px 18px;border-bottom:0.5px solid var(--border);background:var(--bg2)}
.tier-lbl{font-size:6px;letter-spacing:3px;color:rgba(255,255,255,.18);text-transform:uppercase;font-weight:300;margin-bottom:8px}
.tier-btns{display:flex;gap:6px}
.tier-btn{flex:1;padding:7px 4px;border-radius:1px;font-size:7px;letter-spacing:2px;border:0.5px solid var(--border);background:none;cursor:pointer;font-family:'Inter',sans-serif;font-weight:400;text-transform:uppercase;color:var(--muted);transition:all .2s;text-align:center}
.tier-btn.active-free{border-color:rgba(255,255,255,.2);color:var(--fg);background:var(--dim)}
.tier-btn.active-live{border-color:rgba(168,230,61,.4);color:var(--lp);background:rgba(168,230,61,.06)}
.tier-btn.active-super{border-color:rgba(245,200,66,.4);color:var(--sp);background:rgba(245,200,66,.06)}

/* BENEFIT BANNER */
#benefit-banner{flex-shrink:0;overflow:hidden;max-height:0;transition:max-height .3s}
#benefit-banner.show{max-height:60px}
.benefit-inner{padding:10px 18px;font-size:9px;font-weight:300;line-height:1.7;letter-spacing:.3px;border-bottom:0.5px solid var(--border)}

/* CATEGORY TABS */
#cat-tabs{flex-shrink:0;display:flex;padding:0 18px;border-bottom:0.5px solid var(--border);overflow-x:auto;scrollbar-width:none}
#cat-tabs::-webkit-scrollbar{display:none}
.cat-tab{font-size:8px;letter-spacing:2px;padding:9px 11px;border:none;background:none;color:var(--muted);cursor:pointer;border-bottom:1px solid transparent;font-family:'Inter',sans-serif;font-weight:400;text-transform:uppercase;white-space:nowrap;flex-shrink:0;transition:all .2s}
.cat-tab.active{color:var(--fg);border-bottom-color:var(--fg)}

/* PRODUCT GRID */
#prod-scroll{flex:1;overflow-y:auto;scrollbar-width:none;padding:12px 18px 24px}
#prod-scroll::-webkit-scrollbar{display:none}
#prod-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}

/* PRODUCT CARD */
.p-card{border:0.5px solid var(--border);border-radius:2px;overflow:hidden;background:var(--bg2);cursor:pointer;transition:border-color .2s,transform .15s}
.p-card:active{transform:scale(.98)}
.p-card.locked{opacity:.5}
.p-card-thumb{height:110px;position:relative;display:flex;align-items:center;justify-content:center;overflow:hidden}
.p-card-thumb-inner{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;opacity:.08}
.p-card-thumb-icon{font-size:40px}
.p-badge{position:absolute;top:7px;left:7px;font-size:6px;letter-spacing:1.5px;padding:2px 7px;font-weight:600;text-transform:uppercase}
.p-badge-r{position:absolute;top:7px;right:7px;font-size:6px;letter-spacing:1.5px;padding:2px 7px;font-weight:600;text-transform:uppercase}
.p-stock{position:absolute;bottom:7px;right:7px;font-size:6px;letter-spacing:1px;padding:2px 6px;background:rgba(0,0,0,.7);border:0.5px solid rgba(255,255,255,.15);font-weight:400}
.p-body{padding:10px 11px}
.p-cat{font-size:7px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;font-weight:300;margin-bottom:3px}
.p-name{font-size:12px;font-weight:500;letter-spacing:-.3px;line-height:1.2;margin-bottom:3px}
.p-desc{font-size:8px;color:rgba(255,255,255,.35);font-weight:300;letter-spacing:.3px;line-height:1.5;margin-bottom:9px}
.p-foot{display:flex;align-items:center;justify-content:space-between}
.p-price-wrap{}
.p-price{font-size:14px;font-weight:600;letter-spacing:-.4px;line-height:1}
.p-price-orig{font-size:9px;color:var(--muted);text-decoration:line-through;margin-top:1px}
.p-add{font-size:7px;letter-spacing:2px;padding:5px 10px;border-radius:1px;border:0.5px solid;background:none;cursor:pointer;font-family:'Inter',sans-serif;font-weight:500;text-transform:uppercase;transition:all .2s}
.p-add:active{transform:scale(.93)}
.p-add.locked-btn{border-color:var(--border);color:var(--muted);cursor:default}

/* ────────────────────────────
   PRODUCT DETAIL VIEW
──────────────────────────── */
#detail-view{overflow:hidden}
#d-scroll{flex:1;overflow-y:auto;scrollbar-width:none}
#d-scroll::-webkit-scrollbar{display:none}
#d-topbar{flex-shrink:0;padding:13px 18px 11px;border-bottom:0.5px solid var(--border);display:flex;align-items:center;gap:12px}
.d-back{background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer;line-height:1;padding:0;flex-shrink:0}
.d-top-title{font-size:12px;font-weight:500;letter-spacing:-.2px;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.d-hero{height:220px;position:relative;display:flex;align-items:center;justify-content:center;overflow:hidden}
.d-hero-icon{font-size:80px;opacity:.08}
.d-hero-badges{position:absolute;top:12px;left:12px;display:flex;gap:5px;flex-wrap:wrap}
.d-hero-stock{position:absolute;bottom:12px;right:12px;font-size:7px;letter-spacing:1px;padding:3px 8px;background:rgba(0,0,0,.7);border:0.5px solid rgba(255,255,255,.15)}
.d-info{padding:18px}
.d-cat{font-size:7px;letter-spacing:3px;color:var(--muted);text-transform:uppercase;font-weight:300;margin-bottom:6px}
.d-name{font-size:20px;font-weight:700;letter-spacing:-.6px;line-height:1;margin-bottom:6px}
.d-desc{font-size:11px;color:rgba(255,255,255,.45);font-weight:300;letter-spacing:.3px;line-height:1.9;margin-bottom:16px}
.d-price-row{display:flex;align-items:baseline;gap:10px;margin-bottom:6px}
.d-price{font-size:26px;font-weight:700;letter-spacing:-1px}
.d-orig{font-size:12px;color:var(--muted);text-decoration:line-through}
.d-discount-pill{font-size:7px;letter-spacing:1px;padding:2px 8px;border-radius:100px;font-weight:600}
.d-meta{border-top:0.5px solid var(--border);padding-top:14px;margin-top:14px}
.d-meta-row{display:flex;align-items:baseline;padding:8px 0;border-bottom:0.5px solid rgba(255,255,255,.04)}
.d-meta-row:last-child{border-bottom:none}
.d-meta-key{font-size:7px;letter-spacing:2px;color:rgba(255,255,255,.2);text-transform:uppercase;flex:0 0 90px;font-weight:300}
.d-meta-dots{flex:1;border-bottom:1px dotted rgba(255,255,255,.06);margin:0 10px;position:relative;top:-3px}
.d-meta-val{font-size:10px;font-weight:300;color:rgba(255,255,255,.6);letter-spacing:.3px}
.d-meta-val.colored{font-weight:500}
.d-colors{display:flex;gap:6px;padding:12px 18px;border-top:0.5px solid var(--border)}
.d-color-swatch{width:24px;height:24px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:border-color .15s}
.d-color-swatch.active{border-color:rgba(255,255,255,.5)}
#d-footer{flex-shrink:0;padding:12px 18px;border-top:0.5px solid var(--border);background:rgba(0,0,0,.98)}
.d-add-btn{width:100%;padding:13px;border-radius:1px;font-family:'Inter',sans-serif;font-size:8px;letter-spacing:3px;font-weight:500;text-transform:uppercase;cursor:pointer;transition:all .2s;border:0.5px solid}
.d-add-btn:active{transform:scale(.98)}

/* ────────────────────────────
   CART VIEW
──────────────────────────── */
#cart-view{overflow:hidden}
#c-scroll{flex:1;overflow-y:auto;scrollbar-width:none}
#c-scroll::-webkit-scrollbar{display:none}
#c-topbar{flex-shrink:0;padding:13px 18px 11px;border-bottom:0.5px solid var(--border);display:flex;align-items:center;gap:12px}
.c-back{background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer;line-height:1;padding:0}
.c-title{font-size:13px;font-weight:600;letter-spacing:-.3px;flex:1}
.cart-item{display:flex;gap:12px;padding:14px 18px;border-bottom:0.5px solid rgba(255,255,255,.04)}
.ci-thumb{width:52px;height:52px;border-radius:2px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:20px;position:relative;overflow:hidden}
.ci-thumb-bg{position:absolute;inset:0;opacity:.9}
.ci-thumb-icon{position:relative;z-index:1;opacity:.3}
.ci-info{flex:1;min-width:0}
.ci-name{font-size:12px;font-weight:500;letter-spacing:-.2px;margin-bottom:3px}
.ci-price{font-size:10px;color:var(--muted);font-weight:300;letter-spacing:.3px}
.ci-right{display:flex;flex-direction:column;align-items:flex-end;justify-content:space-between;flex-shrink:0}
.ci-total{font-size:13px;font-weight:600;letter-spacing:-.3px}
.ci-qty{display:flex;align-items:center;gap:8px}
.ci-qty-btn{width:22px;height:22px;border-radius:1px;border:0.5px solid var(--border);background:none;color:var(--fg);cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.ci-qty-btn:active{background:var(--dim)}
.ci-qty-num{font-size:11px;font-weight:500;width:18px;text-align:center}
.upgrade-box{margin:10px 18px 0;padding:12px 14px;border:0.5px solid;border-radius:1px}
.upgrade-lbl{font-size:7px;letter-spacing:2px;text-transform:uppercase;font-weight:600;margin-bottom:4px}
.upgrade-text{font-size:9px;font-weight:300;line-height:1.7;letter-spacing:.3px}
.c-summary{padding:16px 18px;border-top:0.5px solid var(--border)}
.summary-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;font-size:10px;font-weight:300}
.summary-row.discount{color:var(--mint)}
.summary-total{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-top:0.5px solid var(--border);font-size:16px;font-weight:700;letter-spacing:-.4px}
.c-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;gap:10px;padding:40px}
.c-empty-icon{font-size:36px;opacity:.15}
.c-empty-text{font-size:10px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;font-weight:300}
#c-footer{flex-shrink:0;padding:12px 18px;border-top:0.5px solid var(--border);background:rgba(0,0,0,.98)}
.checkout-btn{width:100%;padding:13px;border-radius:1px;background:var(--fg);border:none;font-family:'Inter',sans-serif;font-size:8px;letter-spacing:3px;font-weight:600;color:#000;cursor:pointer;text-transform:uppercase;transition:all .2s}
.checkout-btn:active{transform:scale(.98)}
</style>
</head>
<body>
<div id="app">

  <!-- ══════════ STORE VIEW ══════════ -->
  <div class="view active" id="store-view">

    <div id="s-topbar">
      <div>
        <div class="logo">LIVE <span>PASS</span></div>
        <div class="store-title">Store</div>
      </div>
      <div class="topbar-r">
        <button onclick="if(window.parent&&window.parent.goBack)window.parent.goBack();else window.history.back()" style="background:none;border:0.5px solid rgba(255,255,255,.15);color:rgba(255,255,255,.5);font-family:'Inter',sans-serif;font-size:10px;letter-spacing:1px;padding:6px 14px;border-radius:100px;cursor:pointer">← Back</button>
        <button class="cart-btn" id="cart-btn" onclick="openCart()">
          カート <span class="cart-count" id="cart-count" style="display:none">0</span>
        </button>
      </div>
    </div>

    <div id="tier-bar">
      <div class="tier-lbl">Your Plan</div>
      <div class="tier-btns">
        <button class="tier-btn" id="tb-free"  onclick="setTier('free')">Free</button>
        <button class="tier-btn" id="tb-live"  onclick="setTier('live')">Live Pass</button>
        <button class="tier-btn active-super" id="tb-super" onclick="setTier('super')">Super Pass</button>
      </div>
    </div>

    <div id="benefit-banner" class="show">
      <div class="benefit-inner" id="benefit-text" style="color:var(--sp)">
        SUPER PASSホルダー特典 — 全商品 20% オフ · 送料無料 · 限定品購入権
      </div>
    </div>

    <div id="cat-tabs">
      <button class="cat-tab active" onclick="setCat('すべて',this)">All</button>
      <button class="cat-tab" onclick="setCat('アパレル',this)">Apparel</button>
      <button class="cat-tab" onclick="setCat('フィジカル',this)">Physical</button>
      <button class="cat-tab" onclick="setCat('限定グッズ',this)">Limited</button>
      <button class="cat-tab" onclick="setCat('デジタル',this)">Digital</button>
      <button class="cat-tab" onclick="setCat('コレクターズ',this)">Collector</button>
    </div>

    <div id="prod-scroll">
      <div id="prod-grid"></div>
    </div>

  </div>

  <!-- ══════════ DETAIL VIEW ══════════ -->
  <div class="view" id="detail-view">
    <div id="d-topbar">
      <button class="d-back" onclick="closeDetail()">←</button>
      <div class="d-top-title" id="d-top-title">—</div>
    </div>
    <div id="d-scroll">
      <div class="d-hero" id="d-hero">
        <div class="d-hero-icon" id="d-icon"></div>
        <div class="d-hero-badges" id="d-badges"></div>
        <div class="d-hero-stock" id="d-stock-badge"></div>
      </div>
      <div id="d-colors"></div>
      <div class="d-info">
        <div class="d-cat" id="d-cat"></div>
        <div class="d-name" id="d-name"></div>
        <div class="d-desc" id="d-desc"></div>
        <div class="d-price-row">
          <div class="d-price" id="d-price"></div>
          <div class="d-orig" id="d-orig"></div>
          <div class="d-discount-pill" id="d-disc-pill" style="display:none"></div>
        </div>
        <div class="d-meta" id="d-meta"></div>
      </div>
    </div>
    <div id="d-footer">
      <button class="d-add-btn" id="d-add-btn">カートへ追加</button>
    </div>
  </div>

  <!-- ══════════ CART VIEW ══════════ -->
  <div class="view" id="cart-view">
    <div id="c-topbar">
      <button class="c-back" onclick="closeCart()">←</button>
      <div class="c-title">Cart <span id="c-title-count" style="font-size:10px;font-weight:300;color:var(--muted)"></span></div>
    </div>
    <div id="c-scroll">
      <div id="c-items"></div>
      <div id="c-upgrade"></div>
      <div class="c-summary" id="c-summary"></div>
    </div>
    <div id="c-footer">
      <button class="checkout-btn" onclick="checkout()">購入手続きへ →</button>
    </div>
  </div>

</div>
<script>
// ── DATA ──
const TIERS = {
  free:  {label:"FREE",       discount:0,    shipping:500, color:"rgba(255,255,255,.4)"},
  live:  {label:"LIVE PASS",  discount:0.10, shipping:500, color:"#A8E63D"},
  super: {label:"SUPER PASS", discount:0.20, shipping:0,   color:"#F5C842"},
};

const PRODUCTS = [
  {id:1,  name:"Tour 2025 T-Shirt",     cat:"アパレル",    price:4500,  stock:42, limited:false, superOnly:false, nftOnly:false, colors:["#1a1a2e","#2d2d2d","#1a0000"], icon:"👕", desc:"渋谷 CLUB TOUR 2025 オフィシャル。裏面にセットリスト刻印。"},
  {id:2,  name:"Limited Hoodie",        cat:"アパレル",    price:8900,  stock:15, limited:true,  superOnly:false, nftOnly:false, colors:["#0f2040","#1a1a2e"],            icon:"🧥", desc:"LIVE PASS ホルダー先行販売。刺繍ロゴ入り。"},
  {id:3,  name:"7inch Vinyl",           cat:"フィジカル",  price:3200,  stock:100,limited:false, superOnly:false, nftOnly:false, colors:["#111"],                         icon:"💿", desc:"Track 07 / Last Scene — 両面収録。限定スリーブ付き。"},
  {id:4,  name:"Acrylic Stand",         cat:"限定グッズ",  price:2800,  stock:8,  limited:true,  superOnly:true,  nftOnly:false, colors:["#0a0a1a"],                      icon:"🏆", desc:"SUPER PASS 限定。透明アクリル高さ18cm。"},
  {id:5,  name:"NFT Certificate Frame", cat:"コレクターズ",price:12000, stock:5,  limited:true,  superOnly:false, nftOnly:true,  colors:["#1a1000"],                      icon:"🖼️", desc:"NFT 保有者のみ購入可。A4 額装版。シリアルNo.入り。"},
  {id:6,  name:"Wallpaper Set",         cat:"デジタル",    price:500,   stock:999,limited:false, superOnly:false, nftOnly:false, colors:["#0a001a"],                      icon:"📱", desc:"8種類 · 即時ダウンロード。iPhone / Android 両対応。"},
  {id:7,  name:"Tote Bag",             cat:"アパレル",    price:2200,  stock:30, limited:false, superOnly:false, nftOnly:false, colors:["#111","#f0ede8"],               icon:"👜", desc:"オーガニックコットン。SPACE COOKING™ ロゴ刺繍。"},
  {id:8,  name:"Photo Zine",           cat:"フィジカル",  price:1800,  stock:50, limited:false, superOnly:false, nftOnly:false, colors:["#0a0808"],                      icon:"📕", desc:"ツアー写真集 A5判 32P。サイン入りエディション。"},
];

let currentTier = 'super';
let currentCat  = 'すべて';
let cart = [];
let detailProduct = null;
let selectedColor = 0;

function calcPrice(base, tier){ return Math.round(base*(1-TIERS[tier].discount)); }
function isLocked(p){ return (p.superOnly && currentTier==='free') || (p.nftOnly && currentTier!=='nft'); }

// ── RENDER STORE ──
function renderStore(){
  const filtered = PRODUCTS.filter(p => currentCat==='すべて' || p.cat===currentCat);
  const grid = document.getElementById('prod-grid');
  grid.innerHTML = filtered.map(p=>{
    const price = calcPrice(p.price, currentTier);
    const orig  = p.price;
    const hasDis = price < orig;
    const locked = isLocked(p);
    const lowStock = p.stock <= 10;
    const tierColor = TIERS[currentTier].color;

    const badgesHtml = [
      p.limited ? `<span class="p-badge" style="background:rgba(255,59,48,.15);color:var(--red);border:0.5px solid rgba(255,59,48,.3)">限定</span>` : '',
      p.nftOnly  ? `<span class="p-badge-r" style="background:rgba(245,200,66,.12);color:var(--sp);border:0.5px solid rgba(245,200,66,.25)">NFT</span>` : '',
      p.superOnly && !p.nftOnly ? `<span class="p-badge-r" style="background:rgba(245,200,66,.12);color:var(--sp);border:0.5px solid rgba(245,200,66,.25)">SUPER</span>` : '',
    ].join('');

    const addStyle = locked
      ? `border-color:var(--border);color:var(--muted)`
      : `border-color:${tierColor}44;color:${tierColor}`;

    return `<div class="p-card${locked?' locked':''}" onclick="openDetail(${p.id})">
      <div class="p-card-thumb" style="background:${p.colors[0]}">
        <div class="p-card-thumb-inner"><div class="p-card-thumb-icon">${p.icon}</div></div>
        ${badgesHtml}
        ${lowStock ? `<span class="p-stock">残り${p.stock}</span>` : ''}
      </div>
      <div class="p-body">
        <div class="p-cat">${p.cat}</div>
        <div class="p-name">${p.name}</div>
        <div class="p-desc">${p.desc}</div>
        <div class="p-foot">
          <div class="p-price-wrap">
            <div class="p-price" style="color:${tierColor}">¥${price.toLocaleString()}</div>
            ${hasDis ? `<div class="p-price-orig">¥${orig.toLocaleString()}</div>` : ''}
          </div>
          <button class="p-add ${locked?'locked-btn':''}" style="${addStyle}"
            onclick="event.stopPropagation();${locked?'':'addToCart('+p.id+')'}"
          >${locked ? '🔒' : '+ Cart'}</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

// ── TIER ──
function setTier(t){
  currentTier = t;
  ['free','live','super'].forEach(k=>{
    const btn = document.getElementById('tb-'+k);
    btn.className = 'tier-btn'+(t===k?' active-'+k:'');
  });
  const banner = document.getElementById('benefit-banner');
  const text   = document.getElementById('benefit-text');
  if(t==='free'){
    banner.classList.remove('show');
  } else {
    banner.classList.add('show');
    if(t==='live'){
      text.style.color = 'var(--lp)';
      text.textContent = 'LIVE PASS 特典 — 全商品 10% オフ · 先行購入 24 時間';
    } else {
      text.style.color = 'var(--sp)';
      text.textContent = 'SUPER PASS 特典 — 全商品 20% オフ · 送料無料 · 限定品購入権';
    }
  }
  renderStore();
  if(detailProduct) renderDetail(detailProduct);
  renderCart();
}

// ── CATEGORY ──
function setCat(c, btn){
  currentCat = c;
  document.querySelectorAll('.cat-tab').forEach(t=>t.classList.remove('active'));
  if(btn) btn.classList.add('active');
  renderStore();
}

// ── CART ──
function addToCart(id){
  const p = PRODUCTS.find(x=>x.id===id);
  if(!p || isLocked(p)) return;
  const ex = cart.find(i=>i.id===id);
  if(ex) ex.qty++;
  else cart.push({...p, qty:1});
  updateCartBadge();
  showAddFeedback(id);
}

function removeFromCart(id){
  const ex = cart.find(i=>i.id===id);
  if(!ex) return;
  if(ex.qty > 1) ex.qty--;
  else cart = cart.filter(i=>i.id!==id);
  renderCart();
  updateCartBadge();
}

function updateCartBadge(){
  const total = cart.reduce((s,i)=>s+i.qty,0);
  const btn   = document.getElementById('cart-btn');
  const badge = document.getElementById('cart-count');
  if(total > 0){
    btn.classList.add('has-items');
    badge.style.display = 'inline';
    badge.textContent   = total;
  } else {
    btn.classList.remove('has-items');
    badge.style.display = 'none';
  }
}

function showAddFeedback(id){
  // briefly flash card border
  const cards = document.querySelectorAll('.p-card');
  // just update badge + cart count
  updateCartBadge();
}

// ── DETAIL ──
function openDetail(id){
  detailProduct = PRODUCTS.find(p=>p.id===id);
  selectedColor = 0;
  renderDetail(detailProduct);
  switchView('detail-view');
}
function closeDetail(){ switchView('store-view'); }

function renderDetail(p){
  const price  = calcPrice(p.price, currentTier);
  const orig   = p.price;
  const hasDis = price < orig;
  const locked = isLocked(p);
  const tc     = TIERS[currentTier].color;

  document.getElementById('d-top-title').textContent = p.name;
  document.getElementById('d-icon').textContent = p.icon;
  document.getElementById('d-hero').style.background = p.colors[selectedColor] || p.colors[0];
  document.getElementById('d-cat').textContent = p.cat;
  document.getElementById('d-name').textContent = p.name;
  document.getElementById('d-desc').textContent = p.desc;
  document.getElementById('d-price').textContent = '¥'+price.toLocaleString();
  document.getElementById('d-price').style.color = locked ? 'var(--muted)' : tc;

  const origEl = document.getElementById('d-orig');
  origEl.textContent = hasDis ? '¥'+orig.toLocaleString() : '';

  const discEl = document.getElementById('d-disc-pill');
  if(hasDis && !locked){
    discEl.style.display = 'inline-block';
    discEl.textContent = '-'+Math.round(TIERS[currentTier].discount*100)+'%';
    discEl.style.background = tc+'18';
    discEl.style.color = tc;
    discEl.style.border = '0.5px solid '+tc+'44';
  } else {
    discEl.style.display = 'none';
  }

  // Stock badge
  const sb = document.getElementById('d-stock-badge');
  if(p.stock <= 10){ sb.textContent = '残り'+p.stock+'点'; sb.style.display='block'; }
  else { sb.style.display='none'; }

  // Badges
  const badges = [];
  if(p.limited) badges.push(`<span class="p-badge" style="position:static;background:rgba(255,59,48,.15);color:var(--red);border:0.5px solid rgba(255,59,48,.3);font-size:7px;letter-spacing:1.5px;padding:3px 8px">限定</span>`);
  if(p.nftOnly)  badges.push(`<span class="p-badge" style="position:static;background:rgba(245,200,66,.12);color:var(--sp);border:0.5px solid rgba(245,200,66,.25);font-size:7px;letter-spacing:1.5px;padding:3px 8px">NFT 限定</span>`);
  if(p.superOnly && !p.nftOnly) badges.push(`<span class="p-badge" style="position:static;background:rgba(245,200,66,.12);color:var(--sp);border:0.5px solid rgba(245,200,66,.25);font-size:7px;letter-spacing:1.5px;padding:3px 8px">SUPER 限定</span>`);
  document.getElementById('d-badges').innerHTML = badges.join('');

  // Color swatches
  const colorsEl = document.getElementById('d-colors');
  if(p.colors.length > 1){
    colorsEl.innerHTML = `<div class="d-colors">${p.colors.map((c,i)=>`
      <div class="d-color-swatch${i===selectedColor?' active':''}"
        style="background:${c==='transparent'?'rgba(255,255,255,.1)':c}"
        onclick="selectColor(${i})"></div>`).join('')}</div>`;
  } else { colorsEl.innerHTML=''; }

  // Meta
  document.getElementById('d-meta').innerHTML = [
    ['Category',  p.cat],
    ['Stock',     p.stock > 10 ? `${p.stock} available` : `残り ${p.stock} 点`],
    ['Shipping',  TIERS[currentTier].shipping===0 ? '無料 (SUPER)' : `¥${TIERS[currentTier].shipping}`],
    ['Access',    locked ? (p.nftOnly?'NFT保有者限定':'SUPER PASS 限定') : 'Available'],
  ].map(([k,v])=>`
    <div class="d-meta-row">
      <span class="d-meta-key">${k}</span>
      <span class="d-meta-dots"></span>
      <span class="d-meta-val${k==='Access'&&!locked?' colored':''}"> style="${k==='Access'&&!locked?'color:'+tc:''}">${v}</span>
    </div>`).join('');

  // Add btn
  const addBtn = document.getElementById('d-add-btn');
  if(locked){
    addBtn.style.borderColor = 'var(--border)';
    addBtn.style.color = 'var(--muted)';
    addBtn.style.cursor = 'default';
    addBtn.textContent = p.nftOnly ? '🔒 NFT 保有者限定' : '🔒 SUPER PASS が必要です';
    addBtn.onclick = ()=>{};
  } else {
    addBtn.style.borderColor = tc+'44';
    addBtn.style.color = tc;
    addBtn.style.cursor = 'pointer';
    addBtn.textContent = 'カートへ追加 ¥'+price.toLocaleString();
    addBtn.onclick = ()=>{ addToCart(p.id); addBtn.textContent='✓ Added'; setTimeout(()=>{addBtn.textContent='カートへ追加 ¥'+price.toLocaleString();},1200); };
  }
}

function selectColor(i){
  selectedColor = i;
  renderDetail(detailProduct);
}

// ── CART VIEW ──
function openCart(){
  renderCart();
  switchView('cart-view');
}
function closeCart(){ switchView('store-view'); }

function renderCart(){
  const total = cart.reduce((s,i)=>s+i.qty,0);
  document.getElementById('c-title-count').textContent = total > 0 ? `(${total}点)` : '';
  const itemsEl = document.getElementById('c-items');
  const summaryEl = document.getElementById('c-summary');
  const upgradeEl = document.getElementById('c-upgrade');
  const footer = document.getElementById('c-footer');

  if(cart.length === 0){
    itemsEl.innerHTML = `<div class="c-empty"><div class="c-empty-icon">🛍</div><div class="c-empty-text">Cart is empty</div></div>`;
    summaryEl.innerHTML = '';
    upgradeEl.innerHTML = '';
    footer.style.display = 'none';
    return;
  }
  footer.style.display = 'block';

  const tc = TIERS[currentTier].color;
  itemsEl.innerHTML = cart.map(item=>{
    const p  = calcPrice(item.price, currentTier);
    return `<div class="cart-item">
      <div class="ci-thumb"><div class="ci-thumb-bg" style="background:${item.colors[0]}"></div><div class="ci-thumb-icon">${item.icon}</div></div>
      <div class="ci-info">
        <div class="ci-name">${item.name}</div>
        <div class="ci-price">¥${p.toLocaleString()} × ${item.qty}</div>
      </div>
      <div class="ci-right">
        <div class="ci-total" style="color:${tc}">¥${(p*item.qty).toLocaleString()}</div>
        <div class="ci-qty">
          <button class="ci-qty-btn" onclick="removeFromCart(${item.id})">−</button>
          <span class="ci-qty-num">${item.qty}</span>
          <button class="ci-qty-btn" onclick="addToCart(${item.id})">＋</button>
        </div>
      </div>
    </div>`;
  }).join('');

  const subtotal = cart.reduce((s,i)=>s+calcPrice(i.price,currentTier)*i.qty,0);
  const shipping = TIERS[currentTier].shipping;
  const discount = cart.reduce((s,i)=>s+(i.price-calcPrice(i.price,currentTier))*i.qty,0);
  const grandTotal = subtotal + shipping;

  if(currentTier==='free'){
    upgradeEl.innerHTML = `<div class="upgrade-box" style="border-color:rgba(168,230,61,.25);background:rgba(168,230,61,.04);margin:10px 18px 0">
      <div class="upgrade-lbl" style="color:var(--lp)">Upgrade to Live Pass</div>
      <div class="upgrade-text" style="color:rgba(168,230,61,.55)">10% オフ + 先行購入 24 時間</div></div>`;
  } else if(currentTier==='live'){
    upgradeEl.innerHTML = `<div class="upgrade-box" style="border-color:rgba(245,200,66,.25);background:rgba(245,200,66,.04);margin:10px 18px 0">
      <div class="upgrade-lbl" style="color:var(--sp)">Upgrade to Super Pass</div>
      <div class="upgrade-text" style="color:rgba(245,200,66,.55)">さらに 10% オフ · 送料無料 · 限定品購入権</div></div>`;
  } else { upgradeEl.innerHTML=''; }

  summaryEl.innerHTML = `
    <div class="summary-row"><span style="color:var(--muted)">小計</span><span>¥${subtotal.toLocaleString()}</span></div>
    <div class="summary-row"><span style="color:var(--muted)">送料</span><span>${shipping===0?'<span style="color:var(--mint)">無料</span>':'¥'+shipping.toLocaleString()}</span></div>
    ${discount>0?`<div class="summary-row discount"><span>割引 (${Math.round(TIERS[currentTier].discount*100)}%)</span><span>-¥${discount.toLocaleString()}</span></div>`:''}
    <div class="summary-total"><span>合計</span><span style="color:${tc}">¥${grandTotal.toLocaleString()}</span></div>`;
}

function checkout(){
  const tc = TIERS[currentTier].color;
  document.getElementById('c-scroll').innerHTML = `
    <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:400px;padding:40px 28px;text-align:center;gap:14px">
      <div style="font-size:7px;letter-spacing:4px;color:var(--mint);font-weight:300">ORDER CONFIRMED</div>
      <div style="font-size:18px;font-weight:300;letter-spacing:-.3px">ご注文ありがとうございます</div>
      <div style="font-size:10px;color:var(--muted);font-weight:300;line-height:1.9;letter-spacing:.3px">
        確認メールをお送りします。<br>デジタル商品は即時ダウンロード可能です。
      </div>
      <div style="height:0.5px;width:60px;background:var(--border);margin:8px 0"></div>
      <div style="font-size:8px;color:rgba(255,255,255,.18);letter-spacing:1px">livepass.jp / store</div>
      <button onclick="cart=[];updateCartBadge();closeCart();" style="font-size:8px;letter-spacing:2px;color:var(--muted);background:none;border:0.5px solid var(--border);padding:7px 18px;cursor:pointer;font-family:'Inter',sans-serif;margin-top:8px;text-transform:uppercase">ストアに戻る</button>
    </div>`;
  document.getElementById('c-footer').style.display='none';
}

// ── VIEW SWITCH ──
function switchView(id){
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ── INIT ──
setTier('super');
</script>
</body>
</html>
