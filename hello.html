<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>HELLO v67</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;height:100dvh;background:#000;color:#fff;
  font-family:'Courier New',monospace;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:24px;text-align:center;gap:18px}
.hello{font-size:72px;font-weight:900;color:#A8E63D;letter-spacing:-0.02em;line-height:.9}
.v{font-size:24px;color:#3DAAFF;letter-spacing:.2em}
.msg{font-size:12px;color:#888;line-height:1.8;max-width:300px}
.btn{display:inline-block;padding:16px 28px;background:#A8E63D;color:#000;
  text-decoration:none;font-weight:900;font-size:14px;letter-spacing:.12em;
  text-transform:uppercase;border-radius:99px;margin-top:12px}
.ts{font-size:10px;color:#444;margin-top:24px;font-family:monospace}
</style>
</head>
<body>
<div class="hello">HELLO</div>
<div class="v">v67</div>
<div class="msg">
  これが見えたら<br>最新版のデプロイが<br>正常に届いています
</div>
<a class="btn" href="/start">GO TO APP →</a>
<div class="ts" id="ts"></div>
<script>
// Unregister any old service workers (just in case)
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.getRegistrations().then(function(regs){
    for (var i = 0; i < regs.length; i++) regs[i].unregister();
  }).catch(function(){});
}
// Clear all caches (Safari supports this)
if ('caches' in window) {
  caches.keys().then(function(names){
    for (var i = 0; i < names.length; i++) caches.delete(names[i]);
  }).catch(function(){});
}
document.getElementById('ts').textContent = new Date().toISOString();
</script>
</body>
</html>
