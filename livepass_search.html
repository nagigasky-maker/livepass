<style>
:root{
  --black:#000;--bg:#080808;--white:#EDEBE6;
  --red:#E8100A;--blue:#3DAAFF;--green:#A8E63D;
  --gold:#F5C842;--mint:#00E5A0;--pink:#F4C0D1;--purple:#bf5af2;
  --muted:rgba(237,235,230,.3);--muted2:rgba(237,235,230,.14);
  --border:rgba(255,255,255,.07);
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bot:env(safe-area-inset-bottom,0px);
  --nav-h:62px;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;max-width:100vw;height:100%;height:100dvh;
  background:var(--black);color:var(--white);
  font-family:Arial,'Noto Sans JP',sans-serif;-webkit-font-smoothing:antialiased;
  user-select:none;-webkit-user-select:none;overflow:hidden;
  position:fixed;overscroll-behavior-x:none;touch-action:pan-y;}
a{color:inherit;text-decoration:none}
button{background:none;border:none;color:inherit;font:inherit;cursor:pointer}

.topbar{position:fixed;top:0;left:0;right:0;z-index:100;
  padding:calc(var(--safe-top) + 4px) 18px 8px;
  display:flex;align-items:center;gap:14px;
  background:linear-gradient(to bottom,rgba(0,0,0,.95) 70%,transparent);}
.tb-brand{display:flex;align-items:center;margin-right:auto;height:22px;flex-shrink:0}
.tb-brand img{height:100%;width:auto;display:block;image-rendering:-webkit-optimize-contrast}
.tb-icon{background:none;border:none;cursor:pointer;position:relative;
  width:26px;height:26px;display:flex;align-items:center;justify-content:center;color:var(--white);}
.tb-icon svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.8}
.tb-icon .badge{position:absolute;top:-4px;right:-6px;background:var(--red);color:#fff;
  font-size:8px;font-weight:700;min-width:14px;height:14px;padding:0 3px;border-radius:99px;
  display:flex;align-items:center;justify-content:center;font-family:Arial,sans-serif;}
.tb-stat{display:flex;flex-direction:column;align-items:center;line-height:1;gap:2px;color:var(--blue);}
.tb-stat-n{font-family:Arial,'Noto Sans JP',sans-serif;font-weight:900;font-size:16px;color:var(--white);letter-spacing:.04em}
.tb-stat-l{font-size:7px;color:var(--blue);letter-spacing:.08em;font-weight:500}

.content{position:fixed;top:0;left:0;right:0;bottom:calc(var(--nav-h) + var(--safe-bot));
  padding-top:calc(var(--safe-top) + 42px);
  overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;scrollbar-width:none;
  touch-action:pan-y;overscroll-behavior-x:none;max-width:100vw;}
.content::-webkit-scrollbar{display:none}

.bottomnav{position:fixed;bottom:0;left:0;right:0;z-index:100;
  height:calc(var(--nav-h) + var(--safe-bot));padding:0 0 calc(var(--safe-bot) * .4);
  display:flex;align-items:center;justify-content:space-around;
  background:rgba(0,0,0,.96);border-top:0.5px solid var(--border);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);}
.bn-btn{flex:1;height:100%;display:flex;align-items:center;justify-content:center;
  color:rgba(237,235,230,.35);text-decoration:none;position:relative;}
.bn-btn svg{width:30px;height:30px;stroke:currentColor;fill:none;stroke-width:1.8}
.bn-btn.active{color:var(--white)}
.bn-avatar{width:34px;height:34px;border-radius:50%;
  background:linear-gradient(135deg,#1a2030,#0a1020);
  border:1.5px solid rgba(237,235,230,.25);
  overflow:hidden;display:flex;align-items:center;justify-content:center;}
.bn-btn.active .bn-avatar{border-color:var(--white)}

/* Search page content */
.search-header{padding:14px 20px 10px}
.sh-label{font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:.34em;
  text-transform:uppercase;color:rgba(237,235,230,.3);}
.sh-title{font-family:Arial,'Noto Sans JP',sans-serif;font-weight:900;
  font-size:22px;letter-spacing:.02em;color:var(--white);margin-top:4px;}

.search-bar{
  margin:8px 18px 14px;padding:14px 18px;
  background:rgba(255,255,255,.04);border:0.5px solid rgba(255,255,255,.08);
  border-radius:14px;display:flex;align-items:center;gap:12px;
}
.search-bar svg{width:20px;height:20px;stroke:var(--mint);fill:none;stroke-width:1.8;flex-shrink:0}
.search-bar input{
  flex:1;background:none;border:none;outline:none;color:var(--white);
  font-family:Arial,'Noto Sans JP',sans-serif;font-size:13px;
  font-weight:400;letter-spacing:.02em;
}
.search-bar input::placeholder{color:rgba(237,235,230,.35)}

/* Tag filter row */
.tag-row{display:flex;gap:8px;padding:0 18px 18px;overflow-x:auto;scrollbar-width:none}
.tag-row::-webkit-scrollbar{display:none}
.tag-pill{
  flex-shrink:0;padding:7px 14px;border-radius:99px;
  border:0.5px solid rgba(237,235,230,.15);
  font-family:Arial,'Noto Sans JP',sans-serif;font-weight:500;
  font-size:10px;letter-spacing:.12em;text-transform:uppercase;
  color:rgba(237,235,230,.55);
  background:rgba(255,255,255,.02);
}
.tag-pill.active{color:var(--mint);border-color:var(--mint);background:rgba(0,229,160,.08)}

/* AI suggestion sections */
.ai-badge{
  display:inline-flex;align-items:center;gap:6px;
  padding:4px 10px;border-radius:99px;
  background:rgba(0,229,160,.12);border:0.5px solid rgba(0,229,160,.3);
  font-family:Arial,'Noto Sans JP',sans-serif;font-weight:700;
  font-size:8px;letter-spacing:.2em;text-transform:uppercase;
  color:var(--mint);
  margin:6px 20px 10px;
}
.ai-badge svg{width:10px;height:10px;stroke:currentColor;fill:none;stroke-width:2.4}

.sec-label{
  font-family:'IBM Plex Mono',monospace;
  font-size:8px;letter-spacing:.34em;text-transform:uppercase;
  color:rgba(237,235,230,.3);padding:18px 20px 10px;
}

/* FOLLOWING / DISCOVERY tabs */
.disc-tabs{
  display:flex;gap:24px;padding:2px 20px 0;
  border-bottom:0.5px solid var(--border);
  position:sticky;top:0;z-index:5;
  background:rgba(0,0,0,.92);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
}
.dt-btn{
  font-family:Arial,'Noto Sans JP',sans-serif;font-weight:500;
  font-size:11px;letter-spacing:.22em;text-transform:uppercase;
  color:rgba(237,235,230,.35);padding:12px 0;position:relative;
}
.dt-btn.active{color:var(--white)}
.dt-btn.active::after{
  content:"";position:absolute;left:0;right:0;bottom:-0.5px;height:2px;background:var(--mint);
}
/* Panels */
/* Panel visibility — the body carries a class for the active tab:
     (none) → 検索 (.disc-search visible)
     .disc-following  → フォロー中
     .disc-followers  → フォロワー
*/
.disc-search,.disc-following,.disc-followers{padding:14px 0 0}
.disc-following,.disc-followers{display:none}
body.disc-following .disc-search,
body.disc-followers .disc-search{display:none}
body.disc-following .disc-following{display:block}
body.disc-followers .disc-followers{display:block}

.disc-list{display:flex;flex-direction:column}
.disc-empty{padding:60px 28px;text-align:center}
.de-title{font-family:Arial,'Noto Sans JP',sans-serif;font-weight:700;font-size:13px;color:var(--white);margin-bottom:8px}
.de-sub{font-family:Arial,'Noto Sans JP',sans-serif;font-size:10px;color:rgba(237,235,230,.4);line-height:1.6}
.disc-row{
  display:flex;align-items:center;gap:12px;
  padding:12px 20px;border-bottom:0.5px solid var(--border);
  cursor:pointer;transition:background .18s;
}
.disc-row:active{background:rgba(255,255,255,.03)}
.disc-row .ar-av{
  width:44px;height:44px;border-radius:50%;flex-shrink:0;
  background:linear-gradient(135deg,#1a2030,#0a1020);
  border:1.5px solid rgba(237,235,230,.12);
}
.disc-row .ar-meta{flex:1;min-width:0}
.disc-row .ar-name{font-family:Arial,'Noto Sans JP',sans-serif;font-weight:900;font-size:14px;color:var(--white);line-height:1.1}
.disc-row .ar-role{font-family:Arial,'Noto Sans JP',sans-serif;font-weight:500;font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:rgba(237,235,230,.45);margin-top:3px}
.disc-row .ar-unfollow{
  padding:7px 14px;border-radius:99px;
  background:rgba(61,170,255,.2);border:1px solid var(--blue);color:var(--blue);
  font-family:Arial,'Noto Sans JP',sans-serif;font-size:10px;font-weight:500;letter-spacing:.02em;
  flex-shrink:0;
}

/* Suggestion cards */
.sug-grid{padding:0 14px 10px;display:flex;flex-wrap:wrap;gap:8px}
.sug-card{
  flex:1 1 calc(50% - 4px);
  background:#0a0a0a;border-radius:10px;overflow:hidden;
  border:0.5px solid rgba(255,255,255,.06);
  cursor:pointer;
}
.sug-img{
  position:relative;aspect-ratio:1/1;background:#111;overflow:hidden;
}
.sug-img img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.sug-img::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(to top,rgba(0,0,0,.7) 0%,transparent 50%);
}
.sug-body{padding:10px 12px 12px}
.sug-cat{
  font-family:Arial,'Noto Sans JP',sans-serif;font-weight:500;
  font-size:7px;letter-spacing:.22em;text-transform:uppercase;
  color:var(--sug-color,var(--mint));margin-bottom:3px;
}
.sug-name{
  font-family:Arial,'Noto Sans JP',sans-serif;font-weight:900;
  font-size:13px;color:var(--white);line-height:1.15;
  margin-bottom:3px;
}
.sug-meta{
  font-family:Arial,'Noto Sans JP',sans-serif;font-weight:400;
  font-size:8px;color:rgba(237,235,230,.45);letter-spacing:.02em;
}
.sug-score{
  position:absolute;top:10px;right:12px;
  font-family:'IBM Plex Mono',monospace;
  font-size:8px;font-weight:500;letter-spacing:.1em;
  color:var(--mint);
}

/* Horizontal list (artists / venues) */
.scroll-row{
  display:flex;gap:10px;padding:0 14px 10px;overflow-x:auto;
  scrollbar-width:none;
}
.scroll-row::-webkit-scrollbar{display:none}
.sr-card{
  flex-shrink:0;width:120px;
  display:flex;flex-direction:column;align-items:center;
  cursor:pointer;padding:8px 4px;
}
.sr-av{
  width:70px;height:70px;border-radius:50%;overflow:hidden;
  background:linear-gradient(135deg,#1a2030,#0a1020);
  border:1.5px solid rgba(237,235,230,.12);
  margin-bottom:10px;position:relative;
}
.sr-av svg{width:100%;height:100%;display:block}
.sr-name{
  font-family:Arial,'Noto Sans JP',sans-serif;font-weight:700;
  font-size:11px;color:var(--white);text-align:center;
  margin-bottom:2px;
}
.sr-sub{
  font-family:Arial,'Noto Sans JP',sans-serif;font-weight:400;
  font-size:8px;letter-spacing:.12em;text-transform:uppercase;
  color:rgba(237,235,230,.4);text-align:center;
}

.content-bottom-padding{height:60px}

/* ─────────────────────────────────────────────
   COMPOSE SELECTOR BOTTOM SHEET (shared)
   ───────────────────────────────────────────── */
#composeSheetOverlay{position:fixed;inset:0;z-index:1100;background:rgba(0,0,0,0);pointer-events:none;opacity:0;transition:background .3s ease, opacity .2s ease}

#composeSheet{position:fixed;left:0;right:0;bottom:0;z-index:1101;background:#0a0a0a;border-top:0.5px solid var(--border);border-top-left-radius:20px;border-top-right-radius:20px;padding:20px 20px calc(24px + var(--safe-bot));transform:translateY(100%);transition:transform .35s cubic-bezier(.2,.8,.2,1);box-shadow:0 -12px 40px rgba(0,0,0,.7)}

.cs-handle{width:40px;height:4px;border-radius:99px;background:rgba(237,235,230,.2);margin:0 auto 20px}

.cs-opt svg{width:26px;height:26px;stroke:currentColor;fill:none;stroke-width:1.8;flex-shrink:0}
.cs-opt-body{flex:1;text-align:left}
.cs-opt-title{font-family:Arial,'Noto Sans JP',sans-serif;font-weight:700;font-size:15px;color:var(--white);margin-bottom:2px}
.cs-opt-sub{font-family:Arial,'Noto Sans JP',sans-serif;font-weight:400;font-size:10px;letter-spacing:.04em;color:rgba(237,235,230,.4)}
.cs-opt.article{border-left:3px solid var(--green)}

/* ── Account search results (friend discovery) ─────────────── */
.account-results{padding:0 18px 18px;display:none}
.account-results.open{display:block}
.account-row{
  display:flex;align-items:center;gap:14px;
  padding:12px 14px;margin-bottom:8px;
  background:rgba(255,255,255,.03);
  border:0.5px solid rgba(255,255,255,.08);
  border-radius:12px;cursor:pointer;
}
.account-row:active{background:rgba(255,255,255,.06)}
.account-av{
  width:44px;height:44px;border-radius:50%;flex-shrink:0;
  background:linear-gradient(135deg,var(--av-hue,#3DAAFF),#0a1020);
  border:1px solid rgba(237,235,230,.15);
  display:flex;align-items:center;justify-content:center;
  font-family:Arial,sans-serif;font-weight:900;font-size:16px;color:var(--white);
  overflow:hidden;

.account-body{flex:1;min-width:0}
.account-name{
  font-family:Arial,'Noto Sans JP',sans-serif;font-weight:700;
  font-size:14px;color:var(--white);margin-bottom:2px;
}
.account-role{
  font-family:Arial,'Noto Sans JP',sans-serif;font-weight:400;
  font-size:11px;color:rgba(237,235,230,.45);letter-spacing:.04em;
}
.account-follow{
  flex-shrink:0;padding:7px 16px;border-radius:99px;
  font-family:Arial,'Noto Sans JP',sans-serif;font-size:11px;font-weight:600;
  background:var(--blue);color:#fff;border:1px solid var(--blue);
  cursor:pointer;letter-spacing:.04em;

.account-follow.following{
  background:rgba(61,170,255,.1);color:var(--blue);border-color:var(--blue);
}
.account-empty{
  padding:30px 20px;text-align:center;
  font-family:'IBM Plex Mono',monospace;font-size:10px;
  letter-spacing:.22em;text-transform:uppercase;
  color:rgba(237,235,230,.35);
}

/* ── Manual account add ─────────────────────── */
.account-add-wrap{padding:0 18px 28px;}
.account-add-btn{
  display:flex;align-items:center;gap:8px;
  padding:10px 16px;border-radius:99px;
  background:rgba(255,255,255,.03);
  border:0.5px dashed rgba(237,235,230,.18);
  color:rgba(237,235,230,.65);
  font-family:Arial,'Noto Sans JP',sans-serif;font-size:11px;font-weight:500;letter-spacing:.04em;

.account-add-btn:active{background:rgba(255,255,255,.06)}
.account-add-btn svg{stroke:currentColor}

.account-add-form.open{display:block}
.account-add-form input{
  display:block;width:100%;padding:10px 14px;margin-bottom:10px;
  background:rgba(255,255,255,.04);border:0.5px solid rgba(237,235,230,.12);
  border-radius:8px;
  font-family:Arial,'Noto Sans JP',sans-serif;font-size:12px;color:var(--white);
  outline:none;
}
.account-add-form input:focus{border-color:var(--blue)}
.account-add-form input::placeholder{color:rgba(237,235,230,.35)}
.account-add-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:4px}
.account-add-cancel,.account-add-save{
  padding:8px 16px;border-radius:99px;
  font-family:Arial,'Noto Sans JP',sans-serif;font-size:11px;font-weight:600;letter-spacing:.04em;
}
.account-add-cancel{background:none;border:0.5px solid rgba(237,235,230,.18);color:rgba(237,235,230,.55)}
.account-add-save{background:var(--blue);color:#fff;border:1px solid var(--blue)}
.account-add-save:disabled{opacity:.5}
</style>

<script>
/* AUTH GUARD — wait for Firebase auth before redirecting */
(function(){
  if (localStorage.getItem('livepass_account_name')) return;
  // No localStorage — wait for Firebase auth to resolve
  var timer = setTimeout(function(){ location.replace('/login'); }, 2500);
  window.addEventListener('fb-auth-ready', function(e){
    clearTimeout(timer);
    if (e.detail && e.detail.user) return; // signed in via Firebase — stay
    if (localStorage.getItem('livepass_account_name')) return; // populated by onAuthStateChanged
    location.replace('/login');
  }, {once:true});
})();
</script>
<script>
/* PWA NAV FIX v66 — form-submission technique for iOS PWA standalone.
   Link clicks in iOS PWAs can break out of standalone mode; form
   submissions are handled differently by iOS and stay in-app. */
(function(){
  function isStandalone(){
    return (window.navigator.standalone === true) ||
           window.matchMedia('(display-mode: standalone)').matches ||
           window.matchMedia('(display-mode: fullscreen)').matches;
  }
  if (!isStandalone()) return;
  // Also add a body class so CSS can adjust for standalone mode
  document.documentElement.classList.add('is-pwa');
  document.addEventListener('click', function(e){
    var a = e.target.closest && e.target.closest('a');
    if (!a) return;
    var href = a.getAttribute('href');
    if (!href) return;
    if (a.target && a.target !== '_self') return;
    if (href.charAt(0) === '#') return;
    if (/^(mailto|tel|sms):/i.test(href)) return;
    // External origin?
    try {
      var u = new URL(a.href, location.href);
      if (u.host !== location.host) return;
    } catch(err) { return; }
    e.preventDefault();
    e.stopPropagation();
    // Use form submission — iOS PWA treats this as in-app navigation
    try {
      var u2 = new URL(a.href, location.href);
      var form = document.createElement('form');
      form.method = 'GET';
      form.action = u2.origin + u2.pathname;
      form.style.display = 'none';
      u2.searchParams.forEach(function(value, key){
        var inp = document.createElement('input');
        inp.type = 'hidden'; inp.name = key; inp.value = value;
        form.appendChild(inp);
      });
      document.body.appendChild(form);
      form.submit();
    } catch(err) {
      window.location.href = a.href;
    }
  }, true);
})();
</script>

<script>
<!-- AI sample artists / events / studios / lessons were removed in the
     simplified launch layout. Only live Firestore accounts + locally
     created content are surfaced here now. -->

/* SEARCH / FOLLOWING / FOLLOWERS tab switcher */
(function initDiscTabs(){
  const btns = document.querySelectorAll('.dt-btn');
  const followList     = document.getElementById('discFollowList');
  const followersList  = document.getElementById('discFollowersList');
  const follEmptyEl    = document.getElementById('follEmpty');
  const followersEmpty = document.getElementById('followersEmpty');

  // Escape user-controlled strings before embedding them in innerHTML
  // to keep a malicious localStorage entry from running arbitrary JS.
  function esc(s){
    return String(s == null ? '' : s)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
  }
  // Only allow known-safe avatar URLs.
  function safeAvatar(src){
    const s = String(src || '');
    if (/^data:image\//.test(s) || /^https:\/\//.test(s)) return s;
    return '';
  }
  function normList(key){
    try {
      return (JSON.parse(localStorage.getItem(key) || '[]') || [])
        .map(x => typeof x === 'string' ? { name:x, role:'', avatar:'' } : x)
        .filter(x => x && x.name);
    } catch(e){ return []; }
  }

  function rowHtml(u, opts){
    const name = esc(u.name);
    const role = esc(u.role || '');
    const avSrc = safeAvatar(u.avatar);
    const av = avSrc
      ? `<img src="${esc(avSrc)}" alt="" style="width:100%;height:100%;object-fit:cover;border-radius:50%">`
      : '';
    const btn = opts && opts.button === 'unfollow'
      ? `<button class="ar-unfollow" data-name="${encodeURIComponent(u.name)}" type="button">フォロー中</button>`
      : opts && opts.button === 'followback'
        ? `<button class="ar-unfollow" data-followback="${encodeURIComponent(u.name)}" data-role="${encodeURIComponent(u.role||'')}" type="button" style="background:rgba(0,229,160,.1);border-color:var(--mint);color:var(--mint)">フォロバ</button>`
        : '';
    return `
      <a class="disc-row" href="/profile?user=${encodeURIComponent(u.name)}">
        <div class="ar-av">${av}</div>
        <div class="ar-meta">
          <div class="ar-name">${name}</div>
          <div class="ar-role">${role}</div>
        </div>
        ${btn}
      </a>
    `;
  }

  function renderFollowing(){
    if (!followList) return;
    const list = normList('livepass_following');
    if (!list.length) {
      if (follEmptyEl) follEmptyEl.style.display = 'block';
      followList.innerHTML = '';
      return;
    }
    if (follEmptyEl) follEmptyEl.style.display = 'none';
    followList.innerHTML = list.map(u => rowHtml(u, { button:'unfollow' })).join('');

    followList.querySelectorAll('.ar-unfollow').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.preventDefault(); e.stopPropagation();
        const name = decodeURIComponent(btn.dataset.name || '');
        if (!name) return;
        let cur = [];
        try { cur = JSON.parse(localStorage.getItem('livepass_following') || '[]'); } catch(_){}
        cur = cur.filter(x => (typeof x === 'string' ? x : x && x.name) !== name);
        localStorage.setItem('livepass_following', JSON.stringify(cur));
        if (navigator.vibrate) navigator.vibrate(8);
        renderFollowing();
      });
    });
  }

  function renderFollowers(){
    if (!followersList) return;
    const list = normList('livepass_followers');
    const following = new Set(normList('livepass_following').map(x => (x.name || '').toUpperCase()));
    if (!list.length) {
      if (followersEmpty) followersEmpty.style.display = 'block';
      followersList.innerHTML = '';
      return;
    }
    if (followersEmpty) followersEmpty.style.display = 'none';
    followersList.innerHTML = list.map(u => {
      const isMutual = following.has((u.name || '').toUpperCase());
      return rowHtml(u, { button: isMutual ? null : 'followback' });
    }).join('');

    // Followback handler
    followersList.querySelectorAll('[data-followback]').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.preventDefault(); e.stopPropagation();
        const name = decodeURIComponent(btn.dataset.followback || '');
        const role = decodeURIComponent(btn.dataset.role || '');
        if (!name) return;
        let cur = [];
        try { cur = JSON.parse(localStorage.getItem('livepass_following') || '[]'); } catch(_){}
        if (!cur.some(x => (typeof x === 'string' ? x : x && x.name) === name)) {
          cur.unshift({ name, role });
          localStorage.setItem('livepass_following', JSON.stringify(cur));
        }
        if (navigator.vibrate) navigator.vibrate(8);
        renderFollowers();
      });
    });
  }

  btns.forEach(b => {
    b.addEventListener('click', () => {
      btns.forEach(x => x.classList.remove('active'));
      b.classList.add('active');
      const mode = b.dataset.disc;
      document.body.classList.toggle('disc-following', mode === 'following');
      document.body.classList.toggle('disc-followers', mode === 'followers');
      if (mode === 'following') renderFollowing();
      if (mode === 'followers') renderFollowers();
    });
  });

  // Deep-link support: ?tab=following / ?tab=followers
  try {
    const qs = new URLSearchParams(location.search);
    const tab = qs.get('tab');
    if (tab === 'following' || tab === 'followers') {
      const nextBtn = document.querySelector(`.dt-btn[data-disc="${tab}"]`);
      if (nextBtn) nextBtn.click();
    }
  } catch(e){}
})();

/* Top bar counters + unread badge */
(function syncCounters(){
  try {
    const f1 = JSON.parse(localStorage.getItem('livepass_following') || '[]').length;
    const f2 = JSON.parse(localStorage.getItem('livepass_followers') || '[]').length;
    document.querySelectorAll('[data-count="following"]').forEach(el => el.textContent = f1 || '0');
    document.querySelectorAll('[data-count="followers"]').forEach(el => el.textContent = f2 || '0');
    const unread = parseInt(localStorage.getItem('livepass_unread_count') || '3', 10);
    const badge = document.getElementById('msgBadge');
    if (badge) {
      if (unread > 0) { badge.textContent = unread > 99 ? '99+' : String(unread); badge.style.display = ''; }
      else { badge.style.display = 'none'; }
    }
  } catch(e) {}
})();

/* Compose selector */
(function initComposeSheet(){
  const btn=document.getElementById('tbCreate'),ov=document.getElementById('composeSheetOverlay'),cb=document.getElementById('csClose');
  if(!btn||!ov)return;
  const open=()=>{ov.classList.add('active');ov.setAttribute('aria-hidden','false');if(navigator.vibrate)navigator.vibrate(8)};
  const dismiss=()=>{ov.classList.remove('active');ov.setAttribute('aria-hidden','true')};
  btn.addEventListener('click',open);cb.addEventListener('click',dismiss);
  ov.addEventListener('click',e=>{if(e.target===ov)dismiss()});
  document.querySelectorAll('.cs-opt').forEach(o=>o.addEventListener('click',()=>{
    const t=o.dataset.type;if(navigator.vibrate)navigator.vibrate(12);
    location.href='/compose/'+t;
  }));
  window.addEventListener('keydown',e=>{if(e.key==='Escape'&&ov.classList.contains('active'))dismiss()});
})();
</script>

(function syncBnAvatar(){

    document.querySelectorAll('.bn-avatar').forEach(function(el){
      el.innerHTML = '<img src="' + av + '" alt="" style="width:100%;height:100%;object-fit:cover;border-radius:50%;display:block">';
    });
  } catch(e){}
})();

/* ─────────────────────────────────────────────
   ACCOUNT SEARCH — find & follow other accounts
   ───────────────────────────────────────────── */
(function initAccountSearch(){
  const input = document.getElementById('accountSearchInput');
  const results = document.getElementById('accountResults');
  if (!input || !results) return;

  // Demo / sample accounts have been removed. The directory is built
  // from real sources only:
  //   · locally added custom accounts (manual adds)
  //   · authors / featured artists from this device's post history
  //   · already followed / follower lists
  //   · Firestore `usernames/` registry (loaded on first focus)
  function getList(key){
    try { return JSON.parse(localStorage.getItem(key) || '[]'); } catch(e){ return []; }
  }
  function saveList(key, list){
    try { localStorage.setItem(key, JSON.stringify(list)); } catch(e){}
  }
  function isFollowing(name){
    return getList('livepass_following').some(u => (typeof u === 'string' ? u : u && u.name) === name);
  }
  function toggleFollow(name, role){
    const key = 'livepass_following';
    const list = getList(key);
    const i = list.findIndex(u => (typeof u === 'string' ? u : u && u.name) === name);
    if (i >= 0) list.splice(i, 1);
    else list.unshift({ name, role: role || '' });
    saveList(key, list);
    return i < 0; // returns true if now following
  }

  function buildDirectory(){
    const map = new Map();
    // User-added custom accounts (manual adds)
    getList('livepass_custom_accounts').forEach(u => {
      const name = typeof u === 'string' ? u : u && u.name;
      if (name) map.set(name, { name, role: (u && u.role) || '' });
    });
    // Past authors from any post type
    const postKeys = ['livepass_articles','livepass_events','livepass_workshops','livepass_exhibitions'];
    postKeys.forEach(k => {
      getList(k).forEach(p => {
        if (p && p.author && !map.has(p.author)) map.set(p.author, { name: p.author, role: 'Creator' });
        if (Array.isArray(p && p.artists)) p.artists.forEach(a => {
          const n = typeof a === 'string' ? a : a && a.name;
          if (n && !map.has(n)) map.set(n, { name: n, role: 'Featured Artist' });
        });
      });
    });
    // Already followed / followers (in case they're not in any post yet)
    ['livepass_following','livepass_followers'].forEach(k => {
      getList(k).forEach(u => {
        const name = typeof u === 'string' ? u : u && u.name;
        if (name && !map.has(name)) map.set(name, { name, role: (u && u.role) || '' });
      });
    });
    // Exclude the current user
    const me = (localStorage.getItem('livepass_account_name') || '').toUpperCase();
    return Array.from(map.values()).filter(a => (a.name || '').toUpperCase() !== me);
  }

  let DIRECTORY = buildDirectory();
  function refreshDirectory(){ DIRECTORY = buildDirectory(); }

  // ── Firestore-backed directory ──
  // The old DIRECTORY only included hardcoded samples + past
  // post authors. Friends who just registered weren't searchable.
  // We fetch the usernames/ collection once on first focus and
  // merge it in. Read access is gated to signed-in users via
  // Firestore Rules so the public can't scrape handles.
  let REMOTE_LOADED = false;
  async function loadRemoteDirectory(){
    if (REMOTE_LOADED) return;
    REMOTE_LOADED = true;
    try {
      if (!window.FB) await new Promise(r =>
        window.addEventListener('fb-auth-ready', r, { once:true })
      );
      if (!window.FB || !window.FB.currentUser) return;
      const { collection, getDocs, db } = window.FB;
      const snap = await getDocs(collection(db, 'usernames'));
      const me = (localStorage.getItem('livepass_account_name') || '').toUpperCase();
      const add = [];
      snap.forEach(d => {
        const data = d.data() || {};
        const name = data.name || d.id.toUpperCase();
        if (!name || name.toUpperCase() === me) return;
        // Only add if the local DIRECTORY doesn't already have it.
        if (!DIRECTORY.some(a => (a.name || '').toUpperCase() === name.toUpperCase())) {
          add.push({ name, role: data.role || '', uid: data.uid || null });
        }
      });
      DIRECTORY = DIRECTORY.concat(add);
      // Re-render current query AND the browse list with the expanded
      // directory so new Firestore accounts appear in both surfaces.
      render(input.value);
      renderBrowse();
    } catch (err) {
      console.warn('Firestore directory load failed:', err);
    }
  }

  // Pre-load when the field is focused so the first keystroke already
  // has remote accounts available.
  input.addEventListener('focus', loadRemoteDirectory);

  function accountRow(a){
    const initial = (a.name || '?').slice(0, 2).toUpperCase();
    const following = isFollowing(a.name);
    return `
      <div class="account-row" data-name="${encodeURIComponent(a.name)}">
        <div class="account-av">${initial}</div>
        <div class="account-body">
          <div class="account-name">${a.name}</div>
          <div class="account-role">${a.role || ''}</div>
        </div>
        <button class="account-follow ${following ? 'following' : ''}" data-name="${encodeURIComponent(a.name)}" data-role="${encodeURIComponent(a.role || '')}" type="button">${following ? 'フォロー中' : 'フォロー'}</button>
      </div>
    `;
  }

  function render(q){
    const query = (q || '').trim().toLowerCase();
    if (!query) { results.classList.remove('open'); results.innerHTML = ''; renderBrowse(); return; }
    const matches = DIRECTORY
      .filter(a => (a.name || '').toLowerCase().includes(query) || (a.role || '').toLowerCase().includes(query))
      .slice(0, 12);
    results.classList.add('open');
    if (matches.length === 0) {
      results.innerHTML = `<div class="account-empty">No accounts match "${query}"</div>`;
      return;
    }
    results.innerHTML = matches.map(accountRow).join('');
  }

  // Browse list — shows every known account under the search bar when
  // no query is active. Updates whenever the directory refreshes
  // (e.g. after Firestore load).
  const browseEl    = document.getElementById('browseList');
  const browseEmpty = document.getElementById('browseEmpty');
  function renderBrowse(){
    if (!browseEl) return;
    if (!DIRECTORY.length) {
      browseEl.innerHTML = '';
      if (browseEmpty) browseEmpty.style.display = 'block';
      return;
    }
    if (browseEmpty) browseEmpty.style.display = 'none';
    browseEl.innerHTML = DIRECTORY.slice(0, 50).map(accountRow).join('');
  }
  renderBrowse();

  // Re-render browse list on account directory changes.
  const _refresh = refreshDirectory;
  refreshDirectory = function(){ _refresh(); renderBrowse(); };

  input.addEventListener('input', () => render(input.value));
  browseEl?.addEventListener('click', (e) => {
    const btn = e.target.closest('.account-follow');
    const row = e.target.closest('.account-row');
    if (btn) {
      e.stopPropagation();
      const name = decodeURIComponent(btn.dataset.name);
      const role = decodeURIComponent(btn.dataset.role || '');
      const nowFollowing = toggleFollow(name, role);
      btn.classList.toggle('following', nowFollowing);
      btn.textContent = nowFollowing ? 'フォロー中' : 'フォロー';
      if (navigator.vibrate) navigator.vibrate(10);
      return;
    }
    if (row) {
      const name = decodeURIComponent(row.dataset.name);
      location.href = '/profile?user=' + encodeURIComponent(name);
    }
  });
  results.addEventListener('click', (e) => {
    const btn = e.target.closest('.account-follow');
    const row = e.target.closest('.account-row');
    if (btn) {
      e.stopPropagation();
      const name = decodeURIComponent(btn.dataset.name);
      const role = decodeURIComponent(btn.dataset.role || '');
      const nowFollowing = toggleFollow(name, role);
      btn.classList.toggle('following', nowFollowing);
      btn.textContent = nowFollowing ? 'フォロー中' : 'フォロー';
      if (navigator.vibrate) navigator.vibrate(10);
      return;
    }
    if (row) {
      const name = decodeURIComponent(row.dataset.name);
      location.href = '/profile?user=' + encodeURIComponent(name);
    }
  });

  // ── Manual account add (for friends not yet in the directory) ──
  const addBtn    = document.getElementById('accountAddToggle');
  const addForm   = document.getElementById('accountAddForm');
  const addName   = document.getElementById('accountAddName');
  const addRole   = document.getElementById('accountAddRole');
  const addCancel = document.getElementById('accountAddCancel');
  const addSave   = document.getElementById('accountAddSave');
  if (addBtn && addForm) {
    addBtn.addEventListener('click', () => {
      addForm.classList.toggle('open');
      if (addForm.classList.contains('open')) {
        addName.value = (input.value || '').trim();
        addRole.value = '';
        setTimeout(() => addName.focus(), 50);
      }
    });
    addCancel.addEventListener('click', () => addForm.classList.remove('open'));
    addSave.addEventListener('click', () => {
      const name = (addName.value || '').trim();
      const role = (addRole.value || '').trim();
      if (!name) { addName.focus(); return; }
      // Normalize name to uppercase, dedupe against the current directory
      const uname = name.toUpperCase();
      const me = (localStorage.getItem('livepass_account_name') || '').toUpperCase();
      if (uname === me) { alert('自分のアカウント名は追加できません'); return; }
      const list = getList('livepass_custom_accounts');
      if (!list.some(u => (u.name || '').toUpperCase() === uname)) {
        list.unshift({ name: uname, role });
        saveList('livepass_custom_accounts', list);
      }
      // Auto-follow the new account
      if (!isFollowing(uname)) toggleFollow(uname, role);
      refreshDirectory();
      addForm.classList.remove('open');
      input.value = uname;
      render(uname);
      if (navigator.vibrate) navigator.vibrate([10, 30, 10]);
    });
  }
})();
</script>
</body>
