<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#FFFFFF">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/livepass-icon-180.png">
<title>EXPASS — Search</title>
<script>try{if(localStorage.getItem('livepass_tier')==='user')document.documentElement.classList.add('tier-user')}catch(e){}</script>
<style>html.tier-user .bn-btn[aria-label="Lab"],html.tier-user .bn-btn[aria-label="Atelier"]{display:none!important}</style>
<script src="/livepass_paywall.js" defer></script>
<script src="/livepass_categories.js" defer></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=IBM+Plex+Mono:wght@400;500&family=Noto+Sans+JP:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --black:#000;--bg:#080808;--white:#EDEBE6;
  --red:#E8100A;--blue:#3DAAFF;--green:#A8E63D;
  --gold:#F5C842;--mint:#00E5A0;--pink:#F4C0D1;--purple:#bf5af2;
  --muted:rgba(237,235,230,.3);--muted2:rgba(237,235,230,.14);
  --border:rgba(255,255,255,.07);
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bot:env(safe-area-inset-bottom,0px);
  --nav-h:62px;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;max-width:100vw;height:100%;height:100dvh;
  background:var(--black);color:var(--white);
  font-family:Arial,'Noto Sans JP',sans-serif;-webkit-font-smoothing:antialiased;
  user-select:none;-webkit-user-select:none;overflow:hidden;
  position:fixed;overscroll-behavior-x:none;touch-action:pan-y;}
a{color:inherit;text-decoration:none}
button{background:none;border:none;color:inherit;font:inherit;cursor:pointer}

.topbar{position:fixed;top:0;left:0;right:0;z-index:100;
  padding:calc(var(--safe-top) + 4px) 18px 8px;
  display:flex;align-items:center;gap:14px;
  background:linear-gradient(to bottom,rgba(0,0,0,.95) 70%,transparent);}
.tb-brand{display:flex;align-items:center;margin-right:auto;height:22px;flex-shrink:0}
.tb-brand img{height:100%;width:auto;display:block;image-rendering:-webkit-optimize-contrast}
.tb-icon{background:none;border:none;cursor:pointer;position:relative;
  width:26px;height:26px;display:flex;align-items:center;justify-content:center;color:var(--white);}
.tb-icon svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.8}
.tb-icon .badge{position:absolute;top:-4px;right:-6px;background:var(--red);color:#fff;
  font-size:8px;font-weight:700;min-width:14px;height:14px;padding:0 3px;border-radius:99px;
  display:flex;align-items:center;justify-content:center;font-family:Arial,sans-serif;}
.tb-stat{display:flex;flex-direction:column;align-items:center;line-height:1;gap:2px;color:var(--blue);}
.tb-stat-n{font-family:Arial,'Noto Sans JP',sans-serif;font-weight:900;font-size:16px;color:var(--white);letter-spacing:.04em}
.tb-stat-l{font-size:7px;color:var(--blue);letter-spacing:.08em;font-weight:500}

.content{position:fixed;top:0;left:0;right:0;bottom:calc(var(--nav-h) + var(--safe-bot));
  padding-top:calc(var(--safe-top) + 42px);
  overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;scrollbar-width:none;
  touch-action:pan-y;overscroll-behavior-x:none;max-width:100vw;}
.content::-webkit-scrollbar{display:none}

.bottomnav{position:fixed;bottom:0;left:0;right:0;z-index:100;
  height:calc(var(--nav-h) + var(--safe-bot));padding:0 0 calc(var(--safe-bot) * .4);
  display:flex;align-items:center;justify-content:space-around;
  background:rgba(0,0,0,.96);border-top:0.5px solid var(--border);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);}
.bn-btn{flex:1;height:100%;display:flex;align-items:center;justify-content:center;
  color:rgba(237,235,230,.35);text-decoration:none;position:relative;}
.bn-btn svg{width:30px;height:30px;stroke:currentColor;fill:none;stroke-width:1.8}
.bn-btn.active{color:var(--white)}
.bn-avatar{width:34px;height:34px;border-radius:50%;
  background:linear-gradient(135deg,#1a2030,#0a1020);
  border:1.5px solid rgba(237,235,230,.25);
  overflow:hidden;display:flex;align-items:center;justify-content:center;}
.bn-btn.active .bn-avatar{border-color:var(--white)}

/* Search page content */
.search-header{padding:14px 20px 10px}
.sh-label{font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:.34em;
  text-transform:uppercase;color:rgba(237,235,230,.3);}
.sh-title{font-family:Arial,'Noto Sans JP',sans-serif;font-weight:900;
  font-size:22px;letter-spacing:.02em;color:var(--white);margin-top:4px;}

.search-bar{
  margin:8px 18px 14px;padding:14px 18px;
  background:rgba(255,255,255,.04);border:0.5px solid rgba(255,255,255,.08);
  border-radius:14px;display:flex;align-items:center;gap:12px;
}
.search-bar svg{width:20px;height:20px;stroke:var(--mint);fill:none;stroke-width:1.8;flex-shrink:0}
.search-bar input{
  flex:1;background:none;border:none;outline:none;color:var(--white);
  font-family:Arial,'Noto Sans JP',sans-serif;font-size:13px;
  font-weight:400;letter-spacing:.02em;
}
.search-bar input::placeholder{color:rgba(237,235,230,.35)}

/* Tag filter row */
.tag-row{display:flex;gap:8px;padding:0 18px 18px;overflow-x:auto;scrollbar-width:none}
.tag-row::-webkit-scrollbar{display:none}
.tag-pill{
  flex-shrink:0;padding:7px 14px;border-radius:99px;
  border:0.5px solid rgba(237,235,230,.15);
  font-family:Arial,'Noto Sans JP',sans-serif;font-weight:500;
  font-size:10px;letter-spacing:.12em;text-transform:uppercase;
  color:rgba(237,235,230,.55);
  background:rgba(255,255,255,.02);
}
.tag-pill.active{color:var(--mint);border-color:var(--mint);background:rgba(0,229,160,.08)}

/* AI suggestion sections */
.ai-badge{
  display:inline-flex;align-items:center;gap:6px;
  padding:4px 10px;border-radius:99px;
  background:rgba(0,229,160,.12);border:0.5px solid rgba(0,229,160,.3);
  font-family:Arial,'Noto Sans JP',sans-serif;font-weight:700;
  font-size:8px;letter-spacing:.2em;text-transform:uppercase;
  color:var(--mint);
  margin:6px 20px 10px;
}
.ai-badge svg{width:10px;height:10px;stroke:currentColor;fill:none;stroke-width:2.4}

.sec-label{
  font-family:'IBM Plex Mono',monospace;
  font-size:8px;letter-spacing:.34em;text-transform:uppercase;
  color:rgba(237,235,230,.3);padding:18px 20px 10px;
}

/* FOLLOWING / DISCOVERY tabs */
.disc-tabs{
  display:flex;gap:24px;padding:2px 20px 0;
  border-bottom:0.5px solid var(--border);
  position:sticky;top:0;z-index:5;
  background:rgba(0,0,0,.92);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
}
.dt-btn{
  font-family:Arial,'Noto Sans JP',sans-serif;font-weight:500;
  font-size:11px;letter-spacing:.22em;text-transform:uppercase;
  color:rgba(237,235,230,.35);padding:12px 0;position:relative;
}
.dt-btn.active{color:var(--white)}
.dt-btn.active::after{
  content:"";position:absolute;left:0;right:0;bottom:-0.5px;height:2px;background:var(--mint);
}

/* Sub-mode pills inside the SEARCH tab */
.sm-row{
  display:flex;gap:8px;padding:14px 20px 10px;
}
.sm-btn{
  flex:1;padding:10px 14px;border-radius:99px;
  background:rgba(255,255,255,.04);border:0.5px solid rgba(237,235,230,.12);
  font-family:Arial,'Noto Sans JP',sans-serif;font-size:11px;font-weight:500;
  letter-spacing:.12em;text-transform:uppercase;color:rgba(237,235,230,.55);
  transition:background .18s,border-color .18s,color .18s;
}
.sm-btn.active{
  background:var(--mint);color:#000;border-color:var(--mint);font-weight:800;
}

/* Party sub-mode UI */
.cat-chip-row{
  display:flex;gap:8px;padding:6px 18px 6px;overflow-x:auto;scrollbar-width:none;
  -webkit-overflow-scrolling:touch;
}
.cat-chip-row::-webkit-scrollbar{display:none}
.cat-chip{
  flex-shrink:0;padding:7px 14px;border-radius:99px;
  border:0.5px solid rgba(237,235,230,.15);background:rgba(255,255,255,.02);
  font-family:Arial,'Noto Sans JP',sans-serif;font-weight:600;
  font-size:10px;letter-spacing:.14em;text-transform:uppercase;
  color:rgba(237,235,230,.55);white-space:nowrap;
}
.cat-chip.active{
  color:var(--mint);border-color:var(--mint);background:rgba(0,229,160,.08);
}

.area-row{
  display:flex;align-items:center;gap:12px;padding:6px 20px 14px;
}
.area-label{
  font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:.28em;
  text-transform:uppercase;color:rgba(237,235,230,.4);flex-shrink:0;
}
.area-select{
  flex:1;padding:10px 12px;border-radius:10px;
  background:rgba(255,255,255,.04);border:0.5px solid rgba(237,235,230,.12);
  color:var(--white);font-family:Arial,'Noto Sans JP',sans-serif;font-size:12px;
  -webkit-appearance:none;appearance:none;
  background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='12' height='8' viewBox='0 0 12 8'><polyline points='1 1 6 6 11 1' fill='none' stroke='%23EDEBE6' stroke-width='1.5'/></svg>");
  background-repeat:no-repeat;background-position:right 12px center;padding-right:32px;
}
.area-select:focus{outline:none;border-color:var(--mint)}

/* Event row card — borrows disc-row styling but wider with meta line */
.ev-row{
  display:flex;align-items:center;gap:12px;padding:12px 20px;
  border-bottom:0.5px solid var(--border);
}
.ev-row .ev-thumb{
  width:64px;height:64px;flex-shrink:0;border-radius:10px;overflow:hidden;
  background:#111;position:relative;
}
.ev-row .ev-thumb img,.ev-row .ev-thumb video{
  position:absolute;inset:0;width:100%;height:100%;object-fit:cover;
}
.ev-row .ev-body{flex:1;min-width:0}
.ev-row .ev-cat{
  font-family:'IBM Plex Mono',monospace;font-size:8px;letter-spacing:.22em;
  text-transform:uppercase;color:var(--mint);margin-bottom:3px;
}
.ev-row .ev-title{
  font-family:Arial,'Noto Sans JP',sans-serif;font-weight:800;font-size:13px;
  color:var(--white);line-height:1.3;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}
.ev-row .ev-meta{
  font-family:Arial,'Noto Sans JP',sans-serif;font-size:10px;
  color:rgba(237,235,230,.5);margin-top:3px;letter-spacing:.02em;
}

/* Panels */
/* Panel visibility — the body carries a class for the active tab:
     (none) → 検索 (.disc-search visible)
     .disc-following  → フォロー中
     .disc-followers  → フォロワー
*/
.disc-search,.disc-following,.disc-followers{padding:14px 0 0}
.disc-following,.disc-followers{display:none}
body.disc-following .disc-search,
body.disc-followers .disc-search{display:none}
body.disc-following .disc-following{display:block}
body.disc-followers .disc-followers{display:block}

.disc-list{display:flex;flex-direction:column}
.disc-empty{padding:60px 28px;text-align:center}
.de-title{font-family:Arial,'Noto Sans JP',sans-serif;font-weight:700;font-size:13px;color:var(--white);margin-bottom:8px}
.de-sub{font-family:Arial,'Noto Sans JP',sans-serif;font-size:10px;color:rgba(237,235,230,.4);line-height:1.6}
.disc-row{
  display:flex;align-items:center;gap:12px;
  padding:12px 20px;border-bottom:0.5px solid var(--border);
  cursor:pointer;transition:background .18s;
}
.disc-row:active{background:rgba(255,255,255,.03)}
.disc-row .ar-av{
  width:44px;height:44px;border-radius:50%;flex-shrink:0;
  background:linear-gradient(135deg,#1a2030,#0a1020);
  border:1.5px solid rgba(237,235,230,.12);
}
.disc-row .ar-meta{flex:1;min-width:0}
.disc-row .ar-name{font-family:Arial,'Noto Sans JP',sans-serif;font-weight:900;font-size:14px;color:var(--white);line-height:1.1}
.disc-row .ar-role{font-family:Arial,'Noto Sans JP',sans-serif;font-weight:500;font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:rgba(237,235,230,.45);margin-top:3px}
.disc-row .ar-unfollow{
  padding:7px 14px;border-radius:99px;
  background:rgba(61,170,255,.2);border:1px solid var(--blue);color:var(--blue);
  font-family:Arial,'Noto Sans JP',sans-serif;font-size:10px;font-weight:500;letter-spacing:.02em;
  flex-shrink:0;
}

/* Suggestion cards */
.sug-grid{padding:0 14px 10px;display:flex;flex-wrap:wrap;gap:8px}
.sug-card{
  flex:1 1 calc(50% - 4px);
  background:#0a0a0a;border-radius:10px;overflow:hidden;
  border:0.5px solid rgba(255,255,255,.06);
  cursor:pointer;
}
.sug-img{
  position:relative;aspect-ratio:1/1;background:#111;overflow:hidden;
}
.sug-img img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.sug-img::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(to top,rgba(0,0,0,.7) 0%,transparent 50%);
}
.sug-body{padding:10px 12px 12px}
.sug-cat{
  font-family:Arial,'Noto Sans JP',sans-serif;font-weight:500;
  font-size:7px;letter-spacing:.22em;text-transform:uppercase;
  color:var(--sug-color,var(--mint));margin-bottom:3px;
}
.sug-name{
  font-family:Arial,'Noto Sans JP',sans-serif;font-weight:900;
  font-size:13px;color:var(--white);line-height:1.15;
  margin-bottom:3px;
}
.sug-meta{
  font-family:Arial,'Noto Sans JP',sans-serif;font-weight:400;
  font-size:8px;color:rgba(237,235,230,.45);letter-spacing:.02em;
}
.sug-score{
  position:absolute;top:10px;right:12px;
  font-family:'IBM Plex Mono',monospace;
  font-size:8px;font-weight:500;letter-spacing:.1em;
  color:var(--mint);
}

/* Horizontal list (artists / venues) */
.scroll-row{
  display:flex;gap:10px;padding:0 14px 10px;overflow-x:auto;
  scrollbar-width:none;
}
.scroll-row::-webkit-scrollbar{display:none}
.sr-card{
  flex-shrink:0;width:120px;
  display:flex;flex-direction:column;align-items:center;
  cursor:pointer;padding:8px 4px;
}
.sr-av{
  width:70px;height:70px;border-radius:50%;overflow:hidden;
  background:linear-gradient(135deg,#1a2030,#0a1020);
  border:1.5px solid rgba(237,235,230,.12);
  margin-bottom:10px;position:relative;
}
.sr-av svg{width:100%;height:100%;display:block}
.sr-name{
  font-family:Arial,'Noto Sans JP',sans-serif;font-weight:700;
  font-size:11px;color:var(--white);text-align:center;
  margin-bottom:2px;
}
.sr-sub{
  font-family:Arial,'Noto Sans JP',sans-serif;font-weight:400;
  font-size:8px;letter-spacing:.12em;text-transform:uppercase;
  color:rgba(237,235,230,.4);text-align:center;
}

.content-bottom-padding{height:60px}

/* ─────────────────────────────────────────────
   COMPOSE SELECTOR BOTTOM SHEET (shared)
   ───────────────────────────────────────────── */
#composeSheetOverlay{position:fixed;inset:0;z-index:1100;background:rgba(0,0,0,0);pointer-events:none;opacity:0;transition:background .3s ease, opacity .2s ease}
#composeSheetOverlay.active{background:rgba(0,0,0,.7);pointer-events:all;opacity:1;backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px)}
#composeSheet{position:fixed;left:0;right:0;bottom:0;z-index:1101;background:#0a0a0a;border-top:0.5px solid var(--border);border-top-left-radius:20px;border-top-right-radius:20px;padding:20px 20px calc(24px + var(--safe-bot));transform:translateY(100%);transition:transform .35s cubic-bezier(.2,.8,.2,1);box-shadow:0 -12px 40px rgba(0,0,0,.7)}
#composeSheetOverlay.active #composeSheet{transform:translateY(0)}
.cs-handle{width:40px;height:4px;border-radius:99px;background:rgba(237,235,230,.2);margin:0 auto 20px}
.cs-title{font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:.34em;text-transform:uppercase;color:rgba(237,235,230,.35);text-align:center;margin-bottom:18px}
.cs-options{display:flex;flex-direction:column;gap:10px}
.cs-opt{display:flex;align-items:center;gap:16px;padding:18px 18px;width:100%;background:rgba(255,255,255,.03);border:0.5px solid rgba(237,235,230,.08);border-radius:14px;color:var(--white);transition:background .2s}
.cs-opt:active{background:rgba(255,255,255,.06)}
.cs-opt svg{width:26px;height:26px;stroke:currentColor;fill:none;stroke-width:1.8;flex-shrink:0}
.cs-opt-body{flex:1;text-align:left}
.cs-opt-title{font-family:Arial,'Noto Sans JP',sans-serif;font-weight:700;font-size:15px;color:var(--white);margin-bottom:2px}
.cs-opt-sub{font-family:Arial,'Noto Sans JP',sans-serif;font-weight:400;font-size:10px;letter-spacing:.04em;color:rgba(237,235,230,.4)}
.cs-opt.article{border-left:3px solid var(--green)}
.cs-opt.event{border-left:3px solid var(--red)}
.cs-opt.workshop{border-left:3px solid var(--gold)}
.cs-opt.exhibition{border-left:3px solid var(--mint)}
.cs-opt.article svg{color:var(--green)}
.cs-opt.event svg{color:var(--red)}
.cs-opt.workshop svg{color:var(--gold)}
.cs-opt.exhibition svg{color:var(--mint)}
.cs-close{display:block;width:100%;padding:14px;background:none;border:0.5px solid rgba(237,235,230,.12);border-radius:99px;margin-top:16px;font-family:Arial,'Noto Sans JP',sans-serif;font-size:11px;font-weight:500;letter-spacing:.04em;color:rgba(237,235,230,.5)}

/* ── Artist roster (hero cards, one per artist) ─────────────
   Each artist gets a full-width hero tile — cover art / video
   if they've posted, brand gradient + monogram otherwise.
   Designed to feel like a credits roll, not a contact list. */
.account-results{padding:0 clamp(14px,4vw,20px) 24px;display:none}
.account-results.open{display:block}
#browseList{padding:0 clamp(14px,4vw,20px) 32px}

.account-row{
  position:relative;display:block;
  width:100%;aspect-ratio:4/5;
  margin:0 0 clamp(22px,5vw,38px);
  border:0;border-radius:14px;
  overflow:hidden;isolation:isolate;
  background:#0A0A0A;
  cursor:pointer;
  -webkit-tap-highlight-color:transparent;
  transition:transform .25s ease;
}
.account-row:active{transform:scale(.985)}

/* Hero media layer */
.account-hero{
  position:absolute;inset:0;z-index:0;
  background-size:cover;background-position:center;
  transform:scale(1.02);
  transition:transform 1.2s ease;
}
.account-row:hover .account-hero{transform:scale(1.06)}
.account-hero.gradient{
  background:
    radial-gradient(ellipse at 28% 22%, var(--av-hue,#1b3a66) 0%, transparent 55%),
    radial-gradient(ellipse at 72% 78%, var(--av-hue2,#2a1a48) 0%, transparent 60%),
    linear-gradient(145deg, #0A0A0A 0%, #1a1a22 100%);
}
.account-hero video{
  position:absolute;inset:0;width:100%;height:100%;
  object-fit:cover;
}

/* Monogram — sits behind the name as typographic texture */
.account-initial{
  position:absolute;left:clamp(16px,5vw,24px);top:clamp(16px,5vw,24px);
  z-index:1;
  font-family:'IBM Plex Mono','Helvetica Neue',sans-serif;
  font-weight:500;
  font-size:clamp(56px,17vw,110px);
  line-height:.85;
  letter-spacing:-.06em;
  color:rgba(255,255,255,.06);
  mix-blend-mode:overlay;
  user-select:none;pointer-events:none;
}
.account-hero:not(.gradient) ~ .account-initial{opacity:0}

/* Shadow fade to keep bottom text legible */
.account-row::after{
  content:"";position:absolute;inset:0;z-index:1;pointer-events:none;
  background:linear-gradient(to top,
    rgba(0,0,0,.88) 0%,
    rgba(0,0,0,.55) 22%,
    rgba(0,0,0,.15) 45%,
    rgba(0,0,0,0) 62%);
}

/* Subtle grain */
.account-row::before{
  content:"";position:absolute;inset:0;z-index:2;pointer-events:none;
  background-image:
    repeating-linear-gradient(0deg, rgba(255,255,255,.015) 0 1px, transparent 1px 2px);
  mix-blend-mode:overlay;opacity:.6;
}

.account-body{
  position:absolute;left:0;right:0;bottom:0;z-index:3;
  padding:clamp(16px,4.5vw,22px) clamp(18px,5vw,24px) clamp(18px,5vw,24px);
  display:flex;align-items:flex-end;justify-content:space-between;
  gap:14px;
}
.account-body-text{min-width:0;flex:1}

.account-name{
  font-family:'Helvetica Neue','Arial Narrow',Arial,sans-serif;
  font-weight:800;
  font-size:clamp(24px,7.5vw,38px);
  line-height:.95;
  letter-spacing:-.015em;
  text-transform:uppercase;
  color:#fff;
  margin:0 0 8px;

<script>
/* AUTH GUARD — wait for Firebase auth before redirecting */
(function(){
  if (localStorage.getItem('livepass_account_name')) return;
  // No localStorage — wait for Firebase auth to resolve
  var timer = setTimeout(function(){ location.replace('/login'); }, 2500);
  window.addEventListener('fb-auth-ready', function(e){
    clearTimeout(timer);
    if (e.detail && e.detail.user) return; // signed in via Firebase — stay
    if (localStorage.getItem('livepass_account_name')) return; // populated by onAuthStateChanged
    location.replace('/login');
  }, {once:true});
})();
</script>
<script>
/* PWA NAV FIX v66 — form-submission technique for iOS PWA standalone.
   Link clicks in iOS PWAs can break out of standalone mode; form
   submissions are handled differently by iOS and stay in-app. */
(function(){
  function isStandalone(){
    return (window.navigator.standalone === true) ||
           window.matchMedia('(display-mode: standalone)').matches ||
           window.matchMedia('(display-mode: fullscreen)').matches;
  }
  if (!isStandalone()) return;
  // Also add a body class so CSS can adjust for standalone mode
  document.documentElement.classList.add('is-pwa');
  document.addEventListener('click', function(e){
    var a = e.target.closest && e.target.closest('a');
    if (!a) return;
    var href = a.getAttribute('href');
    if (!href) return;
    if (a.target && a.target !== '_self') return;
    if (href.charAt(0) === '#') return;
    if (/^(mailto|tel|sms):/i.test(href)) return;
    // External origin?
    try {
      var u = new URL(a.href, location.href);
      if (u.host !== location.host) return;
    } catch(err) { return; }
    e.preventDefault();
    e.stopPropagation();
    // Use form submission — iOS PWA treats this as in-app navigation
    try {
      var u2 = new URL(a.href, location.href);
      var form = document.createElement('form');
      form.method = 'GET';
      form.action = u2.origin + u2.pathname;
      form.style.display = 'none';
      u2.searchParams.forEach(function(value, key){
        var inp = document.createElement('input');
        inp.type = 'hidden'; inp.name = key; inp.value = value;
        form.appendChild(inp);
      });
      document.body.appendChild(form);
      form.submit();
    } catch(err) {
      window.location.href = a.href;
    }
  }, true);
})();
</script>

<script>
/* ─────────────────────────────────────────────
   SEARCH MAGAZINE LAYOUT — runtime
   ─────────────────────────────────────────────
   · DIRECTORY  — built from local follow/follower lists + Firestore
                  (users/) + most recent posts/. Each entry:
                  { name, role, uid?, cover?, videoUrl? }.
   · render()   — turns DIRECTORY into:
                    1) FEATURED #1 hard-coded NOBBY (May 4 demo)
                    2) Masonry batch 1 (12 tiles)
                    3) FEATURED #2 (next-most-active artist)
                    4) Masonry batch 2 (next 12)
   · IntersectionObserver on #sLoader keeps appending FEATURED +
     12-tile batches from the same DIRECTORY pool.
   · Click on any FEATURED / tile → AI Concierge modal.
   ───────────────────────────────────────────── */
(function initSearch(){
  const FEATURED_HERO = {
    name: 'NOBBY',
    role: 'DANCER · ALL MUST DANCE™ · TOKYO',
    tag:  'FEATURED · THIS WEEK',
  };

  // For the May 4 demo: only NOBBY has a curated AI script.
  const AI_ANSWERS = {
    NOBBY: {
      activity:
        'NOBBYは20年以上にわたって東京のダンスシーンと音楽シーンを横断する活動を続けています。' +
        'SPACE COOKING™とALL MUST DANCE™の主宰者として、ストリートダンスからクラブシーンまで、' +
        '現場でしか生まれない文化を記録し、次の世代に渡すことに取り組んでいます。',
      events:
        '次の出演はMAY 04のALL MUST DANCE™ at CLUB ASIA TOKYO。' +
        '最新のMIXはMixcloudで公開されています。',
      free:
        'NOBBYについて、何でも聞いてください。プロフィールに登録された情報の範囲でお答えします。',
    },
  };

  const HEIGHTS = ['h-tall','h-mid','h-short','h-xshort'];
  const BATCH   = 12;

  let DIRECTORY = [];
  let renderedTo = 0;

  function pushUnique(arr, name, extra){
    if (!name) return;
    const k = String(name).toUpperCase();
    if (arr.some(a => (a.name || '').toUpperCase() === k)) return;
    arr.push(Object.assign({ name }, extra || {}));
  }

  function buildLocalDirectory(){
    const out = [];
    const me = (localStorage.getItem('livepass_account_name') || '').toUpperCase();
    try {
      JSON.parse(localStorage.getItem('livepass_following') || '[]').forEach(x => {
        const n = typeof x === 'string' ? x : x && x.name;
        if (n && n.toUpperCase() !== me) pushUnique(out, n, { role: (x && x.role) || '' });
      });
    } catch(_){}
    try {
      JSON.parse(localStorage.getItem('livepass_followers') || '[]').forEach(x => {
        const n = typeof x === 'string' ? x : x && x.name;
        if (n && n.toUpperCase() !== me) pushUnique(out, n, { role: (x && x.role) || '' });
      });
    } catch(_){}
    return out;
  }
  DIRECTORY = buildLocalDirectory();

  async function loadRemoteDirectory(){
    if (!window.FB) await new Promise(r => window.addEventListener('fb-auth-ready', r, { once:true }));
    if (!window.FB || !window.FB.currentUser) return;
    const { collection, getDocs, db, query, orderBy, limit } = window.FB;
    const me = (localStorage.getItem('livepass_account_name') || '').toUpperCase();
    try {
      const snap = await getDocs(collection(db, 'users'));
      snap.forEach(d => {
        const data = d.data() || {};
        const name = data.name || '';
        if (!name || name.toUpperCase() === me) return;
        pushUnique(DIRECTORY, name, {
          role: data.role || '', uid: d.id,
          cover: data.coverUrl || null, avatar: data.avatarUrl || null,
        });
      });
    } catch(err){
      console.warn('search: users/ load failed:', err && err.code);
    }
    try {
      const q = query(collection(db,'posts'), orderBy('createdAt','desc'), limit(250));
      const snap = await getDocs(q);
      const byName = new Map();
      snap.forEach(d => {
        const dt = d.data() || {};
        const nm = (dt.authorName || dt.author || '').toUpperCase();
        if (!nm || byName.has(nm)) return;
        const cover = dt.cover || dt.coverUrl || null;
        const videoUrl = (dt.videoLoop && dt.videoUrl) ? dt.videoUrl : null;
        if (cover || videoUrl) byName.set(nm, { cover, videoUrl });
      });
      DIRECTORY = DIRECTORY.map(a => {
        const m = byName.get((a.name || '').toUpperCase());
        if (!m) return a;
        return Object.assign({}, a, { cover: a.cover || m.cover, videoUrl: a.videoUrl || m.videoUrl });
      });
    } catch(err){
      console.warn('search: posts hydrate failed:', err && err.code);
    }
    renderAll(true);
  }

  function escHTML(s){
    return String(s == null ? '' : s)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
  }
  function nameHue(s){
    let h = 0;
    for (let i = 0; i < (s||'').length; i++) h = (h*31 + s.charCodeAt(i)) | 0;
    return Math.abs(h) % 360;
  }

  function paintFeatured(el, data){
    if (!el) return;
    el.dataset.artist = data.name || '';
    el.querySelector('.s-feat-name').textContent = data.name || '';
    el.querySelector('.s-feat-meta').textContent = data.role || '';
    const tagEl = el.querySelector('.s-feat-tag');
    if (tagEl && data.tag) {
      tagEl.textContent = data.tag;
      tagEl.classList.toggle('live', !!data.videoUrl);
    }
    const bg = el.querySelector('.s-feat-bg');
    if (!bg) return;
    bg.innerHTML = '';
    bg.style.backgroundImage = '';
    bg.classList.remove('has-img');
    if (data.videoUrl) {
      bg.classList.add('has-img');
      const v = document.createElement('video');
      v.src = data.videoUrl;
      v.muted = true; v.defaultMuted = true; v.playsInline = true;
      v.setAttribute('muted',''); v.setAttribute('playsinline','');
      v.setAttribute('webkit-playsinline',''); v.setAttribute('autoplay','');
      v.setAttribute('loop',''); v.preload = 'metadata';
      bg.appendChild(v);
      requestAnimationFrame(() => { try { v.play(); } catch(_){} });
    } else if (data.cover) {
      bg.classList.add('has-img');
      bg.style.backgroundImage = `url('${String(data.cover).replace(/'/g,"%27")}')`;
    }
  }

  function tileEl(a, idx){
    const el = document.createElement('article');
    el.className = 's-tile ' + HEIGHTS[idx % HEIGHTS.length];
    el.dataset.artist = a.name || '';
    el.dataset.role   = a.role || '';
    const role = (a.role || 'ARTIST').toString().split(/\s*[·/,]\s*/)[0];
    el.innerHTML = `
      <div class="s-tile-bg"></div>
      <div class="s-tile-grain"></div>
      <div class="s-tile-shade"></div>
      <div class="s-tile-tag">${escHTML(role)}</div>
      ${a.videoUrl ? '<div class="s-tile-live"></div>' : ''}
      <div class="s-tile-text">
        <div class="s-tile-name">${escHTML(a.name)}</div>
        <div class="s-tile-meta">${escHTML((a.role || '').replace(/\s*·\s*/g,' · '))}</div>
      </div>
    `;
    const bg = el.querySelector('.s-tile-bg');
    if (a.videoUrl) {
      const v = document.createElement('video');
      v.src = a.videoUrl;
      v.muted = true; v.defaultMuted = true; v.playsInline = true;
      v.setAttribute('muted',''); v.setAttribute('playsinline','');
      v.setAttribute('webkit-playsinline',''); v.setAttribute('autoplay','');
      v.setAttribute('loop',''); v.preload = 'metadata';
      bg.appendChild(v);
      requestAnimationFrame(() => { try { v.play(); } catch(_){} });
    } else if (a.cover) {
      bg.style.backgroundImage = `url('${String(a.cover).replace(/'/g,"%27")}')`;
    } else {
      const h = nameHue(a.name);
      bg.style.background = `linear-gradient(140deg, hsl(${h}, 35%, 14%), #050B1F)`;
    }
    el.addEventListener('click', () => openConcierge(a));
    return el;
  }

  function renderBatchInto(grid, slice){
    grid.innerHTML = '';
    slice.forEach((a, i) => grid.appendChild(tileEl(a, i)));
  }

  function nextBatch(){
    const slice = DIRECTORY.slice(renderedTo, renderedTo + BATCH);
    renderedTo += slice.length;
    return slice;
  }

  function appendBatch(){
    if (renderedTo >= DIRECTORY.length) return false;
    const wrap = document.createElement('div');
    wrap.className = 's-stream-block';
    const pickedArtist = DIRECTORY[renderedTo % Math.max(1, DIRECTORY.length)] || null;
    if (!pickedArtist) return false;
    wrap.innerHTML = `
      <article class="s-feat" data-feat-size="mid"
               data-artist="${escHTML(pickedArtist.name)}">
        <div class="s-feat-bg"></div>
        <div class="s-feat-shade"></div>
        <div class="s-feat-tag">FEATURED · NEW</div>
        <div class="s-feat-text">
          <div class="s-feat-name">${escHTML(pickedArtist.name)}</div>
          <div class="s-feat-meta">${escHTML(pickedArtist.role||'')}</div>
        </div>
      </article>
      <div class="s-sec">
        <div class="s-sec-label">MORE TO DISCOVER</div>
        <a class="s-sec-link" href="#">SEE ALL →</a>
      </div>
      <div class="s-masonry"></div>
    `;
    const featEl    = wrap.querySelector('.s-feat');
    const masonryEl = wrap.querySelector('.s-masonry');
    paintFeatured(featEl, Object.assign({ tag:'FEATURED · NEW' }, pickedArtist));
    featEl.addEventListener('click', () => openConcierge(pickedArtist));
    renderBatchInto(masonryEl, nextBatch());
    document.getElementById('sLoader').before(wrap);
    return true;
  }

  function renderAll(reset){
    if (reset) {
      renderedTo = 0;
      document.querySelectorAll('.s-stream-block').forEach(n => n.remove());
    }
    const heroEl = document.querySelector('.s-feat[data-feat-size="hero"]');
    if (heroEl) {
      const nobby = DIRECTORY.find(a => (a.name || '').toUpperCase() === 'NOBBY') || {};
      paintFeatured(heroEl, Object.assign({}, FEATURED_HERO, { cover: nobby.cover, videoUrl: nobby.videoUrl }));
      heroEl.onclick = () => openConcierge({ name: 'NOBBY', role: FEATURED_HERO.role });
    }
    const grid1 = document.getElementById('sMasonry1');
    if (grid1) renderBatchInto(grid1, nextBatch());
    const feat2 = document.getElementById('sFeat2');
    if (feat2 && DIRECTORY.length) {
      const a = DIRECTORY[renderedTo] || DIRECTORY[0];
      paintFeatured(feat2, Object.assign({ tag:'FEATURED · ARTIST' }, a));
      feat2.onclick = () => openConcierge(a);
    }
    const grid2 = document.getElementById('sMasonry2');
    if (grid2) renderBatchInto(grid2, nextBatch());
    const loader = document.getElementById('sLoader');
    if (loader) loader.style.opacity = '';
  }

  document.querySelectorAll('.s-tab').forEach(btn => {
    btn.addEventListener('click', () => {
      const key = btn.dataset.stab;
      document.querySelectorAll('.s-tab').forEach(b => b.classList.toggle('active', b === btn));
      document.querySelectorAll('.s-panel').forEach(p => p.classList.toggle('active', p.id === `sPanel-${key}`));
      if (key === 'following') renderFollowing();
    });
  });

  function renderFollowing(){
    const list  = document.getElementById('sFollowingList');
    const empty = document.getElementById('sFollowingEmpty');
    if (!list) return;
    let arr = [];
    try { arr = JSON.parse(localStorage.getItem('livepass_following') || '[]'); } catch(_){}
    arr = arr.map(x => typeof x === 'string' ? { name:x } : x).filter(x => x && x.name);
    if (!arr.length) { list.innerHTML = ''; if (empty) empty.style.display = 'block'; return; }
    if (empty) empty.style.display = 'none';
    list.innerHTML = arr.map(a => `
      <div class="s-mini-row" data-name="${escHTML(a.name)}">
        <div class="s-mini-av">${escHTML((a.name||'?').slice(0,2).toUpperCase())}</div>
        <div>
          <div class="s-mini-name">${escHTML(a.name)}</div>
          <div class="s-mini-role">${escHTML(a.role || 'ARTIST')}</div>
        </div>
      </div>
    `).join('');
    list.querySelectorAll('.s-mini-row').forEach(row => {
      row.addEventListener('click', () => {
        location.href = '/profile?user=' + encodeURIComponent(row.dataset.name);
      });
    });
  }

  const sQuery = document.getElementById('sQuery');
  if (sQuery) {
    sQuery.addEventListener('input', () => {
      const q = sQuery.value.trim().toLowerCase();
      document.querySelectorAll('.s-tile').forEach(t => {
        const name = (t.dataset.artist || '').toLowerCase();
        const role = (t.dataset.role  || '').toLowerCase();
        t.style.display = (!q || name.includes(q) || role.includes(q)) ? '' : 'none';
      });
    });
  }

  const loader = document.getElementById('sLoader');
  if (loader && 'IntersectionObserver' in window) {
    const io = new IntersectionObserver((entries) => {
      entries.forEach(e => {
        if (e.isIntersecting) {
          if (!appendBatch()) loader.style.opacity = '0.3';
        }
      });
    }, { rootMargin: '300px 0px' });
    io.observe(loader);
  }

  // ─── AI Concierge ───
  const overlay   = document.getElementById('aiOverlay');
  const sheet     = document.getElementById('aiSheet');
  const promptEl  = document.getElementById('aiPromptText');
  const choicesEl = document.getElementById('aiChoices');
  const streamEl  = document.getElementById('aiStream');
  let promptTimer = null, typeTimer = null;

  function clearTypers(){
    if (promptTimer) { clearInterval(promptTimer); promptTimer = null; }
    if (typeTimer)   { clearInterval(typeTimer);   typeTimer   = null; }
  }
  function startTyping(el, text, speed){
    el.textContent = '';
    let i = 0;
    promptTimer = setInterval(() => {
      if (i < text.length) el.textContent += text[i++];
      else { clearInterval(promptTimer); promptTimer = null; }
    }, speed);
  }
  function streamAnswer(text){
    streamEl.classList.add('active');
    streamEl.innerHTML = '<span class="ai-text"></span><span class="ai-caret"></span>';
    const tx = streamEl.querySelector('.ai-text');
    let i = 0;
    typeTimer = setInterval(() => {
      if (i < text.length) {
        tx.textContent += text[i++];
        sheet.scrollTop = sheet.scrollHeight;
      } else {
        clearInterval(typeTimer); typeTimer = null;
        const c = streamEl.querySelector('.ai-caret'); if (c) c.remove();
      }
    }, 22);
  }
  function openConcierge(artist){
    if (!overlay) return;
    const name = (artist && artist.name) || 'ARTIST';
    streamEl.classList.remove('active');
    streamEl.innerHTML = '';
    choicesEl.innerHTML = '';
    overlay.classList.add('open');
    overlay.setAttribute('aria-hidden','false');
    startTyping(promptEl, `${name}について教えますか`, 50);

    [
      { label:'活動と表現について', key:'activity' },
      { label:'最近のイベント・MIX', key:'events'   },
      { label:'自由に質問する',     key:'free'     },
    ].forEach(c => {
      const b = document.createElement('button');
      b.type = 'button';
      b.className = 'ai-choice';
      b.textContent = c.label;
      b.addEventListener('click', () => answer(name, c.key));
      choicesEl.appendChild(b);
    });
  }
  function answer(name, key){
    const dataset = AI_ANSWERS[String(name).toUpperCase()];
    const text = (dataset && dataset[key])
      ? dataset[key]
      : `${name} はまだプロフィール登録途中です。本人による登録が完了次第、活動・実績・ジャンルを参照してお答えします。`;
    streamAnswer(text);
  }
  function closeConcierge(){
    clearTypers();
    overlay.classList.remove('open');
    overlay.setAttribute('aria-hidden','true');
    sheet.style.transform = '';
  }
  if (overlay) {
    overlay.addEventListener('click', e => { if (e.target === overlay) closeConcierge(); });
    let startY = null;
    sheet.addEventListener('touchstart', e => { startY = e.touches[0].clientY; }, { passive:true });
    sheet.addEventListener('touchmove',  e => {
      if (startY == null) return;
      const dy = e.touches[0].clientY - startY;
      if (dy > 0) sheet.style.transform = `translateY(${Math.min(dy, 200)}px)`;
    }, { passive:true });
    sheet.addEventListener('touchend',   e => {
      if (startY == null) return;
      const dy = (e.changedTouches[0].clientY - startY);
      if (dy > 80) closeConcierge();
      else sheet.style.transform = '';
      startY = null;
    });
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape' && overlay.classList.contains('open')) closeConcierge();
    });
  }

  renderAll(true);
  if (window.FB && window.FB.authReady) loadRemoteDirectory();
  else window.addEventListener('fb-auth-ready', loadRemoteDirectory, { once:true });
})();

<script>
/* ─── Avatar sync: replace bottom-nav initial with uploaded profile photo ─── */

/* ─────────────────────────────────────────────
   ACCOUNT SEARCH — find & follow other accounts
   ───────────────────────────────────────────── */
(function initAccountSearch(){
  const input = document.getElementById('accountSearchInput');
  const results = document.getElementById('accountResults');
  if (!input || !results) return;

  // Demo / sample accounts have been removed. The directory is built
  // from real sources only:
  //   · locally added custom accounts (manual adds)
  //   · authors / featured artists from this device's post history
  //   · already followed / follower lists
  //   · Firestore `usernames/` registry (loaded on first focus)
  function getList(key){
    try { return JSON.parse(localStorage.getItem(key) || '[]'); } catch(e){ return []; }
  }
  function saveList(key, list){
    try { localStorage.setItem(key, JSON.stringify(list)); } catch(e){}
  }
  function isFollowing(name){
    return getList('livepass_following').some(u => (typeof u === 'string' ? u : u && u.name) === name);
  }
  function toggleFollow(name, role){
    const key = 'livepass_following';
    const list = getList(key);
    const i = list.findIndex(u => (typeof u === 'string' ? u : u && u.name) === name);
    if (i >= 0) list.splice(i, 1);
    else list.unshift({ name, role: role || '' });
    saveList(key, list);
    return i < 0; // returns true if now following
  }

  function buildDirectory(){
    const map = new Map();
    // User-added custom accounts (manual adds)
    getList('livepass_custom_accounts').forEach(u => {
      const name = typeof u === 'string' ? u : u && u.name;
      if (name) map.set(name, { name, role: (u && u.role) || '' });
    });
    // Past authors from any post type
    const postKeys = ['livepass_articles','livepass_events','livepass_workshops','livepass_exhibitions'];
    postKeys.forEach(k => {
      getList(k).forEach(p => {
        if (p && p.author && !map.has(p.author)) map.set(p.author, { name: p.author, role: 'Creator' });
        if (Array.isArray(p && p.artists)) p.artists.forEach(a => {
          const n = typeof a === 'string' ? a : a && a.name;
          if (n && !map.has(n)) map.set(n, { name: n, role: 'Featured Artist' });
        });
      });
    });
    // Already followed / followers (in case they're not in any post yet)
    ['livepass_following','livepass_followers'].forEach(k => {
      getList(k).forEach(u => {
        const name = typeof u === 'string' ? u : u && u.name;
        if (name && !map.has(name)) map.set(name, { name, role: (u && u.role) || '' });
      });
    });
    // Exclude the current user
    const me = (localStorage.getItem('livepass_account_name') || '').toUpperCase();
    return Array.from(map.values()).filter(a => (a.name || '').toUpperCase() !== me);
  }

  let DIRECTORY = buildDirectory();
  function refreshDirectory(){ DIRECTORY = buildDirectory(); }

  // ── Firestore-backed directory ──
  // Load the directory from two Firestore collections in parallel:
  //   1) `usernames/` — canonical lowercase handle registry, populated
  //      by the onboarding claim. Recent signups live here.
  //   2) `users/{uid}` — the older per-user profile doc. Everyone has
  //      one of these from before the usernames claim shipped, so this
  //      is where *existing* members are found.
  // Both are gated to signed-in readers by the Firestore Rules.
  let REMOTE_LOADED = false;
  async function loadRemoteDirectory(){
    if (REMOTE_LOADED) return;
    REMOTE_LOADED = true;
    try {
      if (!window.FB) await new Promise(r =>
        window.addEventListener('fb-auth-ready', r, { once:true })
      );
      if (!window.FB || !window.FB.currentUser) {
        console.warn('search: skipping Firestore directory load — not signed in');
        return;
      }
      const { collection, getDocs, db } = window.FB;
      const me = (localStorage.getItem('livepass_account_name') || '').toUpperCase();
      const myUid = window.FB.currentUser.uid;
      const add = [];
      const seen = new Set(DIRECTORY.map(a => (a.name || '').toUpperCase()));

      // Try usernames first (cheapest). If rules aren't deployed yet
      // this throws permission-denied and we still have users/ below.
      try {
        const snap = await getDocs(collection(db, 'usernames'));
        snap.forEach(d => {
          const data = d.data() || {};
          const name = data.name || d.id.toUpperCase();
          if (!name || name.toUpperCase() === me) return;
          const k = name.toUpperCase();
          if (!seen.has(k)) {
            add.push({ name, role: data.role || '', uid: data.uid || null });
            seen.add(k);
          }
        });
      } catch (err) {
        console.warn('search: usernames/ read failed:', err && err.code, err && err.message);
      }

      // Fallback: users/ — broader, may include accounts without a
      // usernames doc (pre-claim signups).
      try {
        const snap = await getDocs(collection(db, 'users'));
        snap.forEach(d => {
          if (d.id === myUid) return;
          const data = d.data() || {};
          const name = data.name || '';
          if (!name || name.toUpperCase() === me) return;
          const k = name.toUpperCase();
          if (!seen.has(k)) {
            add.push({ name, role: data.role || '', uid: d.id });
            seen.add(k);
          }
        });
      } catch (err) {
        console.warn('search: users/ read failed:', err && err.code, err && err.message);
      }

      if (add.length === 0) {
        console.warn('search: Firestore returned zero additional accounts — check that firestore.rules are deployed and that users/ has any documents.');
      } else {
        console.log(`search: +${add.length} accounts from Firestore`);
      }

      DIRECTORY = DIRECTORY.concat(add);
      render(input.value);
      renderBrowse();

      // Second pass: fetch recent posts, attach each artist's most
      // recent cover/video to their roster tile so the grid becomes
      // a true artist gallery instead of a gradient farm.
      hydrateHeroCovers();
    } catch (err) {
      console.warn('Firestore directory load failed:', err);
    }
  }

  // Pull the most recent post from each artist and use its cover /
  // video as that artist's roster hero image. Runs once per session
  // after the directory is populated — the N=1-per-artist reduction
  // keeps this to a single collection scan regardless of user count.
  let heroesHydrated = false;
  async function hydrateHeroCovers(){
    if (heroesHydrated) return;
    heroesHydrated = true;
    if (!window.FB || !window.FB.db) return;
    try {
      const { collection, query, orderBy, limit, getDocs, db } = window.FB;
      const q = query(collection(db, 'posts'), orderBy('createdAt', 'desc'), limit(250));
      const snap = await getDocs(q);
      const byAuthor = new Map();    // uid → { cover, videoUrl }
      const byAuthorName = new Map(); // uppercase name → same
      snap.forEach(d => {
        const data = d.data() || {};
        const pick = {
          cover:    data.cover    || data.coverUrl || null,
          videoUrl: (data.videoLoop && data.videoUrl) ? data.videoUrl : null,
        };
        if (!pick.cover && !pick.videoUrl) return;
        if (data.authorUid && !byAuthor.has(data.authorUid))   byAuthor.set(data.authorUid, pick);
        const nm = (data.authorName || data.author || '').toUpperCase();
        if (nm && !byAuthorName.has(nm)) byAuthorName.set(nm, pick);
      });
      let matched = 0;
      DIRECTORY = DIRECTORY.map(a => {
        const nm = (a.name || '').toUpperCase();
        const m = (a.uid && byAuthor.get(a.uid)) || byAuthorName.get(nm);
        if (!m) return a;
        matched++;
        return { ...a, cover: a.cover || m.cover, videoUrl: a.videoUrl || m.videoUrl };
      });
      if (matched > 0) {
        console.log(`search: hydrated ${matched} hero covers`);
        render(input.value);
        renderBrowse();
      }
    } catch (err) {
      console.warn('search: hero hydration failed:', err && err.code, err && err.message);
    }
  }

  // Pre-load when the field is focused so the first keystroke already
  // has remote accounts available.
  input.addEventListener('focus', loadRemoteDirectory);

  // Also kick off the load as soon as Firebase auth resolves so the
  // browse list is populated without waiting for a tap. Without this,

  // see locally-known authors.
  if (window.FB && window.FB.authReady && window.FB.currentUser) {
    loadRemoteDirectory();
  } else {
    window.addEventListener('fb-auth-ready', () => loadRemoteDirectory(), { once:true });
  }

  // Deterministic two-tone hue from the artist name so every tile
  // still has its own identity even without a cover image.
  function nameToHues(s){
    let h = 0;
    const str = String(s || '');
    for (let i = 0; i < str.length; i++) h = (h * 31 + str.charCodeAt(i)) | 0;
    const h1 = Math.abs(h) % 360;
    const h2 = (h1 + 55 + (Math.abs(h >> 8) % 40)) % 360;
    return {
      a: `hsl(${h1}, 55%, 22%)`,
      b: `hsl(${h2}, 45%, 18%)`,
    };
  }

  // Escape strings going into template literals so stray quotes or
  // angle brackets in an artist name can't break the HTML.
  function escHTML(s){
    return String(s == null ? '' : s)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
  }

  // Role → display label. Keep it short + editorial.
  function roleLabel(r){
    const v = String(r || '').trim().toLowerCase();
    if (!v) return 'artist';
    // Collapse noisy internal slugs to something readable.
    const map = {
      'artist':'artist','creator':'creator','dj':'dj','producer':'producer',
      'vocalist':'vocalist','band':'band','dancer':'dancer','organizer':'organizer',
      'featured artist':'featured artist','fan':'fan','curator':'curator',
    };
    return map[v] || v;
  }

  function accountRow(a){
    const initial   = (a.name || '?').slice(0, 2).toUpperCase();
    const following = isFollowing(a.name);
    const { a: hueA, b: hueB } = nameToHues(a.name);
    const role     = roleLabel(a.role);
    const nameEsc  = escHTML(a.name);
    const roleEsc  = escHTML(role);
    // Priority: video loop > cover image > brand-gradient monogram.
    let hero;
    if (a.videoUrl) {
      hero = `<div class="account-hero"><video src="${escHTML(a.videoUrl)}" muted playsinline webkit-playsinline autoplay loop preload="metadata"></video></div>`;
    } else if (a.cover) {
      hero = `<div class="account-hero" style="background-image:url('${escHTML(a.cover).replace(/'/g,"%27")}')"></div>`;
    } else {
      hero = `<div class="account-hero gradient"></div>`;
    }
    return `
      <article class="account-row" data-name="${encodeURIComponent(a.name)}" style="--av-hue:${hueA};--av-hue2:${hueB}">
        ${hero}
        <div class="account-initial">${escHTML(initial)}</div>
        <div class="account-body">
          <div class="account-body-text">
            <div class="account-name">${nameEsc}</div>
            <div class="account-role">${roleEsc}</div>
          </div>
          <button class="account-follow ${following ? 'following' : ''}"
                  data-name="${encodeURIComponent(a.name)}"
                  data-role="${encodeURIComponent(a.role || '')}"
                  type="button"
                  aria-label="${following ? 'Unfollow' : 'Follow'} ${nameEsc}">${following ? '✓' : '+'}</button>
        </div>
      </article>
    `;
  }

  function render(q){
    const query = (q || '').trim().toLowerCase();
    if (!query) { results.classList.remove('open'); results.innerHTML = ''; renderBrowse(); return; }
    const matches = DIRECTORY
      .filter(a => (a.name || '').toLowerCase().includes(query) || (a.role || '').toLowerCase().includes(query))
      .slice(0, 40);
    results.classList.add('open');
    if (matches.length === 0) {
      results.innerHTML = `<div class="account-empty">No accounts match "${query}"</div>`;
      return;
    }
    results.innerHTML = matches.map(accountRow).join('');
    wireHeroVideos(results);
  }

  // Browse list — shows every known account under the search bar when
  // no query is active. Updates whenever the directory refreshes
  // (e.g. after Firestore load).
  const browseEl    = document.getElementById('browseList');
  const browseEmpty = document.getElementById('browseEmpty');
  function renderBrowse(){
    if (!browseEl) return;
    if (!DIRECTORY.length) {
      browseEl.innerHTML = '';
      if (browseEmpty) browseEmpty.style.display = 'block';
      return;
    }
    if (browseEmpty) browseEmpty.style.display = 'none';
    browseEl.innerHTML = DIRECTORY.map(accountRow).join('');
    wireHeroVideos(browseEl);
  }
  renderBrowse();

  // iOS Safari rejects autoplay if src is assigned before muted is
  // applied, so we re-poke each video element after render and also
  // pause any that scroll off-screen to save battery.
  let heroVideoObserver = null;
  function wireHeroVideos(scope){
    if (!scope) return;
    const vids = scope.querySelectorAll('.account-hero video');
    if (!vids.length) return;
    vids.forEach(v => {
      try {
        v.muted = true; v.defaultMuted = true; v.playsInline = true;
        v.setAttribute('muted',''); v.setAttribute('playsinline','');
        v.setAttribute('webkit-playsinline',''); v.setAttribute('autoplay','');
        requestAnimationFrame(() => { const p = v.play(); if (p && p.catch) p.catch(()=>{}); });
      } catch(_){}
    });
    if (!('IntersectionObserver' in window)) return;
    if (heroVideoObserver) { try { heroVideoObserver.disconnect(); } catch(_){} }
    heroVideoObserver = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        const v = entry.target;
        if (entry.isIntersecting) {
          try { const p = v.play(); if (p && p.catch) p.catch(()=>{}); } catch(_){}
        } else {
          try { v.pause(); } catch(_){}
        }
      });
    }, { threshold: 0, rootMargin: '0px 0px 300px 0px' });
    vids.forEach(v => heroVideoObserver.observe(v));
  }

  // Re-render browse list on account directory changes.
  const _refresh = refreshDirectory;
  refreshDirectory = function(){ _refresh(); renderBrowse(); };

  input.addEventListener('input', () => render(input.value));
  browseEl?.addEventListener('click', (e) => {
    const btn = e.target.closest('.account-follow');
    const row = e.target.closest('.account-row');
    if (btn) {
      e.stopPropagation();
      const name = decodeURIComponent(btn.dataset.name);
      const role = decodeURIComponent(btn.dataset.role || '');
      const nowFollowing = toggleFollow(name, role);
      btn.classList.toggle('following', nowFollowing);
      btn.textContent = nowFollowing ? 'フォロー中' : 'フォロー';
      if (navigator.vibrate) navigator.vibrate(10);
      return;
    }
    if (row) {
      const name = decodeURIComponent(row.dataset.name);
      location.href = '/profile?user=' + encodeURIComponent(name);
    }
  });
  results.addEventListener('click', (e) => {
    const btn = e.target.closest('.account-follow');
    const row = e.target.closest('.account-row');
    if (btn) {
      e.stopPropagation();
      const name = decodeURIComponent(btn.dataset.name);
      const role = decodeURIComponent(btn.dataset.role || '');
      const nowFollowing = toggleFollow(name, role);
      btn.classList.toggle('following', nowFollowing);
      btn.textContent = nowFollowing ? 'フォロー中' : 'フォロー';
      if (navigator.vibrate) navigator.vibrate(10);
      return;
    }
    if (row) {
      const name = decodeURIComponent(row.dataset.name);
      location.href = '/profile?user=' + encodeURIComponent(name);
    }
  });

  // Manual account-add was removed — it let anyone stub arbitrary
  // handles locally, which conflicted with the Firestore usernames/
  // uniqueness claim and the anti-impersonation direction.
})();
</script>
