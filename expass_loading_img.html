<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>EXPASS — Loading</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@200;300&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #fff; }

/* ── ベース画像 ── */
.bg-img {
  position: fixed;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: center;
  z-index: 1;
}

/* ── ロゴゾーン: 元画像のロゴ位置に重ねる ── */
/* 元画像: 縦長、ロゴは上から約24%、左から約30% */
.logo-zone {
  position: fixed;
  top: 14%;
  left: 28%;
  z-index: 10;
  width: 130px;
  height: 160px;
  transform: rotate(-8deg);
}

/* 後ろのカード */
.card-back {
  position: absolute;
  width: 86px;
  height: 108px;
  background: #0C0F1A;
  border-radius: 7px;
  top: 0; left: 0;
  transform: translateX(4px) translateY(2px);
  z-index: 2;
}

/* 前のカード（扉） */
.card-front {
  position: absolute;
  width: 86px;
  height: 108px;
  background: #0C0F1A;
  border-radius: 7px;
  top: 10px; right: 0;
  z-index: 4;
  transform-origin: left center;
}

/* 開いた後の内側 */
.card-inside {
  position: absolute;
  inset: 0;
  border-radius: 6px;
  background: #f5f3ef;
  opacity: 0;
  z-index: 3;
}

/* ノブ */
.knob {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 32px; height: 32px;
  display: flex; align-items: center; justify-content: center;
  z-index: 6;
}
.knob-ripple {
  position: absolute;
  width: 32px; height: 32px;
  border-radius: 50%;
  border: 1px solid rgba(242,240,235,0.5);
  top: 50%; left: 50%;
  transform: translate(-50%,-50%) scale(0);
  animation: ripple 0.8s ease-out 2.0s infinite 3.2s;
}
@keyframes ripple {
  0%   { transform: translate(-50%,-50%) scale(0);   opacity: 0.8; }
  100% { transform: translate(-50%,-50%) scale(3.5); opacity: 0; }
}
.knob-svg {
  width: 28px; height: 28px;
  transform: rotate(180deg);
  animation: knobTurn 3.2s cubic-bezier(0.4,0,0.2,1) 0.4s infinite;
}
@keyframes knobTurn {
  /* copyleft(180°) → copyright(0°) */
  0%   { transform: rotate(180deg); }
  28%  { transform: rotate(80deg); }
  48%  { transform: rotate(8deg); }
  58%  { transform: rotate(-7deg); }
  66%  { transform: rotate(3deg); }
  74%  { transform: rotate(0deg); }
  /* copyright で静止 */
  82%  { transform: rotate(0deg); }
  /* 一瞬で copyleft に戻る */
  90%  { transform: rotate(180deg); }
  100% { transform: rotate(180deg); }
}

/* Copyleft → Copyright テキスト */
.lbl {
  position: absolute;
  bottom: -18px;
  left: 0;
  width: 120px;
  height: 14px;
}
.lbl span {
  position: absolute;
  font-family: 'DM Sans', sans-serif;
  font-weight: 300;
  font-size: 8px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: #0C0F1A;
  white-space: nowrap;
}
.lbl-cl { animation: lblOut 0.2s ease 1.9s infinite 2.4s; }
.lbl-cr { opacity: 0; animation: lblIn  0.2s ease 2.0s infinite 2.4s; }
@keyframes lblOut { to { opacity: 0; } }
@keyframes lblIn  { to { opacity: 0.5; } }

/* ── ブランド: 右下（元画像と同位置） ── */
.brand {
  position: fixed;
  bottom: 5.5%;
  right: 5%;
  z-index: 10;
  text-align: right;
  opacity: 0;
  animation: brandIn 0.8s ease 3.8s forwards;
}
@keyframes brandIn {
  from { opacity: 0; transform: translateY(5px); }
  to   { opacity: 1; transform: translateY(0); }
}
.brand-line {
  font-family: 'Syne', sans-serif;
  font-weight: 800;
  font-size: 13px;
  letter-spacing: 0.2em;
  color: #0C0F1A;
  display: flex;
  align-items: center;
  gap: 5px;
}
.brand-sym {
  font-size: 11px;
  font-family: 'DM Sans', sans-serif;
  font-weight: 300;
}

/* ── プログレス ── */
.prog {
  position: fixed;
  bottom: 5.5%;
  left: 5%;
  z-index: 10;
  width: 40px; height: 1px;
  background: rgba(0,0,0,0.1);
  overflow: hidden;
  opacity: 0;
  animation: fadeIn 0.5s ease 0.5s forwards;
}
.prog-fill {
  height: 100%;
  background: #0C0F1A;
  width: 0%;
  animation: pf 4.5s cubic-bezier(0.4,0,0.2,1) 0.6s forwards;
}
@keyframes pf {
  0%{width:0%} 25%{width:35%} 55%{width:63%} 82%{width:86%} 100%{width:100%}
}

@keyframes fadeIn { to { opacity: 1; } }

/* ── フェードイン ── */
.logo-zone { animation: lgIn 0.8s ease 0.3s both; }
@keyframes lgIn {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ── Replay ── */
.replay {
  position: fixed;
  top: 4%; right: 4%;
  font-family: 'DM Sans', sans-serif;
  font-size: 9px; font-weight: 300;
  letter-spacing: 0.12em; text-transform: uppercase;
  color: rgba(255,255,255,0.5);
  background: none; border: none; cursor: pointer;
  z-index: 20; padding: 6px;
  transition: color 0.15s;
}
.replay:hover { color: rgba(255,255,255,0.9); }
</style>

<script>
function replayAll() {
  const els = document.querySelectorAll(
    '.card-front,.card-inside,.knob-svg,.knob-ripple,' +
    '.lbl-cl,.lbl-cr,.brand,.prog-fill,.prog,.logo-zone'
  );
  els.forEach(el => { el.style.animation='none'; el.offsetHeight; el.style.animation=''; });
}

/* ─────────────────────────────────────────────
   Auto-advance: the progress bar fills over ~5s
   (0.6s delay + 4.5s ease). Once it finishes we
   mark the session as warmed and continue to the
   destination. ?dest= overrides the default.
   Skip entirely if ?preview=1 (design review mode).
   ───────────────────────────────────────────── */
(function autoAdvance(){
  const qs = new URLSearchParams(location.search);
  if (qs.get('preview') === '1') return;       // designer preview, loop forever
  const dest = qs.get('dest') || '/screen';
  const delay = 5200;                           // slightly past the progress fill
  setTimeout(() => {
    try { sessionStorage.setItem('livepass_splash_shown', '1'); } catch(_){}
    location.replace(dest);
  }, delay);
})();
</script>
