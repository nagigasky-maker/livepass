<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#000000">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/livepass-icon-180.png">
<title>LIVE PASS — Home</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&family=Inter:wght@300;400;500;600;700;800;900&family=IBM+Plex+Mono:wght@400;500&family=Noto+Sans+JP:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --black:#000;--bg:#0A0A0A;--bg2:#111111;--bg3:#1A1A1A;
  --white:#F2F0EB;
  --red:#E8100A;--blue:#3DAAFF;--green:#A8E63D;
  --gold:#F5C842;--mint:#00E5A0;--pink:#F4C0D1;--purple:#bf5af2;
  --muted:rgba(242,240,235,.3);--muted2:rgba(242,240,235,.14);
  --border:rgba(242,240,235,.07);
  /* Dutch palette — accent tokens */
  --accent-orange:#FF4D00;
  --accent-blue:#0038FF;
  --accent-yellow:#FFD000;
  --accent-green:#00C853;
  --accent-pink:#FF2D6B;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bot:env(safe-area-inset-bottom,0px);
  --nav-h:36px;
  /* LP design system */
  --lp-bg:#0A0A0A;--lp-white:#F2F0EB;--lp-muted:#555555;
  --lp-border:rgba(242,240,235,0.07);
  --lp-orange:#FF4500;--lp-blue:#0040FF;--lp-yellow:#FFD100;
  --lp-green:#00BA4A;--lp-crimson:#CC1F5A;--lp-violet:#7B2FFF;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;max-width:100vw;height:100%;height:100dvh;
  background:var(--black);color:var(--white);
  font-family:Arial,'Noto Sans JP',sans-serif;-webkit-font-smoothing:antialiased;
  user-select:none;-webkit-user-select:none;overflow:hidden;
  position:fixed;overscroll-behavior-x:none;touch-action:pan-y;}
a{color:inherit;text-decoration:none}
button{background:none;border:none;color:inherit;font:inherit;cursor:pointer}

/* TOP BAR ─────────────────────── */
.topbar{position:fixed;top:0;left:0;right:0;z-index:100;
  padding:max(44px,calc(var(--safe-top) + 14px)) 18px 12px;
  display:flex;align-items:center;gap:14px;
  background:linear-gradient(to bottom,rgba(0,0,0,.95) 70%,transparent);}
.tb-brand{display:flex;align-items:center;margin-right:auto;height:16px;flex-shrink:0}
.tb-brand img{height:100%;width:auto;display:block;image-rendering:-webkit-optimize-contrast}
.tb-icon{background:none;border:none;cursor:pointer;position:relative;
  width:26px;height:26px;display:flex;align-items:center;justify-content:center;color:var(--white);}
.tb-icon svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.8}
.tb-icon .badge{position:absolute;top:-4px;right:-6px;background:var(--red);color:#fff;
  font-size:8px;font-weight:700;min-width:14px;height:14px;padding:0 3px;border-radius:99px;
  display:flex;align-items:center;justify-content:center;font-family:Arial,sans-serif;}
.tb-stat{display:flex;flex-direction:column;align-items:center;line-height:1;gap:2px;color:var(--blue);}
.tb-stat-n{font-family:Arial,'Noto Sans JP',sans-serif;font-weight:900;font-size:16px;color:var(--white);letter-spacing:.04em}
.tb-stat-l{font-size:7px;color:var(--blue);letter-spacing:.08em;font-weight:500}

/* CONTENT ─────────────────────── */
.content{position:fixed;top:0;left:0;right:0;bottom:calc(var(--nav-h) + var(--safe-bot));
  padding-top:max(94px,calc(var(--safe-top) + 62px));
  overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;scrollbar-width:none;
  touch-action:pan-y;overscroll-behavior-x:none;max-width:100vw;}
.content::-webkit-scrollbar{display:none}

/* BOTTOM NAV ─────────────────────── */
.bottomnav{position:fixed;bottom:0;left:0;right:0;z-index:100;
  height:calc(var(--nav-h) + var(--safe-bot));padding:0 0 calc(var(--safe-bot) * .4);
  display:flex;align-items:center;justify-content:space-around;
  background:rgba(0,0,0,.96);border-top:0.5px solid var(--border);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);}
.bn-btn{flex:1;height:100%;display:flex;align-items:center;justify-content:center;
  color:rgba(237,235,230,.35);text-decoration:none;position:relative;}
.bn-btn svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.8}
.bn-btn.active{color:var(--white)}
.bn-avatar{width:26px;height:26px;border-radius:50%;
  background:linear-gradient(135deg,#1a2030,#0a1020);
  border:1.5px solid rgba(237,235,230,.25);
  overflow:hidden;display:flex;align-items:center;justify-content:center;}
.bn-btn.active .bn-avatar{border-color:var(--white)}

/* SECTION HEADER — shared pattern ─────────────────────── */
.sec-head{
  display:flex;justify-content:space-between;align-items:flex-end;
  padding:28px 20px 24px;
}
.sec-ja{
  font-family:'Noto Sans JP',sans-serif;font-weight:300;
  font-size:11px;color:var(--lp-muted);letter-spacing:1px;
  margin-bottom:4px;
}
.sec-en{
  font-family:'Syne',sans-serif;font-weight:800;
  font-size:38px;color:var(--lp-white);letter-spacing:-1px;
  line-height:1;
}
.sec-link{
  font-family:'DM Sans',sans-serif;font-weight:400;
  font-size:11px;color:var(--lp-muted);letter-spacing:.8px;
  text-decoration:none;white-space:nowrap;
}

/* SCHEDULE SECTION ─────────────────────── */
.sched-list{padding:0 20px 20px}
.sched-item{
  display:flex;align-items:flex-start;gap:18px;
  padding:20px 0;
  border-bottom:0.5px solid var(--lp-border);
}
.sched-date{
  flex-shrink:0;min-width:42px;text-align:center;
}
.sched-date-m{
  font-family:'Syne',sans-serif;font-weight:800;
  font-size:10px;color:var(--lp-muted);letter-spacing:1px;
  text-transform:uppercase;
}
.sched-date-d{
  font-family:'Syne',sans-serif;font-weight:800;
  font-size:14px;color:var(--lp-muted);line-height:1.2;
}
.sched-body{flex:1;min-width:0}
.sched-name{
  font-family:'Syne',sans-serif;font-weight:700;
  font-size:17px;color:var(--lp-white);line-height:1.2;
  margin-bottom:3px;
}
.sched-ja{
  font-family:'Noto Sans JP',sans-serif;font-weight:300;
  font-size:11px;color:var(--lp-muted);margin-bottom:5px;
}
.sched-meta{
  font-family:'DM Sans',sans-serif;font-weight:300;
  font-size:11px;color:var(--lp-muted);line-height:1.4;
}
.sched-tag{
  flex-shrink:0;align-self:center;
  padding:4px 12px;border-radius:20px;
  font-family:'DM Sans',sans-serif;font-weight:500;
  font-size:9px;letter-spacing:1.2px;text-transform:uppercase;
}

/* FEED HEADER ─────────────────────── */
.feed-header{padding:0} /* now uses .sec-head */

/* MAGAZINE GRID — hand-placed blocks, irregular sizes ─── */
.mag-grid{
  padding:0 12px 40px;
  display:flex;flex-wrap:wrap;
  gap:2px;
}
.feed-card{
  position:relative;display:block;
  border-radius:3px;overflow:hidden;
  background:var(--bg2);
  cursor:pointer;
  min-width:0; /* prevent grid item overflow */
}
.feed-card .fc-img{
  position:relative;width:100%;display:block;overflow:hidden;background:transparent;
  height:100%;
}
.feed-card .fc-img svg,
.feed-card .fc-img img{
  width:100%;height:100%;object-fit:cover;display:block;position:absolute;inset:0;
}

/* Magazine block sizing — each card gets width via calc(X% - gap) */
.feed-card .fc-img{position:relative;width:100%;display:block;overflow:hidden;height:100%}
/* Large title on big cards */
.feed-card.mag-lg .fc-title{font-size:18px;line-height:1.15}
.feed-card.mag-lg .fc-overlay{padding:14px 16px}

/* Video play icon overlay */
.feed-card .fc-play-icon{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:3;
  width:40px;height:40px;border-radius:50%;
  background:rgba(0,0,0,.55);
  display:flex;align-items:center;justify-content:center;
  backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);
  pointer-events:none;
}
.feed-card .fc-play-icon svg{width:18px;height:18px;margin-left:2px}
/* Slideshow dots */
.feed-card .fc-slide-dots{
  position:absolute;bottom:8px;left:50%;transform:translateX(-50%);z-index:3;
  display:flex;gap:4px;
}
.feed-card .fc-dot{
  width:5px;height:5px;border-radius:50%;
  background:rgba(255,255,255,.35);transition:background .3s;
}
.feed-card .fc-dot.active{background:var(--white)}

/* PRO badge chip on feed cards */
.feed-card .fc-pro{
  position:absolute;top:10px;left:12px;
  padding:3px 6px;border-radius:3px;
  background:rgba(255,77,0,.18);color:var(--accent-orange);
  border:0.5px solid rgba(255,77,0,.5);
  font-family:'IBM Plex Mono',monospace;font-size:7px;font-weight:600;
  letter-spacing:.14em;line-height:1;
  backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);
}
.feed-card .fc-overlay{
  position:absolute;inset:0;
  display:flex;flex-direction:column;justify-content:flex-end;
  padding:12px;
}
.feed-card .fc-num{display:none}
.feed-card .fc-cat{
  font-family:'DM Sans',sans-serif;font-weight:500;
  font-size:8px;letter-spacing:1.6px;text-transform:uppercase;
  opacity:.6;margin-bottom:4px;
}
.feed-card .fc-title{
  font-family:'Syne',sans-serif;font-weight:800;
  font-size:14px;line-height:1.15;
}
.feed-card .fc-title small{
  font-family:'Noto Sans JP',sans-serif;font-weight:500;
  font-size:10px;line-height:1.4;display:block;margin-top:3px;opacity:.65;
}
.feed-card .fc-author{
  display:block;margin-top:4px;
  font-family:'DM Sans',sans-serif;font-weight:300;
  font-size:9px;opacity:.4;
}
.feed-card .fc-author-av{
  width:24px;height:24px;border-radius:50%;overflow:hidden;
  position:relative;flex-shrink:0;
  background:linear-gradient(135deg,#3DAAFF,#1a2030);
  border:1.5px solid rgba(255,255,255,.25);
  box-shadow:0 2px 8px rgba(0,0,0,.5);
}
.feed-card .fc-author-av img{
  position:absolute;inset:0;
  width:100%;height:100%;
  object-fit:cover;display:block;
  border-radius:50%;
}

/* ARTICLE DETAIL MODAL ───────────────────── */
#detailModal{
  position:fixed;inset:0;z-index:1200;
  background:var(--black);
  display:none;flex-direction:column;
  opacity:0;transition:opacity .3s ease;
}
#detailModal.active{display:flex;opacity:1}
.dm-header{
  flex-shrink:0;
  padding:max(14px,calc(var(--safe-top) + 12px)) 18px 12px;
  display:flex;align-items:center;gap:14px;
  background:rgba(0,0,0,.96);border-bottom:0.5px solid var(--border);
}
.dm-close{
  width:36px;height:36px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  color:var(--white);
  border:0.5px solid rgba(255,255,255,.15);
}
.dm-close svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2}
.dm-label{
  font-family:'IBM Plex Mono',monospace;font-size:8px;
  letter-spacing:.32em;text-transform:uppercase;
  color:rgba(237,235,230,.3);margin-left:auto;
}
.dm-body{
  flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;
  scrollbar-width:none;
}
.dm-body::-webkit-scrollbar{display:none}
.dm-hero{position:relative;width:100%;aspect-ratio:9/14;background:#0a0a0a;overflow:hidden;display:flex;flex-direction:column;justify-content:flex-end}
.dm-hero svg,.dm-hero img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:block}
.dm-hero::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(to top,rgba(0,0,0,.92) 0%,transparent 40%);
}
.dm-hero-text{
  position:absolute;bottom:0;left:0;right:0;
  padding:32px 22px 28px;z-index:2;
}
.dm-cat{
  font-family:Arial,'Noto Sans JP',sans-serif;font-weight:500;
  font-size:9px;letter-spacing:.28em;text-transform:uppercase;
  color:var(--pink);margin-bottom:8px;
}
.dm-title{
  font-family:Arial,'Noto Sans JP',sans-serif;font-weight:900;
  font-size:28px;line-height:1.1;color:var(--white);
  margin-bottom:14px;
}
.dm-by{
  display:flex;align-items:center;gap:12px;
  font-family:Arial,'Noto Sans JP',sans-serif;font-weight:500;
  font-size:11px;color:rgba(237,235,230,.65);letter-spacing:.02em;
}
.dm-by .av{
  width:36px;height:36px;border-radius:50%;overflow:hidden;
  position:relative;flex-shrink:0;
  background:linear-gradient(135deg,#3DAAFF,#1a2030);
  border:1.5px solid rgba(255,255,255,.3);
  box-shadow:0 2px 10px rgba(0,0,0,.5);
}
.dm-by .av img{
  position:absolute;inset:0;
  width:100%;height:100%;
  object-fit:cover;display:block;
  border-radius:50%;
}
.dm-content{padding:24px 22px 40px}
.dm-p{
  font-family:Arial,'Noto Sans JP',sans-serif;font-weight:400;
  font-size:13px;line-height:1.9;color:inherit;opacity:.78;
  letter-spacing:.01em;margin-bottom:18px;
}
.dm-actions{
  padding:16px 22px 24px;
  display:flex;align-items:center;justify-content:space-between;
  border-top:0.5px solid var(--border);
}
.dm-act{
  display:flex;align-items:center;gap:6px;
  color:rgba(237,235,230,.55);
  font-family:Arial,'Noto Sans JP',sans-serif;font-size:11px;
  font-weight:500;
}
.dm-act svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:1.8}
.dm-act.liked{color:var(--blue)}
.dm-act.liked svg{fill:var(--blue);stroke:var(--blue)}
.dm-act.saved{color:var(--gold)}
.dm-act.saved svg{fill:var(--gold);stroke:var(--gold)}
.dm-act.shared{color:var(--blue)}
.dm-act.shared svg{stroke:var(--blue)}
@keyframes dmSharePulse{
  0%{transform:scale(1)}
  50%{transform:scale(1.25)}
  100%{transform:scale(1)}
}
.dm-act.sharing{animation:dmSharePulse .35s ease}

/* ─────────────────────────────────────────────
   SHARE BOTTOM SHEET
   ───────────────────────────────────────────── */
#shareSheetOverlay{
  position:fixed;inset:0;z-index:1150;
  background:rgba(0,0,0,0);pointer-events:none;opacity:0;
  transition:background .3s ease, opacity .2s ease;
}
#shareSheetOverlay.active{
  background:rgba(0,0,0,.72);pointer-events:all;opacity:1;
  backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
}
#shareSheet{
  position:fixed;left:0;right:0;bottom:0;z-index:1151;
  background:#141414;
  border-top:0.5px solid var(--border);
  border-top-left-radius:20px;border-top-right-radius:20px;
  padding:16px 20px calc(20px + var(--safe-bot));
  transform:translateY(100%);
  transition:transform .35s cubic-bezier(.2,.8,.2,1);
  box-shadow:0 -12px 40px rgba(0,0,0,.7);
}
#shareSheetOverlay.active #shareSheet{transform:translateY(0)}
.ss-handle{width:40px;height:4px;border-radius:99px;background:rgba(242,240,235,.2);margin:0 auto 14px}
.ss-title{
  font-family:Arial,'Noto Sans JP',sans-serif;font-weight:700;
  font-size:15px;color:var(--white);text-align:center;margin-bottom:12px;
}
.ss-close{
  position:absolute;top:16px;right:18px;width:28px;height:28px;
  display:flex;align-items:center;justify-content:center;color:var(--white);
}
.ss-close svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2}
.ss-repost{
  display:block;width:auto;margin:0 auto 14px;padding:10px 28px;
  border-radius:99px;background:rgba(242,240,235,.08);
  border:0.5px solid rgba(242,240,235,.2);
  font-family:Arial,'Noto Sans JP',sans-serif;font-weight:600;
  font-size:13px;color:var(--white);letter-spacing:.04em;
}
.ss-repost:active{background:rgba(242,240,235,.14)}
.ss-divider{height:0.5px;background:var(--border);margin:14px 0}
.ss-section{
  font-family:Arial,'Noto Sans JP',sans-serif;font-weight:700;
  font-size:13px;color:var(--white);margin-bottom:12px;
}
.ss-icons{
  display:flex;gap:18px;overflow-x:auto;scrollbar-width:none;
  padding-bottom:4px;
}
.ss-icons::-webkit-scrollbar{display:none}
.ss-icon-btn{
  display:flex;flex-direction:column;align-items:center;gap:6px;
  min-width:62px;flex-shrink:0;
}
.ss-icon-circle{
  width:52px;height:52px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  background:rgba(255,255,255,.08);
}
.ss-icon-circle svg{width:24px;height:24px;fill:currentColor;color:var(--white)}
.ss-icon-circle img{width:28px;height:28px;border-radius:50%}
.ss-icon-label{
  font-family:Arial,'Noto Sans JP',sans-serif;font-weight:400;
  font-size:9px;color:rgba(242,240,235,.55);letter-spacing:.02em;
  text-align:center;white-space:nowrap;
}
/* colored brand icons */
.ss-icon-circle.embed{background:rgba(255,255,255,.12)}
.ss-icon-circle.fb{background:#3b5998}
.ss-icon-circle.msg{background:#0b84fe}
.ss-icon-circle.wa{background:#25d366}
.ss-icon-circle.x{background:#000;border:0.5px solid rgba(255,255,255,.2)}
.ss-icon-circle.mail{background:#ea4335}
.ss-url-row{
  display:flex;align-items:center;gap:10px;
  padding:10px 14px;border-radius:10px;
  background:rgba(0,0,0,.45);border:0.5px solid rgba(242,240,235,.1);
}
.ss-url{
  flex:1;min-width:0;
  font-family:'IBM Plex Mono',monospace;font-size:11px;
  color:rgba(242,240,235,.5);letter-spacing:.02em;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.ss-copy{
  flex-shrink:0;padding:7px 16px;border-radius:8px;
  background:var(--blue);color:#fff;
  font-family:Arial,'Noto Sans JP',sans-serif;font-weight:700;
  font-size:11px;letter-spacing:.06em;
}

/* ─────────────────────────────────────────────
   COMPOSE SELECTOR BOTTOM SHEET (shared)
   ───────────────────────────────────────────── */
#composeSheetOverlay{
  position:fixed;inset:0;z-index:1100;
  background:rgba(0,0,0,0);
  pointer-events:none;opacity:0;
  transition:background .3s ease, opacity .2s ease;
}
#composeSheetOverlay.active{
  background:rgba(0,0,0,.7);pointer-events:all;opacity:1;
  backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
}
#composeSheet{
  position:fixed;left:0;right:0;bottom:0;z-index:1101;
  background:#0a0a0a;
  border-top:0.5px solid var(--border);
  border-top-left-radius:20px;border-top-right-radius:20px;
  padding:20px 20px calc(24px + var(--safe-bot));
  transform:translateY(100%);
  transition:transform .35s cubic-bezier(.2,.8,.2,1);
  box-shadow:0 -12px 40px rgba(0,0,0,.7);
}
#composeSheetOverlay.active #composeSheet{transform:translateY(0)}
.cs-handle{width:40px;height:4px;border-radius:99px;background:rgba(237,235,230,.2);margin:0 auto 20px}
.cs-title{font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:.34em;text-transform:uppercase;color:rgba(237,235,230,.35);text-align:center;margin-bottom:18px}
.cs-options{display:flex;flex-direction:column;gap:10px}
.cs-opt{display:flex;align-items:center;gap:16px;padding:18px 18px;width:100%;background:rgba(255,255,255,.03);border:0.5px solid rgba(237,235,230,.08);border-radius:14px;color:var(--white);transition:background .2s}
.cs-opt:active{background:rgba(255,255,255,.06)}
.cs-opt svg{width:26px;height:26px;stroke:currentColor;fill:none;stroke-width:1.8;flex-shrink:0}
.cs-opt-body{flex:1;text-align:left}
.cs-opt-title{font-family:Arial,'Noto Sans JP',sans-serif;font-weight:700;font-size:15px;color:var(--white);margin-bottom:2px}
.cs-opt-sub{font-family:Arial,'Noto Sans JP',sans-serif;font-weight:400;font-size:10px;letter-spacing:.04em;color:rgba(237,235,230,.4)}
.cs-opt.article{border-left:3px solid var(--green)}
.cs-opt.event{border-left:3px solid var(--red)}
.cs-opt.workshop{border-left:3px solid var(--gold)}
.cs-opt.exhibition{border-left:3px solid var(--mint)}
.cs-opt.article svg{color:var(--green)}
.cs-opt.event svg{color:var(--red)}

<script>
/* PWA NAV FIX v66 — form-submission technique for iOS PWA standalone.
   Link clicks in iOS PWAs can break out of standalone mode; form
   submissions are handled differently by iOS and stay in-app. */
(function(){
  function isStandalone(){
    return (window.navigator.standalone === true) ||
           window.matchMedia('(display-mode: standalone)').matches ||
           window.matchMedia('(display-mode: fullscreen)').matches;
  }
  if (!isStandalone()) return;
  // Also add a body class so CSS can adjust for standalone mode
  document.documentElement.classList.add('is-pwa');
  document.addEventListener('click', function(e){
    var a = e.target.closest && e.target.closest('a');
    if (!a) return;
    var href = a.getAttribute('href');
    if (!href) return;
    if (a.target && a.target !== '_self') return;
    if (href.charAt(0) === '#') return;
    if (/^(mailto|tel|sms):/i.test(href)) return;
    // External origin?
    try {
      var u = new URL(a.href, location.href);
      if (u.host !== location.host) return;
    } catch(err) { return; }
    e.preventDefault();
    e.stopPropagation();
    // Use form submission — iOS PWA treats this as in-app navigation
    try {
      var form = document.createElement('form');
      form.method = 'GET';
      form.action = a.href;
      form.style.display = 'none';
      document.body.appendChild(form);
      form.submit();
    } catch(err) {
      window.location.href = a.href;
    }
  }, true);
})();
</script>

/* ─────────────────────────────────────────────
   AUTO-LAYOUT ENGINE — balance rules for the feed
   Rules (per spec):
     1. Same artist not within 3 posts
     2. No more than 3 consecutive same-format
     3. Large formats (cinema, sq-large) max 1 per 6 posts
   Rules relax gracefully when no valid candidate remains,
   so every input post eventually lands in the output.
   ───────────────────────────────────────────── */
const LARGE_FORMATS = new Set(['cinema','sq-large']);
const AUTHOR_GAP    = 3; // min posts between same-author
const LARGE_BUDGET  = 6; // 1 large card per 6 posts

function fmtOf(a){ return a.format || a.layout || 'square'; }

function buildBalancedFeed(posts) {
  const input = posts.slice();
  const out = [];
  let largeSinceLast = 999; // allow the very first large card

  // Helper: does candidate satisfy all rules given current output?
  function passes(candidate) {
    // Rule 1: author spacing
    const recentAuthors = out.slice(-AUTHOR_GAP).map(p => p.author);
    if (recentAuthors.includes(candidate.author)) return false;

    // Rule 2: no 3 consecutive same-format
    const lastThree = out.slice(-3);
    if (lastThree.length === 3 &&
        lastThree.every(p => fmtOf(p) === fmtOf(candidate))) return false;

    // Rule 3: large-card budget
    if (LARGE_FORMATS.has(fmtOf(candidate)) && largeSinceLast < LARGE_BUDGET) {
      return false;
    }
    return true;
  }

  while (input.length > 0) {
    // Try to pick the first candidate that passes all rules
    let pickedIdx = input.findIndex(passes);

    // No candidate passes → relax: accept the first remaining post
    if (pickedIdx === -1) pickedIdx = 0;

    const picked = input.splice(pickedIdx, 1)[0];
    out.push(picked);

    if (LARGE_FORMATS.has(fmtOf(picked))) largeSinceLast = 0;
    else largeSinceLast++;
  }

  return out;
}

/* ─── IndexedDB helper for reading stored video blobs ─── */
const MediaDB = {
  _db: null,
  open(){
    if(this._db) return Promise.resolve();
    return new Promise((res,rej)=>{
      const req = indexedDB.open('livepass_media',1);
      req.onupgradeneeded = ()=> req.result.createObjectStore('blobs');
      req.onsuccess = ()=>{ this._db = req.result; res(); };
      req.onerror = ()=> rej(req.error);
    });
  },
  async get(key){
    await this.open();
    return new Promise((res,rej)=>{
      const tx = this._db.transaction('blobs','readonly');
      const r = tx.objectStore('blobs').get(key);
      r.onsuccess = ()=> res(r.result || null);
      r.onerror = ()=> rej(r.error);
    });
  }
};

/* ─── Build media HTML for a feed card (image / video / gif / slideshow) ─── */
function buildMediaHtml(a) {
  const mt = a.mediaType || 'image';

  // No cover image → colored bg card, no media element needed
  if (!a.cover) return '';

  const imgSrc = a.cover;
  if (mt === 'video') {
    return `<img src="${imgSrc}" alt="" class="fc-poster" data-video-id="${a.id}">
            <div class="fc-play-icon"><svg viewBox="0 0 24 24" fill="var(--white)" stroke="none"><polygon points="6,3 20,12 6,21"/></svg></div>`;
  }
  if (mt === 'gif') {
    return `<img src="${imgSrc}" alt="">`;
  }
  if (mt === 'slideshow' && Array.isArray(a.extraImages) && a.extraImages.length > 0) {
    const allImgs = [imgSrc, ...a.extraImages];
    return allImgs.map((src, i) =>
      `<img src="${src}" alt="" class="fc-slide" style="opacity:${i===0?1:0};transition:opacity .6s ease" data-slide="${i}">`
    ).join('') + `<div class="fc-slide-dots">${allImgs.map((_,i)=>
      `<span class="fc-dot${i===0?' active':''}" data-dot="${i}"></span>`
    ).join('')}</div>`;
  }
  return `<img src="${imgSrc}" alt="">`;
}

/* Text color auto-detect utility */
function getTextColor(hex){
  if(!hex||hex.length<7) return '#F2F0EB';
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return (0.299*r+0.587*g+0.114*b)/255 > 0.45 ? '#0A0A0A' : '#F2F0EB';
}

/* ─────────────────────────────────────────────
   MAGAZINE LAYOUT — hand-placed blocks
   Each "row" is a flex row; cards get explicit width % and height.
   The pattern repeats for user posts appended after sample data.
   ───────────────────────────────────────────── */
const G = 2; // gap px
const BLOCK_PATTERN = [
  // Row 1: portrait 5col + square 7col
  [{ cols:5, rows:6 }, { cols:7, rows:5 }],
  // Row 2: wide full-width
  [{ cols:12, rows:4, cls:'mag-lg' }],
  // Row 3: tall 4col (PRO 9:16) + right stack (8col top + 8col bottom)
  [{ cols:4, rows:7 }, { cols:8, rows:4 }, { cols:8, rows:3 }],
  // Row 4: 7col + 5col
  [{ cols:7, rows:3 }, { cols:5, rows:5 }],
  // Row 5: tall 7col + right stack
  [{ cols:7, rows:9, cls:'mag-lg' }, { cols:5, rows:5 }, { cols:5, rows:4 }],
];
const ROW_UNIT = 56; // px per row unit

function buildScheduleBlock() {
  const block = document.createElement('div');
  block.style.cssText = 'width:100%;padding:28px 8px 20px';
  block.innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:20px">
      <div><div class="sec-ja">今週のイベント</div><div class="sec-en" style="font-size:32px">This week</div></div>
      <a class="sec-link" href="/calendar">ALL EVENTS →</a>
    </div>
  `;
  const list = document.createElement('div');
  SCHEDULE.forEach(ev => {
    const ts = getTagStyle(ev.genre);
    const item = document.createElement('div');
    item.className = 'sched-item';
    item.innerHTML = `
      <div class="sched-date"><div class="sched-date-m">${ev.month}</div><div class="sched-date-d">${ev.day}</div></div>
      <div class="sched-body">
        <div class="sched-name">${ev.name}</div>
        <div class="sched-ja">${ev.ja}</div>
        <div class="sched-meta">${ev.venue} · ${ev.time}</div>
      </div>
      <div class="sched-tag" style="background:${ts.bg};color:${ts.text}">${ev.genre}</div>
    `;
    item.style.cursor = 'pointer';
    item.addEventListener('click', () => { location.href = '/calendar'; });
    list.appendChild(item);
  });
  block.appendChild(list);
  // Separator after
  const sep = document.createElement('div');
  sep.style.cssText = 'border-top:0.5px solid var(--lp-border);margin:16px 0 0';
  block.appendChild(sep);
  return block;
}

function renderMagazine(posts) {
  grid.innerHTML = '';
  let pi = 0; // post index
  const pat = BLOCK_PATTERN;
  let patIdx = 0;
  let schedInserted = false;

  while (pi < posts.length) {
    // Insert "This week" after 2nd pattern row (between articles)
    if (patIdx === 2 && !schedInserted) {
      grid.appendChild(buildScheduleBlock());
      schedInserted = true;
    }

    const blockRow = pat[patIdx % pat.length];
    patIdx++;

    // Determine which blocks share a "visual row" vs stacked right column
    // We process left-to-right; blocks with same col position stack
    let leftCols = 0;
    const rowDiv = document.createElement('div');
    rowDiv.style.cssText = 'display:flex;flex-wrap:wrap;gap:'+G+'px;width:100%;margin-bottom:'+G+'px';

    for (let bi = 0; bi < blockRow.length && pi < posts.length; bi++) {
      const block = blockRow[bi];
      const a = posts[pi]; pi++;
      const w = (block.cols / 12 * 100);
      const h = block.rows * ROW_UNIT + (block.rows - 1) * G;

      const card = document.createElement('div');
      card.className = 'feed-card' + (block.cls ? ' ' + block.cls : '');
      card.dataset.id = a.id;
      card.style.cssText = `width:calc(${w.toFixed(2)}% - ${G}px);height:${h}px;flex-shrink:0`;

      // Auto-assign a palette color to no-cover articles that lack bgColor
      if (!a.cover && !a.bgColor) {
        a.bgColor = LP_COLORS[pi % LP_COLORS.length];
      }
      const cardBg = a.cover ? '' : (a.bgColor || '#1A1A1A');
      const txtColor = a.cover ? '#F2F0EB' : getTextColor(cardBg);
      if (cardBg) card.style.background = cardBg;

      const jaTitle = a.titleJa ? `<small>${a.titleJa}</small>` : '';
      const handle = a.handle ? `<div class="fc-author">${a.handle}</div>` : '';
      const proChip = a.tier === 'pro' ? `<div class="fc-pro">PRO</div>` : '';
      const mediaHtml = buildMediaHtml(a);
      const catHandle = (a.cat && a.handle) ? `${a.cat} · ${a.handle.toUpperCase()}` : a.cat;

      card.innerHTML = `
        <div class="fc-img">${mediaHtml}</div>
        ${proChip}
        <div class="fc-overlay" style="color:${txtColor}">
          <div class="fc-cat">${catHandle}</div>
          <div class="fc-title">${a.title}${jaTitle}</div>
          ${handle}
        </div>
      `;
      card.addEventListener('click', () => openDetail(a));
      rowDiv.appendChild(card);

      // Slideshow
      if (a.mediaType === 'slideshow' && a.extraImages && a.extraImages.length > 0) {
        const slides = card.querySelectorAll('.fc-slide');
        if (slides.length > 1) {
          let cur = 0;
          setInterval(() => { slides[cur].style.opacity='0'; cur=(cur+1)%slides.length; slides[cur].style.opacity='1'; }, 2000);
        }
      }
      // Video autoplay
      if (a.mediaType === 'video') {
        const posterEl = card.querySelector('.fc-poster');
        if (posterEl) {
          MediaDB.get('media_' + a.id).then(blob => {
            if (!blob) return;
            const vid = document.createElement('video');
            vid.src = URL.createObjectURL(blob);
            vid.autoplay=true;vid.muted=true;vid.loop=true;vid.playsInline=true;
            vid.style.cssText='width:100%;height:100%;object-fit:cover;display:block;position:absolute;inset:0';
            posterEl.parentNode.replaceChild(vid, posterEl);
            const pi2 = card.querySelector('.fc-play-icon');
            if(pi2) pi2.remove();
          }).catch(()=>{});
        }
      }
    }
    grid.appendChild(rowDiv);
  }
}

/* ─────────────────────────────────────────────
   LIKES / SAVES — persisted in localStorage
   so the /profile SAVED sub-tab can read them.
   ───────────────────────────────────────────── */
function getIds(key){
  try { return JSON.parse(localStorage.getItem(key) || '[]'); } catch(e) { return []; }
}
function setIds(key, arr){
  try { localStorage.setItem(key, JSON.stringify(arr)); } catch(e) {}
}
function toggleId(key, id){
  const arr = getIds(key);
  const idx = arr.indexOf(id);
  if (idx >= 0) arr.splice(idx, 1);
  else arr.unshift(id);
  setIds(key, arr);
  return idx < 0; // true if now present
}

// Share an article: reshare to current user's ARTICLE timeline AND
// notify followers. Returns true on success, false if already shared.
function shareArticle(a){
  if (!a || !a.id) return false;
  const me = localStorage.getItem('livepass_account_name') || 'NOBBY';
  try {
    const raw  = localStorage.getItem('livepass_articles');
    const list = raw ? JSON.parse(raw) : [];
    const existing = list.find(x => x.sharedFromId === a.id && x.sharedBy === me);
    if (existing) return false;

    // Resolve the visual — for sample articles without a real cover,
    // snapshot the generated SVG placeholder so the reshared entry
    // always has something to render.
    const resolvedCover = a.cover || placeholderSVG(a);

    const reshare = {
      id:           's' + Date.now(),
      type:         'article',
      layout:       a.layout || 'square',
      category:     a.cat || a.category || 'Article',
      cover:        resolvedCover,
      title:        a.title || '',
      subtitle:     a.subtitle || null,
      body:         a.body || '',
      tags:         Array.isArray(a.tags) ? a.tags.slice() : [],
      author:       me,
      sharedBy:     me,
      sharedFromId: a.id,
      sharedFromAuthor: a.author || 'NOBBY',
      createdAt:    new Date().toISOString(),
    };
    list.unshift(reshare);
    localStorage.setItem('livepass_articles', JSON.stringify(list));

    // Notify followers
    const notifKey = 'livepass_follower_notifications';
    const notifRaw = localStorage.getItem(notifKey);
    const notifs   = notifRaw ? JSON.parse(notifRaw) : [];
    notifs.unshift({
      id:        'n' + Date.now(),
      type:      'share',
      actor:     me,
      articleId: a.id,
      title:     a.title || '',
      originalAuthor: a.author || 'NOBBY',
      at:        new Date().toISOString(),
    });
    localStorage.setItem(notifKey, JSON.stringify(notifs.slice(0, 50)));
    return true;
  } catch (e) { return false; }
}

(function initShareSheet(){

  const urlEl = document.getElementById('ssUrl');
  const copyBtn = document.getElementById('ssCopy');

  let _article = null;
  let _shareBtn = null;

  function dismiss(){
    overlay.classList.remove('active');
    overlay.setAttribute('aria-hidden','true');
  }
  window.openShareSheet = function(a, btn){
    _article = a;
    _shareBtn = btn;
    // Build share URL
    const shareUrl = location.origin + '/home#article-' + a.id;
    urlEl.textContent = shareUrl;
    overlay.classList.add('active');
    overlay.setAttribute('aria-hidden','false');
    if (navigator.vibrate) navigator.vibrate(8);
  };
  closeBtn.addEventListener('click', dismiss);
  overlay.addEventListener('click', e => { if(e.target === overlay) dismiss(); });
  window.addEventListener('keydown', e => {
    if(e.key === 'Escape' && overlay.classList.contains('active')) dismiss();
  });

  // ── Repost to own ARTICLE timeline ──
  repostBtn.addEventListener('click', () => {
    if(!_article) return;
    const meNow = localStorage.getItem('livepass_account_name') || 'NOBBY';
    if((_article.author || 'NOBBY') === meNow && !_article.sharedBy){
      alert('自分の投稿です。フォロワーのタイムラインに既に表示されています。');
      return;
    }
    if(getIds('livepass_shares').includes(_article.id)){
      alert('この記事はすでにリポスト済みです。');
      dismiss();
      return;
    }
    const ok = shareArticle(_article);
    if(ok){
      toggleId('livepass_shares', _article.id);
      if(_shareBtn){
        _shareBtn.classList.add('shared','sharing');
        setTimeout(() => _shareBtn.classList.remove('sharing'), 400);

    }
  });

  // ── SNS share buttons ──
  overlay.querySelectorAll('.ss-icon-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      if(!_article) return;

          window.open(url,'_blank');
          break;
        case 'messages':
          url = 'sms:?body=' + encodeURIComponent(text + ' ' + shareUrl);
          location.href = url;
          break;
        case 'whatsapp':
          url = 'https://wa.me/?text=' + encodeURIComponent(text + ' ' + shareUrl);
          window.open(url,'_blank');
          break;
        case 'x':
          url = 'https://twitter.com/intent/tweet?text=' + encodeURIComponent(text) + '&url=' + encodeURIComponent(shareUrl);
          window.open(url,'_blank');
          break;
        case 'email':
          url = 'mailto:?subject=' + encodeURIComponent(text) + '&body=' + encodeURIComponent(text + '\n\n' + shareUrl);
          location.href = url;
          break;
      }
      dismiss();
    });
  });

  // ── Copy link ──
  copyBtn.addEventListener('click', () => {
    const txt = urlEl.textContent;
    navigator.clipboard.writeText(txt).then(()=>{
      copyBtn.textContent = '✓ コピー済';
      setTimeout(()=>{ copyBtn.textContent = 'コピー'; }, 2000);
    }).catch(()=> prompt('URL:', txt));
    if(navigator.vibrate) navigator.vibrate(6);
  });
})();

    // Unread DM badge — the default 3 matches the seed in messages.html
    // (2 from SACHI + 1 from DUBLA). Hide the badge if count is 0.
    const unread = parseInt(localStorage.getItem('livepass_unread_count') || '3', 10);
    const badge = document.getElementById('msgBadge');
    if (badge) {
      if (unread > 0) {
        badge.textContent = unread > 99 ? '99+' : String(unread);
        badge.style.display = '';
      } else {
        badge.style.display = 'none';
      }
    }
  } catch(e) {}
})();

/* ─────────────────────────────────────────────
   COMPOSE SELECTOR — shared bottom sheet
   ───────────────────────────────────────────── */
(function initComposeSheet(){
  const btn = document.getElementById('tbCreate');
  const overlay = document.getElementById('composeSheetOverlay');
  const closeBtn = document.getElementById('csClose');
  if (!btn || !overlay) return;
  const open = () => {
    overlay.classList.add('active');
    overlay.setAttribute('aria-hidden','false');
    if (navigator.vibrate) navigator.vibrate(8);
  };
  const dismiss = () => {
    overlay.classList.remove('active');
    overlay.setAttribute('aria-hidden','true');
  };
  btn.addEventListener('click', open);
  closeBtn.addEventListener('click', dismiss);
  overlay.addEventListener('click', e => { if (e.target === overlay) dismiss(); });
  document.querySelectorAll('.cs-opt').forEach(opt => {
    opt.addEventListener('click', () => {
      const t = opt.dataset.type;
      if (navigator.vibrate) navigator.vibrate(12);
      location.href = '/compose/' + t;
    });
  });
  window.addEventListener('keydown', e => {
    if (e.key === 'Escape' && overlay.classList.contains('active')) dismiss();
  });
})();
</script>
