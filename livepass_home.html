<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#000000">
<title>LIVE PASS — Home</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=IBM+Plex+Mono:wght@400;500&family=Noto+Sans+JP:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --black:#000;--bg:#080808;--white:#EDEBE6;
  --red:#E8100A;--blue:#3DAAFF;--green:#A8E63D;
  --gold:#F5C842;--mint:#00E5A0;--pink:#F4C0D1;--purple:#bf5af2;
  --muted:rgba(237,235,230,.3);--muted2:rgba(237,235,230,.14);
  --border:rgba(255,255,255,.07);
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bot:env(safe-area-inset-bottom,0px);
  --nav-h:64px;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;height:100dvh;background:var(--black);color:var(--white);
  font-family:Arial,'Noto Sans JP',sans-serif;-webkit-font-smoothing:antialiased;
  user-select:none;-webkit-user-select:none;overflow:hidden;}
a{color:inherit;text-decoration:none}
button{background:none;border:none;color:inherit;font:inherit;cursor:pointer}

/* TOP BAR ─────────────────────── */
.topbar{position:fixed;top:0;left:0;right:0;z-index:100;
  padding:max(44px,calc(var(--safe-top) + 14px)) 18px 12px;
  display:flex;align-items:center;gap:14px;
  background:linear-gradient(to bottom,rgba(0,0,0,.95) 70%,transparent);}
.tb-brand{display:flex;align-items:center;margin-right:auto;height:16px;flex-shrink:0}
.tb-brand img{height:100%;width:auto;display:block;image-rendering:-webkit-optimize-contrast}
.tb-icon{background:none;border:none;cursor:pointer;position:relative;
  width:26px;height:26px;display:flex;align-items:center;justify-content:center;color:var(--white);}
.tb-icon svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.8}
.tb-icon .badge{position:absolute;top:-4px;right:-6px;background:var(--red);color:#fff;
  font-size:8px;font-weight:700;min-width:14px;height:14px;padding:0 3px;border-radius:99px;
  display:flex;align-items:center;justify-content:center;font-family:Arial,sans-serif;}
.tb-stat{display:flex;flex-direction:column;align-items:center;line-height:1;gap:2px;color:var(--blue);}
.tb-stat-n{font-family:Arial,'Noto Sans JP',sans-serif;font-weight:900;font-size:16px;color:var(--white);letter-spacing:.04em}
.tb-stat-l{font-size:7px;color:var(--blue);letter-spacing:.08em;font-weight:500}

/* CONTENT ─────────────────────── */
.content{position:fixed;top:0;left:0;right:0;bottom:calc(var(--nav-h) + var(--safe-bot));
  padding-top:max(94px,calc(var(--safe-top) + 62px));
  overflow-y:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
.content::-webkit-scrollbar{display:none}

/* BOTTOM NAV ─────────────────────── */
.bottomnav{position:fixed;bottom:0;left:0;right:0;z-index:100;
  height:calc(var(--nav-h) + var(--safe-bot));padding:0 0 calc(var(--safe-bot) * .4);
  display:flex;align-items:center;justify-content:space-around;
  background:rgba(0,0,0,.96);border-top:0.5px solid var(--border);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);}
.bn-btn{flex:1;height:100%;display:flex;align-items:center;justify-content:center;
  color:rgba(237,235,230,.35);text-decoration:none;position:relative;}
.bn-btn svg{width:26px;height:26px;stroke:currentColor;fill:none;stroke-width:1.8}
.bn-btn.active{color:var(--white)}
.bn-avatar{width:30px;height:30px;border-radius:50%;
  background:linear-gradient(135deg,#1a2030,#0a1020);
  border:1.5px solid rgba(237,235,230,.25);
  overflow:hidden;display:flex;align-items:center;justify-content:center;}
.bn-btn.active .bn-avatar{border-color:var(--white)}

/* FEED HEADER ─────────────────────── */
.feed-header{padding:14px 20px 14px}
.fh-label{
  font-family:'IBM Plex Mono',monospace;
  font-size:9px;letter-spacing:.34em;text-transform:uppercase;
  color:rgba(237,235,230,.3);
}
.fh-title{
  font-family:Arial,'Noto Sans JP',sans-serif;font-weight:900;
  font-size:22px;letter-spacing:.02em;color:var(--white);
  margin-top:4px;
}

/* MIXED GRID FEED — 2 columns + full-width (span 2) ─── */
.feed-grid{
  padding:0 10px 40px;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
  grid-auto-flow:dense; /* fill gaps left by full-width rows */
}
.feed-card{
  position:relative;display:block;
  border-radius:10px;overflow:hidden;
  background:#0a0a0a;
  border:0.5px solid rgba(255,255,255,.06);
  cursor:pointer;
  min-width:0; /* prevent grid item overflow */
}
.feed-card .fc-img{
  position:relative;width:100%;display:block;overflow:hidden;background:#111;
}
.feed-card .fc-img svg,
.feed-card .fc-img img{
  width:100%;height:100%;object-fit:cover;display:block;position:absolute;inset:0;
}
.feed-card.poster .fc-img{aspect-ratio:9/14}
.feed-card.square .fc-img{aspect-ratio:1/1}
/* wide cards span both columns → full-width row */
.feed-card.wide{grid-column:1 / -1}
.feed-card.wide .fc-img{aspect-ratio:16/9}
.feed-card.wide .fc-title{font-size:18px}
.feed-card.wide .fc-cat{font-size:9px}
.feed-card.wide .fc-overlay{padding:18px 20px 18px}
.feed-card .fc-overlay{
  position:absolute;inset:0;
  background:linear-gradient(to top,rgba(0,0,0,.88) 0%,rgba(0,0,0,.15) 45%,transparent 70%);
  display:flex;flex-direction:column;justify-content:flex-end;
  padding:14px 12px 12px;
}
.feed-card .fc-num{
  position:absolute;top:10px;right:12px;
  font-family:Arial,'Noto Sans JP',sans-serif;font-weight:900;
  font-size:14px;color:rgba(237,235,230,.35);letter-spacing:.04em;
}
.feed-card .fc-cat{
  font-family:Arial,'Noto Sans JP',sans-serif;font-weight:500;
  font-size:7px;letter-spacing:.22em;text-transform:uppercase;
  color:var(--cat,var(--green));margin-bottom:4px;
}
.feed-card .fc-title{
  font-family:Arial,'Noto Sans JP',sans-serif;font-weight:900;
  font-size:13px;line-height:1.15;color:var(--white);
}
.feed-card .fc-title small{font-size:10px;font-weight:700;display:block;margin-top:1px}
.feed-card .fc-author{
  display:flex;align-items:center;gap:8px;margin-top:10px;
  font-family:Arial,'Noto Sans JP',sans-serif;font-weight:500;
  font-size:9px;color:rgba(237,235,230,.7);letter-spacing:.02em;
}
.feed-card .fc-author-av{
  width:24px;height:24px;border-radius:50%;overflow:hidden;
  position:relative;flex-shrink:0;
  background:linear-gradient(135deg,#3DAAFF,#1a2030);
  border:1.5px solid rgba(255,255,255,.25);
  box-shadow:0 2px 8px rgba(0,0,0,.5);
}
.feed-card .fc-author-av img{
  position:absolute;inset:0;
  width:100%;height:100%;
  object-fit:cover;display:block;
  border-radius:50%;
}

/* ARTICLE DETAIL MODAL ───────────────────── */
#detailModal{
  position:fixed;inset:0;z-index:1200;
  background:var(--black);
  display:none;flex-direction:column;
  opacity:0;transition:opacity .3s ease;
}
#detailModal.active{display:flex;opacity:1}
.dm-header{
  flex-shrink:0;
  padding:max(14px,calc(var(--safe-top) + 12px)) 18px 12px;
  display:flex;align-items:center;gap:14px;
  background:rgba(0,0,0,.96);border-bottom:0.5px solid var(--border);
}
.dm-close{
  width:36px;height:36px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  color:var(--white);
  border:0.5px solid rgba(255,255,255,.15);
}
.dm-close svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2}
.dm-label{
  font-family:'IBM Plex Mono',monospace;font-size:8px;
  letter-spacing:.32em;text-transform:uppercase;
  color:rgba(237,235,230,.3);margin-left:auto;
}
.dm-body{
  flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;
  scrollbar-width:none;
}
.dm-body::-webkit-scrollbar{display:none}
.dm-hero{position:relative;width:100%;aspect-ratio:9/14;background:#0a0a0a;overflow:hidden}
.dm-hero svg,.dm-hero img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:block}
.dm-hero::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(to top,rgba(0,0,0,.92) 0%,transparent 40%);
}
.dm-hero-text{
  position:absolute;bottom:0;left:0;right:0;
  padding:32px 22px 28px;z-index:2;
}
.dm-cat{
  font-family:Arial,'Noto Sans JP',sans-serif;font-weight:500;
  font-size:9px;letter-spacing:.28em;text-transform:uppercase;
  color:var(--pink);margin-bottom:8px;
}
.dm-title{
  font-family:Arial,'Noto Sans JP',sans-serif;font-weight:900;
  font-size:28px;line-height:1.1;color:var(--white);
  margin-bottom:14px;
}
.dm-by{
  display:flex;align-items:center;gap:12px;
  font-family:Arial,'Noto Sans JP',sans-serif;font-weight:500;
  font-size:11px;color:rgba(237,235,230,.65);letter-spacing:.02em;
}
.dm-by .av{
  width:36px;height:36px;border-radius:50%;overflow:hidden;
  position:relative;flex-shrink:0;
  background:linear-gradient(135deg,#3DAAFF,#1a2030);
  border:1.5px solid rgba(255,255,255,.3);
  box-shadow:0 2px 10px rgba(0,0,0,.5);
}
.dm-by .av img{
  position:absolute;inset:0;
  width:100%;height:100%;
  object-fit:cover;display:block;
  border-radius:50%;
}
.dm-content{padding:24px 22px 40px}
.dm-p{
  font-family:Arial,'Noto Sans JP',sans-serif;font-weight:400;
  font-size:13px;line-height:1.9;color:rgba(237,235,230,.78);
  letter-spacing:.01em;margin-bottom:18px;
}
.dm-actions{
  padding:16px 22px 24px;
  display:flex;align-items:center;justify-content:space-between;
  border-top:0.5px solid var(--border);
}
.dm-act{
  display:flex;align-items:center;gap:6px;
  color:rgba(237,235,230,.55);
  font-family:Arial,'Noto Sans JP',sans-serif;font-size:11px;
  font-weight:500;
}
.dm-act svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:1.8}
.dm-act.liked{color:var(--red)}
.dm-act.liked svg{fill:var(--red);stroke:var(--red)}
.dm-act.saved{color:var(--gold)}
.dm-act.saved svg{fill:var(--gold);stroke:var(--gold)}

/* ─────────────────────────────────────────────
   COMPOSE SELECTOR BOTTOM SHEET (shared)
   ───────────────────────────────────────────── */
#composeSheetOverlay{
  position:fixed;inset:0;z-index:1100;
  background:rgba(0,0,0,0);
  pointer-events:none;opacity:0;
  transition:background .3s ease, opacity .2s ease;
}
#composeSheetOverlay.active{
  background:rgba(0,0,0,.7);pointer-events:all;opacity:1;
  backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
}
#composeSheet{
  position:fixed;left:0;right:0;bottom:0;z-index:1101;
  background:#0a0a0a;
  border-top:0.5px solid var(--border);
  border-top-left-radius:20px;border-top-right-radius:20px;
  padding:20px 20px calc(24px + var(--safe-bot));
  transform:translateY(100%);
  transition:transform .35s cubic-bezier(.2,.8,.2,1);
  box-shadow:0 -12px 40px rgba(0,0,0,.7);
}
#composeSheetOverlay.active #composeSheet{transform:translateY(0)}
.cs-handle{width:40px;height:4px;border-radius:99px;background:rgba(237,235,230,.2);margin:0 auto 20px}
.cs-title{font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:.34em;text-transform:uppercase;color:rgba(237,235,230,.35);text-align:center;margin-bottom:18px}
.cs-options{display:flex;flex-direction:column;gap:10px}
.cs-opt{display:flex;align-items:center;gap:16px;padding:18px 18px;width:100%;background:rgba(255,255,255,.03);border:0.5px solid rgba(237,235,230,.08);border-radius:14px;color:var(--white);transition:background .2s}
.cs-opt:active{background:rgba(255,255,255,.06)}
.cs-opt svg{width:26px;height:26px;stroke:currentColor;fill:none;stroke-width:1.8;flex-shrink:0}
.cs-opt-body{flex:1;text-align:left}
.cs-opt-title{font-family:Arial,'Noto Sans JP',sans-serif;font-weight:700;font-size:15px;color:var(--white);margin-bottom:2px}
.cs-opt-sub{font-family:Arial,'Noto Sans JP',sans-serif;font-weight:400;font-size:10px;letter-spacing:.04em;color:rgba(237,235,230,.4)}
.cs-opt.article{border-left:3px solid var(--green)}
.cs-opt.event{border-left:3px solid var(--red)}
.cs-opt.workshop{border-left:3px solid var(--gold)}
.cs-opt.exhibition{border-left:3px solid var(--mint)}
.cs-opt.article svg{color:var(--green)}
.cs-opt.event svg{color:var(--red)}
.cs-opt.workshop svg{color:var(--gold)}
.cs-opt.exhibition svg{color:var(--mint)}
.cs-close{display:block;width:100%;padding:14px;background:none;border:0.5px solid rgba(237,235,230,.12);border-radius:99px;margin-top:16px;font-family:Arial,'Noto Sans JP',sans-serif;font-size:11px;font-weight:500;letter-spacing:.04em;color:rgba(237,235,230,.5)}
</style>
</head>

</div>

    title:'Waacking', subtitle:'Body as Language',
    author:'SACHI', bgHue:'320,60,30' },
  { id:'a008', layout:'square', num:'008', cat:'Music', catColor:'#3DAAFF',
    title:'Mixtape #042', subtitle:null,
    author:'NOBBY', bgHue:'200,80,25' },
  { id:'a009', layout:'wide', num:'009', cat:'Interview', catColor:'#E8100A',
    title:'ALI on House Culture', subtitle:null,
    author:'LIVE PASS', bgHue:'0,80,25' },
  { id:'a010', layout:'poster', num:'010', cat:'Event', catColor:'#E8100A',
    title:'Liquidroom', subtitle:'May 4 Preview',
    author:'NOBBY', bgHue:'10,70,30' },
];

const grid = document.getElementById('feedGrid');

/* SVG placeholder generator (no external images needed) */
function placeholderSVG(article) {
  const h = article.bgHue;
  const svg = `<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 400 600' preserveAspectRatio='xMidYMid slice'>
    <defs><linearGradient id='g${article.id}' x1='0' y1='0' x2='1' y2='1'>
      <stop offset='0' stop-color='hsla(${h},.4)'/>
      <stop offset='1' stop-color='hsla(${h},.1)'/>
    </linearGradient></defs>
    <rect width='400' height='600' fill='url(%23g${article.id})'/>
    <text x='200' y='320' text-anchor='middle' font-family='Arial' font-weight='900' font-size='100' fill='rgba(255,255,255,.06)'>${article.num}</text>
  </svg>`.replace(/\s+/g,' ').replace(/</g,'%3C').replace(/>/g,'%3E').replace(/#/g,'%23').replace(/"/g,"'");
  return 'data:image/svg+xml;charset=utf-8,' + svg;
}

/* ─── User identity — single source of truth for author name + avatar ─── */
const USER_NAME   = localStorage.getItem('livepass_account_name') || 'NOBBY';
const USER_AVATAR = localStorage.getItem('livepass_avatar') || null;

/* Merge user-posted articles from localStorage with the sample feed.
   User posts are prepended (newest first) so they show up at the top. */
function getUserArticles(){
  try {
    const raw = localStorage.getItem('livepass_articles');
    if (!raw) return [];
    const list = JSON.parse(raw);
    return list.map((u, i) => ({
      id:       u.id,
      layout:   u.layout || 'square',
      num:      String(900 + i).padStart(3, '0'),
      cat:      u.category || 'Article',
      catColor: '#A8E63D',
      title:    u.title,
      subtitle: null,
      // Author name: prefer the value at the time of posting, but if missing
      // fall back to the CURRENT user name so renames flow forward.
      author:   u.author || USER_NAME,
      avatar:   USER_AVATAR, // user posts always show the current user avatar
      body:     u.body,
      cover:    u.cover,
      bgHue:    '140,60,20',
      createdAt:u.createdAt,
      userPost: true,
    }));
  } catch(e) { return []; }
}

const FEED = [...getUserArticles(), ...ARTICLES];

/* Remember article metadata so the /profile SAVED tab can render them */
(function writeArticleMeta(){
  try {
    const map = {};
    FEED.forEach(a => {
      map[a.id] = {
        title: a.title,
        cat:   a.cat,
        catColor: a.catColor,
        cover: a.cover || null, // sample items don't have a cover so SAVED will fall back to gradient bg
      };
    });
    localStorage.setItem('livepass_article_meta', JSON.stringify(map));
  } catch(e) {}
})();

/* Render feed */
FEED.forEach(a => {
  const card = document.createElement('div');
  card.className = 'feed-card ' + a.layout;
  card.style.setProperty('--cat', a.catColor);
  card.dataset.id = a.id;
  const subHtml = a.subtitle ? `<small>${a.subtitle}</small>` : '';
  const imgSrc = a.cover || placeholderSVG(a);
  const avHtml = (a.userPost && a.avatar)
    ? `<div class="fc-author-av"><img src="${a.avatar}" alt=""></div>`
    : `<div class="fc-author-av"></div>`;
  card.innerHTML = `
    <div class="fc-img">
      <img src="${imgSrc}" alt="">
    </div>
    <div class="fc-num">${a.num}</div>
    <div class="fc-overlay">
      <div class="fc-cat">${a.cat}</div>
      <div class="fc-title">${a.title}${subHtml}</div>
      <div class="fc-author">${avHtml}${a.author}${a.userPost ? ' · あなたの投稿' : ''}</div>
    </div>
  `;
  card.addEventListener('click', () => openDetail(a));
  grid.appendChild(card);
});

/* ─────────────────────────────────────────────
   LIKES / SAVES — persisted in localStorage
   so the /profile SAVED sub-tab can read them.
   ───────────────────────────────────────────── */
function getIds(key){
  try { return JSON.parse(localStorage.getItem(key) || '[]'); } catch(e) { return []; }
}
function setIds(key, arr){
  try { localStorage.setItem(key, JSON.stringify(arr)); } catch(e) {}
}
function toggleId(key, id){
  const arr = getIds(key);
  const idx = arr.indexOf(id);
  if (idx >= 0) arr.splice(idx, 1);
  else arr.unshift(id);
  setIds(key, arr);
  return idx < 0; // true if now present
}

/* Detail modal */
const modal = document.getElementById('detailModal');
const dmBody = document.getElementById('dmBody');
const dmClose = document.getElementById('dmClose');

/* Default paragraphs for sample articles (user posts render their own body) */
const SAMPLE_BODY = `
  <p class="dm-p">LIVE PASS上の投稿は、フォロー中のアーティストから流れてくる「読みたくなる」コンテンツを中心に設計されています。ARTICLEタイプの投稿は、タイトル・カテゴリ・カバー画像・本文で構成され、縦長 / 正方形 / 横長の3種類のレイアウトから選べます。</p>
  <p class="dm-p">この記事はサンプルデータで表示されています。実際の投稿機能は / 投稿ボタン（＋アイコン）から ARTICLE を選択して作成できます。投稿後は Home フィードに表示されます。</p>
  <p class="dm-p">アーティスト自身が発信することを前提として、中間搾取を減らし、ファンとの距離を縮めます。投稿にはコメント・いいね・保存・SNS共有の4つのアクションが用意されています。</p>
`;

function openDetail(a) {
  if (navigator.vibrate) navigator.vibrate(8);

  // Convert user body text to HTML paragraphs
  const bodyHtml = a.userPost && a.body
    ? a.body.split(/\n\n+/).map(p => `<p class="dm-p">${p.replace(/\n/g,'<br>')}</p>`).join('')
    : SAMPLE_BODY;

  const heroSrc = a.cover || placeholderSVG(a);
  const dateStr = a.createdAt
    ? new Date(a.createdAt).toLocaleDateString('ja-JP')
    : '2026.04.11';

  const liked = getIds('livepass_likes').includes(a.id);
  const saved = getIds('livepass_saves').includes(a.id);
  // User's own posts: show their uploaded avatar (always cropped to circle)
  // Other authors: show the gradient dot
  const byAvatar = (a.userPost && a.avatar)
    ? `<div class="av"><img src="${a.avatar}" alt=""></div>`
    : `<div class="av"></div>`;

  dmBody.innerHTML = `
    <div class="dm-hero">
      <img src="${heroSrc}" alt="">
      <div class="dm-hero-text">
        <div class="dm-cat" style="color:${a.catColor}">${a.cat}</div>
        <div class="dm-title">${a.title}${a.subtitle ? '<br><span style="font-size:20px;font-weight:700">'+a.subtitle+'</span>' : ''}</div>
        <a class="dm-by" href="/profile?user=${encodeURIComponent(a.author)}" style="cursor:pointer">
          ${byAvatar}${a.author} · ${dateStr}
        </a>
      </div>
    </div>
    <div class="dm-content">${bodyHtml}</div>
    <div class="dm-actions">
      <button class="dm-act" data-act="comment"><svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>12</button>
      <button class="dm-act ${liked ? 'liked' : ''}" data-act="like"><svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>48</button>
      <button class="dm-act ${saved ? 'saved' : ''}" data-act="save"><svg viewBox="0 0 24 24"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>保存</button>
      <button class="dm-act" data-act="share"><svg viewBox="0 0 24 24"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>共有</button>
    </div>
  `;
  modal.classList.add('active');
  modal.setAttribute('aria-hidden','false');

  // Wire up act buttons with localStorage persistence
  dmBody.querySelectorAll('.dm-act').forEach(btn => {
    btn.addEventListener('click', () => {
      const act = btn.dataset.act;
      if (act === 'like') {
        const now = toggleId('livepass_likes', a.id);
        btn.classList.toggle('liked', now);
      } else if (act === 'save') {
        const now = toggleId('livepass_saves', a.id);
        btn.classList.toggle('saved', now);
      }
      if (navigator.vibrate) navigator.vibrate(6);
    });
  });
}
dmClose.addEventListener('click', () => {
  modal.classList.remove('active');
  modal.setAttribute('aria-hidden','true');
  setTimeout(() => { dmBody.innerHTML = ''; }, 300);
});
window.addEventListener('keydown', e => {
  if (e.key === 'Escape' && modal.classList.contains('active')) dmClose.click();
});

/* Top bar counters — read from localStorage (shared pattern) */
(function syncCounters(){
  try {
    const f1 = JSON.parse(localStorage.getItem('livepass_following') || '[]').length;
    const f2 = JSON.parse(localStorage.getItem('livepass_followers') || '[]').length;
    document.querySelectorAll('[data-count="following"]').forEach(el => el.textContent = f1 || '0');
    document.querySelectorAll('[data-count="followers"]').forEach(el => el.textContent = f2 || '0');
  } catch(e) {}
})();

/* ─────────────────────────────────────────────
   COMPOSE SELECTOR — shared bottom sheet
   ───────────────────────────────────────────── */
(function initComposeSheet(){
  const btn = document.getElementById('tbCreate');
  const overlay = document.getElementById('composeSheetOverlay');
  const closeBtn = document.getElementById('csClose');
  if (!btn || !overlay) return;
  const open = () => {
    overlay.classList.add('active');
    overlay.setAttribute('aria-hidden','false');
    if (navigator.vibrate) navigator.vibrate(8);
  };
  const dismiss = () => {
    overlay.classList.remove('active');
    overlay.setAttribute('aria-hidden','true');
  };
  btn.addEventListener('click', open);
  closeBtn.addEventListener('click', dismiss);
  overlay.addEventListener('click', e => { if (e.target === overlay) dismiss(); });
  document.querySelectorAll('.cs-opt').forEach(opt => {
    opt.addEventListener('click', () => {
      const t = opt.dataset.type;
      if (navigator.vibrate) navigator.vibrate(12);
      location.href = '/compose/' + t;
    });
  });
  window.addEventListener('keydown', e => {
    if (e.key === 'Escape' && overlay.classList.contains('active')) dismiss();
  });
})();
</script>
