<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>LIVE PASS — Schedule</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#000;--bg2:#0a0a0a;--bg3:#111;--bg4:#161616;
  --fg:#fff;--muted:rgba(255,255,255,.3);--muted2:rgba(255,255,255,.1);
  --border:rgba(255,255,255,.07);--dim:rgba(255,255,255,.04);
  --lp:#A8E63D;--sp:#F5C842;--red:#FF3B30;--green:#1D9E75;
  --blue:#3DAAFF;--purple:#BF5AF2;--mint:#00E5A0;--pink:#F4C0D1;
  --amber:#EF9F27;--teal:#5DCAA5;
}
html,body{height:100%;background:var(--bg);color:var(--fg);font-family:'Inter',sans-serif;overflow:hidden}
#app{max-width:430px;margin:0 auto;height:100dvh;display:flex;flex-direction:column;overflow:hidden}

/* ── TOPBAR ── */
#topbar{flex-shrink:0;padding:12px 18px 10px;border-bottom:0.5px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.logo{font-size:10px;font-weight:800;letter-spacing:4px}.logo span{color:var(--red)}
.topbar-r{display:flex;align-items:center;gap:8px}
.acct-toggle{display:flex;gap:0;background:var(--bg3);border-radius:1px;padding:2px;border:0.5px solid var(--border)}
.acct-btn{padding:4px 11px;border:none;background:none;cursor:pointer;font-family:'Inter',sans-serif;font-size:7px;letter-spacing:1.5px;color:var(--muted);border-radius:1px;transition:all .2s;text-transform:uppercase;font-weight:500}
.acct-btn.active{background:var(--bg4);color:var(--fg);border:0.5px solid var(--border)}
.new-btn{width:28px;height:28px;border-radius:50%;background:none;border:0.5px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:16px;cursor:pointer;color:var(--muted);transition:all .2s}
.new-btn:hover{border-color:rgba(255,255,255,.2);color:var(--fg)}

/* ── ACCOUNT CONTEXT BAR ── */
#ctx-bar{flex-shrink:0;padding:8px 18px;border-bottom:0.5px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.ctx-left{display:flex;align-items:center;gap:8px}
.ctx-av{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;flex-shrink:0}
.ctx-name{font-size:11px;font-weight:600;letter-spacing:-.2px}
.ctx-role{font-size:7px;letter-spacing:1.5px;color:var(--muted);text-transform:uppercase;font-weight:300;margin-top:1px}
.ctx-pill{font-size:6px;letter-spacing:2px;padding:2px 8px;border-radius:100px;border:0.5px solid;font-weight:600;text-transform:uppercase}

/* ── FILTER TABS ── */
#ftabs{flex-shrink:0;display:flex;padding:0 18px;border-bottom:0.5px solid var(--border);overflow-x:auto;scrollbar-width:none}
#ftabs::-webkit-scrollbar{display:none}
.ftab{font-size:8px;letter-spacing:2px;padding:9px 12px;border:none;background:none;color:var(--muted);cursor:pointer;border-bottom:1.5px solid transparent;font-family:'Inter',sans-serif;font-weight:600;text-transform:uppercase;white-space:nowrap;flex-shrink:0;transition:all .2s}
.ftab.active{color:var(--fg);border-bottom-color:var(--lp)}
.ftab-count{display:inline-block;background:var(--dim);border-radius:100px;font-size:6px;padding:1px 5px;margin-left:4px;color:var(--muted)}
.ftab.active .ftab-count{background:rgba(168,230,61,.15);color:var(--lp)}

/* ── MAIN SCROLL ── */
#main-scroll{flex:1;overflow-y:auto;scrollbar-width:none;padding-bottom:24px}
#main-scroll::-webkit-scrollbar{display:none}

/* ── SECTION HEADER ── */
.sec-head{padding:12px 18px 6px;font-size:6px;letter-spacing:3px;color:var(--muted2);text-transform:uppercase;font-weight:600;position:sticky;top:0;background:rgba(0,0,0,.96);backdrop-filter:blur(8px);z-index:10;display:flex;align-items:center;justify-content:space-between}
.sec-head-add{font-size:7px;letter-spacing:1.5px;color:var(--lp);cursor:pointer;border:0.5px solid rgba(168,230,61,.25);padding:2px 8px;border-radius:1px;font-weight:500}

/* ── SCHEDULE ITEM ── */
.sched-item{border-bottom:0.5px solid var(--border);cursor:pointer;transition:background .15s;position:relative}
.sched-item:active{background:var(--dim)}
.sched-item .left-bar{position:absolute;left:0;top:0;bottom:0;width:2px}
.sched-inner{padding:12px 18px 12px 22px;display:flex;gap:12px;align-items:flex-start}
.sched-thumb{width:52px;height:52px;border-radius:2px;flex-shrink:0;overflow:hidden;position:relative;display:flex;align-items:center;justify-content:center;font-size:22px}
.sched-thumb-bg{position:absolute;inset:0;opacity:.9}
.sched-thumb-icon{position:relative;z-index:1;opacity:.35}
.sched-info{flex:1;min-width:0}
.sched-tags{display:flex;gap:4px;margin-bottom:5px;flex-wrap:wrap;align-items:center}
.sched-tag{font-size:6px;letter-spacing:1.5px;padding:2px 6px;border-radius:1px;border:0.5px solid;font-weight:600;text-transform:uppercase}
.collab-tag{font-size:6px;letter-spacing:1.5px;padding:2px 6px;border-radius:1px;background:rgba(191,90,242,.12);color:var(--purple);border:0.5px solid rgba(191,90,242,.3);font-weight:600;text-transform:uppercase;display:flex;align-items:center;gap:3px}
.sched-title{font-size:13px;font-weight:700;letter-spacing:-.3px;line-height:1.1;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sched-meta{font-size:8px;color:var(--muted);letter-spacing:.5px;margin-bottom:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sched-foot{display:flex;align-items:center;justify-content:space-between;gap:8px}
.sched-bar-wrap{flex:1}
.sched-bar{height:1.5px;background:var(--border);border-radius:1px;overflow:hidden}
.sched-bar-fill{height:100%;border-radius:1px}
.sched-remaining{font-size:7px;margin-top:3px;letter-spacing:.3px}
.sched-right{text-align:right;flex-shrink:0}
.sched-price{font-size:13px;font-weight:700;letter-spacing:-.4px}
.sched-pass-price{font-size:7px;margin-top:2px;letter-spacing:.5px}

/* collab member avatars */
.collab-members{display:flex;align-items:center;gap:-4px;margin-top:5px}
.collab-av{width:18px;height:18px;border-radius:50%;border:1px solid var(--bg);display:flex;align-items:center;justify-content:center;font-size:7px;font-weight:800;margin-right:-6px;flex-shrink:0}
.collab-label{font-size:7px;color:var(--muted);letter-spacing:.5px;margin-left:10px;font-weight:300}

/* ── STUDIO ROW ── */
.studio-row{padding:10px 18px;border-bottom:0.5px solid var(--border);cursor:pointer;display:flex;align-items:center;gap:12px;transition:background .15s}
.studio-row:active{background:var(--dim)}
.st-color-bar{width:3px;height:40px;border-radius:2px;flex-shrink:0}
.st-info{flex:1}
.st-name{font-size:12px;font-weight:600;letter-spacing:-.2px;margin-bottom:2px}
.st-meta{font-size:8px;color:var(--muted);letter-spacing:.5px}
.st-slots{display:flex;gap:4px;margin-top:6px;flex-wrap:wrap}
.st-slot{font-size:7px;letter-spacing:1px;padding:3px 7px;border:0.5px solid var(--border);border-radius:1px;color:var(--muted);font-family:'Inter',sans-serif}
.st-slot.free{border-color:rgba(168,230,61,.25);color:var(--lp)}
.st-slot.taken{opacity:.25;text-decoration:line-through}
.st-price{text-align:right;flex-shrink:0}
.st-ph{font-size:12px;font-weight:700;letter-spacing:-.3px;color:var(--lp)}
.st-ph-lbl{font-size:7px;color:var(--muted);margin-top:2px}

/* ── MODAL ── */
#modal{position:absolute;inset:0;background:rgba(0,0,0,.97);z-index:100;display:none;flex-direction:column}
#modal.open{display:flex}
#modal-header{flex-shrink:0;padding:14px 18px;border-bottom:0.5px solid var(--border);display:flex;align-items:flex-end;justify-content:space-between}
#modal-eyebrow{font-size:6px;letter-spacing:4px;color:var(--muted);text-transform:uppercase;font-weight:300;margin-bottom:5px}
#modal-title{font-size:18px;font-weight:300;letter-spacing:-.3px;font-style:italic}
.modal-close-btn{background:none;border:0.5px solid rgba(255,255,255,.12);color:rgba(255,255,255,.4);cursor:pointer;width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;transition:all .15s}
#modal-body{flex:1;overflow-y:auto;scrollbar-width:none}
#modal-body::-webkit-scrollbar{display:none}

/* modal flyer */
.m-flyer{width:100%}
.m-section{padding:16px 18px;border-bottom:0.5px solid rgba(255,255,255,.05)}
.m-lbl{font-size:6px;letter-spacing:4px;color:rgba(255,255,255,.18);text-transform:uppercase;font-weight:300;margin-bottom:12px}
.m-line{display:flex;align-items:baseline;padding:7px 0;border-bottom:0.5px solid rgba(255,255,255,.04)}
.m-line:last-child{border-bottom:none}
.m-key{font-size:7px;letter-spacing:2px;color:rgba(255,255,255,.2);text-transform:uppercase;flex:0 0 100px;font-weight:300}
.m-dots{flex:1;border-bottom:1px dotted rgba(255,255,255,.06);margin:0 10px;position:relative;top:-3px}
.m-val{font-size:10px;font-weight:300;color:rgba(255,255,255,.65);letter-spacing:.3px}

/* collab section */
.collab-section{padding:16px 18px;border-bottom:0.5px solid rgba(255,255,255,.05)}
.collab-member-card{display:flex;align-items:center;gap:12px;padding:9px 0;border-bottom:0.5px solid rgba(255,255,255,.04)}
.collab-member-card:last-child{border-bottom:none}
.cmc-av{width:36px;height:36px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800}
.cmc-info{flex:1}
.cmc-name{font-size:11px;font-weight:600;letter-spacing:-.2px}
.cmc-role{font-size:7px;color:var(--muted);letter-spacing:1px;margin-top:2px;text-transform:uppercase;font-weight:300}
.cmc-share{font-size:10px;font-weight:700;letter-spacing:-.2px;flex-shrink:0}
.invite-btn{width:100%;padding:11px;border:0.5px solid rgba(255,255,255,.12);border-radius:1px;background:none;color:rgba(255,255,255,.4);font-family:'Inter',sans-serif;font-size:7px;letter-spacing:3px;cursor:pointer;text-transform:uppercase;transition:all .2s;margin-top:10px}
.invite-btn:hover{border-color:rgba(255,255,255,.25);color:var(--fg)}

/* pass toggle */
.pass-row{display:flex;gap:7px;padding:0 18px 16px}
.pass-opt{flex:1;padding:11px;border:0.5px solid var(--border);border-radius:1px;background:none;cursor:pointer;text-align:center;font-family:'Inter',sans-serif;transition:all .2s}
.pass-opt.sel{background:var(--dim)}
.po-lbl{font-size:7px;letter-spacing:2px;text-transform:uppercase;font-weight:500;margin-bottom:4px}
.po-price{font-size:15px;font-weight:800;letter-spacing:-.5px}

/* name input */
.name-inp-wrap{padding:0 18px 14px}
.name-inp{width:100%;background:var(--dim);border:0.5px solid var(--border);border-radius:1px;padding:12px 14px;font-size:13px;color:var(--fg);font-family:'Inter',sans-serif;font-weight:300;outline:none;letter-spacing:.3px;transition:border-color .2s}
.name-inp:focus{border-color:rgba(255,255,255,.2)}
.name-inp::placeholder{color:rgba(255,255,255,.18)}

/* modal footer */
#modal-footer{flex-shrink:0;padding:12px 18px;border-top:0.5px solid var(--border);background:rgba(0,0,0,.98)}
.m-cta{width:100%;padding:14px;border:0.5px solid rgba(255,255,255,.15);border-radius:1px;background:none;font-family:'Inter',sans-serif;font-size:8px;letter-spacing:3px;color:rgba(255,255,255,.4);cursor:default;text-transform:uppercase;transition:all .25s}
.m-cta.enabled{border-color:rgba(255,255,255,.3);color:var(--fg);cursor:pointer}
.m-cta.enabled:hover{background:var(--dim)}
.m-cta.enabled:active{transform:scale(.98)}

/* CREATE MODAL */
#create-modal{position:absolute;inset:0;background:rgba(0,0,0,.97);z-index:200;display:none;flex-direction:column}
#create-modal.open{display:flex}
.cm-header{flex-shrink:0;padding:14px 18px;border-bottom:0.5px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.cm-title{font-size:13px;font-weight:600;letter-spacing:-.3px}
.cm-scroll{flex:1;overflow-y:auto;scrollbar-width:none;padding:18px 18px 24px}
.cm-scroll::-webkit-scrollbar{display:none}
.cm-label{font-size:6px;letter-spacing:3px;color:rgba(255,255,255,.2);text-transform:uppercase;font-weight:300;margin-bottom:8px}
.cm-inp{width:100%;background:var(--dim);border:0.5px solid var(--border);border-radius:1px;padding:11px 13px;font-size:13px;color:var(--fg);font-family:'Inter',sans-serif;font-weight:300;outline:none;letter-spacing:.3px;transition:border-color .2s;margin-bottom:16px}
.cm-inp:focus{border-color:rgba(255,255,255,.2)}
.cm-inp::placeholder{color:rgba(255,255,255,.18)}
.cm-type-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:18px}
.cm-type-btn{padding:12px;border:0.5px solid var(--border);border-radius:1px;background:none;cursor:pointer;text-align:left;font-family:'Inter',sans-serif;transition:all .2s}
.cm-type-btn.active{background:var(--dim)}
.cm-type-icon{font-size:18px;margin-bottom:6px;display:block}
.cm-type-lbl{font-size:10px;font-weight:600;letter-spacing:-.2px;display:block;margin-bottom:2px}
.cm-type-sub{font-size:7px;color:var(--muted);letter-spacing:.3px;display:block;font-weight:300}
.collab-member-add{display:flex;gap:7px;margin-bottom:10px}
.cm-av-inp{flex:1;background:var(--dim);border:0.5px solid var(--border);border-radius:1px;padding:10px 13px;font-size:12px;color:var(--fg);font-family:'Inter',sans-serif;outline:none}
.cm-av-inp::placeholder{color:rgba(255,255,255,.18)}
.cm-add-btn{padding:10px 14px;border:0.5px solid rgba(168,230,61,.3);border-radius:1px;background:none;color:var(--lp);cursor:pointer;font-size:8px;letter-spacing:2px;font-family:'Inter',sans-serif;font-weight:600;text-transform:uppercase;transition:all .2s}
.cm-add-btn:active{transform:scale(.96)}
.member-chip{display:flex;align-items:center;gap:7px;padding:7px 10px;background:var(--dim);border:0.5px solid var(--border);border-radius:1px;margin-bottom:6px}
.mc-av{width:22px;height:22px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:800;background:rgba(191,90,242,.2);color:var(--purple)}
.mc-name{flex:1;font-size:10px;font-weight:500;letter-spacing:-.1px}
.mc-share{font-size:9px;color:var(--muted)}
.mc-remove{background:none;border:none;color:var(--muted);cursor:pointer;font-size:14px;line-height:1;padding:0;transition:color .15s}
.mc-remove:hover{color:var(--red)}
.split-note{font-size:8px;color:rgba(255,255,255,.2);letter-spacing:.3px;font-weight:300;margin-top:4px;margin-bottom:18px}
.cm-footer{flex-shrink:0;padding:12px 18px;border-top:0.5px solid var(--border)}
.cm-submit{width:100%;padding:14px;border:0.5px solid rgba(168,230,61,.3);border-radius:1px;background:none;font-family:'Inter',sans-serif;font-size:8px;letter-spacing:3px;color:var(--lp);cursor:pointer;text-transform:uppercase;font-weight:600;transition:all .2s}
.cm-submit:active{transform:scale(.98)}

/* CONFIRMED */
.conf-overlay{position:absolute;inset:0;background:rgba(0,0,0,.98);z-index:300;display:none;flex-direction:column;align-items:center;justify-content:center;padding:40px 28px;text-align:center;gap:12px}
.conf-overlay.open{display:flex}
.conf-lbl{font-size:7px;letter-spacing:4px;color:var(--mint);font-weight:300}
.conf-title{font-size:18px;font-weight:300;letter-spacing:-.3px}
.conf-meta{font-size:9px;color:var(--muted);font-weight:300;line-height:1.9;letter-spacing:.3px}
.conf-back{font-size:8px;letter-spacing:2px;color:var(--muted);background:none;border:0.5px solid var(--border);padding:7px 18px;cursor:pointer;font-family:'Inter',sans-serif;margin-top:8px;text-transform:uppercase}
</style>
</head>
<body>
<div id="app">

  <!-- TOPBAR -->
  <div id="topbar">
    <div class="logo">LIVE <span>PASS</span></div>
    <div class="topbar-r">
      <div class="acct-toggle">
        <button class="acct-btn active" id="btn-solo" onclick="setAccount('solo')">Solo</button>
        <button class="acct-btn" id="btn-team" onclick="setAccount('team')">Team</button>
      </div>
      <button class="new-btn" onclick="openCreate()" title="新規作成">＋</button>
    </div>
  </div>

  <!-- ACCOUNT CONTEXT BAR -->
  <div id="ctx-bar">
    <div class="ctx-left">
      <div class="ctx-av" id="ctx-av" style="background:rgba(168,230,61,.2);color:var(--lp)">N</div>
      <div>
        <div class="ctx-name" id="ctx-name">NOBBY</div>
        <div class="ctx-role" id="ctx-role">House · Waacking · DJ</div>
      </div>
    </div>
    <div class="ctx-pill" id="ctx-pill" style="color:var(--lp);border-color:rgba(168,230,61,.3);background:rgba(168,230,61,.08)">SOLO</div>
  </div>

  <!-- FILTER TABS -->
  <div id="ftabs">
    <button class="ftab active" onclick="setFilter('ALL',this)">All <span class="ftab-count" id="cnt-all">—</span></button>
    <button class="ftab" onclick="setFilter('EVENT',this)">Event <span class="ftab-count" id="cnt-event">—</span></button>
    <button class="ftab" onclick="setFilter('WORKSHOP',this)">Workshop <span class="ftab-count" id="cnt-ws">—</span></button>
    <button class="ftab" onclick="setFilter('LESSON',this)">Lesson <span class="ftab-count" id="cnt-lesson">—</span></button>
    <button class="ftab" onclick="setFilter('STUDIO',this)">Studio <span class="ftab-count" id="cnt-studio">—</span></button>
  </div>

  <!-- MAIN SCROLL -->
  <div id="main-scroll">
    <div id="main-content"></div>
  </div>

  <!-- BOOKING MODAL -->
  <div id="modal">
    <div id="modal-header">
      <div>
        <div id="modal-eyebrow">WORKSHOP</div>
        <div id="modal-title">—</div>
      </div>
      <button class="modal-close-btn" onclick="closeModal()">✕</button>
    </div>
    <div id="modal-body"></div>
    <div id="modal-footer">
      <button class="m-cta" id="m-cta-btn">予約する →</button>
    </div>
  </div>

  <!-- CREATE MODAL -->
  <div id="create-modal">
    <div class="cm-header">
      <div class="cm-title">新規作成</div>
      <button class="modal-close-btn" onclick="closeCreate()">✕</button>
    </div>
    <div class="cm-scroll">
      <div class="cm-label">種別</div>
      <div class="cm-type-grid" id="cm-type-grid"></div>
      <div class="cm-label">タイトル</div>
      <input class="cm-inp" id="cm-title" placeholder="例：House Dance Intensive">
      <div class="cm-label">日程 / 時間</div>
      <input class="cm-inp" id="cm-date" placeholder="例：2026.06.15 · 14:00 — 18:00">
      <div class="cm-label">会場</div>
      <input class="cm-inp" id="cm-venue" placeholder="例：渋谷 Studio Mission Room A">
      <div class="cm-label">定員 / 参加費</div>
      <div style="display:flex;gap:8px;margin-bottom:18px">
        <input class="cm-inp" id="cm-cap" placeholder="定員: 20" style="margin-bottom:0;flex:1" type="number">
        <input class="cm-inp" id="cm-price" placeholder="¥5,000" style="margin-bottom:0;flex:1" type="number">
      </div>

      <!-- COLLAB SECTION -->
      <div id="collab-section">
        <div class="cm-label">コラボ / プロジェクトメンバー</div>
        <div class="collab-member-add">
          <input class="cm-av-inp" id="collab-inp" placeholder="アーティスト名で検索...">
          <button class="cm-add-btn" onclick="addCollabMember()">招待</button>
        </div>
        <div id="collab-chips"></div>
        <div class="split-note" id="split-note"></div>
        <div class="cm-label" style="margin-top:4px">収益分配</div>
        <div style="display:flex;gap:8px;margin-bottom:18px">
          <input class="cm-inp" id="split-a" placeholder="自分: 60%" style="margin-bottom:0;flex:1">
          <input class="cm-inp" id="split-b" placeholder="相手: 40%" style="margin-bottom:0;flex:1">
        </div>
        <div class="cm-label">ゲスト講師（任意）</div>
        <input class="cm-inp" id="guest-inp" placeholder="例：SACHI (Waacking)">
      </div>

      <div class="cm-label">説明</div>
      <textarea class="cm-inp" id="cm-desc" placeholder="WSの内容・対象レベルなど..." rows="3" style="resize:none;height:72px"></textarea>
    </div>
    <div class="cm-footer">
      <button class="cm-submit" onclick="submitCreate()">作成してフライヤーを生成する →</button>
    </div>
  </div>

  <!-- CONFIRMED OVERLAY -->
  <div class="conf-overlay" id="conf-overlay">
    <div class="conf-lbl">CONFIRMED</div>
    <div class="conf-title" id="conf-title">—</div>

// ─── HELPERS ───
function fmtPrice(n){ return '¥'+n.toLocaleString(); }
function left(item){ return item.cap - item.booked; }
function itemsForAccount(){ return ALL_DATA[currentAccount] || []; }

function filteredItems(){
  const items = itemsForAccount();
  if(currentFilter==='ALL') return items;
  return items.filter(i=>i.type===currentFilter);
}

function countByType(type){ return itemsForAccount().filter(i=>i.type===type).length; }

function updateCounts(){
  document.getElementById('cnt-all').textContent    = itemsForAccount().length;
  document.getElementById('cnt-event').textContent  = countByType('EVENT');
  document.getElementById('cnt-ws').textContent     = countByType('WORKSHOP');
  document.getElementById('cnt-lesson').textContent = countByType('LESSON');
  document.getElementById('cnt-studio').textContent = countByType('STUDIO');
}

// ─── SVG FLYER ───
function buildFlyer(item, h=150){
  const c = item.color || '#A8E63D';
  const isVar = c.startsWith('var(');
  const displayColor = isVar ? ({
    'var(--red)':'#FF3B30','var(--lp)':'#A8E63D','var(--sp)':'#F5C842',
    'var(--purple)':'#BF5AF2','var(--teal)':'#5DCAA5','var(--pink)':'#F4C0D1',
    'var(--amber)':'#EF9F27','var(--mint)':'#00E5A0','var(--blue)':'#3DAAFF'
  }[c] || '#A8E63D') : c;

  const lines = Math.floor(h/14);
  let gl='';
  for(let i=0;i<lines;i++) gl+=`<line x1="0" y1="${(h/lines)*i}" x2="430" y2="${(h/lines)*i}" stroke="${displayColor}" stroke-width="0.3" opacity="0.09"/>`;
  for(let i=0;i<8;i++) gl+=`<line x1="${(430/8)*i}" y1="0" x2="${(430/8)*i}" y2="${h}" stroke="${displayColor}" stroke-width="0.3" opacity="0.06"/>`;

  const isLesson = item.type==='LESSON';
  const dateStr  = item.date || item.freq || '';
  const priceStr = item.price ? fmtPrice(item.price) : '';
  return `<svg width="100%" viewBox="0 0 430 ${h}" xmlns="http://www.w3.org/2000/svg">
    <defs><linearGradient id="fg-${item.id}" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="${displayColor}" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.85"/>
    </linearGradient></defs>
    <rect width="430" height="${h}" fill="url(#fg-${item.id})"/>
    ${gl}
    <rect x="16" y="16" width="${430-32}" height="${h-32}" rx="1" fill="none" stroke="${displayColor}" stroke-width="0.5" opacity="0.22"/>
    <text x="26" y="40" font-size="7" fill="${displayColor}" font-family="Inter,sans-serif" letter-spacing="3" opacity="0.65">LIVE PASS · ${item.type}</text>
    <text x="26" y="${h/2}" font-size="${item.title.length>24?15:19}" fill="#fff" font-family="Inter,sans-serif" font-weight="700" letter-spacing="-0.5">${item.title}</text>
    <text x="26" y="${h/2+18}" font-size="9" fill="${displayColor}" font-family="Inter,sans-serif" opacity="0.75">${item.artist}</text>
    <line x1="26" y1="${h/2+26}" x2="${430-26}" y2="${h/2+26}" stroke="${displayColor}" stroke-width="0.5" opacity="0.2"/>
    <text x="26" y="${h-28}" font-size="8" fill="#fff" font-family="Inter,sans-serif" opacity="0.5">${dateStr} · ${item.time||''}</text>
    <text x="26" y="${h-14}" font-size="8" fill="#fff" font-family="Inter,sans-serif" opacity="0.4">${item.venue||''}</text>
    ${priceStr?`<text x="${430-26}" y="${h-14}" font-size="11" fill="#fff" font-family="Inter,sans-serif" font-weight="700" text-anchor="end">${priceStr}</text>`:''}
    ${item.collab&&item.collab.length?`<text x="${430-26}" y="40" font-size="7" fill="${displayColor}" font-family="Inter,sans-serif" text-anchor="end" opacity="0.6">collab ×${item.collab.length}</text>`:''}
  </svg>`;
}

// ─── RENDER ───
function render(){
  updateCounts();
  const items = filteredItems();
  const content = document.getElementById('main-content');

  // Group by type
  const groups = {};
  items.forEach(i=>{ if(!groups[i.type]) groups[i.type] = []; groups[i.type].push(i); });

  const typeOrder = ['EVENT','WORKSHOP','LESSON','STUDIO'];
  const typeLabels = {EVENT:'Events',WORKSHOP:'Workshops',LESSON:'Lessons',STUDIO:'Studios'};

  let html = '';
  typeOrder.forEach(type=>{
    if(!groups[type]) return;
    html += `<div class="sec-head"><span>${typeLabels[type]}</span><span class="sec-head-add" onclick="openCreate('${type}')">+ 追加</span></div>`;
    groups[type].forEach(item=>{
      if(item.type==='STUDIO'){ html += renderStudio(item); return; }
      html += renderSchedItem(item);
    });
  });

  if(!html) html = `<div style="text-align:center;padding:60px 20px;font-size:9px;letter-spacing:2px;color:var(--muted)">NO ITEMS</div>`;
  content.innerHTML = html;
}

function renderSchedItem(item){
  const rem = left(item);
  const pct = Math.round((item.booked/item.cap)*100);
  const remColor = rem===0?'var(--red)':rem<=3?'var(--amber)':'var(--muted)';
  const hasCollab = item.collab && item.collab.length > 0;

  const collabMembersHtml = hasCollab ? `
    <div class="collab-members" style="margin-top:5px">
      ${item.collab.map(m=>`<div class="collab-av" style="background:${m.color};color:${m.textColor}">${m.av}</div>`).join('')}
      <span class="collab-label">${item.collab.map(m=>m.name).join(' · ')}</span>
    </div>` : '';

  const isLesson = item.type==='LESSON';
  const displayColor = item.color.startsWith('var(') ? '#A8E63D' : item.color;

  return `<div class="sched-item" onclick="openModal('${item.id}')">
    <div class="left-bar" style="background:${item.color}"></div>
    <div class="sched-inner">
      <div class="sched-thumb" style="background:${item.color}14">
        <div class="sched-thumb-bg" style="background:${item.color}"></div>
        <div class="sched-thumb-icon">${item.icon}</div>
      </div>
      <div class="sched-info">
        <div class="sched-tags">
          <span class="sched-tag" style="color:${item.color};border-color:${item.color}44">${item.type}</span>
          ${hasCollab?`<span class="collab-tag">◈ Collab ×${item.collab.length}</span>`:''}
        </div>
        <div class="sched-title">${item.title}</div>
        <div class="sched-meta">${item.artist} · ${item.date||item.freq||''} · ${item.time||''}</div>
        ${collabMembersHtml}
        <div class="sched-foot">
          <div class="sched-bar-wrap">
            <div class="sched-bar"><div class="sched-bar-fill" style="width:${pct}%;background:${rem<=3?'var(--red)':item.color}"></div></div>
            <div class="sched-remaining" style="color:${remColor}">${rem===0?'満員':rem<=3?`残り${rem}枠 — 残りわずか`:`${rem} / ${item.cap} available`}</div>
          </div>
          <div class="sched-right">
            <div class="sched-price">${fmtPrice(item.price)}</div>
            <div class="sched-pass-price" style="color:${item.color}">PASS ${fmtPrice(item.passPrice)}</div>
          </div>
        </div>
      </div>
    </div>
  </div>`;
}

function renderStudio(s){
  const dispColor = s.color;
  return `<div class="studio-row" onclick="openModal('${s.id}')">
    <div class="st-color-bar" style="background:${dispColor}"></div>
    <div class="st-info">
      <div class="st-name">${s.title}</div>
      <div class="st-meta">${s.area} · ${s.size} · 鏡 / 音響完備</div>
      <div class="st-slots">
        ${s.freeSlots.map(t=>`<span class="st-slot free">${t}</span>`).join('')}
        ${s.takenSlots.map(t=>`<span class="st-slot taken">${t}</span>`).join('')}
      </div>
    </div>
    <div class="st-price">
      <div class="st-ph">¥${s.priceH.toLocaleString()}</div>
      <div class="st-ph-lbl">/hour</div>
    </div>
  </div>`;
}

// ─── MODAL ───
function openModal(id){
  const all = [...ALL_DATA.solo, ...ALL_DATA.team];
  const item = all.find(i=>i.id===id);
  if(!item) return;
  currentModal = item;
  usePass = true;

  document.getElementById('modal-eyebrow').textContent = item.type+' · '+(item.date||item.freq||'');
  document.getElementById('modal-title').textContent   = item.title;

  if(item.type==='STUDIO'){
    document.getElementById('modal-body').innerHTML = buildStudioModalBody(item);
    document.getElementById('m-cta-btn').textContent = 'スタジオを予約する →';
    document.getElementById('m-cta-btn').className   = 'm-cta enabled';
    document.getElementById('m-cta-btn').onclick     = ()=>confirmAction();
  } else {
    document.getElementById('modal-body').innerHTML = buildSchedModalBody(item);
    document.getElementById('m-cta-btn').className  = 'm-cta';
    document.getElementById('m-cta-btn').textContent= '予約する →';
  }
  document.getElementById('modal').classList.add('open');
}

function buildSchedModalBody(item){
  const dispColor = item.color.startsWith('var(')? ({
    'var(--red)':'#FF3B30','var(--lp)':'#A8E63D','var(--sp)':'#F5C842',
    'var(--purple)':'#BF5AF2','var(--teal)':'#5DCAA5','var(--pink)':'#F4C0D1',
    'var(--amber)':'#EF9F27','var(--mint)':'#00E5A0','var(--blue)':'#3DAAFF'
  }[item.color]||'#A8E63D') : item.color;

  const rem = left(item);
  const hasCollab = item.collab && item.collab.length > 0;

  const metaLines = [
    ['Artist',   item.artist],
    ['Style',    item.music||'—'],
    ['Schedule', (item.date||item.freq||'')+(item.time?' · '+item.time:'')],
    ['Venue',    item.venue||'—'],
    ['Capacity', `${item.booked} / ${item.cap}`],
  ].map(([k,v])=>`<div class="m-line"><span class="m-key">${k}</span><span class="m-dots"></span><span class="m-val">${v}</span></div>`).join('');

  const collabSection = hasCollab ? `
    <div class="collab-section">
      <div class="m-lbl">Collab Members</div>
      ${item.collab.map(m=>`
        <div class="collab-member-card">
          <div class="cmc-av" style="background:${m.color};color:${m.textColor}">${m.av}</div>
          <div class="cmc-info"><div class="cmc-name">${m.name}</div><div class="cmc-role">${m.role}</div></div>
          <div class="cmc-share" style="color:${m.textColor}">${m.share}</div>
        </div>`).join('')}
    </div>` : '';

  const passToggle = rem > 0 ? `
    <div class="pass-row">
      <button class="pass-opt sel" id="po-pass" style="border-color:${dispColor}44" onclick="selectPass(true,'${item.id}')">
        <div class="po-lbl" style="color:${dispColor}">LIVE PASS</div>
        <div class="po-price" style="color:${dispColor}">${fmtPrice(item.passPrice)}</div>
      </button>
      <button class="pass-opt" id="po-normal" onclick="selectPass(false,'${item.id}')">
        <div class="po-lbl" style="color:var(--muted)">通常価格</div>
        <div class="po-price">${fmtPrice(item.price)}</div>
      </button>
    </div>
    <div class="name-inp-wrap">
      <input class="name-inp" id="modal-name-inp" placeholder="お名前 / Your name" oninput="checkCTA()">
    </div>` : `<div style="padding:12px 18px;font-size:9px;color:var(--red);letter-spacing:1px">満員 — キャンセル待ちに登録できます</div>`;

  return `
    <div class="m-flyer">${buildFlyer(item, 200)}</div>
    <div class="m-section">
      <div class="m-lbl">About</div>
      <div style="font-size:11px;font-weight:300;color:rgba(255,255,255,.5);line-height:1.9;letter-spacing:.2px">${item.desc}</div>
    </div>
    <div class="m-section"><div class="m-lbl">Details</div>${metaLines}</div>
    ${collabSection}
    ${passToggle}`;
}

function buildStudioModalBody(s){
  return `
    <div class="m-section">
      <div class="m-lbl">Available Slots</div>
      <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px">
        ${s.freeSlots.map(t=>`<div class="st-slot free" style="cursor:pointer;padding:6px 12px;font-size:9px" onclick="selectSlotModal(this,'${t}')">${t}</div>`).join('')}
        ${s.takenSlots.map(t=>`<div class="st-slot taken" style="padding:6px 12px;font-size:9px">${t}</div>`).join('')}
      </div>
    </div>
    <div class="m-section">
      <div class="m-lbl">Studio Info</div>
      <div class="m-line"><span class="m-key">Studio</span><span class="m-dots"></span><span class="m-val">${s.title}</span></div>
      <div class="m-line"><span class="m-key">Area</span><span class="m-dots"></span><span class="m-val">${s.area}</span></div>
      <div class="m-line"><span class="m-key">Size</span><span class="m-dots"></span><span class="m-val">${s.size}</span></div>
      <div class="m-line"><span class="m-key">Rate</span><span class="m-dots"></span><span class="m-val" style="color:var(--lp)">¥${s.priceH.toLocaleString()} / h</span></div>
    </div>`;
}

function selectSlotModal(el, slot){
  document.querySelectorAll('#modal-body .st-slot.free').forEach(s=>{ s.style.borderColor='rgba(168,230,61,.25)'; s.style.color='var(--lp)'; s.style.background='none'; });
  el.style.borderColor='var(--lp)'; el.style.color='#000'; el.style.background='var(--lp)';
  document.getElementById('m-cta-btn').className='m-cta enabled';
  document.getElementById('m-cta-btn').textContent=`${slot} を予約する →`;
  document.getElementById('m-cta-btn').onclick=()=>confirmAction();
}

function selectPass(isPass, id){
  usePass = isPass;
  const item = [...ALL_DATA.solo,...ALL_DATA.team].find(i=>i.id===id);
  if(!item) return;
  const dispColor = item.color.startsWith('var(')? '#A8E63D' : item.color;
  const pp = document.getElementById('po-pass');
  const pn = document.getElementById('po-normal');
  if(pp && pn){
    pp.className = 'pass-opt'+(isPass?' sel':'');
    pn.className = 'pass-opt'+(!isPass?' sel':'');
    pp.style.borderColor = isPass ? dispColor+'55':'var(--border)';
    pn.style.borderColor = !isPass? 'rgba(255,255,255,.25)':'var(--border)';
  }
  checkCTA();
}

function checkCTA(){
  const inp = document.getElementById('modal-name-inp');
  const btn = document.getElementById('m-cta-btn');
  if(!inp || !btn) return;
  const name = inp.value.trim();
  if(name){
    btn.className='m-cta enabled';
    btn.onclick=()=>confirmAction();
  } else {
    btn.className='m-cta';
    btn.onclick=null;
  }
}

function confirmAction(){
  if(!currentModal) return;
  const item = currentModal;
  const inp  = document.getElementById('modal-name-inp');
  const name = inp ? inp.value.trim() : '—';
  const price= usePass ? item.passPrice : item.price;
  document.getElementById('conf-title').textContent = item.title;
  document.getElementById('conf-meta').innerHTML    = `${item.artist} · ${fmtPrice(price||0)}<br>${name||'—'}<br>${item.date||item.freq||'—'} · ${item.time||'—'}`;
  document.getElementById('modal').classList.remove('open');
  document.getElementById('conf-overlay').classList.add('open');
}

function closeModal(){ document.getElementById('modal').classList.remove('open'); }
function closeConf(){  document.getElementById('conf-overlay').classList.remove('open'); }

// ─── ACCOUNT SWITCH ───
function setAccount(type){
  currentAccount = type;
  const a = ACCOUNTS[type];
  document.getElementById('btn-solo').className='acct-btn'+(type==='solo'?' active':'');
  document.getElementById('btn-team').className='acct-btn'+(type==='team'?' active':'');
  document.getElementById('ctx-av').textContent   = a.av;
  document.getElementById('ctx-av').style.background = a.avColor;
  document.getElementById('ctx-av').style.color      = a.avTextColor;
  document.getElementById('ctx-name').textContent = a.name;
  document.getElementById('ctx-role').textContent = a.role;
  const pill = document.getElementById('ctx-pill');
  pill.textContent  = a.pillLabel;
  pill.style.color  = a.pillColor;
  pill.style.background = a.pillBg;
  pill.style.borderColor= a.pillBorder;
  setFilter('ALL', document.querySelector('.ftab'));
}

// ─── FILTER ───
function setFilter(f, btn){
  currentFilter = f;
  document.querySelectorAll('.ftab').forEach(t=>t.classList.remove('active'));
  if(btn) btn.classList.add('active');
  render();
}

// ─── CREATE MODAL ───
function openCreate(type){
  selectedCMType = type || 'WORKSHOP';
  collabMembers  = [];
  document.getElementById('cm-title').value  = '';
  document.getElementById('cm-date').value   = '';
  document.getElementById('cm-venue').value  = '';
  document.getElementById('cm-cap').value    = '';
  document.getElementById('cm-price').value  = '';
  document.getElementById('collab-inp').value= '';
  document.getElementById('split-a').value   = '';
  document.getElementById('split-b').value   = '';
  document.getElementById('guest-inp').value = '';
  document.getElementById('cm-desc').value   = '';
  document.getElementById('collab-chips').innerHTML = '';

  // build type grid
  const grid = document.getElementById('cm-type-grid');
  grid.innerHTML = CM_TYPES.map(t=>`
    <button class="cm-type-btn${t.id===selectedCMType?' active':''}" onclick="selectCMType('${t.id}',this)">
      <span class="cm-type-icon">${t.icon}</span>
      <span class="cm-type-lbl">${t.label}</span>
      <span class="cm-type-sub">${t.sub}</span>
    </button>`).join('');

  document.getElementById('create-modal').classList.add('open');
}

function selectCMType(type, btn){
  selectedCMType = type;
  document.querySelectorAll('.cm-type-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
}

function addCollabMember(){
  const inp = document.getElementById('collab-inp');
  const name = inp.value.trim();
  if(!name) return;
  collabMembers.push(name);
  inp.value = '';
  renderCollabChips();
  updateSplitNote();
}

function removeCollab(i){
  collabMembers.splice(i,1);
  renderCollabChips();
  updateSplitNote();
}

function renderCollabChips(){
  document.getElementById('collab-chips').innerHTML = collabMembers.map((m,i)=>`
    <div class="member-chip">
      <div class="mc-av">${m[0].toUpperCase()}</div>
      <span class="mc-name">${m}</span>
      <span class="mc-share">${getAutoShare(i+1, collabMembers.length)}</span>
      <button class="mc-remove" onclick="removeCollab(${i})">✕</button>
    </div>`).join('');
}

function getAutoShare(idx, total){
  const myShare = 100 - Math.round((100/(total+1))*total);
  const theirShare = Math.round(100/(total+1));
  return theirShare+'%';
}

function updateSplitNote(){
  const n = collabMembers.length;
  const note = document.getElementById('split-note');
  if(n===0){ note.textContent=''; return; }
  const myShare = 100-Math.round((100/(n+1))*n);
  note.textContent = `自動分配案: 自分 ${myShare}% / ${collabMembers.map((_,i)=>Math.round(100/(n+1))+'%').join(' / ')}`;
}

function closeCreate(){ document.getElementById('create-modal').classList.remove('open'); }

function submitCreate(){
  const title = document.getElementById('cm-title').value.trim();
  if(!title){ alert('タイトルを入力してください'); return; }

  const newItem = {
    id: 'new_'+Date.now(),
    type: selectedCMType,
    title, icon:'✨',
    artist: ACCOUNTS[currentAccount].name,
    date: document.getElementById('cm-date').value||'TBD',
    time: '', venue: document.getElementById('cm-venue').value||'TBD',
    price: parseInt(document.getElementById('cm-price').value)||0,
    passPrice: Math.round((parseInt(document.getElementById('cm-price').value)||0)*0.8),
    cap: parseInt(document.getElementById('cm-cap').value)||20,
    booked: 0, color:'var(--lp)',
    collab: collabMembers.map(m=>({name:m,av:m[0].toUpperCase(),color:'rgba(191,90,242,.2)',textColor:'var(--purple)',role:'Co-Host',share:'—'})),
    desc: document.getElementById('cm-desc').value||'—',
    music:'—',
  };
  ALL_DATA[currentAccount].unshift(newItem);
  closeCreate();
  render();

  // Show confirm
  document.getElementById('conf-title').textContent = newItem.title + ' を作成しました';
  document.getElementById('conf-meta').innerHTML    = `${selectedCMType} · ${newItem.date}<br>${collabMembers.length?'コラボ: '+collabMembers.join(', '):'Solo'}<br>フライヤーが生成されました`;
  document.getElementById('conf-overlay').classList.add('open');
}

// ─── INIT ───
setAccount('solo');
</script>
</body>
</html>
