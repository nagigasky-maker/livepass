<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#000000">
<title>LIVE PASS — Follow</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=IBM+Plex+Mono:wght@400;500&family=Noto+Sans+JP:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --black:#000;--white:#EDEBE6;
  --red:#E8100A;--blue:#3DAAFF;--green:#A8E63D;
  --gold:#F5C842;--mint:#00E5A0;--pink:#F4C0D1;
  --muted:rgba(237,235,230,.3);--border:rgba(255,255,255,.07);
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bot:env(safe-area-inset-bottom,0px);
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;height:100dvh;background:var(--black);color:var(--white);
  font-family:Arial,'Noto Sans JP',sans-serif;-webkit-font-smoothing:antialiased;
  user-select:none;-webkit-user-select:none;overflow:hidden;}
a{color:inherit;text-decoration:none}
button{background:none;border:none;color:inherit;font:inherit;cursor:pointer}

.hdr{position:fixed;top:0;left:0;right:0;z-index:10;
  padding:max(14px,calc(var(--safe-top) + 12px)) 18px 0;
  background:rgba(0,0,0,.96);
  border-bottom:0.5px solid var(--border);}
.hdr-top{display:flex;align-items:center;gap:14px;margin-bottom:14px}
.hdr-back{background:none;border:0.5px solid rgba(255,255,255,.18);
  color:rgba(237,235,230,.65);font-size:10px;font-weight:500;letter-spacing:.08em;
  padding:7px 14px;border-radius:99px;}
.hdr-title{font-family:Arial,'Noto Sans JP',sans-serif;font-weight:900;
  font-size:18px;color:var(--white);margin-left:auto;margin-right:auto;padding-right:60px;}

.tabs{display:flex}
.tab{flex:1;padding:14px 0 14px;
  font-family:Arial,'Noto Sans JP',sans-serif;font-weight:700;
  font-size:13px;letter-spacing:.12em;text-transform:uppercase;
  color:rgba(237,235,230,.3);
  border-bottom:2px solid transparent;}
.tab.active{color:var(--white);border-bottom-color:var(--blue)}
.tab-count{
  font-family:Arial,'Noto Sans JP',sans-serif;font-weight:400;
  font-size:11px;color:rgba(237,235,230,.35);margin-left:6px;
}

.list{
  position:fixed;top:0;left:0;right:0;bottom:0;
  padding-top:calc(var(--safe-top) + 110px);
  overflow-y:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;
}
.list::-webkit-scrollbar{display:none}

.panel{display:none}
.panel.active{display:block}

.user-row{
  display:flex;align-items:center;gap:14px;
  padding:14px 20px;
  border-bottom:0.5px solid rgba(255,255,255,.04);
}
.user-row:active{background:rgba(255,255,255,.03)}
.ur-av{
  width:48px;height:48px;border-radius:50%;flex-shrink:0;
  background:linear-gradient(135deg,var(--av-hue,#3DAAFF),#0a1020);
  border:1.5px solid rgba(237,235,230,.15);
  display:flex;align-items:center;justify-content:center;
  font-family:Arial,sans-serif;font-weight:900;font-size:18px;color:var(--white);
  overflow:hidden;position:relative;
}
.ur-body{flex:1;min-width:0}
.ur-name{
  font-family:Arial,'Noto Sans JP',sans-serif;font-weight:700;
  font-size:14px;color:var(--white);margin-bottom:3px;
}
.ur-role{
  font-family:Arial,'Noto Sans JP',sans-serif;font-weight:400;
  font-size:10px;color:rgba(237,235,230,.45);letter-spacing:.06em;
}
.ur-btn{
  padding:6px 14px;border-radius:99px;
  font-family:Arial,'Noto Sans JP',sans-serif;font-size:11px;font-weight:500;
  flex-shrink:0;
}
.ur-btn.follow{
  background:var(--blue);color:#fff;border:1px solid var(--blue);
}
.ur-btn.following{
  background:rgba(61,170,255,.1);color:var(--blue);border:1px solid var(--blue);
}
.ur-btn.followback{
  background:none;color:var(--white);border:1px solid rgba(255,255,255,.2);
}
.empty{
  padding:80px 20px;text-align:center;
  font-family:'IBM Plex Mono',monospace;font-size:9px;
  letter-spacing:.28em;text-transform:uppercase;
  color:rgba(237,235,230,.25);line-height:2;
}
</style>
</head>
<body>

<header class="hdr">
  <div class="hdr-top">
    <a href="javascript:history.back()" class="hdr-back">← Back</a>
    <div class="hdr-title" id="hdrTitle">NOBBY</div>
  </div>
  <nav class="tabs">
    <button class="tab active" data-tab="following">フォロー中 <span class="tab-count" id="countFollowing">0</span></button>
    <button class="tab" data-tab="followers">フォロワー <span class="tab-count" id="countFollowers">0</span></button>
  </nav>
</header>

<div class="list">
  <div class="panel active" id="panel-following"></div>
  <div class="panel" id="panel-followers"></div>
</div>

<script>
/* ─────────────────────────────────────────────
   Seed mock data if localStorage is empty
   ───────────────────────────────────────────── */
const MOCK_ACCOUNTS = [
  { id:'sachi',    name:'SACHI',    role:'Waacking · Dancer', hue:'#F4C0D1' },
  { id:'ali',      name:'ALI',      role:'House · DJ',         hue:'#E8100A' },
  { id:'dubla',    name:'DUBLA®',   role:'Fashion · Brand',    hue:'#bf5af2' },
  { id:'keita',    name:'DJ KEITA', role:'Techno · DJ',        hue:'#3DAAFF' },
  { id:'nrg',      name:'CREW NRG', role:'Breaking · Crew',    hue:'#F5C842' },
  { id:'mozyskye', name:'MOZYSKYE', role:'Art · Painter',      hue:'#00E5A0' },
  { id:'kango',    name:'KANGO',    role:'DJ',                 hue:'#3DAAFF' },
  { id:'ejoe',     name:'EJOE WILSON', role:'House · Legend',  hue:'#E8100A' },
  { id:'bungo',    name:'BUNGO',    role:'DJ',                 hue:'#A8E63D' },
  { id:'takobar',  name:'TAKOBAR',  role:'Food · Bar',         hue:'#F5C842' },
  { id:'tenju',    name:'TENJU',    role:'Dancer',             hue:'#bf5af2' },
  { id:'karim',    name:'KARIM',    role:'Dancer',             hue:'#00E5A0' },
];

function getList(key){
  try {
    const raw = localStorage.getItem(key);
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  return null;
}
function setList(key, val){
  try { localStorage.setItem(key, JSON.stringify(val)); } catch(e) {}
}

// Seed on first visit: follow first 6, followers = first 8
if (!getList('livepass_following')) {
  setList('livepass_following', MOCK_ACCOUNTS.slice(0,6).map(u => u.id));
}
if (!getList('livepass_followers')) {
  setList('livepass_followers', MOCK_ACCOUNTS.slice(0,8).map(u => u.id));
}

function findUser(id){
  return MOCK_ACCOUNTS.find(u => u.id === id) || { id, name:id, role:'Artist', hue:'#3DAAFF' };
}

/* ─────────────────────────────────────────────
   Render the two lists
   ───────────────────────────────────────────── */
function render() {
  const followingIds = getList('livepass_following') || [];
  const followerIds  = getList('livepass_followers') || [];

  document.getElementById('countFollowing').textContent = followingIds.length;
  document.getElementById('countFollowers').textContent = followerIds.length;

  // Following panel — you follow each of these, so the button says "フォロー中"
  const fl = document.getElementById('panel-following');
  fl.innerHTML = '';
  if (followingIds.length === 0) {
    fl.innerHTML = '<div class="empty">フォロー中のアカウントはまだありません</div>';
  } else {
    followingIds.forEach(id => {
      const u = findUser(id);
      fl.appendChild(buildRow(u, 'following'));
    });
  }

  // Followers panel — they follow you. Button depends on whether you follow them back
  const fr = document.getElementById('panel-followers');
  fr.innerHTML = '';
  if (followerIds.length === 0) {
    fr.innerHTML = '<div class="empty">フォロワーはまだいません</div>';
  } else {
    followerIds.forEach(id => {
      const u = findUser(id);
      const youFollowThem = followingIds.includes(id);
      fr.appendChild(buildRow(u, youFollowThem ? 'following' : 'followback'));
    });
  }
}

function buildRow(u, state) {
  const row = document.createElement('a');
  row.className = 'user-row';
  row.href = '/profile?user=' + encodeURIComponent(u.name);
  const btnClass = state; // 'following' or 'followback'
  const btnText  = state === 'following' ? 'フォロー中' : 'フォローする';
  row.innerHTML = `
    <div class="ur-av" style="--av-hue:${u.hue}">${u.name.charAt(0)}</div>
    <div class="ur-body">
      <div class="ur-name">${u.name}</div>
      <div class="ur-role">${u.role}</div>
    </div>
    <button class="ur-btn ${btnClass}" onclick="toggleFollow(event,'${u.id}')">${btnText}</button>
  `;
  return row;
}

function toggleFollow(e, id) {
  e.preventDefault();
  e.stopPropagation();
  const list = getList('livepass_following') || [];
  const idx = list.indexOf(id);
  if (idx >= 0) list.splice(idx, 1);
  else list.unshift(id);
  setList('livepass_following', list);
  if (navigator.vibrate) navigator.vibrate(8);
  render();
}

/* ─────────────────────────────────────────────
   Tab switching + initial tab from query param
   ───────────────────────────────────────────── */
const initialTab = new URLSearchParams(location.search).get('tab') || 'following';
function switchTab(tab){
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelector(`.tab[data-tab="${tab}"]`).classList.add('active');
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById('panel-' + tab).classList.add('active');
}
document.querySelectorAll('.tab').forEach(btn => {
  btn.addEventListener('click', () => switchTab(btn.dataset.tab));
});
switchTab(initialTab);

// Set header title from localStorage.livepass_account_name
try {
  const name = localStorage.getItem('livepass_account_name');
  if (name) document.getElementById('hdrTitle').textContent = name;
} catch(e) {}

render();
</script>

</body>
</html>
