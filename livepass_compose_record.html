<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#000000">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/livepass-icon-180.png">
<title>EXPASS — レコード作成</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=IBM+Plex+Mono:wght@400;500&family=Noto+Sans+JP:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --black:#000;--bg:#080808;--white:#EDEBE6;
  --red:#E8100A;--blue:#3DAAFF;--green:#A8E63D;
  --gold:#F5C842;--mint:#00E5A0;--pink:#F4C0D1;
  --muted:rgba(237,235,230,.3);--muted2:rgba(237,235,230,.14);
  --border:rgba(255,255,255,.07);
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bot:env(safe-area-inset-bottom,0px);
  --accent:var(--blue);
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;height:100dvh;background:var(--black);color:var(--white);
  font-family:Arial,'Noto Sans JP',sans-serif;-webkit-font-smoothing:antialiased;
  user-select:none;-webkit-user-select:none;overflow:hidden;max-width:100vw;position:fixed;overscroll-behavior-x:none;touch-action:pan-y;}
a{color:inherit;text-decoration:none}
button{background:none;border:none;color:inherit;font:inherit;cursor:pointer}
input,textarea{color:inherit;font:inherit}

/* Header, form, submit bar — mirrored from /compose/event for consistency. */
.hdr{position:fixed;top:0;left:0;right:0;z-index:10;
  padding:max(14px,calc(var(--safe-top) + 12px)) 18px 12px;
  display:flex;align-items:center;gap:14px;
  background:rgba(0,0,0,.96);border-bottom:0.5px solid var(--border);}
.hdr-back{background:none;border:0.5px solid rgba(255,255,255,.18);
  color:rgba(237,235,230,.65);
  font-family:Arial,'Noto Sans JP',sans-serif;font-size:10px;
  font-weight:500;letter-spacing:.08em;
  padding:7px 14px;border-radius:99px;}
.hdr-title{font-family:'IBM Plex Mono',monospace;font-size:10px;
  letter-spacing:.32em;text-transform:uppercase;
  color:rgba(237,235,230,.35);margin-left:auto;margin-right:auto;padding-right:60px;}

.form{position:fixed;top:0;left:0;right:0;bottom:calc(72px + var(--safe-bot));
  padding-top:calc(var(--safe-top) + 64px);
  overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;scrollbar-width:none;
  touch-action:pan-y;overscroll-behavior-x:none;max-width:100vw;}
.form::-webkit-scrollbar{display:none}
.form-section{padding:18px 20px 4px}
.form-label{font-family:'IBM Plex Mono',monospace;font-size:8px;
  letter-spacing:.34em;text-transform:uppercase;
  color:rgba(237,235,230,.3);margin-bottom:10px;}
.input-box{width:100%;background:rgba(255,255,255,.04);
  border:0.5px solid rgba(255,255,255,.08);
  border-radius:8px;padding:14px 16px;
  font-family:Arial,'Noto Sans JP',sans-serif;font-size:14px;
  color:var(--white);outline:none;transition:border-color .2s;}
.input-box:focus{border-color:var(--accent)}

/* Live preview — a single jacket card with the uploaded art + a small
   label chip in the centre showing the label colour and text. No extra
   copy; what you see here is the artefact. */
.preview-wrap{padding:22px 20px 4px;display:flex;justify-content:center}
.preview{position:relative;width:min(70vw,280px);aspect-ratio:1/1;
  border-radius:6px;overflow:hidden;
  background:linear-gradient(135deg,#1a1a1a,#050505);
  border:0.5px solid rgba(255,255,255,.08);
  box-shadow:0 30px 50px rgba(0,0,0,.6),0 10px 20px rgba(0,0,0,.4);}
.preview img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:block;pointer-events:none}
.preview-placeholder{
  position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  color:rgba(237,235,230,.28);font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:.28em;text-transform:uppercase;
}
.preview-label{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  width:44%;aspect-ratio:1/1;border-radius:50%;
  background:var(--label-color,#3DAAFF);
  box-shadow:0 6px 14px rgba(0,0,0,.5), inset 0 0 0 1px rgba(0,0,0,.15);
  display:flex;flex-direction:column;align-items:stretch;justify-content:space-between;
  padding:12% 6% 12%;text-align:center;
}
.preview-label .pl-top,
.preview-label .pl-bottom{
  display:flex;flex-direction:column;align-items:center;justify-content:center;line-height:1;
}
.preview-label .pl-title{
  font-family:'Inter',sans-serif;font-weight:800;font-size:11px;letter-spacing:-0.005em;
  color:rgba(0,0,0,.9);line-height:1.05;margin-bottom:3px;
  max-width:100%;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;
}
.preview-label .pl-artist{
  font-family:Arial,'Noto Sans JP',sans-serif;font-weight:600;font-size:9px;
  color:rgba(0,0,0,.7);letter-spacing:.04em;
  max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}
.preview-label .pl-labelname{
  font-family:'IBM Plex Mono',monospace;font-size:7px;letter-spacing:.28em;
  text-transform:uppercase;color:rgba(0,0,0,.55);
  max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}

/* Jacket upload — drop zone doubles as the add-image button; after upload
   it collapses into a thin "replace" chip so the preview takes centre stage. */
.jacket-drop{width:100%;
  border:1px dashed rgba(255,255,255,.16);border-radius:10px;
  background:rgba(255,255,255,.02);
  aspect-ratio:1/1;max-height:220px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;
  color:rgba(237,235,230,.4);cursor:pointer;
  transition:border-color .2s, color .2s;
}
.jacket-drop:active{border-color:var(--accent);color:var(--accent)}
.jacket-drop svg{width:28px;height:28px;stroke:currentColor;fill:none;stroke-width:1.5}
.jacket-drop span{font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:.2em;text-transform:uppercase;}
.jacket-drop.filled{
  border-style:solid;border-color:rgba(255,255,255,.08);
  background:rgba(255,255,255,.04);aspect-ratio:auto;max-height:none;
  flex-direction:row;padding:12px 16px;gap:12px;
  justify-content:flex-start;align-items:center;
  color:rgba(237,235,230,.65);
}
.jacket-drop.filled .jd-thumb{
  width:42px;height:42px;border-radius:6px;overflow:hidden;flex-shrink:0;background:#222;
}
.jacket-drop.filled .jd-thumb img{width:100%;height:100%;object-fit:cover;display:block}
.jacket-drop.filled .jd-cap{font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:rgba(237,235,230,.4)}
.jacket-drop.filled .jd-main{flex:1;font-family:Arial,'Noto Sans JP',sans-serif;font-size:13px;color:var(--white)}
.jacket-drop.filled svg{display:none}
#jacketInput{display:none}

/* Label colour — swatches row + native custom picker. */
.swatch-row{display:flex;flex-wrap:wrap;gap:10px}
.swatch{
  width:38px;height:38px;border-radius:50%;cursor:pointer;
  border:1.5px solid rgba(255,255,255,.12);
  position:relative;
}
.swatch.active::after{
  content:"";position:absolute;inset:-5px;border-radius:50%;
  border:1.5px solid var(--accent);
}
.swatch.custom{
  background:conic-gradient(from 0deg,red,yellow,lime,cyan,blue,magenta,red);
  display:flex;align-items:center;justify-content:center;overflow:hidden;
}
.swatch.custom input{opacity:0;width:100%;height:100%;display:block;cursor:pointer}

/* Toast */
#toast{position:fixed;top:max(20px,calc(var(--safe-top) + 20px));left:50%;
  transform:translate(-50%,-30px);z-index:20;
  background:rgba(61,170,255,.15);border:0.5px solid var(--accent);
  color:var(--accent);padding:10px 20px;border-radius:99px;
  font-family:Arial,'Noto Sans JP',sans-serif;font-weight:700;
  font-size:11px;letter-spacing:.12em;
  opacity:0;transition:opacity .3s, transform .3s;pointer-events:none;}
#toast.show{opacity:1;transform:translate(-50%,0)}

.form-bottom-padding{height:40px}

/* Submit bar */
.submit-bar{position:fixed;left:0;right:0;bottom:0;z-index:10;
  padding:14px 18px calc(14px + var(--safe-bot));
  background:rgba(0,0,0,.96);border-top:0.5px solid var(--border);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  display:flex;gap:10px;}
.submit-btn{flex:1;padding:16px;
  background:var(--accent);color:#fff;
  font-family:Arial,'Noto Sans JP',sans-serif;font-weight:900;
  font-size:12px;letter-spacing:.2em;text-transform:uppercase;
  border-radius:99px;box-shadow:0 6px 24px rgba(61,170,255,.25);}
.submit-btn:disabled{background:rgba(237,235,230,.08);color:rgba(237,235,230,.25);box-shadow:none}
.draft-btn{flex:0 0 auto;padding:0 20px;border-radius:99px;
  background:rgba(255,255,255,.05);border:0.5px solid rgba(255,255,255,.1);
  color:rgba(237,235,230,.8);
  font-family:Arial,'Noto Sans JP',sans-serif;font-weight:700;
  font-size:11px;letter-spacing:.16em;text-transform:uppercase;}
</style>
</head>
<body>

<header class="hdr">
  <button class="hdr-back" onclick="history.length>1?history.back():location.href='/atelier/record'">← 戻る</button>
  <div class="hdr-title">Record · Compose</div>
</header>

<main class="form" id="form">

  <!-- Preview -->
  <div class="preview-wrap">
    <div class="preview" id="preview">
      <div class="preview-placeholder" id="previewPlaceholder">Upload jacket</div>
      <img id="previewImg" alt="" style="display:none">
      <div class="preview-label" id="previewLabel" style="--label-color:#3DAAFF">
        <div class="pl-top">
          <span class="pl-title" id="plTitle">Title</span>
          <span class="pl-artist" id="plArtist">Artist</span>
        </div>
        <div class="pl-bottom">
          <span class="pl-labelname" id="plLabelName">Label</span>
        </div>
      </div>
    </div>
  </div>

  <!-- Jacket upload -->
  <section class="form-section">
    <div class="form-label">Jacket</div>
    <label for="jacketInput" class="jacket-drop" id="jacketDrop">
      <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="9" cy="9" r="2"/><path d="M21 15l-5-5L5 21"/></svg>
      <span>Tap to upload</span>
    </label>
    <input type="file" id="jacketInput" accept="image/*">
  </section>

  <!-- Title -->
  <section class="form-section">
    <div class="form-label">Title</div>
    <input class="input-box" id="titleInput" type="text" placeholder="Midnight Ether" maxlength="60" autocomplete="off">
  </section>

  <!-- Artist -->
  <section class="form-section">
    <div class="form-label">Artist</div>
    <input class="input-box" id="artistInput" type="text" placeholder="RIO KAGURA" maxlength="40" autocomplete="off">
  </section>

  <!-- Label name -->
  <section class="form-section">
    <div class="form-label">Label Name</div>
    <input class="input-box" id="labelNameInput" type="text" placeholder="LUMEN RECORDS" maxlength="32" autocomplete="off">
  </section>

  <!-- Label color -->
  <section class="form-section">
    <div class="form-label">Label Color</div>
    <div class="swatch-row" id="swatchRow">
      <span class="swatch active" data-color="#3DAAFF" style="background:#3DAAFF"></span>
      <span class="swatch" data-color="#F5C842" style="background:#F5C842"></span>
      <span class="swatch" data-color="#E8100A" style="background:#E8100A"></span>
      <span class="swatch" data-color="#00E5A0" style="background:#00E5A0"></span>
      <span class="swatch" data-color="#F4C0D1" style="background:#F4C0D1"></span>
      <span class="swatch" data-color="#0A0A0A" style="background:#0A0A0A"></span>
      <span class="swatch" data-color="#FFF3C2" style="background:#FFF3C2"></span>
      <label class="swatch custom"><input type="color" id="customColor" value="#A8E63D"></label>
    </div>
  </section>

  <div class="form-bottom-padding"></div>
</main>

<div class="submit-bar">
  <button class="draft-btn" id="draftBtn">保存</button>
  <button class="submit-btn" id="submitBtn">SCREEN に転送</button>
</div>

<input type="file" id="jacketInputProxy" accept="image/*" style="display:none">
<div id="toast">保存しました</div>

<script>
// ── State ──────────────────────────────────────────────
const state = {
  id:          'rec_' + Date.now(),
  jacketSrc:   null,
  title:       '',
  artist:      '',
  labelName:   '',
  labelColor:  '#3DAAFF',
  createdAt:   Date.now(),
};

// Restore draft from localStorage (if any).
try {
  const draft = JSON.parse(localStorage.getItem('livepass_record_draft') || 'null');
  if (draft) Object.assign(state, draft);
} catch(e){}

// ── DOM refs ───────────────────────────────────────────
const form             = document.getElementById('form');
const previewImg       = document.getElementById('previewImg');
const previewPh        = document.getElementById('previewPlaceholder');
const previewLabel     = document.getElementById('previewLabel');
const plArtist         = document.getElementById('plArtist');
const plTitle          = document.getElementById('plTitle');
const jacketDrop       = document.getElementById('jacketDrop');
const jacketInput      = document.getElementById('jacketInput');
const titleInput       = document.getElementById('titleInput');
const artistInput      = document.getElementById('artistInput');
const labelNameInput   = document.getElementById('labelNameInput');
const plLabelName      = document.getElementById('plLabelName');
const swatchRow        = document.getElementById('swatchRow');
const customColor      = document.getElementById('customColor');
const draftBtn         = document.getElementById('draftBtn');
const submitBtn        = document.getElementById('submitBtn');
const toast            = document.getElementById('toast');

// ── Render preview + form from state ───────────────────
function renderPreview(){
  if (state.jacketSrc) {
    previewImg.src = state.jacketSrc;
    previewImg.style.display = 'block';
    previewPh.style.display = 'none';
  } else {
    previewImg.removeAttribute('src');
    previewImg.style.display = 'none';
    previewPh.style.display = 'flex';
  }
  plArtist.textContent    = state.artist    || 'Artist';
  plTitle.textContent     = state.title     || 'Title';
  plLabelName.textContent = state.labelName || 'Label';
  previewLabel.style.setProperty('--label-color', state.labelColor);
}
function renderInputs(){
  titleInput.value     = state.title;
  artistInput.value    = state.artist;
  labelNameInput.value = state.labelName;
  document.querySelectorAll('.swatch[data-color]').forEach(s => {
    s.classList.toggle('active', s.dataset.color.toLowerCase() === state.labelColor.toLowerCase());
  });
  if (state.jacketSrc) {
    // Flip the drop zone into its compact "filled" state so the preview can breathe.
    jacketDrop.classList.add('filled');
    jacketDrop.innerHTML = `
      <div class="jd-thumb"><img src="${state.jacketSrc}" alt=""></div>
      <div class="jd-main">画像設定済み</div>
      <div class="jd-cap">Replace</div>
    `;
  }
}

// ── Persist draft ──────────────────────────────────────
function saveDraft(){
  try { localStorage.setItem('livepass_record_draft', JSON.stringify(state)); } catch(e){}
}
function showToast(msg){
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 1800);
}

// ── Jacket upload ──────────────────────────────────────
jacketInput.addEventListener('change', e => {
  const file = e.target.files && e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    state.jacketSrc = ev.target.result;
    renderPreview(); renderInputs(); saveDraft();
  };
  reader.readAsDataURL(file);
});

// ── Text inputs ────────────────────────────────────────
titleInput.addEventListener('input',     () => { state.title     = titleInput.value.trim();     renderPreview(); saveDraft(); });
artistInput.addEventListener('input',    () => { state.artist    = artistInput.value.trim();    renderPreview(); saveDraft(); });
labelNameInput.addEventListener('input', () => { state.labelName = labelNameInput.value.trim(); renderPreview(); saveDraft(); });

// ── Label color ────────────────────────────────────────
swatchRow.addEventListener('click', e => {
  const sw = e.target.closest('.swatch[data-color]');
  if (!sw) return;
  state.labelColor = sw.dataset.color;
  renderPreview(); renderInputs(); saveDraft();
});
customColor.addEventListener('input', () => {
  state.labelColor = customColor.value;
  document.querySelectorAll('.swatch[data-color]').forEach(x => x.classList.remove('active'));
  renderPreview(); saveDraft();
});

// ── Save draft button ──────────────────────────────────
draftBtn.addEventListener('click', () => {
  saveDraft();
  showToast('下書きを保存しました');
});

// ── Submit — push to the published-records list and stub SCREEN transfer ──
submitBtn.addEventListener('click', () => {
  if (!state.jacketSrc || !state.title.trim() || !state.artist.trim()) {
    showToast('ジャケ・タイトル・アーティスト必須');
    return;
  }
  const list = (() => {
    try { return JSON.parse(localStorage.getItem('livepass_records') || '[]'); }
    catch(e){ return []; }
  })();
  const record = {
    id: state.id,
    jacketSrc: state.jacketSrc,
    title: state.title,
    artist: state.artist,
    labelName: state.labelName,
    labelColor: state.labelColor,
    createdAt: Date.now(),
  };
  // Replace if an entry with the same id exists (for re-saves).
  const i = list.findIndex(r => r.id === record.id);
  if (i >= 0) list[i] = record; else list.unshift(record);
  try { localStorage.setItem('livepass_records', JSON.stringify(list.slice(0, 40))); } catch(e){}

  // ── Also push to livepass_articles so SCREEN renders it alongside other
  //    user posts. The shape mirrors compose_article.html so the existing
  //    SCREEN feed card + detail modal pick it up without extra wiring.
  try {
    const me  = localStorage.getItem('livepass_account_name') || '';
    const uid = localStorage.getItem('livepass_uid') || null;
    const art = {
      id:         state.id,
      type:       'record',
      layout:     'square',
      category:   state.labelName ? state.labelName : 'Record',
      cover:      state.jacketSrc,
      mediaType:  'image',
      title:      state.title,
      body:       '',
      tags:       state.labelName ? [state.labelName] : [],
      author:     state.artist || me || '',
      authorUid:  uid,
      bgColor:    state.labelColor || null,
      createdAt:  new Date().toISOString(),
      recordArtist:    state.artist,
      recordLabelName: state.labelName,
      recordLabelColor:state.labelColor,
    };
    const arts = JSON.parse(localStorage.getItem('livepass_articles') || '[]');
    const j = arts.findIndex(a => a.id === art.id);
    if (j >= 0) arts[j] = art; else arts.unshift(art);
    localStorage.setItem('livepass_articles', JSON.stringify(arts));
  } catch(e) { console.warn('SCREEN push failed:', e); }

  // Clear the draft so reopening the page starts fresh.
  try { localStorage.removeItem('livepass_record_draft'); } catch(e){}
  showToast('SCREEN に投稿しました');
  if (navigator.vibrate) navigator.vibrate([8, 40, 12]);
  setTimeout(() => { location.href = '/screen'; }, 900);
});

// ── Init ───────────────────────────────────────────────
renderPreview();
renderInputs();
</script>

</body>
</html>
