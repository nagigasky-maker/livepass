<style>
:root{
  --black:#000;--bg:#080808;--white:#EDEBE6;
  --red:#E8100A;--blue:#3DAAFF;--green:#A8E63D;
  --gold:#F5C842;--mint:#00E5A0;--pink:#F4C0D1;
  --muted:rgba(237,235,230,.3);--muted2:rgba(237,235,230,.14);
  --border:rgba(255,255,255,.07);
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bot:env(safe-area-inset-bottom,0px);
  --nav-h:36px;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;max-width:100vw;height:100%;height:100dvh;
  background:var(--black);color:var(--white);
  font-family:'Noto Sans JP','Inter',sans-serif;-webkit-font-smoothing:antialiased;
  user-select:none;-webkit-user-select:none;overflow:hidden;
  position:fixed;overscroll-behavior-x:none;touch-action:pan-y;}
a{color:inherit;text-decoration:none}
button{background:none;border:none;color:inherit;font:inherit;cursor:pointer}

.topbar{position:fixed;top:0;left:0;right:0;z-index:100;
  padding:max(44px,calc(var(--safe-top) + 14px)) 18px 12px;
  display:flex;align-items:center;gap:14px;
  background:linear-gradient(to bottom,rgba(0,0,0,.95) 70%,transparent);}
.tb-brand{display:flex;align-items:center;margin-right:auto;height:22px;flex-shrink:0}
.tb-brand img{height:100%;width:auto;display:block;image-rendering:-webkit-optimize-contrast}
.tb-icon{background:none;border:none;cursor:pointer;position:relative;
  width:26px;height:26px;display:flex;align-items:center;justify-content:center;color:var(--white);}
.tb-icon svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.8}
.tb-icon .badge{position:absolute;top:-4px;right:-6px;background:var(--red);color:#fff;
  font-size:8px;font-weight:700;min-width:14px;height:14px;padding:0 3px;border-radius:99px;
  display:flex;align-items:center;justify-content:center;font-family:'Inter',sans-serif;}
.tb-stat{display:flex;flex-direction:column;align-items:center;line-height:1;gap:2px;color:var(--blue);}
.tb-stat-n{font-family:Arial,'Noto Sans JP',sans-serif;font-size:16px;color:var(--white);letter-spacing:.04em}
.tb-stat-l{font-size:7px;color:var(--blue);letter-spacing:.08em;font-weight:500}

.content{position:fixed;top:0;left:0;right:0;bottom:calc(var(--nav-h) + var(--safe-bot));
  padding-top:max(94px,calc(var(--safe-top) + 62px));
  overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;scrollbar-width:none;
  touch-action:pan-y;overscroll-behavior-x:none;max-width:100vw;}
.content::-webkit-scrollbar{display:none}

.bottomnav{position:fixed;bottom:0;left:0;right:0;z-index:100;
  height:calc(var(--nav-h) + var(--safe-bot));padding:0 0 calc(var(--safe-bot) * .4);
  display:flex;align-items:center;justify-content:space-around;
  background:rgba(0,0,0,.96);border-top:0.5px solid var(--border);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);}
.bn-btn{flex:1;height:100%;display:flex;align-items:center;justify-content:center;
  color:rgba(237,235,230,.35);text-decoration:none;position:relative;}
.bn-btn svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.8}
.bn-btn.active{color:var(--white)}
.bn-avatar{width:26px;height:26px;border-radius:50%;
  background:linear-gradient(135deg,#1a2030,#0a1020);
  border:1.5px solid rgba(237,235,230,.25);
  overflow:hidden;display:flex;align-items:center;justify-content:center;}
.bn-btn.active .bn-avatar{border-color:var(--white)}

/* Settings header */
.settings-header{
  display:flex;align-items:center;justify-content:space-between;gap:16px;
  padding:16px 20px 20px;
}
.sh-left{display:flex;align-items:baseline;gap:18px}
.sh-label{
  font-family:'IBM Plex Mono',monospace;font-size:8px;letter-spacing:.32em;
  text-transform:uppercase;color:rgba(237,235,230,.22);
}
.sh-title{
  font-family:Arial,'Noto Sans JP',sans-serif;font-weight:300;font-style:italic;
  font-size:22px;color:var(--white);letter-spacing:.02em;
}
.sh-tabicons{display:flex;gap:14px;align-items:center;margin-left:auto}
.sh-ticon{color:rgba(237,235,230,.2);padding:4px}
.sh-ticon svg{width:22px;height:22px;fill:currentColor}
.sh-back{
  font-family:Arial,'Noto Sans JP',sans-serif;font-size:10px;font-weight:400;
  color:rgba(237,235,230,.55);
  padding:6px 14px;border:0.5px solid rgba(237,235,230,.15);
  border-radius:99px;letter-spacing:.02em;
}

/* Section headers */
.sec-label{
  font-family:'IBM Plex Mono',monospace;
  font-size:8px;letter-spacing:.34em;
  text-transform:uppercase;color:rgba(237,235,230,.22);
  padding:22px 20px 12px;
}

/* ACCOUNT TYPE — 3 plan cards */
.plans{
  display:grid;grid-template-columns:repeat(3,1fr);gap:12px;
  padding:0 20px 36px;
}
.plan{
  position:relative;aspect-ratio:0.86;
  border-radius:10px;overflow:hidden;background:#0a0a0a;
  border:0.5px solid rgba(255,255,255,.08);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:8px;padding:14px 8px;cursor:pointer;
}
.plan.active{
  background:linear-gradient(180deg,#111 0%,#000 100%);
  border:1.5px solid var(--gold);
  box-shadow:0 0 0 0.5px rgba(245,200,66,.25),
             0 6px 22px rgba(245,200,66,.08);
}
.plan.locked{opacity:.65}
.plan-icon{
  width:44px;height:44px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;color:var(--mint);
}
.plan.active .plan-icon{color:var(--gold)}
.plan.locked .plan-icon{color:var(--gold)}
.plan-icon svg{width:30px;height:30px;stroke:currentColor;fill:none;stroke-width:1.8}
.plan-pill{
  font-family:Arial,'Noto Sans JP',sans-serif;font-weight:900;
  font-size:9px;letter-spacing:.18em;
  padding:3px 10px;border-radius:99px;text-transform:uppercase;
  background:rgba(237,235,230,.08);color:rgba(237,235,230,.5);
}
.plan.active .plan-pill{background:var(--gold);color:#000}
.plan.locked .plan-pill{background:rgba(245,200,66,.18);color:var(--gold)}
.plan-price{
  position:absolute;bottom:-26px;left:0;right:0;text-align:center;
  font-family:Arial,'Noto Sans JP',sans-serif;font-weight:400;
  font-size:11px;letter-spacing:.08em;color:rgba(237,235,230,.7);
}
.plan-price strong{font-weight:900;color:var(--white)}

/* Profile row */
.profile-row{
  display:flex;align-items:center;gap:14px;
  padding:10px 20px 20px;
  border-bottom:0.5px solid var(--border);
}
.pr-avatar{
  width:56px;height:56px;border-radius:50%;
  background:linear-gradient(135deg,#1a2030,#0a1020);
  border:1.5px solid rgba(237,235,230,.15);
  overflow:hidden;position:relative;flex-shrink:0;
}
.pr-avatar img{width:100%;height:100%;object-fit:cover}
.pr-info{flex:1;min-width:0}
.pr-line1{display:flex;align-items:baseline;gap:12px;flex-wrap:wrap}
.pr-name{
  font-family:Arial,'Noto Sans JP',sans-serif;font-weight:900;
  font-size:22px;letter-spacing:.02em;color:var(--blue);line-height:1;
}
.pr-role{
  font-family:Arial,'Noto Sans JP',sans-serif;font-weight:500;
  font-size:10px;letter-spacing:.22em;
  color:var(--blue);text-transform:uppercase;
}
.pr-sub{
  font-family:Arial,'Noto Sans JP',sans-serif;font-weight:400;
  font-size:9px;letter-spacing:.22em;
  color:rgba(237,235,230,.4);text-transform:uppercase;margin-top:6px;
}
.pr-badge{
  font-family:Arial,'Noto Sans JP',sans-serif;font-weight:900;
  font-size:10px;letter-spacing:.18em;
  padding:5px 14px;border-radius:99px;
  background:var(--gold);color:#000;flex-shrink:0;
}

/* ACCOUNT field list */
.field-row{
  display:flex;align-items:center;gap:14px;
  padding:18px 20px;
  border-bottom:0.5px solid rgba(255,255,255,.04);
  cursor:pointer;
}
.field-icon{
  width:28px;height:28px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
}
.field-icon svg{width:24px;height:24px;stroke:currentColor;fill:none;stroke-width:1.8}
.field-icon.teal{color:var(--mint)}
.field-icon.red{color:var(--red)}
.field-icon.gold{color:var(--gold)}
.field-body{flex:1;min-width:0;line-height:1.3}
.field-label{
  font-family:Arial,'Noto Sans JP',sans-serif;font-weight:500;
  font-size:13px;color:var(--white);
}
.field-value{
  font-family:Arial,'Noto Sans JP',sans-serif;font-weight:400;
  font-size:10px;color:rgba(237,235,230,.4);margin-top:3px;letter-spacing:.02em;
}
.field-chevron{color:rgba(237,235,230,.25);font-size:16px}

/* Photo upload row */
.photo-row{
  display:flex;align-items:center;gap:14px;
  padding:18px 20px;
  border-bottom:0.5px solid rgba(255,255,255,.04);
}
.photo-row .pr-av{
  width:44px;height:44px;border-radius:50%;overflow:hidden;flex-shrink:0;
  background:linear-gradient(135deg,#1a2030,#0a1020);
  border:1.5px solid rgba(237,235,230,.15);
}
.photo-row .pr-av img{width:100%;height:100%;object-fit:cover}
.photo-row .pr-label{
  flex:1;font-family:Arial,'Noto Sans JP',sans-serif;
  font-weight:500;font-size:13px;color:var(--white);
}
.photo-row label.upload{
  font-family:Arial,'Noto Sans JP',sans-serif;font-weight:500;
  font-size:11px;letter-spacing:.02em;color:var(--blue);cursor:pointer;
  padding:6px 14px;border:0.5px solid var(--blue);border-radius:99px;
}
.photo-row input{display:none}

/* Compose selector bottom sheet (shared) */
#composeSheetOverlay{position:fixed;inset:0;z-index:1100;background:rgba(0,0,0,0);pointer-events:none;opacity:0;transition:background .3s ease, opacity .2s ease}
#composeSheetOverlay.active{background:rgba(0,0,0,.7);pointer-events:all;opacity:1;backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px)}
#composeSheet{position:fixed;left:0;right:0;bottom:0;z-index:1101;background:#0a0a0a;border-top:0.5px solid var(--border);border-top-left-radius:20px;border-top-right-radius:20px;padding:20px 20px calc(24px + var(--safe-bot));transform:translateY(100%);transition:transform .35s cubic-bezier(.2,.8,.2,1);box-shadow:0 -12px 40px rgba(0,0,0,.7)}
#composeSheetOverlay.active #composeSheet{transform:translateY(0)}
.cs-handle{width:40px;height:4px;border-radius:99px;background:rgba(237,235,230,.2);margin:0 auto 20px}
.cs-title{font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:.34em;text-transform:uppercase;color:rgba(237,235,230,.35);text-align:center;margin-bottom:18px}
.cs-options{display:flex;flex-direction:column;gap:10px}
.cs-opt{display:flex;align-items:center;gap:16px;padding:18px 18px;width:100%;background:rgba(255,255,255,.03);border:0.5px solid rgba(237,235,230,.08);border-radius:14px;color:var(--white);transition:background .2s}
.cs-opt:active{background:rgba(255,255,255,.06)}
.cs-opt svg{width:26px;height:26px;stroke:currentColor;fill:none;stroke-width:1.8;flex-shrink:0}
.cs-opt-body{flex:1;text-align:left}
.cs-opt-title{font-family:Arial,'Noto Sans JP',sans-serif;font-weight:700;font-size:15px;color:var(--white);margin-bottom:2px}
.cs-opt-sub{font-family:Arial,'Noto Sans JP',sans-serif;font-weight:400;font-size:10px;letter-spacing:.04em;color:rgba(237,235,230,.4)}
.cs-opt.article{border-left:3px solid var(--green)}
.cs-opt.event{border-left:3px solid var(--red)}
.cs-opt.workshop{border-left:3px solid var(--gold)}
.cs-opt.exhibition{border-left:3px solid var(--mint)}
.cs-opt.article svg{color:var(--green)}
.cs-opt.event svg{color:var(--red)}
.cs-opt.workshop svg{color:var(--gold)}
.cs-opt.exhibition svg{color:var(--mint)}
.cs-close{display:block;width:100%;padding:14px;background:none;border:0.5px solid rgba(237,235,230,.12);border-radius:99px;margin-top:16px;font-family:Arial,'Noto Sans JP',sans-serif;font-size:11px;font-weight:500;letter-spacing:.04em;color:rgba(237,235,230,.5)}
</style>

<script>
/* AUTH GUARD — first visit redirect to /onboarding if no account exists */

    if (!localStorage.getItem('livepass_account_name')) {
      location.replace('/onboarding');

</script>
<script>
/* PWA NAV FIX v66 — form-submission technique for iOS PWA standalone.
   Link clicks in iOS PWAs can break out of standalone mode; form
   submissions are handled differently by iOS and stay in-app. */
(function(){
  function isStandalone(){
    return (window.navigator.standalone === true) ||
           window.matchMedia('(display-mode: standalone)').matches ||
           window.matchMedia('(display-mode: fullscreen)').matches;
  }
  if (!isStandalone()) return;
  // Also add a body class so CSS can adjust for standalone mode
  document.documentElement.classList.add('is-pwa');
  document.addEventListener('click', function(e){
    var a = e.target.closest && e.target.closest('a');
    if (!a) return;
    var href = a.getAttribute('href');
    if (!href) return;
    if (a.target && a.target !== '_self') return;
    if (href.charAt(0) === '#') return;
    if (/^(mailto|tel|sms):/i.test(href)) return;
    // External origin?
    try {
      var u = new URL(a.href, location.href);
      if (u.host !== location.host) return;
    } catch(err) { return; }
    e.preventDefault();
    e.stopPropagation();
    // Use form submission — iOS PWA treats this as in-app navigation
    try {
      var form = document.createElement('form');
      form.method = 'GET';
      form.action = a.href;
      form.style.display = 'none';
      document.body.appendChild(form);
      form.submit();
    } catch(err) {
      window.location.href = a.href;
    }
  }, true);
})();
</script>

<script>
/* ─────────────────────────────────────────────
   AVATAR UPLOAD → localStorage
   All pages read livepass_avatar on load and
   show the latest stored photo in their avatar slots.
   ───────────────────────────────────────────── */
const AVATAR_KEY = 'livepass_avatar';

function renderAvatar(dataUrl){
  const preview = document.getElementById('photoPreview');
  const srAv = document.getElementById('srAvatar');
  if (dataUrl) {
    preview.innerHTML = `<img src="${dataUrl}" alt="avatar">`;
    srAv.innerHTML = `<img src="${dataUrl}" alt="avatar">`;
  } else {
    preview.innerHTML = `<svg viewBox="0 0 44 44" style="width:100%;height:100%;opacity:.3"><circle cx="22" cy="17" r="8" fill="#3DAAFF"/><path d="M6 38c0-8 7-14 16-14s16 6 16 14" fill="#3DAAFF"/></svg>`;
    srAv.innerHTML = preview.innerHTML;
  }
}

// Load existing avatar on page load
try {
  const stored = localStorage.getItem(AVATAR_KEY);
  renderAvatar(stored);
} catch(e) { renderAvatar(null); }

// Handle file upload
document.getElementById('avatarUpload').addEventListener('change', (e) => {
  const file = e.target.files && e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    const dataUrl = ev.target.result;
    try { localStorage.setItem(AVATAR_KEY, dataUrl); } catch(err) {
      alert('画像が大きすぎます。2MB以下にしてください。');
      return;
    }
    renderAvatar(dataUrl);
    if (navigator.vibrate) navigator.vibrate(12);
  };
  reader.readAsDataURL(file);
});

/* Plan selection — writes to localStorage so profile can react */
const PLAN_KEY = 'livepass_plan';
// Initial sync from storage (if stored)
try {
  const stored = (localStorage.getItem(PLAN_KEY) || 'free').toLowerCase();
  document.querySelectorAll('.plan').forEach(x => x.classList.remove('active'));
  const match = document.querySelector(`.plan[data-plan="${stored}"]`);
  if (match && !match.classList.contains('locked')) match.classList.add('active');
} catch(e) {}
document.querySelectorAll('.plan').forEach(p => {
  p.addEventListener('click', () => {
    if (p.classList.contains('locked')) return;
    document.querySelectorAll('.plan').forEach(x => x.classList.remove('active'));
    p.classList.add('active');
    try { localStorage.setItem(PLAN_KEY, p.dataset.plan); } catch(e) {}
  });
});

/* Sync profile row from localStorage */
(function syncProfileRow(){
  try {
    const n = localStorage.getItem('livepass_account_name') || '';
    const r = localStorage.getItem('livepass_role') || localStorage.getItem('livepass_style') || '';
    const p = (localStorage.getItem('livepass_plan') || 'FREE').toUpperCase();
    document.getElementById('srName').textContent = n;
    const roleEl = document.getElementById('srRole');
    if (roleEl) roleEl.textContent = r;
    const subEl = document.getElementById('srPlanSub');
    if (subEl) subEl.textContent = p + (r ? ' / ' + r.toUpperCase() : '');
    const badge = document.getElementById('srBadge');
    if (badge) badge.textContent = p;
    // Also fill input fields
    const nameInput = document.getElementById('srNameInput');
    if (nameInput && n) nameInput.value = n;
    const roleInput = document.getElementById('srRoleInput');
    if (roleInput && r) roleInput.value = r;
  } catch(e){}
})();

/* Email / Phone / Password — save to Firebase + localStorage */
(function initAccountFields(){
  const emailInput = document.getElementById('srEmailInput');
  const phoneInput = document.getElementById('srPhoneInput');
  const passInput = document.getElementById('srPassInput');
  // Load existing values
  emailInput.value = localStorage.getItem('livepass_email') || localStorage.getItem('livepass_temp_email') || '';
  phoneInput.value = localStorage.getItem('livepass_phone') || '';
  // Save on blur
  emailInput.addEventListener('change', async () => {
    const v = emailInput.value.trim();
    if (!v) return;
    localStorage.setItem('livepass_email', v);
    // Update Firebase Auth email if available
    try {
      if (window.FB && window.FB.currentUser) {
        const { updateEmail } = await import('https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js');
        await updateEmail(window.FB.currentUser, v);
      }
    } catch(e) { console.warn('Email update:', e.message); }
  });
  phoneInput.addEventListener('change', () => {
    localStorage.setItem('livepass_phone', phoneInput.value.trim());
    // Save to Firestore
    try {
      if (window.FB && window.FB.currentUser) {
        const uid = window.FB.currentUser.uid;
        window.FB.updateDoc(window.FB.doc(window.FB.db, 'users', uid), { phone: phoneInput.value.trim() });
      }
    } catch(e) {}
  });
  passInput.addEventListener('change', async () => {
    const v = passInput.value.trim();
    if (!v || v.length < 6) { alert('パスワードは6文字以上にしてください'); return; }
    try {
      if (window.FB && window.FB.currentUser) {
        const { updatePassword } = await import('https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js');
        await updatePassword(window.FB.currentUser, v);
        passInput.value = '';
        alert('パスワードを変更しました');
      }
    } catch(e) { alert('パスワード変更に失敗: ' + e.message); }
  });
})();

/* Top bar counters + unread badge */
(function syncCounters(){
  try {
    const f1 = JSON.parse(localStorage.getItem('livepass_following') || '[]').length;
    const f2 = JSON.parse(localStorage.getItem('livepass_followers') || '[]').length;
    document.querySelectorAll('[data-count="following"]').forEach(el => el.textContent = f1 || '0');
    document.querySelectorAll('[data-count="followers"]').forEach(el => el.textContent = f2 || '0');
    const unread = parseInt(localStorage.getItem('livepass_unread_count') || '3', 10);
    const badge = document.getElementById('msgBadge');
    if (badge) {
      if (unread > 0) { badge.textContent = unread > 99 ? '99+' : String(unread); badge.style.display = ''; }
      else { badge.style.display = 'none'; }
    }
  } catch(e) {}
})();

/* Role (スタイル) + アカウント名 — store to localStorage, pick up on profile + compose */
const ROLE_KEY = 'livepass_role';
const NAME_KEY = 'livepass_account_name';
const roleInput = document.getElementById('srRoleInput');
const nameInput = document.getElementById('srNameInput');
try {
  const storedRole = localStorage.getItem(ROLE_KEY);
  if (storedRole) roleInput.value = storedRole;
  const storedName = localStorage.getItem(NAME_KEY);
  if (storedName) {
    nameInput.value = storedName;
    document.getElementById('srName').textContent = storedName;
  }
} catch(e) {}
roleInput.addEventListener('input', () => {
  try {
    localStorage.setItem(ROLE_KEY, roleInput.value);
    // Sync to Firestore
    if (window.FB && window.FB.currentUser) {
      window.FB.updateDoc(window.FB.doc(window.FB.db, 'users', window.FB.currentUser.uid), { role: roleInput.value });
    }
  } catch(e) {}
});
nameInput.addEventListener('input', () => {
  try {
    localStorage.setItem(NAME_KEY, nameInput.value);
    document.getElementById('srName').textContent = nameInput.value || '';
    // Sync to Firestore
    if (window.FB && window.FB.currentUser) {
      window.FB.updateDoc(window.FB.doc(window.FB.db, 'users', window.FB.currentUser.uid), { name: nameInput.value });
    }
  } catch(e) {}
});

/* Compose selector bottom sheet */
(function initComposeSheet(){
  const btn=document.getElementById('tbCreate'),ov=document.getElementById('composeSheetOverlay'),cb=document.getElementById('csClose');
  if(!btn||!ov)return;
  const open=()=>{ov.classList.add('active');ov.setAttribute('aria-hidden','false');if(navigator.vibrate)navigator.vibrate(8)};
  const dismiss=()=>{ov.classList.remove('active');ov.setAttribute('aria-hidden','true')};
  btn.addEventListener('click',open);cb.addEventListener('click',dismiss);
  ov.addEventListener('click',e=>{if(e.target===ov)dismiss()});
  document.querySelectorAll('.cs-opt').forEach(o=>o.addEventListener('click',()=>{
    const t=o.dataset.type;if(navigator.vibrate)navigator.vibrate(12);
    location.href='/compose/'+t;
  }));
  window.addEventListener('keydown',e=>{if(e.key==='Escape'&&ov.classList.contains('active'))dismiss()});
})();

/* ─────────────────────────────────────────────
   SIGN OUT — signs out of Firebase Auth AND clears local identity.
   Next visit routes through /login (where user can sign in or go to
   /onboarding for signup). Posts, likes, saves, reservations are
   intentionally preserved in localStorage.
   ───────────────────────────────────────────── */
document.getElementById('signOutBtn')?.addEventListener('click', async () => {
  const name = localStorage.getItem('livepass_account_name') || '';
  if (!confirm(`${name ? name + ' として ' : ''}サインアウトしますか？\n\n次回アクセス時はログイン画面に戻ります。投稿や保存済みは残ります。`)) return;
  try {
    // Sign out of Firebase first so the token is revoked.
    if (window.FB && window.FB.auth) {
      await window.FB.signOut(window.FB.auth);
    }
  } catch(e) { console.warn('FB signOut error:', e); }
  try {
    // Identity-only keys are cleared; content keys (articles/events/saves/
    // likes/reservations/...) stay so the browser remembers everything
    // when a new or returning account signs in.
    localStorage.removeItem('livepass_account_name');
    localStorage.removeItem('livepass_account_name_ja');
    localStorage.removeItem('livepass_account_name_en');
    localStorage.removeItem('livepass_role');
    localStorage.removeItem('livepass_kind');
    localStorage.removeItem('livepass_style');
    localStorage.removeItem('livepass_goals');
    localStorage.removeItem('livepass_avatar');
    localStorage.removeItem('livepass_signed_in');
    localStorage.removeItem('livepass_uid');
    localStorage.removeItem('livepass_plan');
  } catch(e) {}
  if (navigator.vibrate) navigator.vibrate([18, 40, 18]);
  location.replace('/login');
});
</script>
