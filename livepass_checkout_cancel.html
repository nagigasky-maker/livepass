<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#000000">
<title>LIVE PASS — キャンセル</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=IBM+Plex+Mono:wght@400;500&family=Noto+Sans+JP:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --black:#000;--white:#EDEBE6;
  --red:#E8100A;--blue:#3DAAFF;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bot:env(safe-area-inset-bottom,0px);
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;height:100dvh;background:var(--black);color:var(--white);
  font-family:Arial,'Noto Sans JP',sans-serif;-webkit-font-smoothing:antialiased;
  user-select:none;-webkit-user-select:none;overflow:hidden;}

.wrap{
  position:fixed;inset:0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:40px 24px;text-align:center;
}
.label{
  font-family:'IBM Plex Mono',monospace;font-size:9px;
  letter-spacing:.4em;text-transform:uppercase;
  color:rgba(237,235,230,.4);margin-bottom:18px;
}
.title{
  font-family:Arial,'Noto Sans JP',sans-serif;font-weight:900;
  font-size:28px;letter-spacing:.02em;color:var(--white);
  line-height:1.2;margin-bottom:14px;
}
.subtitle{
  font-family:Arial,'Noto Sans JP',sans-serif;font-weight:400;
  font-size:12px;color:rgba(237,235,230,.55);
  line-height:1.8;max-width:300px;margin-bottom:36px;
}
.btn{
  display:inline-block;padding:14px 30px;
  background:none;border:0.5px solid var(--blue);
  color:var(--blue);
  font-family:Arial,'Noto Sans JP',sans-serif;font-weight:700;
  font-size:12px;letter-spacing:.12em;
  border-radius:99px;text-decoration:none;
}
</style>
<script type="module" src="/firebase-init.js"></script>
</head>
<body>
<div class="wrap">
  <div class="label">Payment Cancelled</div>
  <div class="title">購入キャンセル</div>
  <div class="subtitle">
    決済がキャンセルされました。<br>
    もう一度試す場合は Calendar から選び直してください。
  </div>
  <a href="/calendar" class="btn">Calendar に戻る</a>
</div>
</body>
</html>
