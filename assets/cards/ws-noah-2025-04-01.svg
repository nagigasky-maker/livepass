<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0" stop-color="#001a10"/>
      <stop offset="0.5" stop-color="#002a1a"/>
      <stop offset="1" stop-color="#000a05"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="30%" r="60%">
      <stop offset="0" stop-color="#00e5a0" stop-opacity="0.3"/>
      <stop offset="0.5" stop-color="#a8e63d" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#000" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="600" height="900" fill="url(#bg)"/>
  <rect width="600" height="900" fill="url(#glow)"/>

  <!-- LIVE PASS WORKSHOP -->
  <g font-family="'Helvetica Neue',Arial,sans-serif" font-weight="800">
    <text x="300" y="52" text-anchor="middle" font-size="20" fill="#fff" letter-spacing="1.5">LIVE <tspan fill="#e8100a">PASS</tspan></text>
    <text x="300" y="74" text-anchor="middle" font-size="12" fill="#fff" letter-spacing="2.2">WORKSHOP EDITION</text>
  </g>

  <!-- 64BEAT title -->
  <g font-family="'Helvetica Neue','Arial Black',sans-serif" font-weight="900" text-anchor="middle">
    <text x="300" y="330" font-size="180" fill="#00e5a0">64</text>
    <text x="300" y="490" font-size="130" fill="#fff">BEAT</text>
  </g>

  <!-- Workshop -->
  <g font-family="'Helvetica Neue',Arial,sans-serif" font-weight="700" text-anchor="middle">
    <text x="300" y="600" font-size="36" fill="#fff" letter-spacing="1">WORKSHOP</text>
    <text x="300" y="770" font-size="30" fill="rgba(255,255,255,0.7)" letter-spacing="1">NOAH STUDIO</text>
    <text x="300" y="820" font-size="22" fill="rgba(255,255,255,0.5)" letter-spacing="1">APR 1 2025</text>
  </g>

  <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
    <stop offset="0.6" stop-color="#000" stop-opacity="0"/>
    <stop offset="1" stop-color="#000" stop-opacity="0.55"/>
  </radialGradient>
  <rect width="600" height="900" fill="url(#vignette)"/>
</svg>
