<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#FFFFFF">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/livepass-icon-180.png">
<title>LIVE PASS — Calendar</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=IBM+Plex+Mono:wght@400;500&family=Noto+Sans+JP:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --black:#000;--bg:#080808;--white:#EDEBE6;
  --red:#E8100A;--blue:#3DAAFF;--green:#A8E63D;
  --gold:#F5C842;--mint:#00E5A0;--pink:#F4C0D1;--purple:#bf5af2;
  --muted:rgba(237,235,230,.3);--muted2:rgba(237,235,230,.14);
  --border:rgba(255,255,255,.07);
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bot:env(safe-area-inset-bottom,0px);
  --nav-h:36px;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;max-width:100vw;height:100%;height:100dvh;
  background:var(--black);color:var(--white);
  font-family:Arial,'Noto Sans JP',sans-serif;-webkit-font-smoothing:antialiased;
  user-select:none;-webkit-user-select:none;overflow:hidden;
  position:fixed;overscroll-behavior-x:none;touch-action:pan-y;}
a{color:inherit;text-decoration:none}
button{background:none;border:none;color:inherit;font:inherit;cursor:pointer}

.topbar{position:fixed;top:0;left:0;right:0;z-index:100;
  padding:max(44px,calc(var(--safe-top) + 14px)) 18px 12px;
  display:flex;align-items:center;gap:14px;
  background:linear-gradient(to bottom,rgba(0,0,0,.95) 70%,transparent);}
.tb-brand{display:flex;align-items:center;margin-right:auto;height:22px;flex-shrink:0}
.tb-brand img{height:100%;width:auto;display:block;image-rendering:-webkit-optimize-contrast}
.tb-icon{background:none;border:none;cursor:pointer;position:relative;
  width:26px;height:26px;display:flex;align-items:center;justify-content:center;color:var(--white);}
.tb-icon svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.8}
.tb-icon .badge{position:absolute;top:-4px;right:-6px;background:var(--red);color:#fff;
  font-size:8px;font-weight:700;min-width:14px;height:14px;padding:0 3px;border-radius:99px;
  display:flex;align-items:center;justify-content:center;font-family:Arial,sans-serif;}
.tb-stat{display:flex;flex-direction:column;align-items:center;line-height:1;gap:2px;color:var(--blue);}
.tb-stat-n{font-family:Arial,'Noto Sans JP',sans-serif;font-weight:900;font-size:16px;color:var(--white);letter-spacing:.04em}
.tb-stat-l{font-size:7px;color:var(--blue);letter-spacing:.08em;font-weight:500}

.content{position:fixed;top:0;left:0;right:0;bottom:calc(var(--nav-h) + var(--safe-bot));
  padding-top:max(94px,calc(var(--safe-top) + 62px));
  overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;scrollbar-width:none;
  touch-action:pan-y;overscroll-behavior-x:none;max-width:100vw;}
.content::-webkit-scrollbar{display:none}

.bottomnav{position:fixed;bottom:0;left:0;right:0;z-index:100;
  height:calc(var(--nav-h) + var(--safe-bot));padding:0 0 calc(var(--safe-bot) * .4);
  display:flex;align-items:center;justify-content:space-around;
  background:rgba(0,0,0,.96);border-top:0.5px solid var(--border);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);}
.bn-btn{flex:1;height:100%;display:flex;align-items:center;justify-content:center;
  color:rgba(237,235,230,.35);text-decoration:none;position:relative;}
.bn-btn svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.8}
.bn-btn.active{color:var(--white)}
.bn-avatar{width:26px;height:26px;border-radius:50%;
  background:linear-gradient(135deg,#1a2030,#0a1020);
  border:1.5px solid rgba(237,235,230,.25);
  overflow:hidden;display:flex;align-items:center;justify-content:center;}
.bn-btn.active .bn-avatar{border-color:var(--white)}

/* Calendar header */
.cal-header{padding:14px 20px 10px}
.ch-label{font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:.34em;
  text-transform:uppercase;color:rgba(237,235,230,.3);}
.ch-title{font-family:Arial,'Noto Sans JP',sans-serif;font-weight:900;
  font-size:22px;letter-spacing:.02em;color:var(--white);margin-top:4px;}

/* Calendar tabs (Following / AI Search) */
.cal-tabs{display:flex;align-items:stretch;padding:0 20px;
  border-bottom:0.5px solid var(--border);}
.ctb{flex:1;font-family:Arial,'Noto Sans JP',sans-serif;font-weight:700;
  font-size:12px;letter-spacing:.16em;text-transform:uppercase;
  color:rgba(237,235,230,.3);padding:14px 0 12px;
  border-bottom:2px solid transparent;}
.ctb.active{color:var(--white);border-bottom-color:var(--green)}

.cal-panel{display:none;padding-bottom:20px}
.cal-panel.active{display:block}

/* AI Search bar */
.ai-search-bar{
  margin:16px 18px;padding:12px 16px;
  background:rgba(255,255,255,.04);border:0.5px solid rgba(255,255,255,.08);
  border-radius:12px;display:flex;align-items:center;gap:10px;
}
.ai-search-bar svg{width:18px;height:18px;stroke:var(--mint);fill:none;stroke-width:1.8;flex-shrink:0}
.ai-search-bar input{
  flex:1;background:none;border:none;outline:none;color:var(--white);
  font-family:Arial,'Noto Sans JP',sans-serif;font-size:12px;
  font-weight:400;letter-spacing:.02em;
}
.ai-search-bar input::placeholder{color:rgba(237,235,230,.35)}
.ai-hint{padding:0 18px 6px;
  font-family:'IBM Plex Mono',monospace;font-size:8px;letter-spacing:.24em;
  text-transform:uppercase;color:rgba(168,230,61,.4);}

/* Event list — shared with Profile SCREEN */
.ev-list{padding:4px 0 30px}
.ev-item{
  display:flex;padding:14px 20px;gap:12px;
  border-bottom:0.5px solid rgba(255,255,255,.04);
  position:relative;cursor:pointer;align-items:center;
}
.ev-item::before{
  content:'';position:absolute;left:0;top:8px;bottom:8px;width:3px;
  background:var(--cat-color,var(--muted));opacity:.7;
}
/* Flyer thumbnail on the left of each row */
.ev-thumb{
  flex-shrink:0;width:68px;height:88px;border-radius:8px;
  overflow:hidden;background:#0a0a0a;
  border:0.5px solid rgba(255,255,255,.08);
  position:relative;
}
.ev-thumb img{
  position:absolute;inset:0;width:100%;height:100%;
  object-fit:cover;display:block;
}
.ev-thumb-empty{
  position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  font-family:Arial,'Noto Sans JP',sans-serif;font-weight:900;
  font-size:18px;color:rgba(237,235,230,.12);
  background:linear-gradient(135deg,rgba(255,255,255,.02),rgba(255,255,255,.05));
}
.ev-date{flex-shrink:0;width:46px;text-align:left;line-height:1}
.ev-date .m{font-family:Arial,'Noto Sans JP',sans-serif;font-weight:700;
  font-size:10px;letter-spacing:.12em;
  color:var(--cat-color,var(--muted));text-transform:uppercase;}
.ev-date .d{font-family:Arial,'Noto Sans JP',sans-serif;font-weight:900;
  font-size:28px;color:var(--white);margin-top:2px;}
.ev-body{flex:1;min-width:0}
.ev-cat{font-family:Arial,'Noto Sans JP',sans-serif;font-weight:700;
  font-size:9px;letter-spacing:.22em;
  color:var(--cat-color,var(--muted));text-transform:uppercase;margin-bottom:3px;}
.ev-title{font-family:Arial,'Noto Sans JP',sans-serif;font-weight:700;
  font-size:13px;color:var(--white);margin-bottom:3px;line-height:1.2;
  overflow:hidden;text-overflow:ellipsis;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;}
.ev-meta{font-family:Arial,'Noto Sans JP',sans-serif;font-weight:400;
  font-size:9px;color:rgba(237,235,230,.45);letter-spacing:.02em;line-height:1.5;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.ev-tags{display:flex;gap:6px;margin-top:6px;flex-wrap:wrap}
.ev-tag{font-family:Arial,'Noto Sans JP',sans-serif;font-weight:500;
  font-size:7px;letter-spacing:.12em;
  padding:2px 8px;border-radius:99px;
  border:1px solid var(--cat-color,var(--muted));
  color:var(--cat-color,var(--muted));text-transform:uppercase;}
.ev-right{flex-shrink:0;display:flex;flex-direction:column;align-items:flex-end;gap:6px}

/* EVENT DETAIL MODAL */
#eventModal{
  position:fixed;inset:0;z-index:1200;
  background:var(--black);
  display:none;flex-direction:column;opacity:0;transition:opacity .3s ease;
}
#eventModal.active{display:flex;opacity:1}
.em-header{flex-shrink:0;
  padding:max(14px,calc(var(--safe-top) + 12px)) 18px 12px;
  display:flex;align-items:center;gap:14px;
  background:rgba(0,0,0,.96);border-bottom:0.5px solid var(--border);}
.em-close{width:36px;height:36px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;color:var(--white);
  border:0.5px solid rgba(255,255,255,.15);}
.em-close svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2}
.em-label{font-family:'IBM Plex Mono',monospace;font-size:8px;
  letter-spacing:.32em;text-transform:uppercase;
  color:rgba(237,235,230,.3);margin-left:auto;}
.em-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
.em-body::-webkit-scrollbar{display:none}

.em-hero{position:relative;padding:40px 22px 30px;
  background:linear-gradient(180deg,var(--cat-color-soft,rgba(232,16,10,.08)) 0%,transparent 100%);}
.em-date-big{display:flex;align-items:baseline;gap:10px;margin-bottom:18px}
.em-date-m{font-family:Arial,'Noto Sans JP',sans-serif;font-weight:700;
  font-size:16px;letter-spacing:.14em;color:var(--cat-color,var(--red));text-transform:uppercase;}
.em-date-d{font-family:Arial,'Noto Sans JP',sans-serif;font-weight:900;
  font-size:72px;line-height:.85;color:var(--white);letter-spacing:-.02em;}
.em-weekday{font-family:Arial,'Noto Sans JP',sans-serif;font-weight:400;
  font-size:11px;color:rgba(237,235,230,.45);letter-spacing:.2em;
  text-transform:uppercase;}
.em-cat{font-family:Arial,'Noto Sans JP',sans-serif;font-weight:700;
  font-size:11px;letter-spacing:.22em;
  color:var(--cat-color,var(--red));text-transform:uppercase;margin-bottom:10px;}
.em-title{font-family:Arial,'Noto Sans JP',sans-serif;font-weight:900;
  font-size:30px;line-height:1.1;color:var(--white);margin-bottom:14px;}
.em-venue{font-family:Arial,'Noto Sans JP',sans-serif;font-weight:500;
  font-size:13px;color:var(--white);margin-bottom:4px;}
.em-time{font-family:Arial,'Noto Sans JP',sans-serif;font-weight:400;
  font-size:11px;color:rgba(237,235,230,.55);letter-spacing:.04em;}
.em-tags{display:flex;gap:6px;margin-top:16px;flex-wrap:wrap}
.em-tags .ev-tag{padding:4px 12px;font-size:9px}

.em-section{padding:22px 22px 0;}
.em-sec-label{font-family:'IBM Plex Mono',monospace;font-size:10px;font-weight:500;
  letter-spacing:.3em;text-transform:uppercase;
  color:rgba(237,235,230,.55);margin-bottom:14px;}
.em-sec-body{font-family:Arial,'Noto Sans JP',sans-serif;font-weight:400;
  font-size:12px;line-height:1.8;color:rgba(237,235,230,.75);letter-spacing:.02em;}

/* Event cover hero — poster-style layout: hero info overlaid on cover image */
.em-cover{
  position:relative;width:100%;
  height:min(80vh, 720px);min-height:480px;
  background:#0a0a0a;overflow:hidden;
}
.em-cover-bg{
  position:absolute;inset:0;width:100%;height:100%;
  object-fit:cover;filter:blur(40px) brightness(.35);
  transform:scale(1.15);opacity:.7;z-index:0;
}
.em-cover img.em-cover-fg{
  position:absolute;inset:0;z-index:1;
  display:block;width:100%;height:100%;object-fit:contain;
}
/* Hero info overlaid on the cover at bottom */
.em-hero.over-cover{
  position:absolute;left:0;right:0;bottom:0;z-index:2;
  padding:100px 22px 24px;
  background:linear-gradient(to top,
    rgba(0,0,0,.96) 0%,
    rgba(0,0,0,.85) 30%,
    rgba(0,0,0,.45) 65%,
    transparent 100%);
}
.em-hero.over-cover .em-date-big{margin-bottom:12px}
.em-hero.over-cover .em-title{font-size:28px;text-shadow:0 2px 20px rgba(0,0,0,.8)}
.em-hero.over-cover .em-venue{text-shadow:0 1px 10px rgba(0,0,0,.8)}
.em-hero.over-cover .em-time{text-shadow:0 1px 10px rgba(0,0,0,.8)}

/* Featured artist account chips */
.em-artists{display:flex;flex-wrap:wrap;gap:8px}
.em-artist{
  display:flex;align-items:center;gap:10px;
  padding:10px 18px 10px 10px;border-radius:99px;
  background:rgba(61,170,255,.08);
  border:0.5px solid rgba(61,170,255,.4);
  color:var(--white);cursor:pointer;
  transition:background .15s ease, transform .15s ease;
  min-height:44px; /* touch target */
}
.em-artist:active{background:rgba(61,170,255,.16);transform:scale(.97)}
.em-artist-avatar{
  width:34px;height:34px;border-radius:50%;
  background:linear-gradient(135deg,#3DAAFF,#bf5af2);
  display:flex;align-items:center;justify-content:center;
  font-family:Arial,sans-serif;font-weight:900;font-size:12px;color:#000;
  flex-shrink:0;
}
.em-artist-name{
  font-family:Arial,'Noto Sans JP',sans-serif;font-weight:700;
  font-size:14px;letter-spacing:.04em;
}

/* Compact left-aligned team credits (rendered directly below cover) */
.em-credits{padding:14px 22px 6px;text-align:left;font-family:Arial,'Noto Sans JP',sans-serif;color:rgba(237,235,230,.85)}
.em-credits-group{margin-bottom:14px;display:flex;gap:14px;align-items:baseline}
.em-credits-role{font-family:'IBM Plex Mono',monospace;font-size:10px;font-weight:500;letter-spacing:.2em;text-transform:uppercase;color:rgba(237,235,230,.7);flex-shrink:0;min-width:100px;line-height:1.4}
.em-credits-name{font-family:Arial,'Noto Sans JP',sans-serif;font-weight:600;font-size:15px;letter-spacing:.02em;color:var(--white);line-height:1.5;flex:1;min-width:0;display:flex;flex-wrap:wrap;column-gap:14px;row-gap:3px;word-break:break-word;overflow-wrap:anywhere}
.em-credits-name > .nm{display:inline-flex;white-space:nowrap}
.em-credits-name a{color:inherit;text-decoration:none;border-bottom:1px solid rgba(61,170,255,.25);padding-bottom:0}
.em-credits-name a:active{color:#8fcaff;border-bottom-color:var(--blue)}

/* Collaboration revenue split — hidden per spec (not shown to viewers) */
.em-collab{padding:8px 22px 0;display:none}
.em-collab-row{display:flex;align-items:center;gap:12px;padding:10px 14px;margin-bottom:8px;background:rgba(191,90,242,.06);border:0.5px solid rgba(191,90,242,.35);border-radius:12px}
.em-collab-row.me{background:rgba(61,170,255,.06);border-color:rgba(61,170,255,.4)}
.em-collab-av{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,#bf5af2,#F4C0D1);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-family:Arial,sans-serif;font-weight:900;font-size:11px;color:#000}
.em-collab-row.me .em-collab-av{background:linear-gradient(135deg,#3DAAFF,#bf5af2)}
.em-collab-name{flex:1;min-width:0;font-family:Arial,'Noto Sans JP',sans-serif;font-weight:700;font-size:13px;color:var(--white);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.em-collab-name a{color:inherit;text-decoration:none}
.em-collab-share{flex-shrink:0;font-family:Arial,'Noto Sans JP',sans-serif;font-weight:900;font-size:16px;color:#d4a8ff;letter-spacing:.02em}
.em-collab-row.me .em-collab-share{color:#8fcaff}
.em-collab-bar{display:flex;height:4px;border-radius:99px;overflow:hidden;margin:6px 0 14px;background:rgba(255,255,255,.06)}
.em-collab-bar .seg{height:100%}
.em-collab-bar .seg.me{background:var(--blue)}
.em-collab-bar .seg.them{background:var(--purple)}
.em-collab-note{font-family:'IBM Plex Mono',monospace;font-size:8px;letter-spacing:.18em;text-transform:uppercase;color:rgba(237,235,230,.35);margin-top:4px;text-align:center}

/* Price tier chips (General / Reservation / Subscriber) */
.em-price-row{display:flex;flex-wrap:wrap;gap:8px;margin-top:4px}
.em-price-chip{
  display:flex;flex-direction:column;gap:4px;
  padding:10px 14px;border-radius:10px;
  background:rgba(255,255,255,.04);border:0.5px solid rgba(255,255,255,.1);
  min-width:96px;
}
.em-price-chip.subscriber{background:rgba(191,90,242,.08);border-color:rgba(191,90,242,.45)}
.em-price-chip.reservation{background:rgba(61,170,255,.08);border-color:rgba(61,170,255,.4)}
.em-price-chip-label{
  font-family:'IBM Plex Mono',monospace;font-size:8px;
  letter-spacing:.22em;text-transform:uppercase;color:rgba(237,235,230,.45);
}
.em-price-chip.subscriber .em-price-chip-label{color:#d4a8ff}
.em-price-chip.reservation .em-price-chip-label{color:#8fcaff}
.em-price-chip-value{
  font-family:Arial,'Noto Sans JP',sans-serif;font-weight:800;
  font-size:15px;color:var(--white);
}

.em-cta{padding:22px;margin-top:8px}
.em-cta-stack{display:flex;flex-direction:column;gap:10px}
.em-buy-btn{display:block;width:100%;padding:18px;
  background:var(--cat-color,var(--red));color:#fff;
  font-family:Arial,'Noto Sans JP',sans-serif;font-weight:900;
  font-size:14px;letter-spacing:.1em;text-transform:uppercase;
  border-radius:99px;text-align:center;border:none;
  box-shadow:0 8px 32px rgba(232,16,10,.25);
  transition:transform .15s ease, opacity .15s ease;}
.em-buy-btn:active{transform:scale(.98)}
.em-buy-btn:disabled{opacity:.5;cursor:not-allowed;box-shadow:none}
.em-buy-price{display:inline-block;margin-left:8px;opacity:.85;font-weight:700}

/* Reservation button (blue) */
.em-reserve-btn{
  display:flex;align-items:center;justify-content:center;gap:10px;
  width:100%;padding:15px;
  background:rgba(61,170,255,.1);
  border:0.5px solid rgba(61,170,255,.5);
  color:#8fcaff;
  font-family:Arial,'Noto Sans JP',sans-serif;font-weight:800;
  font-size:12px;letter-spacing:.12em;text-transform:uppercase;
  border-radius:99px;
}
.em-reserve-btn svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2}
.em-reserve-btn:active{background:rgba(61,170,255,.18)}

/* Subscriber-only price button (purple, lockable) */
.em-sub-price-btn{
  display:flex;align-items:center;justify-content:center;gap:10px;
  width:100%;padding:15px;
  background:linear-gradient(135deg,rgba(191,90,242,.12),rgba(191,90,242,.05));
  border:0.5px solid rgba(191,90,242,.5);
  color:#d4a8ff;
  font-family:Arial,'Noto Sans JP',sans-serif;font-weight:800;
  font-size:12px;letter-spacing:.08em;
  border-radius:99px;position:relative;
}
.em-sub-price-btn svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2}
.em-sub-price-btn-price{font-weight:900;font-size:13px;margin-left:4px}
.em-sub-price-btn.locked{
  background:rgba(255,255,255,.02);
  border-color:rgba(237,235,230,.15);
  color:rgba(237,235,230,.45);
  cursor:not-allowed;
}
.em-sub-price-btn.locked .em-sub-price-btn-lock{display:inline-block}
.em-sub-price-btn-lock{display:none;margin-left:6px}
.em-sub-hint{
  margin-top:8px;text-align:center;
  font-family:'IBM Plex Mono',monospace;font-size:8px;
  letter-spacing:.22em;text-transform:uppercase;
  color:rgba(237,235,230,.4);
}

.em-sub-actions{
  display:flex;gap:8px;margin-top:12px;
}
.em-sub-btn{flex:1;padding:12px;
  background:none;border:1px solid rgba(237,235,230,.15);
  color:rgba(237,235,230,.6);
  font-family:Arial,'Noto Sans JP',sans-serif;font-weight:500;
  font-size:11px;border-radius:99px;letter-spacing:.02em;}

/* ───── Card registration sheet (simulated Stripe SetupIntent) ───── */
#cardSheetOverlay{position:fixed;inset:0;z-index:1400;background:rgba(0,0,0,0);pointer-events:none;opacity:0;transition:background .3s ease,opacity .2s ease}
#cardSheetOverlay.active{background:rgba(0,0,0,.75);pointer-events:all;opacity:1;backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px)}

<script>
/* PWA NAV FIX v66 — form-submission technique for iOS PWA standalone.
   Link clicks in iOS PWAs can break out of standalone mode; form
   submissions are handled differently by iOS and stay in-app. */
(function(){
  function isStandalone(){
    return (window.navigator.standalone === true) ||
           window.matchMedia('(display-mode: standalone)').matches ||
           window.matchMedia('(display-mode: fullscreen)').matches;
  }
  if (!isStandalone()) return;
  // Also add a body class so CSS can adjust for standalone mode
  document.documentElement.classList.add('is-pwa');
  document.addEventListener('click', function(e){
    var a = e.target.closest && e.target.closest('a');
    if (!a) return;
    var href = a.getAttribute('href');
    if (!href) return;
    if (a.target && a.target !== '_self') return;
    if (href.charAt(0) === '#') return;
    if (/^(mailto|tel|sms):/i.test(href)) return;
    // External origin?
    try {
      var u = new URL(a.href, location.href);
      if (u.host !== location.host) return;
    } catch(err) { return; }
    e.preventDefault();
    e.stopPropagation();
    // Use form submission — iOS PWA treats this as in-app navigation
    try {
      var form = document.createElement('form');
      form.method = 'GET';
      form.action = a.href;
      form.style.display = 'none';
      document.body.appendChild(form);
      form.submit();
    } catch(err) {
      window.location.href = a.href;
    }
  }, true);
})();
</script>

/* Sample schedule data — mix of events & workshops from following */
const SCHEDULE = [

  { id:'e6', type:'event', cat:'EVENT', catColor:'#E8100A',
    m:'JUL', d:'05', weekday:'SAT', title:'All Must Dance Vol.26',
    venue:'LIQUIDROOM TOKYO', time:'2026.07.05 21:00 — 28:00',
    by:'NOBBY', meta:'NOBBY · 21:00 — · LIQUIDROOM TOKYO',
    price:'¥3,000',
    tags:['DJ','HOUSE','TECHNO'],
    desc:'All Must Dance 夏の陣。Vol.26 はゲスト DJ 陣を拡大、朝6時まで開催。' },
];

/* Populate following list */
/* Merge user-posted events + workshops from localStorage
   with the sample schedule. User posts come first (newest). */
function getUserSchedule(){
  const out = [];
  const CAT_COLOR = {
    DJ:'#E8100A', LIVE:'#E8100A', PARTY:'#bf5af2', EXHIBITION:'#00E5A0', FASHION:'#bf5af2',
    HOUSE:'#00E5A0', BREAKING:'#F5C842', WAACKING:'#F4C0D1',
    LOCKING:'#F5C842', POPPING:'#F5C842',
  };
  const parseDate = (iso) => {
    if (!iso) return { m:'—', d:'—', weekday:'—' };
    const d = new Date(iso);
    const MONTHS = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
    const WD = ['SUN','MON','TUE','WED','THU','FRI','SAT'];
    return {
      m: MONTHS[d.getMonth()],
      d: String(d.getDate()).padStart(2,'0'),
      weekday: WD[d.getDay()],
    };
  };
  try {
    const events = JSON.parse(localStorage.getItem('livepass_events') || '[]');
    events.forEach(e => {
      const pd = parseDate(e.date);
      const cat = (e.category || 'EVENT').toUpperCase();
      out.push({
        id: e.id, type:'event', cat:'EVENT',
        catColor: CAT_COLOR[cat] || '#E8100A',
        m: pd.m, d: pd.d, weekday: pd.weekday,
        title: e.title,
        venue: e.venue,
        time: `${e.date} ${e.time || ''}`,
        by: e.author,
        author: e.author || 'NOBBY',
        meta: `${e.author} · ${e.time || '—'} · ${e.venue}`,
        priceRaw: e.price || '0',
        price: e.price && e.price !== '0' ? '¥' + Number(e.price).toLocaleString() : '無料',
        tags: e.tags && e.tags.length ? e.tags : [cat],
        desc: e.body || '',
        cover: e.cover || null,
        reservation: !!e.reservation,
        cancelFee: Number(e.cancelFee || 0),
        cancelDeadlineH: Number(e.cancelDeadlineH || 0),
        rawDate: e.date || '',
        subscriberPrice: e.subscriberPrice || '',
        artists: Array.isArray(e.artists) ? e.artists : [],
        team: Array.isArray(e.team) ? e.team : [],
        collaborators: Array.isArray(e.collaborators) ? e.collaborators : [],
      });
    });
  } catch(err) {}
  try {
    const workshops = JSON.parse(localStorage.getItem('livepass_workshops') || '[]');
    workshops.forEach(w => {
      const pd = parseDate(w.date);
      const cat = (w.category || 'WORKSHOP').toUpperCase();
      out.push({
        id: w.id, type:'workshop', cat:'WORKSHOP',
        catColor: CAT_COLOR[cat] || '#F5C842',
        m: pd.m, d: pd.d, weekday: pd.weekday,
        title: w.title,
        venue: w.venue,
        time: `${w.date} ${w.time || ''}${w.endTime ? ' — '+w.endTime : ''}`,
        by: w.instructor || w.author,
        author: w.author || w.instructor || 'NOBBY',
        meta: `${w.instructor || w.author} · ${w.time || '—'} · ${w.venue}`,
        priceRaw: w.price || '0',
        price: w.price && w.price !== '0' ? '¥' + Number(w.price).toLocaleString() : '無料',
        tags: [cat, w.level || 'ALL LEVELS'],
        desc: w.body || '',
        cover: w.cover || null,
        reservation: !!w.reservation,
        cancelFee: Number(w.cancelFee || 0),
        cancelDeadlineH: Number(w.cancelDeadlineH || 0),
        rawDate: w.date || '',
        subscriberPrice: w.subscriberPrice || '',
        artists: Array.isArray(w.artists) ? w.artists : [],
        team: Array.isArray(w.team) ? w.team : [],
        collaborators: Array.isArray(w.collaborators) ? w.collaborators : [],
      });
    });
  } catch(err) {}
  try {
    const exhibitions = JSON.parse(localStorage.getItem('livepass_exhibitions') || '[]');
    exhibitions.forEach(x => {
      const pd = parseDate(x.date);
      const cat = (x.category || 'EXHIBITION').toUpperCase();
      const endStr = x.endDate ? ' — ' + x.endDate : '';
      out.push({
        id: x.id, type:'exhibition', cat:'EXHIBITION',
        catColor: '#00E5A0', // mint
        m: pd.m, d: pd.d, weekday: pd.weekday,
        title: x.title,
        venue: x.venue,
        time: x.date + endStr,
        by: x.artist || x.author,
        author: x.author || x.artist || 'NOBBY',
        meta: `${x.artist || x.author} · ${x.date}${endStr} · ${x.venue}`,
        priceRaw: x.price || '0',
        price: x.price && x.price !== '0' ? '¥' + Number(x.price).toLocaleString() : '無料',
        tags: [cat],
        desc: x.body || '',
        cover: x.cover || null,
        reservation: !!x.reservation,
        cancelFee: Number(x.cancelFee || 0),
        cancelDeadlineH: Number(x.cancelDeadlineH || 0),
        rawDate: x.date || '',
        subscriberPrice: x.subscriberPrice || '',
        artists: Array.isArray(x.artists) ? x.artists : [],
        team: Array.isArray(x.team) ? x.team : [],
        collaborators: Array.isArray(x.collaborators) ? x.collaborators : [],
      });
    });
  } catch(err) {}
  return out;
}

const MERGED = [...getUserSchedule(), ...SCHEDULE];
const followingList = document.getElementById('followingList');
MERGED.forEach(e => followingList.appendChild(renderEvent(e)));

/* AI list — starts empty, fills on input */
const aiList = document.getElementById('aiList');
const aiInput = document.getElementById('aiInput');
function aiSearch(q) {
  aiList.innerHTML = '';
  const matches = q
    ? MERGED.filter(e =>
        (e.title + ' ' + e.venue + ' ' + e.meta + ' ' + e.tags.join(' '))
          .toLowerCase().includes(q.toLowerCase()))
    : MERGED.slice(0,3);
  matches.forEach(e => aiList.appendChild(renderEvent(e)));
}
aiSearch('');
aiInput.addEventListener('input', (e) => aiSearch(e.target.value));

function renderEvent(e) {
  const div = document.createElement('div');
  div.className = 'ev-item';
  div.style.setProperty('--cat-color', e.catColor);
  const thumbHtml = e.cover
    ? `<div class="ev-thumb"><img src="${e.cover}" alt=""></div>`
    : `<div class="ev-thumb"><div class="ev-thumb-empty">${(e.cat || 'E').charAt(0)}</div></div>`;
  div.innerHTML = `
    ${thumbHtml}
    <div class="ev-date"><div class="m">${e.m}</div><div class="d">${e.d}</div></div>
    <div class="ev-body">
      <div class="ev-cat">${e.cat}</div>
      <div class="ev-title">${e.title}</div>
      <div class="ev-meta">${e.meta}</div>
      <div class="ev-tags">${e.tags.slice(0,3).map(t => `<div class="ev-tag">${t}</div>`).join('')}</div>
    </div>
  `;
  div.addEventListener('click', () => openEventDetail(e));
  return div;
}

/* Tab swap */
document.querySelectorAll('.ctb').forEach(btn => {
  btn.addEventListener('click', () => {
    const tab = btn.dataset.tab;
    document.querySelectorAll('.ctb').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.querySelectorAll('.cal-panel').forEach(p => p.classList.remove('active'));
    document.getElementById('cal-' + tab).classList.add('active');
  });
});

/* Event detail modal */
const eventModal = document.getElementById('eventModal');
const emBody = document.getElementById('emBody');
const emLabel = document.getElementById('emLabel');
const emClose = document.getElementById('emClose');

const initialsOf = (n) => (n || '?').replace(/[^A-Za-z0-9\u3040-\u30FF\u4E00-\u9FFF]/g, '').slice(0, 2).toUpperCase();

function openEventDetail(e) {
  if (navigator.vibrate) navigator.vibrate(8);
  emLabel.textContent = e.cat;
  const soft = hexToRgba(e.catColor, 0.08);

  // Hero info content (date/cat/title/venue/time/tags) — reused in both
  // the "overlay on cover" layout and the standalone-gradient layout
  const heroContentHtml = `
    <div class="em-date-big">
      <div>
        <div class="em-date-m">${e.m}</div>
        <div class="em-date-d">${e.d}</div>
      </div>
      <div class="em-weekday">${e.weekday}</div>
    </div>
    <div class="em-cat" style="color:${e.catColor}">${e.cat}</div>
    <div class="em-title">${e.title}</div>
    <div class="em-venue">${e.venue}</div>
    <div class="em-time">${e.time}</div>
    <div class="em-tags" style="--cat-color:${e.catColor}">
      ${e.tags.map(t => `<div class="ev-tag">${t}</div>`).join('')}
    </div>
  `;

  // Owner reservation management button — visible when current user is
  // the event author and the event accepts reservations
  const currentUser = localStorage.getItem('livepass_account_name') || 'NOBBY';
  const isOwnerReservable = (e.author || e.by || 'NOBBY') === currentUser && !!e.reservation;
  let ownerReserveCount = 0;
  if (isOwnerReservable) {
    try {
      const all = JSON.parse(localStorage.getItem('livepass_reservations') || '[]');
      ownerReserveCount = all.filter(r => r.eventId === e.id && r.eventAuthor === currentUser && r.status === 'confirmed').length;
    } catch(err) {}
  }
  const ownerActionsHtml = isOwnerReservable ? `
    <div class="em-owner-actions">
      <button class="em-owner-reserves-btn" id="emOwnerReservesBtn" type="button">
        <svg viewBox="0 0 24 24"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 11h-6M19 8v6"/></svg>
        予約者<span class="cnt">${ownerReserveCount}</span>
      </button>
    </div>
  ` : '';

  // Cover + hero combined layout — poster-style overlay when cover present
  const coverAndHeroHtml = e.cover ? `
    <div class="em-cover">
      ${ownerActionsHtml}
      <img class="em-cover-bg" src="${e.cover}" alt="" aria-hidden="true">
      <img class="em-cover-fg" src="${e.cover}" alt="">
      <div class="em-hero over-cover" style="--cat-color:${e.catColor};--cat-color-soft:${soft}">
        ${heroContentHtml}
      </div>
    </div>
  ` : `
    <div class="em-hero" style="--cat-color:${e.catColor};--cat-color-soft:${soft};position:relative">
      ${ownerActionsHtml}
      ${heroContentHtml}
    </div>
  `;

  // Featured artists — clickable chips → /profile?user=NAME
  const artistsList = Array.isArray(e.artists) ? e.artists : [];
  const artistsHtml = artistsList.length ? `
    <div class="em-artists">
      ${artistsList.map(a => {
        const name = typeof a === 'string' ? a : (a && a.name) || '';
        if (!name) return '';
        return `
          <button type="button" class="em-artist" data-artist="${encodeURIComponent(name)}">
            <div class="em-artist-avatar">${initialsOf(name)}</div>
            <div class="em-artist-name">${name}</div>
          </button>
        `;
      }).join('')}
    </div>
  ` : `<div class="em-sec-body">${e.by || ''}</div>`;

  // CREDITS — unified (artists + team), rendered directly below cover
  const teamArr = Array.isArray(e.team) ? e.team : [];
  const isAuthor = (e.author || e.by || 'NOBBY') === currentUser;
  const visibleTeam = teamArr.filter(t => !t.hidden || isAuthor);
  const creditGroups = {};
  if (artistsList.length) {
    const lineupLabel = (e.type === 'workshop') ? 'INSTRUCTOR'
                      : (e.type === 'exhibition') ? 'ARTIST'
                      : 'LINEUP';
    creditGroups[lineupLabel] = artistsList.map(a => ({
      name: typeof a === 'string' ? a : (a && a.name) || '',
      hidden: false,
    })).filter(x => x.name);
  }
  visibleTeam.forEach(t => {
    const role = (t.role || 'Credit').trim();
    if (!creditGroups[role]) creditGroups[role] = [];
    creditGroups[role].push(t);
  });
  const hasCredits = Object.keys(creditGroups).length > 0;
  const teamHtml = hasCredits ? `
    <div class="em-section" style="padding:18px 22px 0">
      <div class="em-sec-label" style="margin-bottom:10px">CREDITS</div>
      <div class="em-credits">
        ${Object.keys(creditGroups).map(role => `
          <div class="em-credits-group">
            <div class="em-credits-role">${role}</div>
            <div class="em-credits-name">
              ${creditGroups[role].map(t => {
                const priv = t.hidden ? ' <span style="color:var(--gold);font-size:8px">(非公開)</span>' : '';
                return `<span class="nm"><a href="/profile?user=${encodeURIComponent(t.name)}">${t.name}</a>${priv}</span>`;
              }).join('')}
            </div>
          </div>
        `).join('')}
      </div>
    </div>
  ` : '';

  // COLLABORATION — revenue split (PRIVATE — only visible to the author
  // and the listed collaborators, never to the public feed)
  const collabArr = Array.isArray(e.collaborators) ? e.collaborators : [];
  const validCollabs = collabArr.filter(c => c && c.name);
  const totalCollabShare = validCollabs.reduce((s, c) => s + (Number(c.share) || 0), 0);
  const mySharePct = Math.max(0, 100 - totalCollabShare);
  const eventAuthor = e.author || e.by || 'NOBBY';
  const isCollabParticipant = (eventAuthor === currentUser) || validCollabs.some(c => c.name === currentUser);
  const collabHtml = (validCollabs.length && isCollabParticipant) ? `
    <div class="em-section">
      <div class="em-sec-label">Collaboration · 収益分配</div>
      <div class="em-collab">
        <div class="em-collab-row me">
          <div class="em-collab-av">${initialsOf(eventAuthor)}</div>
          <div class="em-collab-name"><a href="/profile?user=${encodeURIComponent(eventAuthor)}">${eventAuthor}</a></div>
          <div class="em-collab-share">${mySharePct}%</div>
        </div>
        ${validCollabs.map(c => `
          <div class="em-collab-row">
            <div class="em-collab-av">${initialsOf(c.name)}</div>
            <div class="em-collab-name"><a href="/profile?user=${encodeURIComponent(c.name)}">${c.name}</a></div>
            <div class="em-collab-share">${Number(c.share) || 0}%</div>
          </div>
        `).join('')}
        <div class="em-collab-bar">
          <div class="seg me" style="width:${mySharePct}%"></div>
          <div class="seg them" style="width:${totalCollabShare}%"></div>
        </div>
        <div class="em-collab-note">売り上げは上記の割合で自動分配されます</div>
      </div>
    </div>
  ` : '';

  // Price chips (General / Reservation / Subscriber)
  const subPriceNum = e.subscriberPrice && Number(e.subscriberPrice) > 0
    ? Number(e.subscriberPrice) : 0;
  const priceChipsHtml = `
    <div class="em-price-row">
      <div class="em-price-chip">
        <div class="em-price-chip-label">General</div>
        <div class="em-price-chip-value">${e.price}</div>
      </div>
      ${e.reservation ? `
      <div class="em-price-chip reservation">
        <div class="em-price-chip-label">予約受付</div>
        <div class="em-price-chip-value">OPEN</div>
      </div>` : ''}
      ${subPriceNum > 0 ? `
      <div class="em-price-chip subscriber">
        <div class="em-price-chip-label">Subscriber</div>
        <div class="em-price-chip-value">¥${Number(subPriceNum).toLocaleString()}</div>
      </div>` : ''}
    </div>
  `;

  // Subscription gating for sub-price button
  let subscribedArtists = [];
  try { subscribedArtists = JSON.parse(localStorage.getItem('livepass_subscribed_artists') || '[]'); }
  catch(err) { subscribedArtists = []; }
  // currentUser declared earlier in the function (for isOwnerReservable)
  const eventOwner  = e.author || e.by || 'NOBBY';
  const isSubscribed = subscribedArtists.includes(eventOwner) || eventOwner === currentUser;

  // Fallback By line only when there are no credits (artists + team)
  const byFallbackHtml = (!hasCredits) ? `
    <div class="em-section">
      <div class="em-sec-label">By</div>
      <div class="em-sec-body">${e.by || ''}</div>
    </div>
  ` : '';

  // ─── Parse description into credits-style rows (same rule as profile) ───
  function renderBodyAsCredits(raw){
    const text = (raw || '').trim();
    if (!text) return '<div class="em-sec-body">No description</div>';
    const blocks = text.split(/\n(?=\s*■)/);
    if (blocks.length === 1 && !/■/.test(blocks[0])) {
      return `<div class="em-sec-body">${blocks[0].replace(/\n/g,'<br>')}</div>`;
    }
    const leading = /^\s*■/.test(blocks[0]) ? '' : blocks.shift().trim();
    const leadHtml = leading ? `<div class="em-sec-body" style="margin-bottom:14px">${leading.replace(/\n/g,'<br>')}</div>` : '';
    const rows = blocks.map(b => {
      const m = b.match(/^\s*■\s*([^\n]+)\n?([\s\S]*)$/);
      if (!m) return '';
      const role = m[1].trim();
      const content = (m[2] || '').trim();
      if (!content) return '';
      const lines = content.split('\n').map(l => l.trim()).filter(Boolean);
      const allBullets = lines.length > 0 && lines.every(l => l.startsWith('・'));
      let bodyHtml;
      if (allBullets) {
        bodyHtml = lines.map(l => `<span class="nm">${l.replace(/^・\s*/, '')}</span>`).join('');
      } else {
        bodyHtml = content.replace(/\n/g, '<br>');
      }
      return `
        <div class="em-credits-group">
          <div class="em-credits-role">${role}</div>
          <div class="em-credits-name">${bodyHtml}</div>
        </div>
      `;
    }).join('');
    return `${leadHtml}<div class="em-credits" style="padding:0">${rows}</div>`;
  }

  emBody.innerHTML = `
    ${coverAndHeroHtml}
    ${teamHtml}

    <div class="em-section">
      <div class="em-sec-label">About</div>
      ${renderBodyAsCredits(e.desc)}
    </div>

    ${byFallbackHtml}
    ${collabHtml}

    <div class="em-section">
      <div class="em-sec-label">Price</div>
      ${priceChipsHtml}
    </div>

    <div class="em-cta">
      <div class="em-cta-stack">
        <button class="em-buy-btn" id="emBuyBtn"
          style="background:${e.catColor};box-shadow:0 8px 32px ${hexToRgba(e.catColor,.25)}">
          ${e.type === 'workshop' ? '参加申込' : 'TICKET を購入'}
          <span class="em-buy-price">${e.price}</span>
        </button>

        ${e.reservation ? `
        <button class="em-reserve-btn" id="emReserveBtn" type="button">
          <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/><path d="M9 16l2 2 4-4"/></svg>
          予約する
        </button>` : ''}

        ${subPriceNum > 0 ? `
        <button class="em-sub-price-btn ${isSubscribed ? '' : 'locked'}" id="emSubBtn" type="button"
          ${isSubscribed ? '' : 'aria-disabled="true"'}>
          <svg viewBox="0 0 24 24"><path d="M12 2l3 7h7l-5.5 4.5L18 21l-6-4-6 4 1.5-7.5L2 9h7l3-7z"/></svg>
          サブスク限定価格
          <span class="em-sub-price-btn-price">¥${Number(subPriceNum).toLocaleString()}</span>
          <span class="em-sub-price-btn-lock">🔒</span>
        </button>
        ${isSubscribed ? '' : `
        <div class="em-sub-hint">${eventOwner} のサブスク加入者限定価格です</div>`}
        ` : ''}
      </div>
      <div class="em-sub-actions">
        <button class="em-sub-btn">🔖 保存</button>
        <button class="em-sub-btn">📤 共有</button>
      </div>
    </div>
  `;
  eventModal.classList.add('active');
  eventModal.setAttribute('aria-hidden','false');

  // Artist chips → navigate to that user's profile
  emBody.querySelectorAll('.em-artist').forEach(btn => {
    btn.addEventListener('click', () => {
      if (navigator.vibrate) navigator.vibrate(8);
      const name = decodeURIComponent(btn.dataset.artist || '');
      if (name) location.href = '/profile?user=' + encodeURIComponent(name);
    });
  });

  // Shared checkout runner
  const runCheckout = async (amount, opts = {}) => {
    if (!amount || amount < 1) { alert('価格が未設定です'); return; }
    const target = opts.button;
    const originalHtml = target.innerHTML;
    target.disabled = true;
    target.innerHTML = '処理中…';
    try {
      const r = await fetch('/api/checkout', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          productType: opts.productType || e.type || 'event',
          productId:   e.id,
          title:       (opts.titlePrefix ? opts.titlePrefix + ' · ' : '') + e.title,
          description: `${e.venue} · ${e.time}`,
          amount:      amount,
          cover:       null,
          userId:      (function(){
            try { return JSON.parse(localStorage.getItem('livepass_holder') || '{}').id || ''; }
            catch(err) { return ''; }
          })(),
        }),
      });
      const data = await r.json();
      if (data.stub) {
        alert(data.message || 'Stripe テストモード未設定');
        target.disabled = false;
        target.innerHTML = originalHtml;
        return;
      }
      if (!r.ok || !data.url) throw new Error(data.error || 'checkout failed');
      if (navigator.vibrate) navigator.vibrate(12);
      location.href = data.url;
    } catch (err) {
      alert('決済ページを開けませんでした: ' + err.message);
      target.disabled = false;
      target.innerHTML = originalHtml;
    }
  };

  // Wire up the buy button → Stripe Checkout
  const buyBtn = document.getElementById('emBuyBtn');
  if (buyBtn) {
    buyBtn.addEventListener('click', () => {
      const amount = parseInt((e.priceRaw || e.price || '').toString().replace(/[^\d]/g, ''), 10);
      runCheckout(amount, { button: buyBtn });
    });
  }

  // Reservation → open card registration sheet first, persist on confirm
  const reserveBtn = document.getElementById('emReserveBtn');
  if (reserveBtn) {
    reserveBtn.addEventListener('click', () => {
      if (navigator.vibrate) navigator.vibrate(10);
      // Check for existing reservation by the current user
      try {
        const me = localStorage.getItem('livepass_account_name') || 'NOBBY';
        const existing = JSON.parse(localStorage.getItem('livepass_reservations') || '[]');
        const dupe = existing.find(r => r.eventId === e.id && r.userId === me && r.status === 'confirmed');
        if (dupe) {
          alert('既に予約済みです。\n\n/profile → SAVED → 予約 タブから確認・取り消しができます。');
          return;
        }
      } catch(err) {}
      // Build the item shape expected by openCardSheet
      openCardSheet({
        item: {
          id: e.id,
          title: e.title,
          venue: e.venue,
          time: e.time,
          date: e.rawDate || (e.time || '').match(/\d{4}-\d{2}-\d{2}/)?.[0],
          author: e.author || e.by,
          type: e.type,
          cancelFee: e.cancelFee,
          cancelDeadlineH: e.cancelDeadlineH,
        },
        type: e.type || 'event',
        onConfirmed: () => {
          reserveBtn.disabled = true;
          reserveBtn.style.opacity = '.6';
          reserveBtn.innerHTML = `
            <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
            予約済み
          `;
        },
      });
    });
  }

  // Owner 予約者 button — shown as an overlay badge on the hero for owners
  const ownerBtn = document.getElementById('emOwnerReservesBtn');
  if (ownerBtn) {
    ownerBtn.addEventListener('click', () => {
      if (navigator.vibrate) navigator.vibrate(10);
      openOrgSheet({
        id: e.id,
        title: e.title,
        author: e.author || e.by,
      });
    });
  }

  // Subscriber-only price button — gated on subscription to the artist
  const subBtn = document.getElementById('emSubBtn');
  if (subBtn) {
    subBtn.addEventListener('click', () => {
      if (!isSubscribed) {
        if (navigator.vibrate) navigator.vibrate([30, 40, 30]);
        alert(`${eventOwner} のサブスクに加入するとこの価格で購入できます。\n\nプロフィール → SUBSCRIPTION から加入してください。`);
        location.href = '/profile?user=' + encodeURIComponent(eventOwner) + '#sub';
        return;
      }
      runCheckout(subPriceNum, {
        button: subBtn,
        titlePrefix: 'SUBSCRIBER',
        productType: (e.type || 'event') + '-subscriber',
      });
    });
  }
}

function hexToRgba(hex, a) {
  const h = hex.replace('#','');
  const r = parseInt(h.substring(0,2), 16);
  const g = parseInt(h.substring(2,4), 16);
  const b = parseInt(h.substring(4,6), 16);
  return `rgba(${r},${g},${b},${a})`;
}

emClose.addEventListener('click', () => {
  eventModal.classList.remove('active');
  eventModal.setAttribute('aria-hidden','true');
  setTimeout(() => { emBody.innerHTML = ''; }, 300);
});
window.addEventListener('keydown', e => {
  if (e.key === 'Escape' && eventModal.classList.contains('active')) emClose.click();
});

/* ─────────────────────────────────────────────
   CARD REGISTRATION SHEET — simulated Stripe SetupIntent
   ───────────────────────────────────────────── */
const cardSheetOverlay = document.getElementById('cardSheetOverlay');
const cdrsEventTitle   = document.getElementById('cdrsEventTitle');
const cdrsEventMeta    = document.getElementById('cdrsEventMeta');
const cdrsPolicy       = document.getElementById('cdrsPolicy');
const cdrsHolder       = document.getElementById('cdrsCardHolder');
const cdrsNumber       = document.getElementById('cdrsCardNumber');
const cdrsExp          = document.getElementById('cdrsCardExp');
const cdrsCvc          = document.getElementById('cdrsCardCvc');
const cdrsSubmit       = document.getElementById('cdrsSubmit');
const cdrsCancel       = document.getElementById('cdrsCancel');

cdrsNumber?.addEventListener('input', () => {
  const raw = cdrsNumber.value.replace(/\s+/g, '').replace(/\D/g, '');
  const parts = raw.match(/.{1,4}/g) || [];
  cdrsNumber.value = parts.join(' ');
  validateCard();
});
cdrsExp?.addEventListener('input', () => {
  let v = cdrsExp.value.replace(/\D/g, '').slice(0, 4);
  if (v.length >= 3) v = v.slice(0,2) + '/' + v.slice(2);
  cdrsExp.value = v;
  validateCard();
});
cdrsCvc?.addEventListener('input', () => {
  cdrsCvc.value = cdrsCvc.value.replace(/\D/g, '').slice(0, 4);
  validateCard();
});
cdrsHolder?.addEventListener('input', validateCard);

function validateCard(){
  const n = cdrsNumber.value.replace(/\s+/g, '');
  const holder = cdrsHolder.value.trim();
  const exp    = cdrsExp.value;
  const cvc    = cdrsCvc.value;
  const ok = holder.length >= 2 && n.length >= 13 && /^\d{2}\/\d{2}$/.test(exp) && cvc.length >= 3;
  cdrsSubmit.disabled = !ok;
}

function computeCancelDeadline(eventDate, hoursBefore){
  if (!eventDate || !hoursBefore) return null;
  try {
    const d = new Date(eventDate);
    if (isNaN(d.getTime())) return null;
    return new Date(d.getTime() - hoursBefore * 3600 * 1000).toISOString();
  } catch(e) { return null; }
}

let pendingReserveContext = null;

function openCardSheet(ctx){
  pendingReserveContext = ctx;
  const { item } = ctx;
  cdrsEventTitle.textContent = item.title || '(no title)';
  cdrsEventMeta.textContent = (item.venue || '') + ' · ' + (item.time || '');

  const fee = Number(item.cancelFee || 0);
  const hrs = Number(item.cancelDeadlineH || 0);
  if (hrs === 0) {
    cdrsPolicy.innerHTML = `<b>キャンセルポリシー</b><br>キャンセル不可のイベントです。予約後のキャンセルは ¥${fee.toLocaleString()} の料金が自動請求されます。`;
  } else if (fee > 0) {
    cdrsPolicy.innerHTML = `<b>キャンセルポリシー</b><br>開催 ${hrs} 時間前までは無料でキャンセル可能です。<br>以降のキャンセル / 無連絡欠席は <b>¥${fee.toLocaleString()}</b> を登録カードに自動請求します。`;
  } else {
    cdrsPolicy.innerHTML = `<b>キャンセルポリシー</b><br>キャンセル料はかかりません。いつでもキャンセル可能です。`;
  }

  const me = localStorage.getItem('livepass_account_name') || 'NOBBY';
  if (!cdrsHolder.value) cdrsHolder.value = me.toUpperCase();

  validateCard();
  cardSheetOverlay.classList.add('active');
  cardSheetOverlay.setAttribute('aria-hidden', 'false');
}
function closeCardSheet(){
  cardSheetOverlay.classList.remove('active');
  cardSheetOverlay.setAttribute('aria-hidden', 'true');
  pendingReserveContext = null;
}
cardSheetOverlay?.addEventListener('click', (e) => { if (e.target === cardSheetOverlay) closeCardSheet(); });
cdrsCancel?.addEventListener('click', closeCardSheet);

cdrsSubmit?.addEventListener('click', () => {
  if (!pendingReserveContext) return;
  const { item, type, onConfirmed } = pendingReserveContext;
  const rawNum = cdrsNumber.value.replace(/\s+/g, '');
  const last4  = rawNum.slice(-4);
  const me     = localStorage.getItem('livepass_account_name') || 'NOBBY';
  const now    = new Date().toISOString();

  // item.date in calendar shape is typically the raw YYYY-MM-DD
  const rawDate = item.date || item.rawDate || (item.time || '').match(/\d{4}-\d{2}-\d{2}/)?.[0] || null;
  const deadlineIso = computeCancelDeadline(rawDate, Number(item.cancelDeadlineH || 0));

  try {
    const key = 'livepass_reservations';
    const existing = JSON.parse(localStorage.getItem(key) || '[]');
    if (existing.find(r => r.eventId === item.id && r.userId === me && r.status !== 'canceled_free')) {
      alert('既にこのイベントを予約しています');
      closeCardSheet();
      return;
    }
    existing.unshift({
      id:              'r' + Date.now(),
      eventId:         item.id,
      eventType:       type || item.type || 'event',
      title:           item.title,
      date:            rawDate || item.time,
      venue:           item.venue,
      eventAuthor:     item.author || item.by || 'NOBBY',
      userId:          me,
      userName:        me,
      reservedAt:      now,
      cancelFee:       Number(item.cancelFee || 0),
      cancelDeadline:  deadlineIso,
      cancelDeadlineH: Number(item.cancelDeadlineH || 0),
      cardLast4:       last4,
      cardHolder:      cdrsHolder.value.trim(),
      status:          'confirmed',
      chargedAmount:   0,
    });
    localStorage.setItem(key, JSON.stringify(existing));
    cdrsNumber.value = ''; cdrsCvc.value = '';
    closeCardSheet();
    if (navigator.vibrate) navigator.vibrate([12, 30, 12]);
    if (onConfirmed) onConfirmed();
    const ok = confirm(`予約を受け付けました。\n\n${item.title}\nカード登録: •••• ${last4}\n\n今すぐ予約一覧を確認しますか？`);
    if (ok) location.href = '/profile#panel-saved';
  } catch(e) {
    alert('予約に失敗しました: ' + e.message);
  }
});

/* ─────────────────────────────────────────────
   ORGANIZER RESERVATION SHEET
   ───────────────────────────────────────────── */
const orgSheetOverlay = document.getElementById('orgSheetOverlay');
const orgList         = document.getElementById('orgList');
const orgTitleEl      = document.getElementById('orgTitle');
const orgSubEl        = document.getElementById('orgSub');
const orgCloseBtn     = document.getElementById('orgClose');

function openOrgSheet(item){
  const me = localStorage.getItem('livepass_account_name') || 'NOBBY';
  const all = (() => {
    try { return JSON.parse(localStorage.getItem('livepass_reservations') || '[]'); }
    catch(e) { return []; }
  })();
  const list = all.filter(r => r.eventId === item.id && r.eventAuthor === me);
  orgTitleEl.textContent = item.title || '(no title)';
  orgSubEl.textContent   = `予約者 ${list.filter(r=>r.status==='confirmed').length}人 / 全 ${list.length}件`;

  if (list.length === 0) {
    orgList.innerHTML = `<div class="org-empty">まだ予約はありません</div>`;
  } else {
    const initialsOf = (n) => (n || '?').replace(/[^A-Za-z0-9\u3040-\u30FF\u4E00-\u9FFF]/g, '').slice(0, 2).toUpperCase();
    orgList.innerHTML = '';
    list.forEach(r => {
      const row = document.createElement('div');
      row.className = 'org-item' + (r.status !== 'confirmed' ? ' canceled' : '');
      const reservedAt = r.reservedAt ? new Date(r.reservedAt).toLocaleString('ja-JP', { month:'short', day:'numeric', hour:'2-digit', minute:'2-digit' }) : '—';
      const card = r.cardLast4 ? `•••• ${r.cardLast4}` : '—';
      const statusLabel = r.status === 'confirmed' ? '予約確定'
        : r.status === 'canceled_free' ? 'キャンセル済み (無料)'
        : r.status === 'canceled_charged' ? `キャンセル請求済み ¥${Number(r.chargedAmount||0).toLocaleString()}`
        : r.status === 'no_show' ? `無連絡欠席 ¥${Number(r.chargedAmount||0).toLocaleString()} 請求済`
        : r.status;
      const canCharge = r.status === 'confirmed' && Number(r.cancelFee||0) > 0;
      row.innerHTML = `
        <div class="org-item-top">
          <div class="org-item-avatar">${initialsOf(r.userName || r.userId)}</div>
          <div>
            <div class="org-item-name">${r.userName || r.userId || '—'}</div>
            <div class="org-item-sub">${reservedAt} · 💳 ${card}</div>
          </div>
        </div>
        <div class="org-item-body">
          <div>${statusLabel}</div>
          ${canCharge ? `<button class="org-item-charge" data-rid="${r.id}">無連絡欠席 ¥${Number(r.cancelFee||0).toLocaleString()} 請求</button>` : ''}
        </div>
      `;
      orgList.appendChild(row);
    });
    orgList.querySelectorAll('.org-item-charge').forEach(btn => {
      btn.addEventListener('click', () => {
        const rid = btn.dataset.rid;
        if (!confirm('この予約者に無連絡欠席のキャンセル料を請求しますか？\n\n（プロトタイプ環境では実際の決済は行われません）')) return;
        try {
          const all2 = JSON.parse(localStorage.getItem('livepass_reservations') || '[]');
          const idx = all2.findIndex(x => x.id === rid);
          if (idx < 0) return;
          all2[idx].status = 'no_show';
          all2[idx].chargedAmount = Number(all2[idx].cancelFee || 0);
          all2[idx].chargedAt = new Date().toISOString();
          localStorage.setItem('livepass_reservations', JSON.stringify(all2));
          if (navigator.vibrate) navigator.vibrate([12, 40, 12]);
          openOrgSheet(item);
        } catch (e) { alert('請求に失敗しました: ' + e.message); }
      });
    });
  }
  orgSheetOverlay.classList.add('active');
  orgSheetOverlay.setAttribute('aria-hidden', 'false');
}
function closeOrgSheet(){
  orgSheetOverlay.classList.remove('active');
  orgSheetOverlay.setAttribute('aria-hidden', 'true');
}
orgCloseBtn?.addEventListener('click', closeOrgSheet);
orgSheetOverlay?.addEventListener('click', (e) => { if (e.target === orgSheetOverlay) closeOrgSheet(); });

/* Top bar counters + unread badge */
(function syncCounters(){
  try {
    const f1 = JSON.parse(localStorage.getItem('livepass_following') || '[]').length;
    const f2 = JSON.parse(localStorage.getItem('livepass_followers') || '[]').length;
    document.querySelectorAll('[data-count="following"]').forEach(el => el.textContent = f1 || '0');
    document.querySelectorAll('[data-count="followers"]').forEach(el => el.textContent = f2 || '0');
    const unread = parseInt(localStorage.getItem('livepass_unread_count') || '3', 10);
    const badge = document.getElementById('msgBadge');
    if (badge) {
      if (unread > 0) { badge.textContent = unread > 99 ? '99+' : String(unread); badge.style.display = ''; }
      else { badge.style.display = 'none'; }
    }
  } catch(e) {}
})();

/* Compose selector */
(function initComposeSheet(){
  const btn=document.getElementById('tbCreate'),ov=document.getElementById('composeSheetOverlay'),cb=document.getElementById('csClose');
  if(!btn||!ov)return;
  const open=()=>{ov.classList.add('active');ov.setAttribute('aria-hidden','false');if(navigator.vibrate)navigator.vibrate(8)};
  const dismiss=()=>{ov.classList.remove('active');ov.setAttribute('aria-hidden','true')};
  btn.addEventListener('click',open);cb.addEventListener('click',dismiss);
  ov.addEventListener('click',e=>{if(e.target===ov)dismiss()});
  document.querySelectorAll('.cs-opt').forEach(o=>o.addEventListener('click',()=>{
    const t=o.dataset.type;if(navigator.vibrate)navigator.vibrate(12);
    location.href='/compose/'+t;
  }));
  window.addEventListener('keydown',e=>{if(e.key==='Escape'&&ov.classList.contains('active'))dismiss()});
})();
</script>
