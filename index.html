@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#000;--bg2:#0a0a0a;--bg3:#111;
  --fg:#fff;--muted:rgba(255,255,255,.3);
  --border:rgba(255,255,255,.07);--dim:rgba(255,255,255,.04);
  --lp:#A8E63D;--sp:#F5C842;--red:#FF3B30;
  --nav-h:64px;
}
html,body{
  height:100%;height:100dvh;
  background:var(--bg);color:var(--fg);
  font-family:'Inter',sans-serif;
  overflow:hidden;
}

/* ── APP SHELL ── */
#shell{
  max-width:430px;margin:0 auto;
  height:100dvh;display:flex;flex-direction:column;
  overflow:hidden;position:relative;
  background:var(--bg);
}

/* ── SPLASH ── */
#splash{
  position:absolute;inset:0;z-index:1000;
  background:var(--bg);
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  gap:0;
  transition:opacity .5s,transform .5s;
}
#splash.hide{opacity:0;pointer-events:none;transform:scale(1.04)}
.splash-logo{font-size:13px;font-weight:800;letter-spacing:5px;color:#fff;margin-bottom:4px}
.splash-logo span{color:var(--red)}
.splash-tagline{font-size:22px;font-weight:300;letter-spacing:8px;color:rgba(255,255,255,.45);line-height:2;text-align:center;text-transform:uppercase;margin-top:32px}
.splash-bar{width:40px;height:1px;background:rgba(255,255,255,.1);margin:24px auto 0;position:relative;overflow:hidden}
.splash-bar-fill{position:absolute;left:0;top:0;height:100%;background:var(--lp);width:0;transition:width 2s linear}

/* ── CONTENT FRAME ── */
#content{
  flex:1;overflow:hidden;position:relative;min-height:0;
}
#frame{
  width:100%;height:100%;border:none;
  display:block;background:var(--bg);
  transition:opacity .2s;
}
#frame.loading{opacity:0}

/* ── TRANSITION OVERLAY ── */
#trans{
  position:absolute;inset:0;
  background:var(--bg);
  opacity:0;pointer-events:none;
  transition:opacity .15s;
  z-index:50;
}
#trans.show{opacity:1;pointer-events:auto}

/* ── BOTTOM NAV (removed — nav is now inside iframe) ── */

/* ── SUBNAV (appears above nav for deep pages) ── */
#subnav{
  flex-shrink:0;height:0;overflow:hidden;
  border-top:0.5px solid var(--border);
  background:rgba(0,0,0,.95);
  display:flex;align-items:center;
  transition:height .2s;
  z-index:190;
}
#subnav.open{height:40px}
.sn-btn{
  flex:1;background:none;border:none;cursor:pointer;
  font-family:'Inter',sans-serif;font-size:7px;letter-spacing:2px;
  color:var(--muted);text-transform:uppercase;font-weight:500;
  padding:0 6px;height:100%;transition:color .15s;
}
.sn-btn.active{color:var(--fg)}
.sn-divider{width:0.5px;height:16px;background:var(--border);flex-shrink:0}

/* ── MODE SWITCHER (removed) ── */

/* ── BACK BUTTON (shows on sub-pages) ── */
#back-btn{
  position:absolute;top:12px;left:14px;z-index:300;
  background:rgba(0,0,0,.7);backdrop-filter:blur(10px);
  border:0.5px solid var(--border);border-radius:100px;
  color:var(--muted);cursor:pointer;
  font-size:11px;padding:5px 12px 5px 8px;
  display:none;align-items:center;gap:5px;
  font-family:'Inter',sans-serif;font-size:8px;letter-spacing:1px;
  transition:all .2s;
}
#back-btn.visible{display:flex}
#back-btn:hover{border-color:rgba(255,255,255,.2);color:var(--fg)}

// ── STATE ──
let currentPage = 'home';
let history_stack = [];
let moreBlob = null;

// ── NAVIGATION ──
function nav(page, pushHistory=true) {
  if(page === currentPage) return;

  const route = ROUTES[page];
  if(!route) return;

  // Handle more menu
  if(route.isMenu) {
    if(!moreBlob) {
      const blob = new Blob([MORE_HTML], {type:'text/html'});
      moreBlob = URL.createObjectURL(blob);
    }
    loadFrame(moreBlob, page, pushHistory);
    return;
  }

  loadFrame(route.src, page, pushHistory);
}

function loadFrame(src, page, pushHistory=true) {
  const frame  = document.getElementById('frame');
  const trans  = document.getElementById('trans');
  const back   = document.getElementById('back-btn');
  const route  = ROUTES[page] || {};

  // transition
  trans.classList.add('show');
  setTimeout(() => {
    frame.src = src;
    currentPage = page;

    if(pushHistory && history_stack[history_stack.length-1] !== page) {
      history_stack.push(page);
    }

    // Back button
    if(route.showBack || route.parent) {
      back.classList.add('visible');
    } else {
      back.classList.remove('visible');
    }

    setTimeout(() => { trans.classList.remove('show'); }, 100);
  }, 150);
}

function goBack() {
  history_stack.pop(); // remove current
  const prev = history_stack[history_stack.length-1] || 'home';
  nav(prev, false);
}

// ── SPLASH ──
function runSplash() {
  const lines = ['YOU','WERE','THERE'];
  const ids   = ['sl1','sl2','sl3'];
  let i = 0;

  function showNext() {
    if(i >= lines.length) {
      // Start loading bar
      setTimeout(() => {
        document.getElementById('splash-progress').style.width = '100%';
      }, 100);
      setTimeout(hideSplash, 2200);
      return;
    }
    const el = document.getElementById(ids[i]);
    el.textContent = lines[i];
    el.style.opacity = '1';
    i++;
    setTimeout(showNext, 700);
  }
  setTimeout(showNext, 400);
}

function hideSplash() {
  document.getElementById('splash').classList.add('hide');
  setTimeout(() => {
    document.getElementById('splash').style.display = 'none';
  }, 600);
}

// ── INIT ──
window.addEventListener('load', () => {
  // Coming from the NFC cinematic — skip the splash so we don't replay
  // YOU WERE THERE on top of an experience that already showed it.
  const qs = new URLSearchParams(location.search);
  if (qs.get('from') === 'nfc') {
    document.getElementById('splash').style.display = 'none';
    return;
  }
  runSplash();
});

// Expose nav globally so more menu iframes can call parent.nav()
window.nav = nav;
