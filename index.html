<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#000000">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/livepass-icon-180.png">
<title>LIVE PASS</title>
<style>
html,body{
  margin:0;padding:0;width:100%;height:100%;height:100dvh;
  background:#000;color:#EDEBE6;
  font-family:Arial,'Noto Sans JP',sans-serif;
  -webkit-font-smoothing:antialiased;
  overflow:hidden;
  display:flex;align-items:center;justify-content:center;
}
.logo{height:32px;width:auto;opacity:.85;filter:drop-shadow(0 2px 16px rgba(0,0,0,.6))}
</style>
</head>
<body>
<img class="logo" src="/livepasslogo.png" alt="LIVE PASS">
<script>
// Hard redirect to the real app. Any cached HTML, service workers, or
// stale PWA start_urls that still land on /index.html immediately get
// bounced to the current home page. No iframe, no legacy shell.
(function(){
  try {
    // If the user is already signed in, go to /home
    // If not, go to /onboarding for the sign-up flow
    const signedIn = !!localStorage.getItem('livepass_account_name');
    location.replace(signedIn ? '/profile' : '/onboarding');
  } catch(e) {
    location.replace('/profile');
  }
})();
</script>
</body>
</html>
