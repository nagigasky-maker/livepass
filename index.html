<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#000000">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/livepass-icon-180.png">
<title>EXPASS</title>
<style>
html,body{
  margin:0;padding:0;width:100%;height:100%;height:100dvh;
  background:#000;color:#EDEBE6;
  font-family:Arial,'Noto Sans JP',sans-serif;
  -webkit-font-smoothing:antialiased;
  overflow:hidden;
  display:flex;align-items:center;justify-content:center;
}
.logo{height:32px;width:auto;opacity:.85;filter:drop-shadow(0 2px 16px rgba(0,0,0,.6))}
</style>
<script type="module" src="/firebase-init.js"></script>
</head>
<body>
<img class="logo" src="/livepasslogo.png" alt="EXPASS">
<script>
/* Entry router:
   1. If Firebase Auth resolves to a signed-in user → /profile
   2. Else if localStorage has livepass_account_name (legacy cache) → /profile
   3. Else → /login (which has a signup link to /onboarding)
   We wait up to 1.5s for Firebase to resolve before falling through to
   the localStorage check so the first visit isn't stalled by network. */
(function(){
  const hasLocalIdentity = !!localStorage.getItem('livepass_account_name');

  function decide(user){
    if (user) location.replace('/profile');
    else if (hasLocalIdentity) location.replace('/profile');
    else location.replace('/login');
  }

  let decided = false;
  function finish(user){
    if (decided) return;
    decided = true;
    try { decide(user); } catch(e) { location.replace('/login'); }
  }

  window.addEventListener('fb-auth-ready', (e) => finish(e.detail && e.detail.user), { once:true });
  // Fallback if firebase-init never loads
  setTimeout(() => finish(null), 1500);
})();
</script>
</body>
</html>
