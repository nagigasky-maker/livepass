<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#000000">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/livepass-icon-180.png">
<title>EXPASS — Record Booth / 視聴</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=IBM+Plex+Mono:wght@400;500&family=Noto+Sans+JP:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<style>
:root{
  --black:#000;--bg:#020206;--white:#EDEBE6;
  --blue:#3DAAFF;--gold:#F5C842;--red:#E8100A;
  --mint:#00E5A0;--muted:rgba(237,235,230,.3);--border:rgba(255,255,255,.07);
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bot:env(safe-area-inset-bottom,0px);
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;max-width:100vw;height:100%;height:100dvh;
  background:#020206;color:var(--white);
  font-family:'Noto Sans JP','Inter',sans-serif;-webkit-font-smoothing:antialiased;
  user-select:none;-webkit-user-select:none;overflow:hidden;
  position:fixed;overscroll-behavior-x:none;touch-action:pan-y;}
a{color:inherit;text-decoration:none}
button{background:none;border:none;color:inherit;font:inherit;cursor:pointer}

.topbar{position:fixed;top:0;left:0;right:0;z-index:100;
  padding:calc(var(--safe-top) + 6px) 14px 8px;
  display:flex;align-items:center;gap:10px;
  background:linear-gradient(to bottom,rgba(2,2,6,.9) 70%,transparent);}
.tb-back{width:34px;height:34px;display:flex;align-items:center;justify-content:center;
  border-radius:50%;background:rgba(255,255,255,.06);}
.tb-back svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.tb-title{flex:1;text-align:center;font-family:'IBM Plex Mono',monospace;font-size:10px;
  letter-spacing:.28em;text-transform:uppercase;color:var(--blue);}
.tb-spacer{width:34px;height:34px}

.content{
  position:fixed;top:0;left:0;right:0;bottom:0;
  padding-top:calc(var(--safe-top) + 52px);
  padding-bottom:calc(var(--safe-bot) + 40px);
  overflow-y:auto;overflow-x:hidden;
  scrollbar-width:none;-webkit-overflow-scrolling:touch;
}
.content::-webkit-scrollbar{display:none}

.rb-hero{padding:18px 22px 22px}
.rb-eyebrow{font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:.28em;
  text-transform:uppercase;color:var(--blue);margin-bottom:6px}
.rb-title{
  font-family:'Inter',sans-serif;font-weight:800;
  font-size:clamp(30px,7vw,40px);letter-spacing:-0.02em;line-height:.98;
}
.rb-sub{margin-top:10px;font-size:12px;line-height:1.7;color:rgba(237,235,230,.5);max-width:480px}

/* Horizontal shelf of records */
.shelf{
  padding:12px 22px 20px;
  display:flex;gap:18px;overflow-x:auto;overflow-y:visible;
  scrollbar-width:none;
  scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch;
  scroll-padding-inline:22px;
}
.shelf::-webkit-scrollbar{display:none}

.rec-card{
  flex:0 0 auto;width:72vw;max-width:260px;
  scroll-snap-align:start;
  cursor:pointer;
  display:flex;flex-direction:column;gap:10px;
}
.rec-jacket{
  position:relative;width:100%;aspect-ratio:1/1;border-radius:6px;overflow:hidden;
  box-shadow:0 24px 40px rgba(0,0,0,.7),0 8px 20px rgba(0,0,0,.5);
  border:0.5px solid rgba(255,255,255,.08);
  transition:transform .3s ease, box-shadow .3s ease;
}
.rec-card:active .rec-jacket{transform:translateY(-3px) scale(1.01);box-shadow:0 28px 48px rgba(0,0,0,.8),0 10px 24px rgba(0,0,0,.6)}
.rec-jacket .rj-art{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  font-family:'Inter',sans-serif;font-weight:900;font-size:36px;letter-spacing:.02em;color:rgba(0,0,0,.25);text-align:center;padding:18px}
.rec-meta{padding:0 2px}
.rec-artist{font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:.22em;text-transform:uppercase;color:var(--blue);margin-bottom:2px}
.rec-name{font-family:'Inter',sans-serif;font-weight:700;font-size:14px;letter-spacing:-0.01em;line-height:1.3}
.rec-price{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.1em;color:rgba(237,235,230,.55);margin-top:4px}

.shelf-label{
  padding:28px 22px 6px;
  font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.3em;
  text-transform:uppercase;color:rgba(237,235,230,.35);
}

/* CREATE card — single row entry point to /compose/record. */
.create-card{
  margin:10px 22px 32px;display:flex;align-items:center;gap:14px;
  padding:18px;border-radius:14px;
  background:
    radial-gradient(120% 80% at 0% 0%, rgba(61,170,255,.14), transparent 60%),
    linear-gradient(160deg,#0c0c14,#050508);
  border:0.5px solid rgba(61,170,255,.28);
  text-decoration:none;color:inherit;
  transition:transform .18s ease, border-color .2s ease;
}
.create-card:active{transform:scale(.99);border-color:rgba(61,170,255,.5)}
.create-card .cc-plus{
  width:46px;height:46px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  background:rgba(61,170,255,.12);border:1px solid rgba(61,170,255,.3);color:var(--blue);
}
.create-card .cc-plus svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:2}
.create-card .cc-text{flex:1;min-width:0}
.create-card .cc-title{
  font-family:'Inter',sans-serif;font-weight:700;font-size:15px;letter-spacing:-0.005em;
  margin-bottom:2px;
}
.create-card .cc-sub{
  font-size:11px;line-height:1.6;color:rgba(237,235,230,.5);
  overflow:hidden;text-overflow:ellipsis;
}
.create-card .cc-chev{
  width:28px;height:28px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  background:rgba(255,255,255,.04);color:rgba(237,235,230,.6);
}
.create-card .cc-chev svg{width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:2}

/* ═══════════════════════════════════════════════════════
   FULLSCREEN LIGHTBOX PLAYER
   ═══════════════════════════════════════════════════════ */
#lightbox{
  position:fixed;inset:0;z-index:300;
  background:rgba(0,0,0,0);backdrop-filter:blur(0px);-webkit-backdrop-filter:blur(0px);
  pointer-events:none;opacity:0;
  transition:background .45s ease, backdrop-filter .5s ease, opacity .25s ease;
  display:flex;flex-direction:column;
  padding:calc(var(--safe-top) + 12px) 20px calc(var(--safe-bot) + 20px);
}
#lightbox.open{
  background:rgba(2,2,6,.96);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  pointer-events:all;opacity:1;
}

.lb-close{
  align-self:flex-end;
  width:38px;height:38px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  background:rgba(255,255,255,.08);border:0.5px solid rgba(255,255,255,.1);
}
.lb-close svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round}

.lb-stage{
  flex:1;position:relative;
  display:flex;align-items:center;justify-content:center;
  margin:20px 0;
  perspective:1400px;
}

.lb-jacket,.lb-vinyl-tilt{
  position:absolute;top:50%;left:50%;
  width:min(64vw, 340px);aspect-ratio:1/1;
  transform:translate(-50%,-50%);
}
/* The outer .lb-vinyl-tilt is kept as a structural wrapper for future
   tilt experiments; right now both jacket and disc stay front-facing
   (cleanest look, no alignment issues) so the wrapper is just a layer
   for z-index and grouping. */
.lb-vinyl-tilt{
  transform-style:preserve-3d;
  z-index:3;
  pointer-events:none;
}
.lb-vinyl{
  position:absolute;inset:0;
  width:100%;height:100%;
  will-change:transform;
}
.lb-jacket{
  z-index:1;
  transform-style:preserve-3d;
  transform:translate(-50%,-50%) rotateY(0deg);
  will-change:transform;
}
.jk-face{
  position:absolute;inset:0;
  border-radius:6px;overflow:hidden;
  backface-visibility:hidden;
  -webkit-backface-visibility:hidden;
}
.jk-front{
  box-shadow:0 40px 70px rgba(0,0,0,.85),0 15px 30px rgba(0,0,0,.6);
  border:0.5px solid rgba(255,255,255,.1);
}
.jk-front .rj-art{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  font-family:'Inter',sans-serif;font-weight:900;font-size:48px;letter-spacing:.02em;color:rgba(0,0,0,.28);text-align:center;padding:22px}

/* Turntable — the back face of the jacket.
   It's a dark plinth with a circular platter, tonearm, and spindle. */
.jk-back{
  transform:rotateY(180deg);
  background:
    radial-gradient(120% 80% at 20% 10%,rgba(255,255,255,.05),transparent 55%),
    linear-gradient(160deg,#1a1a1a 0%,#0a0a0a 70%);
  box-shadow:
    0 40px 70px rgba(0,0,0,.85),0 15px 30px rgba(0,0,0,.6),
    inset 0 0 0 1px rgba(255,255,255,.05);
}
.jk-back .tt-platter{
  position:absolute;top:50%;left:50%;
  width:82%;height:82%;border-radius:50%;
  transform:translate(-50%,-50%);
  background:
    radial-gradient(circle,#0f0f0f 0%,#080808 70%,#141414 100%);
  box-shadow:
    inset 0 0 0 3px rgba(0,0,0,.7),
    inset 0 0 22px rgba(0,0,0,.6),
    inset 0 0 0 1px rgba(255,255,255,.04);
}
.jk-back .tt-mat{
  position:absolute;top:50%;left:50%;
  width:74%;height:74%;border-radius:50%;
  transform:translate(-50%,-50%);
  background:
    radial-gradient(circle,#1a1a1a 0%,#101010 100%);
  box-shadow:inset 0 0 30px rgba(0,0,0,.8);
}
.jk-back .tt-spindle{
  position:absolute;top:50%;left:50%;
  width:3.2%;height:3.2%;border-radius:50%;
  transform:translate(-50%,-50%);
  background:linear-gradient(180deg,#e0e0e0,#888);
  box-shadow:0 0 0 1px rgba(0,0,0,.4), 0 2px 4px rgba(0,0,0,.5);
  z-index:2;
}
.jk-back .tt-arm-base{
  position:absolute;top:18%;right:8%;
  width:14%;height:14%;border-radius:50%;
  background:radial-gradient(circle,#2a2a2a,#0f0f0f);
  box-shadow:inset 0 0 0 1px rgba(255,255,255,.08), 0 2px 6px rgba(0,0,0,.5);
}
.jk-back .tt-arm{
  position:absolute;top:24%;right:15%;
  width:42%;height:3px;border-radius:2px;
  background:linear-gradient(90deg,#2a2a2a,#9a9a9a 20%,#e0e0e0 35%,#9a9a9a 85%,#2a2a2a);
  transform-origin:right center;
  transform:rotate(-32deg);
  box-shadow:0 2px 4px rgba(0,0,0,.5);
}
.jk-back .tt-arm::after{
  /* headshell */
  content:"";position:absolute;left:-12px;top:-4px;
  width:20px;height:10px;border-radius:2px;
  background:linear-gradient(180deg,#3a3a3a,#141414);
  box-shadow:inset 0 0 0 1px rgba(255,255,255,.1);
}
.jk-back .tt-led{
  position:absolute;top:10%;left:10%;
  width:6px;height:6px;border-radius:50%;
  background:#F5C842;
  box-shadow:0 0 8px rgba(245,200,66,.7);
}
.jk-back .tt-brand{
  position:absolute;bottom:9%;left:10%;
  font-family:'IBM Plex Mono',monospace;font-size:8px;letter-spacing:.22em;
  color:rgba(237,235,230,.35);text-transform:uppercase;
}

/* Vinyl (a realistic black disc with grooves + colored label) */
.lb-vinyl{
  border-radius:50%;
  background:
    radial-gradient(circle, #191919 0%, #0a0a0a 18%, #151515 19%, #0a0a0a 22%, #151515 23%, #0a0a0a 26%, #151515 27%, #0a0a0a 30%, #151515 31%, #0a0a0a 34%, #151515 35%, #0a0a0a 38%, #151515 39%, #0a0a0a 42%, #151515 43%, #0a0a0a 46%, #151515 47%, #0a0a0a 50%, #151515 51%, #0a0a0a 54%, #151515 55%, #0a0a0a 58%, #151515 59%, #0a0a0a 62%, #151515 63%, #0a0a0a 66%, #151515 67%, #0a0a0a 70%, #151515 71%, #0a0a0a 74%, #151515 75%, #0a0a0a 78%, #151515 79%, #0a0a0a 82%, #151515 83%, #0a0a0a 86%, #151515 87%, #0a0a0a 90%, #151515 91%, #0a0a0a 94%, #151515 95%, #0a0a0a 100%);
  /* Keep just the subtle inner ring — the big outer drop-shadow was the
     "ズレてる" transparent-frame artefact. An offset shadow inside a tilted
     3D wrapper renders in tilted space, so it drifted away from the disc
     silhouette. Removing it keeps the vinyl flush with the turntable. */
  box-shadow:inset 0 0 0 1px rgba(255,255,255,.04);
}
.lb-vinyl::before{
  /* label */
  content:"";position:absolute;top:50%;left:50%;
  width:38%;height:38%;border-radius:50%;
  transform:translate(-50%,-50%);
  background:var(--vinyl-label,#3DAAFF);
  box-shadow:inset 0 0 0 1px rgba(0,0,0,.2);
}
.lb-vinyl::after{
  /* center hole + spindle */
  content:"";position:absolute;top:50%;left:50%;
  width:4%;height:4%;border-radius:50%;
  transform:translate(-50%,-50%);
  background:#000;box-shadow:0 0 0 1px rgba(255,255,255,.25);
}
/* Label layout — split into a top stack (title + artist, readable) and
   a bottom stack (label name). The spindle + centre hole occupy the
   middle; text avoids that zone so nothing sits on the spinning part. */
.lb-label-text{
  position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);
  width:44%;height:44%;
  display:flex;flex-direction:column;align-items:stretch;justify-content:space-between;
  pointer-events:none;z-index:4;text-align:center;
  padding:6% 4%;
}
.lb-label-text .lt-top,
.lb-label-text .lt-bottom{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  line-height:1;
}
.lb-label-text .lt-title{
  font-family:'Inter',sans-serif;font-weight:800;font-size:11px;letter-spacing:-0.005em;
  color:rgba(0,0,0,.9);line-height:1.05;
  max-width:100%;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;
  margin-bottom:3px;
}
.lb-label-text .lt-artist{
  font-family:Arial,'Noto Sans JP',sans-serif;font-weight:600;font-size:9px;
  color:rgba(0,0,0,.7);letter-spacing:.04em;
  max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}
.lb-label-text .lt-labelname{
  font-family:'IBM Plex Mono',monospace;font-size:7px;letter-spacing:.28em;
  text-transform:uppercase;color:rgba(0,0,0,.55);
  max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}

/* Light overlay — sits inside .lb-vinyl-tilt so it inherits the disc's
   tilt. To avoid any perceived misalignment when the wrapper flips,
   every gradient layer is concentric/symmetric — no directional
   highlight that would appear shifted after the -210° rotation. */
.lb-light{
  position:absolute;inset:0;
  border-radius:50%;
  pointer-events:none;
  z-index:5;
  opacity:0;
  background:
    /* Soft central glow — the vinyl catches ambient light overall. */
    radial-gradient(circle at 50% 50%, rgba(220,235,255,.14) 0%, rgba(220,235,255,.06) 30%, transparent 60%),
    /* Curvature vignette — slight edge darkening for convex feel. */
    radial-gradient(circle at 50% 50%, transparent 62%, rgba(0,0,0,.3) 95%, rgba(0,0,0,.45) 100%);
  mix-blend-mode:screen;
  transition:opacity .6s ease;
}
.lb-light.on{opacity:1}

/* Vinyl rotation is driven by GSAP (not CSS keyframes) so it composes
   cleanly with the timeline transforms. See spinTween in the script. */

/* Controls inside lightbox */
.lb-info{text-align:center;margin-bottom:8px}
.lb-artist{font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:.28em;
  text-transform:uppercase;color:var(--blue);margin-bottom:6px}
.lb-title{font-family:'Inter',sans-serif;font-weight:700;font-size:18px;letter-spacing:-0.01em}
.lb-price{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.1em;
  color:rgba(237,235,230,.6);margin-top:6px}

.lb-scrubber{
  display:flex;align-items:center;gap:10px;
  padding:10px 4px 16px;
}
.lb-time{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.08em;
  color:rgba(237,235,230,.5);flex-shrink:0;width:34px;text-align:center}
.lb-bar{
  flex:1;height:3px;border-radius:2px;
  background:rgba(255,255,255,.12);position:relative;overflow:hidden;
}
.lb-bar-fill{
  position:absolute;inset:0 auto 0 0;width:0%;
  background:linear-gradient(90deg,var(--blue),var(--mint));
  border-radius:2px;transition:width .1s linear;
}

.lb-actions{display:flex;align-items:center;gap:12px}
.lb-play{
  width:58px;height:58px;border-radius:50%;flex-shrink:0;
  background:var(--white);color:#000;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 10px 24px rgba(255,255,255,.15);
}
.lb-play svg{width:22px;height:22px;fill:currentColor;stroke:none}
.lb-buy{
  flex:1;padding:16px 20px;border-radius:14px;
  background:linear-gradient(120deg,var(--blue) 0%,#2880E8 100%);
  font-family:'Inter',sans-serif;font-weight:700;font-size:13px;letter-spacing:.12em;
  text-align:center;color:#fff;
  box-shadow:0 10px 24px rgba(61,170,255,.25);
}
.lb-buy:active{transform:scale(.98)}

/* Toast (shared) */
#toast{
  position:fixed;left:50%;top:calc(var(--safe-top) + 70px);
  transform:translate(-50%,-16px);
  padding:12px 22px;border-radius:99px;
  background:rgba(61,170,255,.96);color:#fff;
  font-size:12px;font-weight:700;letter-spacing:.06em;
  opacity:0;pointer-events:none;transition:opacity .25s ease, transform .25s ease;
  z-index:500;
}
#toast.show{opacity:1;transform:translate(-50%,0)}
</style>
</head>
<body>

<div class="topbar">
  <a class="tb-back" href="/atelier" aria-label="Back"><svg viewBox="0 0 24 24"><polyline points="15 6 9 12 15 18"/></svg></a>
  <div class="tb-title">Record Booth</div>
  <span class="tb-spacer"></span>
</div>

<main class="content">
  <header class="rb-hero">
    <div class="rb-eyebrow">EXPASS · LISTEN</div>
    <h1 class="rb-title">Record Booth</h1>
    <p class="rb-sub">ジャケットをタップするとレコードが出てきて回転、試聴から購入まで。アーティストは自分の作品を登録して販売できる。</p>
  </header>

  <div class="shelf-label">NEW ARRIVALS</div>
  <div class="shelf" id="shelf"></div>

  <div class="shelf-label">CREATE</div>
  <a class="create-card" href="/compose/record" aria-label="Create a record">
    <div class="cc-plus"><svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19" stroke-linecap="round"/><line x1="5" y1="12" x2="19" y2="12" stroke-linecap="round"/></svg></div>
    <div class="cc-text">
      <div class="cc-title">新しいレコードを作る</div>
      <div class="cc-sub">ジャケ・音源・ラベル色・テキスト登録 → SCREENへ</div>
    </div>
    <div class="cc-chev"><svg viewBox="0 0 24 24"><polyline points="9 6 15 12 9 18" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
  </a>
</main>

<!-- ═══ FULLSCREEN LIGHTBOX PLAYER ═══ -->
<div id="lightbox" aria-hidden="true">
  <button class="lb-close" id="lbClose" aria-label="Close"><svg viewBox="0 0 24 24"><line x1="6" y1="6" x2="18" y2="18"/><line x1="6" y1="18" x2="18" y2="6"/></svg></button>

  <div class="lb-stage">
    <div class="lb-jacket" id="lbJacket">
      <div class="jk-face jk-back">
        <div class="tt-led"></div>
        <div class="tt-platter">
          <div class="tt-mat"></div>
        </div>
        <div class="tt-arm-base"></div>
        <div class="tt-arm"></div>
        <div class="tt-spindle"></div>
        <div class="tt-brand">EXPASS · TT-01</div>
      </div>
      <div class="jk-face jk-front"><div class="rj-art" id="lbJacketArt"></div></div>
    </div>
    <div class="lb-vinyl-tilt" id="lbVinylTilt">
      <div class="lb-vinyl" id="lbVinyl">
        <!-- Label lives INSIDE the vinyl now so spin / scale / position
             are inherited automatically — no two separate elements that
             could drift apart in 3D space. -->
        <div class="lb-label-text" id="lbLabelText">
          <div class="lt-top">
            <span class="lt-title" id="lbLtTitle"></span>
            <span class="lt-artist" id="lbLtArtist"></span>
          </div>
          <div class="lt-bottom">
            <span class="lt-labelname" id="lbLtLabelName"></span>
          </div>
        </div>
      </div>
      <div class="lb-light" id="lbLight"></div>
    </div>
  </div>

  <div class="lb-info">
    <div class="lb-artist" id="lbArtist"></div>
    <div class="lb-title" id="lbTitle"></div>
    <div class="lb-price" id="lbPrice"></div>
  </div>

  <div class="lb-scrubber">
    <span class="lb-time" id="lbTime">0:00</span>
    <div class="lb-bar"><div class="lb-bar-fill" id="lbBarFill"></div></div>
    <span class="lb-time">0:30</span>
  </div>

  <div class="lb-actions">
    <button class="lb-play" id="lbPlay" aria-label="Play/Pause"><svg id="lbPlayIcon" viewBox="0 0 24 24"><polygon points="6 4 20 12 6 20 6 4"/></svg></button>
    <button class="lb-buy" id="lbBuy">PURCHASE — <span id="lbBuyPrice"></span></button>
  </div>
</div>

<div id="toast">購入は近日公開</div>

<script>
// ── Dummy catalog (no real MP3s yet) ───────────────────
// Each record has a jacket art (CSS gradient), label color, and metadata.
const RECORDS = [
  { id:'r1', artist:'RIO KAGURA',      title:'Midnight Ether',  labelName:'LUMEN RECORDS',    price:'¥2,400',
    grad:'linear-gradient(135deg,#F5C842 0%,#E8100A 100%)',               label:'#0A0A0A', text:'' },
  { id:'r2', artist:'KENTA IZUMI',     title:'Boundary',        labelName:'HONOKA WAX',       price:'¥1,800',
    grad:'linear-gradient(160deg,#00E5A0 0%,#3DAAFF 60%,#0a0a0a 100%)',   label:'#FFF3C2', text:'' },
  { id:'r3', artist:'AIKO TANAKA',     title:'Autumn Hymn',     labelName:'SHIBUYA TAPES',    price:'¥3,200',
    grad:'linear-gradient(200deg,#A8E63D 0%,#F5C842 100%)',               label:'#181818', text:'' },
  { id:'r4', artist:'MOZYSKYE',        title:'Blue Hour',       labelName:'AZURE SOUND',      price:'¥1,500',
    grad:'linear-gradient(180deg,#3DAAFF 0%,#1a1030 100%)',               label:'#E8100A', text:'' },
  { id:'r5', artist:'DJ TORI',         title:'Tokyo Echo',      labelName:'NIGHTFLIGHT',      price:'¥2,800',
    grad:'linear-gradient(150deg,#F4C0D1 0%,#F5C842 50%,#E8100A 100%)',   label:'#2a2a2a', text:'' },
];
// Pull anything the artist has composed via /compose/record. Each saved
// record has {jacketSrc, title, artist, labelColor} — we adapt it into
// the same shape as the hardcoded samples so renderShelf + the lightbox
// can treat both the same way.
function loadUserRecords(){
  try {
    const raw = localStorage.getItem('livepass_records');
    if (!raw) return [];
    const list = JSON.parse(raw);
    return list.map(r => ({
      id:        r.id,
      artist:    r.artist || '',
      title:     r.title  || '',
      labelName: r.labelName || '',
      price:     r.price  || '—',
      // Use the uploaded image as the jacket background (fallback gradient if none).
      grad:      r.jacketSrc ? `url("${r.jacketSrc}") center/cover, #000` : 'linear-gradient(135deg,#1a1a1a,#050505)',
      label:     r.labelColor || '#3DAAFF',
      text:      '', // user images don't need the big placeholder letters
    }));
  } catch(e){ return []; }
}

// ── Render shelf ───────────────────────────────────────
function renderShelf(el, list){
  el.innerHTML = list.map(r => `
    <div class="rec-card" data-id="${r.id}">
      <div class="rec-jacket" style="background:${r.grad}"><div class="rj-art">${r.text || ''}</div></div>
      <div class="rec-meta">
        <div class="rec-artist">${r.artist}</div>
        <div class="rec-name">${r.title}</div>
        <div class="rec-price">${r.price}</div>
      </div>
    </div>
  `).join('');
}
const USER_RECORDS = loadUserRecords();
renderShelf(document.getElementById('shelf'), [...USER_RECORDS, ...RECORDS]);

// ── Lightbox ───────────────────────────────────────────
const ALL = [...USER_RECORDS, ...RECORDS];
const lb        = document.getElementById('lightbox');
const lbClose   = document.getElementById('lbClose');
const lbJacket  = document.getElementById('lbJacket');
const lbJacketA = document.getElementById('lbJacketArt');
const lbVinyl   = document.getElementById('lbVinyl');
const lbVinylT  = document.getElementById('lbVinylTilt');
const lbLabel   = document.getElementById('lbLabelText');
const lbLtA     = document.getElementById('lbLtArtist');
const lbLtT     = document.getElementById('lbLtTitle');
const lbLtLN    = document.getElementById('lbLtLabelName');
const lbArtist  = document.getElementById('lbArtist');
const lbTitle   = document.getElementById('lbTitle');
const lbPrice   = document.getElementById('lbPrice');
const lbPlay    = document.getElementById('lbPlay');
const lbPlayIcn = document.getElementById('lbPlayIcon');
const lbBarFill = document.getElementById('lbBarFill');
const lbTime    = document.getElementById('lbTime');
const lbBuy     = document.getElementById('lbBuy');
const lbBuyPrc  = document.getElementById('lbBuyPrice');
const toast     = document.getElementById('toast');

const PLAY_SVG  = '<polygon points="6 4 20 12 6 20 6 4"/>';
const PAUSE_SVG = '<rect x="6" y="5" width="4" height="14"/><rect x="14" y="5" width="4" height="14"/>';

let playing = false, progress = 0, tickId = null, currentId = null;
let spinTweenV = null; // continuous-rotation tween on the vinyl (label is a child, inherits)
const DURATION = 30; // 30 seconds preview
const lbJacketFront = lbJacket.querySelector('.jk-front');
const lbLight = document.getElementById('lbLight');

function openLightbox(rec){
  currentId = rec.id;
  lbJacketFront.style.background = rec.grad;
  lbJacketA.textContent = rec.text;
  lbVinyl.style.setProperty('--vinyl-label', rec.label);
  lbLtA.textContent  = rec.artist;
  lbLtT.textContent  = rec.title;
  lbLtLN.textContent = rec.labelName || '';
  lbArtist.textContent = rec.artist;
  lbTitle.textContent  = rec.title;
  lbPrice.textContent  = rec.price;
  lbBuyPrc.textContent = rec.price;

  lb.classList.add('open');
  lb.setAttribute('aria-hidden','false');

  // Reset: jacket front-facing, vinyl hidden behind it. Both the jacket
  // and the disc stay perfectly front-facing (no Y tilt) so the label
  // can never go mirrored and the light overlay can never look offset.
  gsap.set(lbJacket, { rotationY:0, rotationX:0, opacity:1 });
  gsap.set(lbVinylT, { rotationY:0 });
  gsap.set(lbVinyl,  { x:0, y:0, scale:0.7, rotation:0, opacity:0 });

  // Tap = play trigger. Sequence:
  //  1. Vinyl slides out from behind the jacket (to the right, scales up).
  //  2. Jacket flips 200° left — back face becomes a turntable.
  //  3. The .lb-vinyl-tilt wrapper rotates to -210° Y, sitting 10°
  //     deeper than the turntable so both planes are visibly parallel.
  //  4. Vinyl returns to center. The continuous Z spin runs inside the
  //     already-tilted wrapper — the ellipse silhouette stays put while
  //     the content revolves, so the disc looks stable (no wobble) AND
  //     parallel to the turntable.
  const tl = gsap.timeline({
    onComplete: () => {
      startSpin();
      setPlaying(true);
    }
  });
  // Sequence:
  //  1. Vinyl slides out from behind the jacket (right, scales up).
  //  2. Jacket flips a clean 180° so the turntable face is flat-on
  //     (perfectly parallel to the camera).
  //  3. Vinyl returns to centre. The disc + label are children of the
  //     same flat tilt wrapper, so they spin together front-facing —
  //     no mirror, no offset, no halo.
  tl.to(lbVinyl, { x:'24%', scale:1.0, opacity:1, duration:0.7, ease:'power3.out' }, 0.05)
    .to(lbJacket, { rotationY:-180, duration:1.1, ease:'power2.inOut' }, 0.35)
    .to(lbVinyl,  { x:'0%',         duration:0.8, ease:'power2.inOut' }, 0.85);

  if (navigator.vibrate) navigator.vibrate([6, 20, 10]);
}

function startSpin(){
  stopSpin();
  // Single 360° tween on the vinyl. The label is its child, so it
  // revolves in perfect sync — no chance of the two drifting apart.
  spinTweenV = gsap.to(lbVinyl, { rotation:'+=360', duration:4.5, ease:'none', repeat:-1 });
  lbLight.classList.add('on');
}
function stopSpin(){
  if (spinTweenV) { spinTweenV.kill(); spinTweenV = null; }
  lbLight.classList.remove('on');
}

function closeLightbox(){
  lb.classList.remove('open');
  lb.setAttribute('aria-hidden','true');
  setPlaying(false);
  stopSpin();
  progress = 0; updateScrubber();
}

function setPlaying(v){
  playing = v;
  lbPlayIcn.innerHTML = v ? PAUSE_SVG : PLAY_SVG;
  if (v) { startSpin(); startTick(); }
  else   { stopSpin();  stopTick();  }
}
function startTick(){
  stopTick();
  let last = performance.now();
  tickId = setInterval(() => {
    const now = performance.now();
    const dt = (now - last) / 1000; last = now;
    progress = Math.min(DURATION, progress + dt);
    updateScrubber();
    if (progress >= DURATION) setPlaying(false);
  }, 100);
}
function stopTick(){ if (tickId) { clearInterval(tickId); tickId = null; } }
function updateScrubber(){
  const p = Math.min(1, progress / DURATION);
  lbBarFill.style.width = (p * 100) + '%';
  const m = Math.floor(progress / 60);
  const s = Math.floor(progress % 60);
  lbTime.textContent = m + ':' + String(s).padStart(2, '0');
}

document.querySelectorAll('.shelf').forEach(shelf => {
  shelf.addEventListener('click', e => {
    const card = e.target.closest('.rec-card');
    if (!card) return;
    const rec = ALL.find(r => r.id === card.dataset.id);
    if (rec) openLightbox(rec);
  });
});
lbClose.addEventListener('click', closeLightbox);
lb.addEventListener('click', e => { if (e.target === lb) closeLightbox(); });
lbPlay.addEventListener('click', () => setPlaying(!playing));
lbBuy.addEventListener('click', () => {
  // Stripe integration happens in a follow-up PR. For now, show the toast.
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 1800);
  if (navigator.vibrate) navigator.vibrate(10);
});
window.addEventListener('keydown', e => {
  if (e.key === 'Escape' && lb.classList.contains('open')) closeLightbox();
});
</script>

</body>
</html>
