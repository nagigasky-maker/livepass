<style>
:root{
  --black:#000;--bg:#080808;--white:#EDEBE6;
  --red:#E8100A;--blue:#3DAAFF;--green:#A8E63D;
  --gold:#F5C842;--mint:#00E5A0;--pink:#F4C0D1;
  --muted:rgba(237,235,230,.3);--border:rgba(255,255,255,.07);
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bot:env(safe-area-inset-bottom,0px);
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;height:100dvh;background:var(--black);color:var(--white);
  font-family:Arial,'Noto Sans JP',sans-serif;-webkit-font-smoothing:antialiased;
  user-select:none;-webkit-user-select:none;overflow:hidden;max-width:100vw;position:fixed;overscroll-behavior-x:none;touch-action:pan-y;}
a{color:inherit;text-decoration:none}
button{background:none;border:none;color:inherit;font:inherit;cursor:pointer}

/* Header */
.hdr{position:fixed;top:0;left:0;right:0;z-index:10;
  padding:max(14px,calc(var(--safe-top) + 12px)) 18px 12px;
  display:flex;align-items:center;gap:14px;
  background:rgba(0,0,0,.96);border-bottom:0.5px solid var(--border);}
.hdr-back{background:none;border:0.5px solid rgba(255,255,255,.18);
  color:rgba(237,235,230,.65);font-size:10px;font-weight:500;letter-spacing:.08em;
  padding:7px 14px;border-radius:99px;}
.hdr-title{font-family:Arial,'Noto Sans JP',sans-serif;font-weight:900;
  font-size:18px;color:var(--white);margin-left:auto;margin-right:auto;padding-right:60px;}

/* Conversation list */
.conv-list{
  position:fixed;top:0;left:0;right:0;bottom:0;
  padding-top:calc(var(--safe-top) + 110px);
  overflow-y:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;
}
.conv-list::-webkit-scrollbar{display:none}

/* ── Messages / Notifications tab switcher ───────────── */
.mtabs{
  position:fixed;left:0;right:0;z-index:9;
  top:calc(var(--safe-top) + 52px);
  display:flex;align-items:stretch;padding:0 20px;
  background:#000;
  border-bottom:0.5px solid var(--border);
}
.mtab{
  flex:1;font-family:Arial,'Noto Sans JP',sans-serif;font-weight:700;
  font-size:12px;letter-spacing:.16em;text-transform:uppercase;
  color:rgba(237,235,230,.3);padding:14px 0 12px;
  border-bottom:2px solid transparent;cursor:pointer;background:none;border-top:0;border-left:0;border-right:0;
}
.mtab.active{color:var(--white);border-bottom-color:var(--blue)}
.mtab .mtab-dot{
  display:inline-block;width:7px;height:7px;border-radius:50%;
  background:var(--red);margin-left:6px;vertical-align:middle;
}

.m-panel{display:none}
.m-panel.active{display:block}

/* ── Empty state (shared) ───────────────────────────── */
.m-empty{
  padding:90px 24px 40px;text-align:center;
  display:flex;flex-direction:column;align-items:center;gap:14px;
}
.m-empty svg{width:48px;height:48px;stroke:rgba(237,235,230,.2);
  fill:none;stroke-width:1.6}
.m-empty-title{
  font-family:Arial,'Noto Sans JP',sans-serif;font-weight:700;
  font-size:15px;color:var(--white);letter-spacing:.02em;
}
.m-empty-sub{
  font-family:Arial,'Noto Sans JP',sans-serif;font-weight:400;
  font-size:11px;color:rgba(237,235,230,.4);
  letter-spacing:.02em;line-height:1.7;max-width:300px;
}

/* ── Notification item ──────────────────────────────── */
#notifList{padding:14px 18px 40px;display:flex;flex-direction:column;gap:8px}
.notif-item{
  display:flex;align-items:center;gap:12px;
  padding:14px 16px;
  background:rgba(255,255,255,.03);
  border:0.5px solid rgba(255,255,255,.06);
  border-radius:12px;
  cursor:pointer;transition:background .2s ease;
}
.notif-item:active{background:rgba(255,255,255,.06)}
.notif-av{
  width:36px;height:36px;border-radius:50%;flex-shrink:0;
  background:linear-gradient(135deg,var(--av-hue,#3DAAFF),#0a1020);
  border:1px solid rgba(237,235,230,.12);
  display:flex;align-items:center;justify-content:center;
  font-family:Arial,sans-serif;font-weight:900;font-size:13px;color:var(--white);
  overflow:hidden;
}
.notif-av.kind{
  background:rgba(255,255,255,.04);border-color:rgba(237,235,230,.15);
}
.notif-av.kind svg{width:16px;height:16px;stroke:var(--blue);fill:none;stroke-width:1.8}
.notif-body{flex:1;min-width:0}
.notif-text{
  font-family:Arial,'Noto Sans JP',sans-serif;font-weight:700;
  font-size:11px;color:var(--white);letter-spacing:.02em;
  line-height:1.5;margin-bottom:3px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.notif-text b{font-weight:900}
.notif-time{
  font-family:'IBM Plex Mono',ui-monospace,monospace;
  font-size:8px;letter-spacing:.18em;text-transform:uppercase;
  color:rgba(237,235,230,.35);
}
.notif-dot{
  width:8px;height:8px;border-radius:50%;flex-shrink:0;
  background:var(--blue);
}
.notif-item.read .notif-dot{opacity:0}

.conv-item{
  display:flex;align-items:center;gap:14px;
  padding:16px 20px;
  border-bottom:0.5px solid rgba(255,255,255,.04);
  cursor:pointer;
}
.conv-item:active{background:rgba(255,255,255,.03)}
.conv-av{
  width:48px;height:48px;border-radius:50%;flex-shrink:0;
  background:linear-gradient(135deg,var(--av-hue,#3DAAFF),#0a1020);
  border:1.5px solid rgba(237,235,230,.12);
  display:flex;align-items:center;justify-content:center;
  font-family:Arial,sans-serif;font-weight:900;font-size:18px;color:var(--white);
  position:relative;overflow:hidden;
}
.conv-av img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;border-radius:50%}
.conv-unread{
  position:absolute;top:-2px;right:-2px;
  min-width:16px;height:16px;padding:0 4px;
  border-radius:99px;
  background:var(--red);color:#fff;
  font-family:Arial,sans-serif;font-weight:700;font-size:9px;
  display:flex;align-items:center;justify-content:center;
  border:1.5px solid #000;
  line-height:1;
}
.conv-body{flex:1;min-width:0}
.conv-name{
  font-family:Arial,'Noto Sans JP',sans-serif;font-weight:700;
  font-size:14px;color:var(--white);margin-bottom:3px;
}
.conv-preview{
  font-family:Arial,'Noto Sans JP',sans-serif;font-weight:400;
  font-size:11px;color:rgba(237,235,230,.5);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.conv-time{
  flex-shrink:0;
  font-family:'IBM Plex Mono',monospace;font-size:8px;
  letter-spacing:.1em;color:rgba(237,235,230,.3);
}

/* Chat view */
#chatView{
  position:fixed;inset:0;z-index:20;
  background:var(--black);
  display:none;flex-direction:column;
}
#chatView.active{display:flex}

.chat-header{
  flex-shrink:0;
  padding:max(14px,calc(var(--safe-top) + 12px)) 18px 12px;
  display:flex;align-items:center;gap:12px;
  background:rgba(0,0,0,.96);border-bottom:0.5px solid var(--border);
}
.chat-back{font-size:10px;font-weight:500;letter-spacing:.08em;
  color:rgba(237,235,230,.65);padding:7px 14px;
  border:0.5px solid rgba(255,255,255,.18);border-radius:99px;}
.chat-name{
  font-family:Arial,'Noto Sans JP',sans-serif;font-weight:700;
  font-size:15px;color:var(--white);flex:1;
}

.chat-messages{
  flex:1;overflow-y:auto;padding:20px 16px;
  display:flex;flex-direction:column;gap:10px;
  scrollbar-width:none;
}
.chat-messages::-webkit-scrollbar{display:none}

.msg{max-width:78%;padding:12px 16px;border-radius:18px;
  font-family:Arial,'Noto Sans JP',sans-serif;font-size:13px;
  line-height:1.6;word-break:break-word;}
.msg.them{
  align-self:flex-start;
  background:rgba(255,255,255,.06);
  border-bottom-left-radius:4px;
  color:rgba(237,235,230,.85);
}
.msg.me{
  align-self:flex-end;
  background:var(--blue);color:#fff;
  border-bottom-right-radius:4px;
}
.msg-time{
  font-family:'IBM Plex Mono',monospace;font-size:7px;
  color:rgba(237,235,230,.25);margin-top:2px;
}
.msg.me .msg-time{text-align:right;color:rgba(255,255,255,.4)}

.chat-input-bar{
  flex-shrink:0;
  padding:10px 14px calc(12px + var(--safe-bot));
  display:flex;gap:10px;align-items:center;
  background:rgba(0,0,0,.96);border-top:0.5px solid var(--border);
}
.chat-input{
  flex:1;padding:12px 18px;
  background:rgba(255,255,255,.06);
  border:0.5px solid rgba(255,255,255,.1);
  border-radius:99px;
  font-family:Arial,'Noto Sans JP',sans-serif;font-size:13px;
  color:var(--white);outline:none;
}
.chat-input::placeholder{color:rgba(237,235,230,.35)}
.chat-send{
  width:40px;height:40px;border-radius:50%;
  background:var(--blue);
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
}
.chat-send svg{width:18px;height:18px;stroke:#fff;fill:none;stroke-width:2}
.chat-send:disabled{background:rgba(237,235,230,.08)}

.empty-msg{
  text-align:center;padding:80px 20px;
  font-family:'IBM Plex Mono',monospace;font-size:9px;
  letter-spacing:.28em;text-transform:uppercase;
  color:rgba(237,235,230,.25);line-height:2;
}
</style>

<script>
/* PWA NAV FIX v66 — form-submission technique for iOS PWA standalone.
   Link clicks in iOS PWAs can break out of standalone mode; form
   submissions are handled differently by iOS and stay in-app. */
(function(){
  function isStandalone(){
    return (window.navigator.standalone === true) ||
           window.matchMedia('(display-mode: standalone)').matches ||
           window.matchMedia('(display-mode: fullscreen)').matches;
  }
  if (!isStandalone()) return;
  // Also add a body class so CSS can adjust for standalone mode
  document.documentElement.classList.add('is-pwa');
  document.addEventListener('click', function(e){
    var a = e.target.closest && e.target.closest('a');
    if (!a) return;
    var href = a.getAttribute('href');
    if (!href) return;
    if (a.target && a.target !== '_self') return;
    if (href.charAt(0) === '#') return;
    if (/^(mailto|tel|sms):/i.test(href)) return;
    // External origin?
    try {
      var u = new URL(a.href, location.href);
      if (u.host !== location.host) return;
    } catch(err) { return; }
    e.preventDefault();
    e.stopPropagation();
    // Use form submission — iOS PWA treats this as in-app navigation
    try {
      var u2 = new URL(a.href, location.href);
      var form = document.createElement('form');
      form.method = 'GET';
      form.action = u2.origin + u2.pathname;
      form.style.display = 'none';
      u2.searchParams.forEach(function(value, key){
        var inp = document.createElement('input');
        inp.type = 'hidden'; inp.name = key; inp.value = value;
        form.appendChild(inp);
      });
      document.body.appendChild(form);
      form.submit();
    } catch(err) {
      window.location.href = a.href;
    }
  }, true);
})();
</script>

      <svg viewBox="0 0 24 24"><path d="M4 6h16a1 1 0 0 1 1 1v10a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V7a1 1 0 0 1 1-1z"/><polyline points="3,7 12,13 21,7"/></svg>
      <div class="m-empty-title">まだメッセージはありません</div>
      <div class="m-empty-sub">フォロー中のアーティストからの DM がここに届きます</div>
    </div>
  </div>

  <!-- Notifications panel -->
  <div class="m-panel" id="notifPanel">
    <div id="notifList"></div>
    <div class="m-empty" id="notifEmpty" style="display:none">
      <svg viewBox="0 0 24 24"><path d="M12 2a7 7 0 0 0-7 7v5l-2 3h18l-2-3V9a7 7 0 0 0-7-7z"/><path d="M10 20a2 2 0 0 0 4 0"/></svg>
      <div class="m-empty-title">お知らせはまだありません</div>
      <div class="m-empty-sub">フォローやイベント公開、リマインダーなどがここに届きます</div>
    </div>
  </div>
</div>

<!-- Chat view overlay -->
<div id="chatView">
  <header class="chat-header">
    <button class="chat-back" id="chatBack">← 戻る</button>
    <div class="chat-name" id="chatName">—</div>
  </header>
  <div class="chat-messages" id="chatMessages"></div>
  <div class="chat-input-bar">
    <input class="chat-input" id="chatInput" placeholder="メッセージを入力..." maxlength="500">
    <button class="chat-send" id="chatSend">
      <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13" stroke-linecap="round"/><polygon points="22,2 15,22 11,13 2,9" stroke-linejoin="round"/></svg>
    </button>
  </div>
</div>

<script>
/* ─────────────────────────────────────────────
   MOCK CONVERSATIONS (sample DM data)
   In production these would come from a backend.
   Sent messages are persisted to localStorage.
   ───────────────────────────────────────────── */
// Ship empty — the real DM list comes from the user's own
// conversations (stored per-contact at livepass_dm_<id>). The mock
// artists that used to live here were pre-launch fillers and were
// confusing once the empty-state UI landed.
const CONTACTS = [];

const DM_KEY = 'livepass_dm_';

function loadUserMessages(contactId){
  try {
    const raw = localStorage.getItem(DM_KEY + contactId);
    return raw ? JSON.parse(raw) : [];
  } catch(e) { return []; }
}
function saveUserMessages(contactId, msgs){
  try { localStorage.setItem(DM_KEY + contactId, JSON.stringify(msgs)); } catch(e) {}
}

/* ── Sort contacts by latest activity (newest first) ── */
// Approximate "latest timestamp" per contact: if user has sent a message,
// use the local clock from the last sent; otherwise use the contact's
// mock history order (index is a stable tiebreaker).
function lastActivityTime(c){
  const userMsgs = loadUserMessages(c.id);
  if (userMsgs.length > 0) {
    // Use now() at save time as a proxy; real backend would use server time
    return userMsgs[userMsgs.length - 1].sentAt || Date.now();
  }
  // Parse mock time string like "14:30" or "昨日" or "4/10" into a crude rank
  return c._rank;
}
CONTACTS.forEach((c, i) => { c._rank = CONTACTS.length - i; });
CONTACTS.sort((a, b) => lastActivityTime(b) - lastActivityTime(a));

/* ── Render conversation list ── */
const convList = document.getElementById('convList');
const msgEmpty = document.getElementById('msgEmpty');
function renderConvList(){
  convList.innerHTML = '';
  if (!CONTACTS.length) {
    if (msgEmpty) msgEmpty.style.display = 'flex';
    return;
  }
  if (msgEmpty) msgEmpty.style.display = 'none';
  CONTACTS.forEach(c => {
    const userMsgs = loadUserMessages(c.id);
    const lastUserMsg = userMsgs.length ? userMsgs[userMsgs.length-1] : null;
    const preview = lastUserMsg ? lastUserMsg.text : c.preview;
    const time = lastUserMsg ? lastUserMsg.t : c.time;
    const item = document.createElement('div');
    item.className = 'conv-item';
    item.innerHTML = `
      <div class="conv-av" style="--av-hue:${c.hue}">
        ${c.name.charAt(0)}
        ${c.unread > 0 ? '<div class="conv-unread">' + c.unread + '</div>' : ''}
      </div>
      <div class="conv-body">
        <div class="conv-name">${c.name}</div>
        <div class="conv-preview">${preview}</div>
      </div>
      <div class="conv-time">${time}</div>
    `;
    item.addEventListener('click', () => openChat(c));
    convList.appendChild(item);
  });
}
renderConvList();

/* ─────────────────────────────────────────────
   NOTIFICATIONS
   ─────────────────────────────────────────────
   Stored at livepass_notifications. Schema:
     { id, type, at:ISO, read:bool, ...data }
   Types currently rendered:
     · follow     { who }
     · new_event  { who, event }
     · reminder   { who, event, when }
     · message    { who, preview }
   The addNotification() helper is also exposed on window so other
   pages can push events without duplicating storage logic.
   ───────────────────────────────────────────── */
const NOTIF_KEY = 'livepass_notifications';

function loadNotifications(){
  try {
    const raw = localStorage.getItem(NOTIF_KEY);
    if (raw) return JSON.parse(raw);
  } catch(_){}
  // Seed with sample notifications on first visit so the お知らせ tab
  // demonstrates its layout. Subsequent visits use whatever the user has.
  const now = Date.now();
  const seed = [
    { id:'n'+(now-60e3),     type:'follow',    who:'SACHI',   hue:'#F4C0D1',
      at:new Date(now - 60e3).toISOString(),     read:false },
    { id:'n'+(now-45*60e3),  type:'new_event', who:'ALI',     hue:'#E8100A',
      event:'All Must Dance Vol.12',
      at:new Date(now - 45*60e3).toISOString(),  read:false },
    { id:'n'+(now-3*3600e3), type:'reminder',  who:'CREW NRG',hue:'#F5C842',
      event:'Cypher Night',
      when:'明日 21:00',
      at:new Date(now - 3*3600e3).toISOString(), read:true },
    { id:'n'+(now-26*3600e3),type:'follow',    who:'DJ KEITA',hue:'#3DAAFF',
      at:new Date(now - 26*3600e3).toISOString(),read:true },
  ];
  try { localStorage.setItem(NOTIF_KEY, JSON.stringify(seed)); } catch(_){}
  return seed;
}

function saveNotifications(list){
  try { localStorage.setItem(NOTIF_KEY, JSON.stringify(list.slice(0, 100))); } catch(_){}
}

function addNotification(type, data){
  const list = loadNotifications();
  list.unshift({ id:'n'+Date.now(), type, ...data, at:new Date().toISOString(), read:false });
  saveNotifications(list);
  renderNotifList();
  paintUnreadDot();
}
window.addNotification = addNotification;

function fmtNotifTime(iso){
  const d = new Date(iso);
  if (isNaN(d.getTime())) return '';
  const diffMin = (Date.now() - d.getTime()) / 60000;
  if (diffMin < 1)  return 'たった今';
  if (diffMin < 60) return Math.floor(diffMin) + '分前';
  if (diffMin < 60*24) return Math.floor(diffMin / 60) + '時間前';
  return d.toLocaleDateString('ja-JP', { month:'numeric', day:'numeric' });
}

function notifBody(n){
  const name = `<b>${(n.who || '').replace(/</g,'&lt;')}</b>`;
  switch (n.type) {
    case 'follow':    return `${name}があなたをフォローしました`;
    case 'new_event': return `${name}が新しいイベント「${n.event || ''}」を公開しました`;
    case 'reminder':  return `${n.when || ''}: ${n.event || ''}（${name}）`;
    case 'message':   return `${name}「${(n.preview || '').slice(0,40)}」`;
    default:          return (n.text || '通知');
  }
}

const notifList  = document.getElementById('notifList');
const notifEmpty = document.getElementById('notifEmpty');

function renderNotifList(){
  const list = loadNotifications();
  notifList.innerHTML = '';
  if (!list.length) {
    if (notifEmpty) notifEmpty.style.display = 'flex';
    return;
  }
  if (notifEmpty) notifEmpty.style.display = 'none';
  list.forEach(n => {
    const initial = (n.who || '?').charAt(0).toUpperCase();
    const item = document.createElement('div');
    item.className = 'notif-item' + (n.read ? ' read' : '');
    item.dataset.id = n.id;
    item.innerHTML = `
      <div class="notif-av" style="--av-hue:${n.hue || '#3DAAFF'}">${initial}</div>
      <div class="notif-body">
        <div class="notif-text">${notifBody(n)}</div>
        <div class="notif-time">${fmtNotifTime(n.at)}</div>
      </div>
      <div class="notif-dot"></div>
    `;
    item.addEventListener('click', () => {
      // Mark single notification as read and navigate to the actor.
      const all = loadNotifications();
      const hit = all.find(x => x.id === n.id);
      if (hit) hit.read = true;
      saveNotifications(all);
      item.classList.add('read');
      paintUnreadDot();
      if (n.who) location.href = '/profile?user=' + encodeURIComponent(n.who);
    });
    notifList.appendChild(item);
  });
}

function paintUnreadDot(){
  const any = loadNotifications().some(n => !n.read);
  const dot = document.getElementById('notifUnreadDot');
  if (dot) dot.style.display = any ? 'inline-block' : 'none';
}

renderNotifList();
paintUnreadDot();

/* ── Tab switcher ─────────────────────────────────── */
document.querySelectorAll('.mtab').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.mtab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const key = btn.dataset.mtab;
    document.getElementById('msgPanel').classList.toggle('active',  key === 'msg');
    document.getElementById('notifPanel').classList.toggle('active', key === 'notif');
    if (key === 'notif') {
      // Mark all read on tab visit
      const all = loadNotifications();
      let changed = false;
      all.forEach(n => { if (!n.read) { n.read = true; changed = true; } });
      if (changed) { saveNotifications(all); renderNotifList(); }
      paintUnreadDot();
    }
  });
});

/* ── Auto-open a chat from ?open=<nameOrId> ── */
(function handleOpenParam(){
  const param = new URLSearchParams(location.search).get('open');
  if (!param) return;
  const needle = param.toLowerCase();
  const match = CONTACTS.find(c =>
    c.id === needle ||
    c.name.toLowerCase() === needle ||
    c.name.toLowerCase().replace(/[^a-z]/g,'') === needle.replace(/[^a-z]/g,'')
  );
  if (match) {
    setTimeout(() => openChat(match), 200);
  } else {
    // Create a new ad-hoc conversation from the name
    const newContact = {
      id:      'new-' + Date.now(),
      name:    param,
      hue:     '#3DAAFF',
      unread:  0,
      preview: 'まだメッセージがありません',
      time:    'Now',
      history: [],
    };
    CONTACTS.unshift(newContact);
    renderConvList();
    setTimeout(() => openChat(newContact), 200);
  }
})();

/* ── Chat view ── */
const chatView = document.getElementById('chatView');
const chatName = document.getElementById('chatName');
const chatMessages = document.getElementById('chatMessages');
const chatInput = document.getElementById('chatInput');
const chatSend = document.getElementById('chatSend');
const chatBack = document.getElementById('chatBack');
let currentContact = null;

/* ─────────────────────────────────────────────
   Unread count sync — shared across all pages
   livepass_unread_count is read by each tab page's
   top-bar envelope badge. Opening a chat zeros out
   that contact's unread count and decrements the total.
   ───────────────────────────────────────────── */
const UNREAD_KEY = 'livepass_unread_count';
function getTotalUnread(){
  return CONTACTS.reduce((sum, c) => sum + (c.unread || 0), 0);
}
function saveUnreadCount(){
  try { localStorage.setItem(UNREAD_KEY, String(getTotalUnread())); } catch(e) {}
}
// Seed once on first visit if not set
(function initUnread(){
  try {
    if (localStorage.getItem(UNREAD_KEY) === null) {
      saveUnreadCount();
    }
  } catch(e) {}
})();

function openChat(c){
  // Mark this contact as read — zero its unread and update total
  if (c.unread && c.unread > 0) {
    c.unread = 0;
    saveUnreadCount();
    renderConvList(); // refresh the list (remove unread dot)
  }
  currentContact = c;
  chatName.textContent = c.name;
  chatView.classList.add('active');
  renderMessages(c);
  chatInput.value = '';
  setTimeout(() => {
    chatMessages.scrollTop = chatMessages.scrollHeight;
    chatInput.focus();
  }, 100);
}

function renderMessages(c){
  const userMsgs = loadUserMessages(c.id);
  const allMsgs = [...c.history, ...userMsgs];
  if (allMsgs.length === 0) {
    chatMessages.innerHTML = '<div class="empty-msg">メッセージはまだありません</div>';
    return;
  }
  chatMessages.innerHTML = '';
  allMsgs.forEach(m => {
    const div = document.createElement('div');
    div.className = 'msg ' + (m.from === 'me' ? 'me' : 'them');
    div.innerHTML = `${m.text}<div class="msg-time">${m.t}</div>`;
    chatMessages.appendChild(div);
  });
  chatMessages.scrollTop = chatMessages.scrollHeight;
}

chatBack.addEventListener('click', () => {
  chatView.classList.remove('active');
  currentContact = null;
});

function sendMessage(){
  const text = chatInput.value.trim();
  if (!text || !currentContact) return;
  const now = new Date();
  const t = String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');
  const msg = { from:'me', text, t, sentAt: Date.now() };
  const userMsgs = loadUserMessages(currentContact.id);
  userMsgs.push(msg);
  saveUserMessages(currentContact.id, userMsgs);
  chatInput.value = '';
  renderMessages(currentContact);
  // Re-sort so this contact floats to the top when user returns
  CONTACTS.sort((a, b) => lastActivityTime(b) - lastActivityTime(a));
  renderConvList();
  if (navigator.vibrate) navigator.vibrate(6);
}

chatSend.addEventListener('click', sendMessage);
chatInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});
</script>

<script>
/* ─── Avatar sync: replace bottom-nav initial with uploaded profile photo ─── */
(function syncBnAvatar(){
  try {
    var av = localStorage.getItem('livepass_avatar');
    if (!av) return;
    document.querySelectorAll('.bn-avatar').forEach(function(el){
      el.innerHTML = '<img src="' + av + '" alt="" style="width:100%;height:100%;object-fit:cover;border-radius:50%;display:block">';
    });
  } catch(e){}
})();
</script>

</body>
