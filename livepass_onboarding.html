<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#FFFFFF">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/livepass-icon-180.png">
<title>EXPASS</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#FFFFFF;--fg:#0A0A0A;
  --muted:#999;--muted2:rgba(10,10,10,.06);
  --border:rgba(10,10,10,.1);--dim:rgba(10,10,10,.03);
  --red:#E8100A;
}
html,body{height:100%;background:var(--bg);color:var(--fg);font-family:'Inter',sans-serif;overflow:hidden;-webkit-font-smoothing:antialiased}
#app{max-width:430px;margin:0 auto;height:100dvh;position:relative;overflow:hidden;display:flex;flex-direction:column}

/* ── STEPS ── */
.step{position:absolute;inset:0;display:flex;flex-direction:column;opacity:0;pointer-events:none;transition:opacity .4s,transform .4s;transform:translateX(24px);z-index:10}
.step.active{opacity:1;pointer-events:auto;transform:translateX(0)}
.step.exit{opacity:0;transform:translateX(-24px)}

/* ── WELCOME ── */
#step-0{align-items:center;justify-content:center;padding:0 40px;text-align:center}
.w-logo{margin-bottom:48px}
.w-logo img{width:56px;height:auto;display:block;margin:0 auto}
.w-lines{font-size:11px;letter-spacing:6px;color:var(--fg);line-height:2.4;font-weight:500;text-transform:uppercase;min-height:80px}
.w-line{display:block;opacity:0;transition:opacity .6s}
.w-line.show{opacity:1}
.w-cta{margin-top:48px;opacity:0;transition:opacity .8s}
.w-cta.show{opacity:1}
.w-btn{padding:12px 48px;border:1px solid var(--fg);border-radius:0;background:none;font-size:9px;letter-spacing:4px;color:var(--fg);cursor:pointer;font-family:'Inter',sans-serif;font-weight:500;text-transform:uppercase;transition:all .2s}
.w-btn:active{transform:scale(.97)}
.w-login{display:block;margin-top:16px;font-size:9px;letter-spacing:2px;color:var(--muted);text-decoration:none;font-weight:400;transition:color .2s}

/* ── CONTENT STEPS ── */
.step-inner{flex:1;overflow-y:auto;scrollbar-width:none;padding:80px 32px 24px;display:flex;flex-direction:column}
.step-inner::-webkit-scrollbar{display:none}
.step-num{font-size:9px;letter-spacing:4px;color:var(--muted);font-weight:400;margin-bottom:32px}
.step-title{font-size:24px;font-weight:300;letter-spacing:-.5px;line-height:1.1;margin-bottom:40px}

/* ── FORM ── */
.form-group{margin-bottom:20px}
.form-label{font-size:8px;letter-spacing:3px;color:var(--muted);text-transform:uppercase;font-weight:400;margin-bottom:8px;display:block}
.form-input{width:100%;background:transparent;border:none;border-bottom:1px solid var(--border);border-radius:0;padding:10px 0;font-size:16px;color:var(--fg);font-family:'Inter',sans-serif;font-weight:300;outline:none;letter-spacing:.3px;transition:border-color .2s;-webkit-appearance:none}
.form-input:focus{border-bottom-color:var(--fg)}
.form-input::placeholder{color:rgba(10,10,10,.2)}

/* ── TERMS ── */
.terms-row{display:flex;align-items:flex-start;gap:10px;margin-top:28px}
.terms-check{width:16px;height:16px;border:1px solid var(--border);border-radius:0;background:transparent;cursor:pointer;flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;transition:all .2s;-webkit-appearance:none;appearance:none}
.terms-check:checked{background:var(--fg);border-color:var(--fg)}
.terms-check:checked::after{content:'';display:block;width:4px;height:8px;border:solid #fff;border-width:0 1.5px 1.5px 0;transform:rotate(45deg);margin-top:-2px}
.terms-text{font-size:11px;color:var(--muted);line-height:1.6;font-weight:300}
.terms-text a{color:var(--fg);text-decoration:underline;text-underline-offset:2px}

/* ── ERROR ── */
.error-msg{font-size:10px;color:var(--red);margin-top:12px;min-height:14px;line-height:1.5;display:none}
.error-msg.visible{display:block}

/* ── NEXT BUTTON ── */
.step-footer{padding:0 32px 36px;flex-shrink:0}
.next-btn{width:100%;padding:14px;border:1px solid var(--border);border-radius:0;background:none;font-size:9px;letter-spacing:3px;color:var(--muted);cursor:default;font-family:'Inter',sans-serif;font-weight:500;text-transform:uppercase;transition:all .25s}
.next-btn.enabled{border-color:var(--fg);color:var(--fg);cursor:pointer}
.next-btn.enabled:active{transform:scale(.98)}
.next-btn:disabled{opacity:.4;cursor:default}

/* ── READY ── */
.ready-center{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:0 40px}
.ready-logo{margin-bottom:32px}
.ready-logo img{width:40px;height:auto;display:block;margin:0 auto}
.ready-name{font-size:28px;font-weight:300;letter-spacing:-.5px;margin-bottom:8px}
.ready-sub{font-size:11px;color:var(--muted);letter-spacing:1px;font-weight:300}

#__v{position:fixed;bottom:2px;right:2px;z-index:9999;
  font:9px/1 'IBM Plex Mono',monospace;color:rgba(10,10,10,.12);
  letter-spacing:.1em;pointer-events:none;user-select:none}

/* ── Global text scale (slightly larger) ── */
.sec-en{font-size:42px !important}
.sec-ja{font-size:12px !important}
.ch-title{font-size:42px !important}
.ch-label{font-size:12px !important}
.ph-name{font-size:22px !important}
.ph-role{font-size:11px !important}
.fc-title{font-size:16px !important}
.fc-cat{font-size:10px !important}
.sched-title{font-size:16px !important}
.sched-ja{font-size:11px !important}
.sched-meta,.sched-venue{font-size:11px !important}
.dm-p{font-size:15px !important;line-height:1.8 !important}
.dm-title{font-size:30px !important}
.dm-cat{font-size:10px !important}
.pm-title{font-size:28px !important}
.pm-venue{font-size:14px !important}
.pm-time{font-size:12px !important}
.em-title{font-size:30px !important}
.em-venue{font-size:14px !important}
.em-time{font-size:12px !important}
.eli-title{font-size:15px !important}
.eli-meta{font-size:12px !important}
.sr-name,.sug-name{font-size:14px !important}
.sr-sub,.sug-meta{font-size:10px !important}
.conv-name{font-size:15px !important}
.conv-preview{font-size:12px !important}
.msg{font-size:14px !important}
.sr-label,.settings-label,.pr-name{font-size:auto}
.pr-name{font-size:24px !important}
.pr-role{font-size:11px !important}

</style>
<script type="module" src="/firebase-init.js"></script>
</head>
<body>
<script>
(function(){
  function isStandalone(){
    return (window.navigator.standalone === true) ||
           window.matchMedia('(display-mode: standalone)').matches ||
           window.matchMedia('(display-mode: fullscreen)').matches;
  }
  if (!isStandalone()) return;
  document.documentElement.classList.add('is-pwa');
  document.addEventListener('click', function(e){
    var a = e.target.closest && e.target.closest('a');
    if (!a) return;
    var href = a.getAttribute('href');
    if (!href || (a.target && a.target !== '_self') || href.charAt(0) === '#') return;
    if (/^(mailto|tel|sms):/i.test(href)) return;
    try { var u = new URL(a.href, location.href); if (u.host !== location.host) return; } catch(err) { return; }
    e.preventDefault(); e.stopPropagation();
    try { var f = document.createElement('form'); f.method='GET'; f.action=a.href; f.style.display='none'; document.body.appendChild(f); f.submit(); }
    catch(err) { window.location.href = a.href; }
  }, true);
})();
</script>
<div id="app">

  <!-- STEP 0 — WELCOME -->
  <div class="step active" id="step-0">
    <div class="w-logo"><img src="livepasslogo.png" alt="EXPASS"></div>
    <div class="w-lines" id="w-lines">
      <span class="w-line" id="wl-1"></span>
      <span class="w-line" id="wl-2"></span>
      <span class="w-line" id="wl-3"></span>
    </div>
    <div class="w-cta" id="w-cta">
      <button class="w-btn" onclick="goStep(1)">Enter</button>
      <a href="/login" class="w-login">Sign in</a>
    </div>
  </div>

  <!-- STEP 1 — NAME -->
  <div class="step" id="step-1">
    <div class="step-inner">
      <div class="step-num">01</div>
      <div class="step-title">名前</div>
      <div class="form-group">
        <label class="form-label" for="nameInput">活動名</label>
        <input class="form-input" type="text" id="nameInput" placeholder="NOBBY" autocomplete="name" maxlength="40">
      </div>
    </div>
    <div class="step-footer">
      <button class="next-btn" id="next-1" onclick="goStep(2)">続ける</button>
    </div>
  </div>

  <!-- STEP 2 — ACCOUNT -->
  <div class="step" id="step-2">
    <div class="step-inner">
      <div class="step-num">02</div>
      <div class="step-title">アカウント</div>
      <div class="form-group">
        <label class="form-label" for="emailInput">Email</label>
        <input class="form-input" type="email" id="emailInput" placeholder="you@example.com" autocomplete="email" inputmode="email" autocapitalize="off" spellcheck="false">
      </div>
      <div class="form-group">
        <label class="form-label" for="passInput">Password</label>
        <input class="form-input" type="password" id="passInput" placeholder="8文字以上" autocomplete="new-password" minlength="8">
      </div>
      <div class="terms-row">
        <input type="checkbox" class="terms-check" id="termsCheck">
        <div class="terms-text">
          <a href="/terms" target="_blank">利用規約</a>と<a href="/privacy" target="_blank">プライバシーポリシー</a>に同意する
        </div>
      </div>
      <div class="error-msg" id="errorMsg"></div>
    </div>
    <div class="step-footer">
      <button class="next-btn" id="next-2" onclick="submitSignup()">アカウント作成</button>
    </div>
  </div>

  <!-- STEP 3 — READY -->
  <div class="step" id="step-3">
    <div class="ready-center">
      <div class="ready-logo"><img src="livepasslogo.png" alt="EXPASS"></div>
      <div class="ready-name" id="readyName">—</div>
      <div class="ready-sub">準備ができました</div>
    </div>
    <div class="step-footer">
      <button class="next-btn enabled" id="startBtn" onclick="location.href='/home'">はじめる</button>
    </div>
  </div>

</div>

<script>
if (localStorage.getItem('livepass_account_name')) {
  location.replace('/profile');
}

let currentStep = 0;

function goStep(n) {
  const cur = document.getElementById('step-' + currentStep);
  const nxt = document.getElementById('step-' + n);
  cur.classList.add('exit');
  setTimeout(() => cur.classList.remove('active', 'exit'), 400);
  nxt.classList.add('active');
  currentStep = n;
  if (n === 1) document.getElementById('nameInput').focus();
  if (n === 2) document.getElementById('emailInput').focus();
}

// ── Welcome typewriter ──
(function(){
  const words = ['YOU', 'WERE', 'THERE'];
  const els = [document.getElementById('wl-1'), document.getElementById('wl-2'), document.getElementById('wl-3')];
  let i = 0;
  function showNext() {
    if (i >= words.length) {
      setTimeout(() => document.getElementById('w-cta').classList.add('show'), 400);
      return;
    }
    els[i].textContent = words[i];
    els[i].classList.add('show');
    i++;
    setTimeout(showNext, 350);
  }
  setTimeout(showNext, 600);
})();

// ── Step 1: name validation ──
const nameInput = document.getElementById('nameInput');
const next1 = document.getElementById('next-1');
nameInput.addEventListener('input', () => {
  next1.classList.toggle('enabled', nameInput.value.trim().length > 0);
});

// ── Step 2: account validation ──
const emailInput = document.getElementById('emailInput');
const passInput  = document.getElementById('passInput');
const termsCheck = document.getElementById('termsCheck');
const next2      = document.getElementById('next-2');
const errorMsg   = document.getElementById('errorMsg');

function checkStep2() {
  const ok = emailInput.value.trim() &&
             passInput.value.length >= 8 &&
             termsCheck.checked;
  next2.classList.toggle('enabled', !!ok);
}
emailInput.addEventListener('input', checkStep2);
passInput.addEventListener('input', checkStep2);
termsCheck.addEventListener('change', checkStep2);

function showError(msg) {
  errorMsg.textContent = msg;
  errorMsg.classList.add('visible');
}

function friendlyError(code) {
  const map = {
    'auth/email-already-in-use':   'このメールアドレスは既に登録されています',
    'auth/invalid-email':          'メールアドレスの形式が正しくありません',
    'auth/weak-password':          'パスワードは8文字以上にしてください',
    'auth/network-request-failed': 'ネットワークエラー。接続を確認してください',
    'auth/too-many-requests':      '時間を置いて再度お試しください',
  };
  return map[code] || '登録に失敗しました';
}

// ── Submit ──
async function submitSignup() {
  if (!next2.classList.contains('enabled')) return;
  errorMsg.classList.remove('visible');

  const name  = nameInput.value.trim().toUpperCase();
  const email = emailInput.value.trim();
  const pass  = passInput.value;

  next2.disabled = true;
  next2.textContent = '作成中…';

  try {
    if (!window.FB) await new Promise(r => window.addEventListener('fb-auth-ready', r, { once:true }));
    const { auth, db, createUserWithEmailAndPassword, doc, setDoc, serverTimestamp, sendEmailVerification, getDoc } = window.FB;

    // ── Username uniqueness check ──
    // The lowercase of the display name is the canonical key in
    // `usernames/{nameLower}`. If it already exists, reject the
    // signup before we burn a Firebase Auth account.
    const nameLower = name.toLowerCase();
    try {
      const taken = await getDoc(doc(db, 'usernames', nameLower));
      if (taken.exists()) {
        showError('このアカウント名はすでに使われています。別の名前を試してください。');
        next2.disabled = false;
        next2.textContent = 'アカウント作成';
        return;
      }
    } catch (err) {
      // Availability check failed (offline / rules) — continue and
      // rely on the transactional claim below. Better to surface a
      // race-condition error than to block signup on network glitches.
      console.warn('username availability check failed:', err);
    }

    const cred = await createUserWithEmailAndPassword(auth, email, pass);
    const uid = cred.user.uid;

    // Claim the username. If this throws (another signup raced us),
    // roll back — delete the freshly-created auth account and surface
    // the collision to the user.
    try {
      await setDoc(doc(db, 'usernames', nameLower), {
        uid: uid,
        name: name,
        claimedAt: serverTimestamp(),
      });
    } catch (err) {
      console.error('username claim failed:', err);
      try { await cred.user.delete(); } catch(_){}
      showError('このアカウント名はすでに使われています。別の名前を試してください。');
      next2.disabled = false;
      next2.textContent = 'アカウント作成';
      return;
    }

    await setDoc(doc(db, 'users', uid), {
      name: name,
      email: email,
      plan: 'free',
      avatar: null,
      agreedTermsAt: serverTimestamp(),
      createdAt: serverTimestamp(),
    });

    localStorage.setItem('livepass_account_name', name);
    localStorage.setItem('livepass_uid', uid);
    localStorage.setItem('livepass_last_email', email);
    localStorage.setItem('livepass_plan', 'free');
    localStorage.setItem('livepass_signed_in', '1');
    localStorage.setItem('livepass_onboarded_at', new Date().toISOString());
    localStorage.setItem('livepass_email_verified', '0');

    // Fire a confirmation email so the account can graduate from
    // "未認証" to "本人確認済み" and unlock reservations / paid flows.
    // Silent best-effort — Firebase sometimes rate-limits the send,
    // and the user can always re-issue from Settings.
    try {
      if (sendEmailVerification) await sendEmailVerification(cred.user);
    } catch(err) { console.warn('sendEmailVerification failed:', err); }
  } catch (e) {
    console.error('signup error:', e);
    showError(friendlyError(e.code));
    next2.disabled = false;
    next2.textContent = 'アカウント作成';
    return;
  }

  document.getElementById('readyName').textContent = nameInput.value.trim();
  if (navigator.vibrate) navigator.vibrate([18, 40, 18]);
  goStep(3);
}
</script>
<div id="__v">v68</div>
</body>
</html>
